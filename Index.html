<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Story Wayfinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#EAF4FB;font-family:'Barlow',system-ui,sans-serif;color:#333}
#app{min-height:100vh}

/* transitions */
.page{min-height:100vh;animation:pageIn .32s ease both}
@keyframes pageIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.page-home{animation:fadeIn .28s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* wheel dimming */
.wedge{transition:opacity .2s ease;cursor:pointer}
.wedge.dim{opacity:.35}

/* hover card */
.hover-card{transition:opacity .18s ease,transform .18s ease;min-height:72px;border-radius:16px;padding:12px 16px;text-align:center;margin-top:6px}
.hover-card.hide{opacity:0;transform:translateY(5px);pointer-events:none}
.hover-card.show{opacity:1;transform:translateY(0)}

/* back button */
.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;border:none;border-radius:20px;padding:10px 18px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;color:#004B86;box-shadow:0 4px 16px rgba(0,97,173,.12);transition:transform .15s ease}
.back-btn:hover{transform:translateY(-2px)}
.back-btn:active{transform:scale(.97)}

/* layout */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px}
.header-left{display:flex;align-items:center;gap:16px}
.divider{width:1px;height:28px;background:#c8d8e8}
.tag{font-size:12px;font-weight:600;color:#8fa0b0;letter-spacing:.2em;text-transform:uppercase}

.logo{display:inline-flex;align-items:center;justify-content:center;background:#0061AD;border-radius:5px;height:40px;padding:0 10px}
.logo span{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-style:italic;font-size:29px;color:white;letter-spacing:-.02em;line-height:1;user-select:none}

.container{max-width:1100px;margin:0 auto;padding:8px 32px 48px}
.center-block{text-align:center;max-width:580px;margin:0 auto 28px}
.title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:48px;font-weight:800;color:#004B86;letter-spacing:-.02em}
.subtitle{color:#666;font-size:16px;line-height:1.75;margin-top:12px}

.grid-2{display:grid;grid-template-columns:min(480px,100%) 1fr;gap:28px;align-items:start}
.card{background:white;border-radius:28px;padding:28px;box-shadow:0 6px 24px rgba(0,97,173,.07)}
.wheel-card{background:white;border-radius:28px;padding:22px 22px 14px;box-shadow:0 16px 48px rgba(0,97,173,.13),0 2px 12px rgba(0,0,0,.05)}
.side-col{display:flex;flex-direction:column;gap:20px}
.card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:21px;font-weight:800;color:#004B86;margin-bottom:12px}
.card p{color:#666;line-height:1.75;font-size:14.5px}
.card ul{color:#666;line-height:1.8;font-size:14.5px;padding-left:18px}

/* detail page */
.hero{border-radius:28px;padding:30px 36px;margin-bottom:24px;position:relative;overflow:hidden}
.hero-blob1{position:absolute;top:-40px;right:-20px;width:200px;height:200px;border-radius:50%;background:white;opacity:.055;pointer-events:none}
.hero-blob2{position:absolute;bottom:-30px;right:80px;width:110px;height:110px;border-radius:50%;background:white;opacity:.04;pointer-events:none}
.hero-eyebrow{color:rgba(255,255,255,.7);font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;margin-bottom:8px}
.hero h1{color:white;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:42px;font-weight:800;letter-spacing:-.01em}
.hero p{color:rgba(255,255,255,.82);font-size:15px;margin-top:8px;line-height:1.65;max-width:620px}

.detail-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:24px}
.model-card{background:white;border-radius:28px;padding:28px;box-shadow:0 8px 28px rgba(0,97,173,.08)}
.model-eyebrow{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A8E91;margin-bottom:4px}
.model-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:24px;font-weight:800;color:#004B86;margin-bottom:8px}
.model-card .desc{color:#666;font-size:14px;line-height:1.65;margin-bottom:20px}
.right-col{display:flex;flex-direction:column;gap:20px}
.bullets-card{background:white;border-radius:28px;padding:24px;box-shadow:0 8px 28px rgba(0,97,173,.08)}
.bullets-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:20px;font-weight:800;color:#004B86;margin-bottom:14px}
.bullet-item{background:#EAF4FB;border-radius:14px;padding:10px 14px;font-size:14px;color:#004B86;font-weight:500;margin-bottom:10px}
.note-card{background:#004B86;border-radius:28px;padding:24px;box-shadow:0 8px 28px rgba(0,97,173,.12)}
.note-eyebrow{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-bottom:8px}
.note-card p{color:rgba(255,255,255,.88);font-size:14px;line-height:1.72}

/* animations */
.slide-up{animation:slideUp .36s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.delay1{animation-delay:.04s}
.delay2{animation-delay:.12s}
.delay3{animation-delay:.18s}
.delay4{animation-delay:.24s}

/* johari */
.johari-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:220px}
.johari-cell{border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between;animation:springIn .4s ease both}
@keyframes springIn{0%{opacity:0;transform:scale(.84)}70%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
.johari-cell h3{color:white;font-weight:700;font-size:13px;line-height:1.3}
.johari-cell p{color:rgba(255,255,255,.75);font-size:11px;line-height:1.55;margin-top:8px;white-space:pre-line}

/* grow */
.grow-list{display:flex;flex-direction:column;gap:10px;min-height:220px}
.grow-row{display:flex;align-items:center;gap:14px;background:white;border-radius:14px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);animation:slideInLeft .38s ease both}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
.grow-letter{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:18px;flex-shrink:0}
.grow-row h3{font-weight:700;font-size:13px;color:#1a2a3a}
.grow-row p{font-size:12px;color:#666;margin-top:2px}

/* tuckman */
.tuck-wrap{display:flex;flex-direction:column;gap:13px;min-height:220px;justify-content:center}
.tuck-label{font-size:11px;color:#8A8E91;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:2px}
.tuck-row{display:flex;align-items:center;gap:12px}
.tuck-name{width:80px;font-size:12px;font-weight:600;color:#2a3a4a;flex-shrink:0}
.tuck-track{flex:1;background:#EEF2F6;border-radius:6px;height:18px;overflow:hidden}
.tuck-bar{height:100%;border-radius:6px;width:0;transition:width .68s ease}
.tuck-note{font-size:11px;color:#aaa;margin-top:6px;line-height:1.5}

/* change curve */
.curve-wrap{width:100%;min-height:220px}
.curve-path{stroke-dasharray:1200;stroke-dashoffset:1200;animation:drawCurve 1.6s .2s ease forwards}
@keyframes drawCurve{to{stroke-dashoffset:0}}
.curve-fill{opacity:0;animation:fadeIn .7s .7s ease forwards}
.curve-dot{opacity:0;transform-box:fill-box;transform-origin:center;animation:popIn .3s ease forwards}
@keyframes popIn{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
const C = {
  blue:'#0061AD', blueDark:'#004B86', blueDeep:'#1A3A5C',
  orange:'#F26522', teal:'#009FA0', grey:'#666666',
  bg:'#EAF4FB', wheel:'#1A5CB0', wheelHub:'#154F9E'
};

const SECTIONS = [
  { id:'self',   label:'Leading Self',   short:'Self',   color:C.blue,
    tagline:'Developing your inner leader',
    desc:'Developing your ability to lead yourself effectively is the foundation of everything else in the Liberator Programme.',
    bullets:['Personal effectiveness','Self-awareness','Intentional leadership habits'],
    modelTitle:'The Johari Window',
    modelDesc:'A framework for understanding self-awareness and how others perceive us. Effective leaders actively work to expand the Open area through feedback and honest disclosure.' },
  { id:'others', label:'Leading Others', short:'Others', color:C.orange,
    tagline:'Building powerful one-to-one relationships',
    desc:'Great leadership is built one relationship at a time. This section focuses on how you show up with the individuals you lead.',
    bullets:['Communication','Coaching and support','Building trust'],
    modelTitle:'The GROW Model',
    modelDesc:'A structured coaching conversation model used by leaders to help their people set goals, explore current reality, generate options, and commit to action.' },
  { id:'teams',  label:'Leading Teams',  short:'Teams',  color:C.teal,
    tagline:'Creating high-performing team environments',
    desc:'Teams do not become high-performing by accident. This section explores how you shape the conditions for collective success.',
    bullets:['Team alignment','Decision-making','Shared accountability'],
    modelTitle:"Tuckman's Stages",
    modelDesc:'Every team travels through four key stages on its journey to high performance. Leaders who understand where their team sits can adapt their style accordingly.' },
  { id:'change', label:'Leading Change', short:'Change', color:C.blueDeep,
    tagline:'Navigating and sustaining transformation',
    desc:'Leading change well means understanding both the technical and human sides of transformation and meeting people where they are.',
    bullets:['Direction and momentum','Adapting well','Sustaining progress'],
    modelTitle:'The Change Curve',
    modelDesc:'Based on the work of Elisabeth Kübler-Ross, this model maps the emotional journey people travel during change. Knowing where people are helps leaders provide the right support at the right time.' },
];

// ── Geometry ───────────────────────────────────────────────────────────────
function polar(cx,cy,r,deg){
  const rad=((deg-90)*Math.PI)/180;
  return {x:cx+r*Math.cos(rad), y:cy+r*Math.sin(rad)};
}
function wedgePath(cx,cy,r0,r1,a0,a1){
  const s0=polar(cx,cy,r1,a0), e0=polar(cx,cy,r1,a1);
  const s1=polar(cx,cy,r0,a1), e1=polar(cx,cy,r0,a0);
  return `M${s0.x} ${s0.y} A${r1} ${r1} 0 0 1 ${e0.x} ${e0.y} L${s1.x} ${s1.y} A${r0} ${r0} 0 0 0 ${e1.x} ${e1.y}Z`;
}

// ── Audio ──────────────────────────────────────────────────────────────────
let audioCtx = null;
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playShush(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.09),ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(); src.buffer=buf;
    const flt=ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=3800; flt.Q.value=0.7;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.055,now+.008); g.gain.exponentialRampToValueAtTime(.0001,now+.09);
    src.connect(flt); flt.connect(g); g.connect(ctx.destination); src.start(now); src.stop(now+.1);
  }catch(e){}
}
function playChime(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [523.25,783.99].forEach((freq,i)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.07-i*.015,now+.01); g.gain.exponentialRampToValueAtTime(.0001,now+.7);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+.75);
    });
  }catch(e){}
}
function playReturn(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [{f:783.99,d:0},{f:523.25,d:.09}].forEach(({f,d})=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=f;
      g.gain.setValueAtTime(0,now+d); g.gain.linearRampToValueAtTime(.06,now+d+.01); g.gain.exponentialRampToValueAtTime(.0001,now+d+.55);
      osc.connect(g); g.connect(ctx.destination); osc.start(now+d); osc.stop(now+d+.6);
    });
  }catch(e){}
}

// ── SVG helpers ────────────────────────────────────────────────────────────
const SVG_NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs={}){
  const el=document.createElementNS(SVG_NS,tag);
  for(const[k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
function iconSelf(cx,cy,s=12){
  const g=svgEl('g',{transform:`translate(${cx},${cy})`,style:'pointer-events:none'});
  g.appendChild(svgEl('circle',{cy:-s*.44,r:s*.3,fill:'white','fill-opacity':.95}));
  g.appendChild(svgEl('path',{d:`M${-s*.52} ${s*.52} Q${-s*.52} 0 0 0 Q${s*.52} 0 ${s*.52} ${s*.52}`,fill:'white','fill-opacity':.95}));
  return g;
}
function iconOthers(cx,cy,s=12){
  const g=svgEl('g',{transform:`translate(${cx},${cy})`,style:'pointer-events:none'});
  g.appendChild(svgEl('circle',{cx:s*.22,cy:-s*.44,r:s*.26,fill:'white','fill-opacity':.65}));
  g.appendChild(svgEl('path',{d:`M${-s*.18} ${s*.52} Q${-s*.18} ${s*.04} ${s*.22} ${s*.04} Q${s*.62} ${s*.04} ${s*.62} ${s*.52}`,fill:'white','fill-opacity':.65}));
  g.appendChild(svgEl('circle',{cx:-s*.22,cy:-s*.44,r:s*.26,fill:'white','fill-opacity':.97}));
  g.appendChild(svgEl('path',{d:`M${-s*.62} ${s*.52} Q${-s*.62} ${s*.04} ${-s*.22} ${s*.04} Q${s*.18} ${s*.04} ${s*.18} ${s*.52}`,fill:'white','fill-opacity':.97}));
  return g;
}
function iconTeams(cx,cy,s=12){
  const g=svgEl('g',{transform:`translate(${cx},${cy})`,style:'pointer-events:none'});
  const nodes=[{x:0,y:-s*.62},{x:-s*.54,y:s*.42},{x:s*.54,y:s*.42}];
  [[0,1],[0,2],[1,2]].forEach(([a,b])=>{
    g.appendChild(svgEl('line',{x1:nodes[a].x,y1:nodes[a].y,x2:nodes[b].x,y2:nodes[b].y,stroke:'white','stroke-opacity':.88,'stroke-width':1.8}));
  });
  nodes.forEach(n=>g.appendChild(svgEl('circle',{cx:n.x,cy:n.y,r:s*.22,fill:'white','fill-opacity':.97})));
  return g;
}
function iconChange(cx,cy,s=12){
  const g=svgEl('g',{transform:`translate(${cx},${cy})`,style:'pointer-events:none'});
  const props={fill:'none',stroke:'white','stroke-opacity':.95,'stroke-width':2.1,'stroke-linecap':'round'};
  g.appendChild(svgEl('path',{...props,d:`M${-s*.5} ${-s*.08} A${s*.48} ${s*.48} 0 0 1 ${s*.5} ${-s*.08}`}));
  g.appendChild(svgEl('path',{...props,'stroke-linejoin':'round',d:`M${s*.26} ${-s*.33} L${s*.5} ${-s*.08} L${s*.2} ${s*.04}`}));
  g.appendChild(svgEl('path',{...props,d:`M${s*.5} ${s*.08} A${s*.48} ${s*.48} 0 0 1 ${-s*.5} ${s*.08}`}));
  g.appendChild(svgEl('path',{...props,'stroke-linejoin':'round',d:`M${-s*.26} ${s*.33} L${-s*.5} ${s*.08} L${-s*.2} ${-s*.04}`}));
  return g;
}
const ICON_FNS=[iconSelf,iconOthers,iconTeams,iconChange];

// ── Build wheel SVG ────────────────────────────────────────────────────────
function buildWheel(onHover,onClick){
  const CX=200,CY=200,R0=58,R1=154;
  const svg=svgEl('svg',{viewBox:'0 0 400 400',style:'width:100%;height:auto'});
  const wedgeEls=[];

  SECTIONS.forEach((sec,i)=>{
    const a0=i*90, a1=(i+1)*90, mid=i*90+45, span=R1-R0;
    const iconPt=polar(CX,CY,R0+span*.28,mid);
    const labelPt=polar(CX,CY,R0+span*.7,mid);
    const g=svgEl('g',{class:'wedge'});

    const path=svgEl('path',{d:wedgePath(CX,CY,R0,R1,a0,a1),fill:C.wheel,style:'cursor:pointer'});
    path.addEventListener('mouseenter',()=>onHover(sec.id));
    path.addEventListener('mouseleave',()=>onHover(null));
    path.addEventListener('click',()=>onClick(sec.id));

    g.appendChild(path);
    g.appendChild(ICON_FNS[i](iconPt.x,iconPt.y));

    const txt=svgEl('text',{x:labelPt.x,y:labelPt.y,'text-anchor':'middle','dominant-baseline':'middle',
      fill:'white','font-size':13.5,'font-family':"'Barlow Condensed','Arial Narrow',sans-serif",
      'font-weight':700,style:'pointer-events:none;letter-spacing:.04em'});
    txt.textContent=sec.short;
    g.appendChild(txt);
    svg.appendChild(g);
    wedgeEls.push(g);
  });

  // cross + ring
  svg.appendChild(svgEl('line',{x1:CX,y1:CY-R1,x2:CX,y2:CY+R1,stroke:'white','stroke-width':3}));
  svg.appendChild(svgEl('line',{x1:CX-R1,y1:CY,x2:CX+R1,y2:CY,stroke:'white','stroke-width':3}));
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R1,fill:'none',stroke:'white','stroke-width':3}));

  // hub
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R0,fill:C.wheelHub}));
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R0-8,fill:'none',stroke:'white','stroke-opacity':.18,'stroke-width':1.5}));
  const t1=svgEl('text',{x:CX,y:CY-9,'text-anchor':'middle',
    'font-family':"'Barlow Condensed','Arial Narrow',sans-serif",
    'font-weight':800,'font-style':'italic','font-size':16,fill:'white','letter-spacing':.5});
  t1.textContent='STORY';
  svg.appendChild(t1);
  const t2=svgEl('text',{x:CX,y:CY+12,'text-anchor':'middle',
    'font-family':"'Barlow',sans-serif",'font-weight':500,'font-size':9,
    fill:'white','fill-opacity':.6,'letter-spacing':2});
  t2.textContent='WAYFINDER';
  svg.appendChild(t2);

  return {svg, wedgeEls};
}

// ── Model HTML builders ────────────────────────────────────────────────────
function buildJohari(){
  const cells=[
    {label:'Open / Arena',    sub:'Known to self\nKnown to others',     color:C.blue,   d:'.08s'},
    {label:'Blind Spot',      sub:'Unknown to self\nKnown to others',   color:C.orange, d:'.2s'},
    {label:'Hidden / Façade', sub:'Known to self\nUnknown to others',   color:C.teal,   d:'.32s'},
    {label:'Unknown',         sub:'Unknown to self\nUnknown to others', color:'#666',   d:'.44s'},
  ];
  const grid=document.createElement('div');
  grid.className='johari-grid';
  cells.forEach(c=>{
    const cell=document.createElement('div');
    cell.className='johari-cell';
    cell.style.cssText=`background:${c.color};animation-delay:${c.d}`;
    cell.innerHTML=`<h3>${c.label}</h3><p>${c.sub}</p>`;
    grid.appendChild(cell);
  });
  return grid;
}

function buildGrow(){
  const steps=[
    {letter:'G',word:'Goal',        desc:'What do you want to achieve?', color:C.blue,    d:'.05s'},
    {letter:'R',word:'Reality',     desc:'Where are you right now?',      color:C.orange,  d:'.15s'},
    {letter:'O',word:'Options',     desc:'What could you do about it?',   color:C.teal,    d:'.25s'},
    {letter:'W',word:'Way Forward', desc:'What will you commit to?',      color:C.blueDeep,d:'.35s'},
  ];
  const list=document.createElement('div');
  list.className='grow-list';
  steps.forEach(s=>{
    const row=document.createElement('div');
    row.className='grow-row';
    row.style.cssText=`border-left:4px solid ${s.color};animation-delay:${s.d}`;
    row.innerHTML=`<div class="grow-letter" style="background:${s.color}">${s.letter}</div><div><h3>${s.word}</h3><p>${s.desc}</p></div>`;
    list.appendChild(row);
  });
  return list;
}

function buildTuckman(){
  const stages=[
    {name:'Forming',   perf:26,color:C.blue,    d:'.05s'},
    {name:'Storming',  perf:11,color:C.orange,  d:'.16s'},
    {name:'Norming',   perf:54,color:'#1874C4', d:'.27s'},
    {name:'Performing',perf:91,color:C.teal,    d:'.38s'},
    {name:'Adjourning',perf:55,color:C.blueDeep,d:'.49s'},
  ];
  const wrap=document.createElement('div');
  wrap.className='tuck-wrap';
  const lbl=document.createElement('p');
  lbl.className='tuck-label'; lbl.textContent='Team performance';
  wrap.appendChild(lbl);
  stages.forEach(s=>{
    const row=document.createElement('div'); row.className='tuck-row';
    const name=document.createElement('div'); name.className='tuck-name'; name.textContent=s.name;
    const track=document.createElement('div'); track.className='tuck-track';
    const bar=document.createElement('div');
    bar.className='tuck-bar';
    bar.style.cssText=`background:${s.color};transition-delay:${s.d}`;
    bar.dataset.target=s.perf;
    track.appendChild(bar); row.appendChild(name); row.appendChild(track);
    wrap.appendChild(row);
  });
  const note=document.createElement('p'); note.className='tuck-note';
  note.textContent='Note: Storming is a natural dip, not a failure. Great leaders navigate this stage with empathy and clarity.';
  wrap.appendChild(note);
  // trigger bars after paint
  setTimeout(()=>{
    wrap.querySelectorAll('.tuck-bar').forEach(b=>{ b.style.width=b.dataset.target+'%'; });
  },120);
  return wrap;
}

function buildChangeCurve(){
  const W=430,H=195;
  const pts=[
    {nx:.03,ny:.14,label:'Shock'},
    {nx:.17,ny:.36,label:'Denial'},
    {nx:.32,ny:.69,label:'Frustration'},
    {nx:.48,ny:.86,label:'Depression'},
    {nx:.63,ny:.57,label:'Experiment'},
    {nx:.79,ny:.26,label:'Decision'},
    {nx:.96,ny:.09,label:'Integration'},
  ].map(p=>({x:p.nx*W,y:p.ny*H,label:p.label}));

  const curve=pts.reduce((acc,pt,i)=>{
    if(i===0) return `M${pt.x.toFixed(1)} ${pt.y.toFixed(1)}`;
    const prev=pts[i-1], cpx=((prev.x+pt.x)/2).toFixed(1);
    return acc+` C${cpx} ${prev.y.toFixed(1)} ${cpx} ${pt.y.toFixed(1)} ${pt.x.toFixed(1)} ${pt.y.toFixed(1)}`;
  },'');

  const svg=svgEl('svg',{viewBox:`0 0 ${W} ${H+30}`,style:'width:100%;height:auto'});
  svg.appendChild(svgEl('line',{x1:0,y1:H,x2:W,y2:H,stroke:'#d8e4ee','stroke-width':1}));

  const fill=svgEl('path',{d:curve+` L${pts[pts.length-1].x} ${H} L${pts[0].x} ${H} Z`,fill:C.blue+'13',class:'curve-fill'});
  svg.appendChild(fill);
  const line=svgEl('path',{d:curve,fill:'none',stroke:C.blue,'stroke-width':2.6,'stroke-linecap':'round',class:'curve-path'});
  svg.appendChild(line);

  pts.forEach((pt,i)=>{
    const low=pt.y>H*.55;
    const g=svgEl('g',{class:'curve-dot',style:`animation-delay:${.35+i*.13}s;transform-origin:${pt.x}px ${pt.y}px`});
    g.appendChild(svgEl('circle',{cx:pt.x,cy:pt.y,r:5,fill:C.blue}));
    g.appendChild(svgEl('circle',{cx:pt.x,cy:pt.y,r:3,fill:'white'}));
    const t=svgEl('text',{x:pt.x,y:low?pt.y+14:pt.y-10,'text-anchor':'middle','font-size':9.5,fill:'#666','font-family':'Barlow,sans-serif','font-weight':500});
    t.textContent=pt.label;
    g.appendChild(t);
    svg.appendChild(g);
  });
  const vt=svgEl('text',{x:pts[3].x,y:H+20,'text-anchor':'middle','font-size':9,fill:'#b0c0cc','font-family':'Barlow,sans-serif'});
  vt.textContent='Emotional valley';
  svg.appendChild(vt);

  const wrap=document.createElement('div'); wrap.className='curve-wrap';
  wrap.appendChild(svg);
  return wrap;
}

const MODEL_BUILDERS={self:buildJohari,others:buildGrow,teams:buildTuckman,change:buildChangeCurve};

// ── Header ─────────────────────────────────────────────────────────────────
function buildHeader(rightEl=null){
  const header=document.createElement('div'); header.className='header';
  const left=document.createElement('div'); left.className='header-left';
  const logo=document.createElement('div'); logo.className='logo';
  logo.innerHTML='<span>STORY</span>';
  const div=document.createElement('div'); div.className='divider';
  const tag=document.createElement('span'); tag.className='tag'; tag.textContent='Concept Demo';
  left.appendChild(logo); left.appendChild(div); left.appendChild(tag);
  header.appendChild(left);
  if(rightEl) header.appendChild(rightEl);
  return header;
}

// ── Wheel page ─────────────────────────────────────────────────────────────
function buildWheelPage(onOpen){
  const page=document.createElement('div');
  page.className='page page-home';
  page.style.background=C.bg;

  let hovered=null;
  const {svg,wedgeEls}=buildWheel(
    (id)=>{
      if(id!==null && id!==hovered) playShush();
      hovered=id;
      wedgeEls.forEach((g,i)=>{
        if(id===null) g.classList.remove('dim');
        else g.classList.toggle('dim', SECTIONS[i].id!==id);
      });
      if(id){
        const sec=SECTIONS.find(s=>s.id===id);
        hoverCard.style.background=sec.color;
        hoverCard.querySelector('.hc-label').textContent=sec.label;
        hoverCard.querySelector('.hc-tag').textContent=sec.tagline;
        hoverCard.classList.remove('hide'); hoverCard.classList.add('show');
      } else {
        hoverCard.classList.remove('show'); hoverCard.classList.add('hide');
      }
    },
    (id)=>{ playChime(); onOpen(id); }
  );

  const hoverCard=document.createElement('div');
  hoverCard.className='hover-card hide';
  hoverCard.innerHTML='<p class="hc-label" style="color:white;font-weight:700;font-size:14px"></p><p class="hc-tag" style="color:rgba(255,255,255,.8);font-size:12px;margin-top:4px;line-height:1.5"></p><p style="color:rgba(255,255,255,.55);font-size:10px;margin-top:6px;letter-spacing:.16em;text-transform:uppercase">Click to explore</p>';

  const wheelCard=document.createElement('div'); wheelCard.className='wheel-card';
  wheelCard.appendChild(svg); wheelCard.appendChild(hoverCard);

  const sideCol=document.createElement('div'); sideCol.className='side-col';

  const c1=document.createElement('div'); c1.className='card';
  c1.innerHTML='<h2>What this demonstrates</h2><p>This concept uses a single-page app that behaves like a multi-page experience. It shows how a wheel on the intranet could act as a visual navigation tool, taking colleagues to separate pages with different content while keeping the interaction smooth and intuitive.</p>';

  const c2=document.createElement('div'); c2.className='card';
  c2.innerHTML='<h2>Potential next steps</h2><ul><li>Replace the placeholder section names with the final Story Wayfinder themes or modules.</li><li>Add the actual diagrams, models, or programme content to each destination page.</li><li>Refine the motion, colours, and typography to match the Story brand and intranet style.</li><li>Add proper routing so each section has its own shareable link within the intranet.</li></ul>';

  sideCol.appendChild(c1); sideCol.appendChild(c2);

  const grid=document.createElement('div'); grid.className='grid-2';
  grid.appendChild(wheelCard); grid.appendChild(sideCol);

  const centreBlock=document.createElement('div'); centreBlock.className='center-block';
  centreBlock.innerHTML='<h1 class="title">Story Wayfinder</h1><p class="subtitle">This is a simple concept to show how Story Wayfinder could work as an interactive navigation experience. Hovering over a section highlights it while the others fade back. Clicking takes the user through to a dedicated page.</p>';

  const container=document.createElement('div'); container.className='container';
  container.appendChild(centreBlock); container.appendChild(grid);

  page.appendChild(buildHeader()); page.appendChild(container);
  return page;
}

// ── Detail page ────────────────────────────────────────────────────────────
function buildDetailPage(sec,onBack){
  const page=document.createElement('div');
  page.className='page'; page.style.background=C.bg;

  const backBtn=document.createElement('button'); backBtn.className='back-btn';
  backBtn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back to wheel';
  backBtn.addEventListener('click',()=>{ playReturn(); onBack(); });

  const hero=document.createElement('div');
  hero.className='hero slide-up delay1';
  hero.style.background=sec.color;
  hero.innerHTML=`<div class="hero-blob1"></div><div class="hero-blob2"></div><p class="hero-eyebrow">Selected section</p><h1>${sec.label}</h1><p>${sec.desc}</p>`;

  const modelCard=document.createElement('div'); modelCard.className='model-card slide-up delay2';
  const eyebrow=document.createElement('p'); eyebrow.className='model-eyebrow'; eyebrow.textContent='Model';
  const mTitle=document.createElement('h2'); mTitle.textContent=sec.modelTitle;
  const mDesc=document.createElement('p'); mDesc.className='desc'; mDesc.textContent=sec.modelDesc;
  modelCard.appendChild(eyebrow); modelCard.appendChild(mTitle); modelCard.appendChild(mDesc);
  modelCard.appendChild(MODEL_BUILDERS[sec.id]());

  const bulletsCard=document.createElement('div'); bulletsCard.className='bullets-card slide-up delay3';
  bulletsCard.innerHTML='<h2>Illustrative content</h2>';
  sec.bullets.forEach(b=>{
    const item=document.createElement('div'); item.className='bullet-item';
    item.style.borderLeft=`3px solid ${sec.color}`;
    item.textContent=b; bulletsCard.appendChild(item);
  });

  const noteCard=document.createElement('div'); noteCard.className='note-card slide-up delay4';
  noteCard.innerHTML='<p class="note-eyebrow">Intranet note</p><p>Once we are happy with the motion and layout, this could be adapted for our intranet with separate pages, navigation, and branded assets.</p>';

  const rightCol=document.createElement('div'); rightCol.className='right-col';
  rightCol.appendChild(bulletsCard); rightCol.appendChild(noteCard);

  const detailGrid=document.createElement('div'); detailGrid.className='detail-grid';
  detailGrid.appendChild(modelCard); detailGrid.appendChild(rightCol);

  const container=document.createElement('div'); container.className='container';
  container.appendChild(hero); container.appendChild(detailGrid);

  page.appendChild(buildHeader(backBtn)); page.appendChild(container);
  return page;
}

// ── Router ─────────────────────────────────────────────────────────────────
const app=document.getElementById('app');
let currentPage=null;

function showPage(el){
  if(currentPage) app.removeChild(currentPage);
  app.appendChild(el);
  currentPage=el;
}

function goHome(){
  showPage(buildWheelPage(goDetail));
}

function goDetail(id){
  const sec=SECTIONS.find(s=>s.id===id);
  showPage(buildDetailPage(sec,goHome));
}

goHome();
</script>
