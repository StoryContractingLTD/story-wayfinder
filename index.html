// ============================================================
//  WHEEL SVG (embedded original)
// ============================================================
function getWheelSVG() {
  const div = document.createElement('div');
  div.innerHTML = WHEEL_SVG_STRING;
  const svg = div.querySelector('svg');
  svg.setAttribute('id','main-wheel');
  svg.style.cssText = 'width:100%;height:auto;display:block';
  return svg;
}

// ============================================================
//  OVERLAY SVG
// ============================================================
function buildOverlaySVG(onHover, onClick, onHoverHub, onClickHub) {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('id','overlay-svg');
  svg.setAttribute('viewBox','0 0 2200 2200');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%';

  const wedgeEls = [];

  SEGMENTS.forEach(seg => {
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', wedgePath(CX, CY, R_INNER, R_OUTER, seg.startAngle, seg.endAngle));
    path.setAttribute('class', 'ov-wedge');
    path.dataset.id = seg.id;
    path.addEventListener('mouseenter', () => onHover(seg.id));
    path.addEventListener('click', () => onClick(seg.id));
    svg.appendChild(path);
    wedgeEls.push(path);
  });

  // Centre hub — outer pulse ring, inner pulse ring, then transparent hit circle
  const hubRingOuter = document.createElementNS(NS, 'circle');
  hubRingOuter.setAttribute('cx', CX); hubRingOuter.setAttribute('cy', CY); hubRingOuter.setAttribute('r', R_INNER + 30);
  hubRingOuter.setAttribute('class', 'hub-ring-outer');
  svg.appendChild(hubRingOuter);

  const hubRing = document.createElementNS(NS, 'circle');
  hubRing.setAttribute('cx', CX); hubRing.setAttribute('cy', CY); hubRing.setAttribute('r', R_INNER - 10);
  hubRing.setAttribute('class', 'hub-ring');
  svg.appendChild(hubRing);

  const hubCircle = document.createElementNS(NS, 'circle');
  hubCircle.setAttribute('cx', CX); hubCircle.setAttribute('cy', CY); hubCircle.setAttribute('r', R_INNER);
  hubCircle.setAttribute('class', 'hub-circle');
  hubCircle.addEventListener('mouseenter', () => {
    svg.classList.add('hub-hovered');
    onHoverHub(true);
  });
  hubCircle.addEventListener('mouseleave', () => {
    svg.classList.remove('hub-hovered');
    onHoverHub(false);
  });
  hubCircle.addEventListener('click', () => onClickHub());
  svg.appendChild(hubCircle);

  svg.addEventListener('mouseleave', () => { svg.classList.remove('hub-hovered'); onHover(null); });

  return { svg, wedgeEls };
}

// ============================================================
//  WHEEL PAGE
// ============================================================
function buildWheelPage(onOpen) {
  const page = document.createElement('div');
  page.className = 'page page-home';
  page.style.background = '#EAF4FB';

  let hoveredId = null;

  // Create hoverBar before overlay so callbacks can reference it
  const hoverBar = document.createElement('div');
  hoverBar.className = 'hover-bar idle';
  const hoverBarContent = document.createElement('div');
  hoverBarContent.className = 'hover-bar-content';
  hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to see what each section covers</div>';
  hoverBar.appendChild(hoverBarContent);

  const wheelSVG = getWheelSVG();
  const container = document.createElement('div');
  container.className = 'wheel-svg-container';
  container.appendChild(wheelSVG);

  const { svg: overlaySVG, wedgeEls } = buildOverlaySVG(
    (id) => {
      if (id !== null && id !== hoveredId) playShush();
      hoveredId = id;

      if (id) {
        container.classList.add('has-hover');
        wedgeEls.forEach(w => {
          w.classList.toggle('active', w.dataset.id === id);
        });
        const seg = SEGMENTS.find(s => s.id === id);
        hoverBar.className = 'hover-bar active';
        hoverBar.style.background = QUADRANT_COLOURS[seg.quadrant];
        hoverBarContent.innerHTML = `
          <div class="quadrant-label" style="color:rgba(255,255,255,.6)">${seg.quadrant}</div>
          <div class="segment-label" style="color:white">${seg.label}</div>
          <div class="click-hint" style="color:rgba(255,255,255,.5)">Click to explore</div>
        `;
      } else {
        container.classList.remove('has-hover');
        wedgeEls.forEach(w => w.classList.remove('active'));
        hoverBar.className = 'hover-bar idle';
        hoverBar.style.background = '';
        hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to see what each section covers</div>';
      }
    },
    (id) => {
      playChime();
      onOpen(id);
    },
    (isHovered) => {
      if (isHovered) {
        playShush();
        container.classList.remove('has-hover');
        wedgeEls.forEach(w => w.classList.remove('active'));
        hoverBar.className = 'hover-bar active';
        hoverBar.style.background = 'linear-gradient(135deg,#004B86,#0061AD)';
        hoverBarContent.innerHTML = `
          <div class="quadrant-label" style="color:rgba(255,255,255,.6)">The Liberator Programme</div>
          <div class="segment-label" style="color:white">High Challenge &amp; High Support</div>
          <div class="click-hint" style="color:rgba(255,255,255,.5)">More coming soon</div>
        `;
      } else {
        hoverBar.className = 'hover-bar idle';
        hoverBar.style.background = '';
        hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to see what each section covers</div>';
      }
    },
    () => {
      // Centre click — Coming Soon page
      goComingSoon();
      playChime();
    }
  );
  container.appendChild(overlaySVG);

  const wheelWrap = document.createElement('div');
  wheelWrap.className = 'wheel-wrap';
  wheelWrap.appendChild(container);
  wheelWrap.appendChild(hoverBar);

  const wheelCol = document.createElement('div');
  wheelCol.className = 'wheel-col';
  wheelCol.appendChild(wheelWrap);

  // Info column
  const infoCol = document.createElement('div');
  infoCol.className = 'info-col';

  const c1 = document.createElement('div');
  c1.className = 'card';
  c1.innerHTML = '<h2>Story Liberator</h2><p>This interactive tool supports the Liberator Programme. The wheel maps 15 leadership behaviours across four quadrants: Enabling, Visioning, Mobilising, and Developing. Click any segment to explore the model and guidance behind it.</p>';

  const c2 = document.createElement('div');
  c2.className = 'card';
  c2.innerHTML = '<h2>How to use</h2><p>Hover over any section of the wheel to see which quadrant it belongs to and what it covers. Click to open a detailed page with a leadership model, explanation, and key takeaways you can apply in your role.</p>';

  const c3 = document.createElement('div');
  c3.className = 'card';
  c3.style.cssText = 'padding:0;overflow:hidden;';
  c3.innerHTML = `
    <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:inherit;">
      <iframe
        src="https://www.youtube.com/embed/RyFKGWdKaBQ?rel=0&si=j4UodxnXf5xfdjFX"
        title="Story Liberator | Coming soon"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
        style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;">
      </iframe>
    </div>
  `;

  infoCol.appendChild(c1);
  infoCol.appendChild(c2);
  infoCol.appendChild(c3);

  const layout = document.createElement('div');
  layout.className = 'wheel-layout';
  layout.appendChild(wheelCol);
  layout.appendChild(infoCol);

  const centerBlock = document.createElement('div');
  centerBlock.className = 'center-block';
  centerBlock.innerHTML = '<h1 class="title">Story Liberator</h1><p class="subtitle">An interactive leadership toolkit for the Liberator Programme. Explore the wheel to discover models, frameworks, and approaches that will support your growth as a leader at Story.</p>';

  const cont = document.createElement('div');
  cont.className = 'container';
  cont.appendChild(centerBlock);
  cont.appendChild(layout);

  page.appendChild(buildHeader());
  page.appendChild(cont);
  return page;
}

// ── Fable block builder ──────────────────────────────────────────
// Renders an animated illustration with story text. Lines draw in
// progressively (using getTotalLength + stroke-dashoffset transitions),
// then warm colour shades fade in. Triggered by IntersectionObserver.
function buildFableBlock(fable, qColour) {
  const block = document.createElement('div');
  block.className = 'fable-block';
  block.style.setProperty('--fb-accent', qColour);

  if (fable.eyebrow) {
    const eb = document.createElement('p');
    eb.className = 'fable-eyebrow';
    eb.textContent = fable.eyebrow;
    block.appendChild(eb);
  }

  if (fable.title) {
    const t = document.createElement('h3');
    t.className = 'fable-title';
    t.textContent = fable.title;
    block.appendChild(t);
  }

  if (fable.page) {
    const pg = document.createElement('div');
    pg.className = 'fable-page';
    pg.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> <span>Page ' + fable.page + '</span>';
    block.appendChild(pg);
  }

  if (fable.intro) {
    const intro = document.createElement('p');
    intro.className = 'fable-intro';
    intro.textContent = fable.intro;
    block.appendChild(intro);
  }

  // Illustration wrapper
  if (fable.svg) {
    const ill = document.createElement('div');
    ill.className = 'fable-illustration';
    ill.innerHTML = fable.svg;
    block.appendChild(ill);

    // After the SVG is in the DOM, measure path lengths and arm the animation.
    requestAnimationFrame(() => {
      const svgEl = ill.querySelector('svg');
      if (!svgEl) return;

      // Arm every fb-line path with its true length so dasharray draws cleanly.
      // We set --fb-len as a CSS variable; the stylesheet handles dasharray/offset
      // and the transition to 0 when .is-animated is added. Setting these inline
      // here would override the CSS rule and prevent the transition firing.
      const lines = svgEl.querySelectorAll('.fb-line');
      lines.forEach(p => {
        try {
          const len = p.getTotalLength();
          if (len > 0) {
            p.style.setProperty('--fb-len', len);
          }
        } catch (e) { /* non-path or unmeasurable, ignore */ }
      });

      // Mark the wrapper visible (opacity fade in) and trigger animation
      // when the user actually scrolls to it.
      const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) {
        ill.classList.add('is-visible', 'is-animated');
        return;
      }

      const reveal = () => {
        ill.classList.add('is-visible');
        // Let the wrapper fade settle in fully before the strokes start drawing.
        setTimeout(() => ill.classList.add('is-animated'), 750);
      };

      if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              reveal();
              io.disconnect();
            }
          });
        }, { threshold: 0.25 });
        io.observe(ill);
        // Safety: if observer never fires (e.g., already in view but layout odd),
        // reveal after a generous delay.
        setTimeout(() => {
          if (!ill.classList.contains('is-visible')) reveal();
        }, 1500);
      } else {
        // Fallback for browsers without IO
        reveal();
      }
    });
  }

  // Story text: array of paragraphs in italics with a left rule
  if (fable.story && fable.story.length) {
    const story = document.createElement('div');
    story.className = 'fable-story';
    fable.story.forEach(para => {
      const p = document.createElement('p');
      p.textContent = para;
      story.appendChild(p);
    });
    block.appendChild(story);
  }

  return block;
}

function buildNarrativeSection(seg, qColour) {
  if (!seg.narrative) return null;
  const n = seg.narrative;

  const sec = document.createElement('div');
  sec.className = 'narrative-section slide-up delay2';

  // Header with eyebrow + framed quote
  if (n.eyebrow || n.quote) {
    const head = document.createElement('div');
    head.className = 'narrative-header';
    if (n.eyebrow) {
      const eb = document.createElement('p');
      eb.className = 'narrative-eyebrow';
      eb.textContent = n.eyebrow;
      head.appendChild(eb);
    }
    if (n.quote) {
      const q = document.createElement('blockquote');
      q.className = 'narrative-quote';
      q.style.borderColor = qColour;
      q.style.color = qColour;
      q.textContent = '\u201C' + n.quote + '\u201D';
      head.appendChild(q);
    }
    sec.appendChild(head);
  }

  // Fable block: animated illustration + story text. Sits between quote and cards.
  if (n.fable) {
    sec.appendChild(buildFableBlock(n.fable, qColour));
  }

  // Three cards as a clickable shuffle stack
  if (n.cards && n.cards.length) {
    const stack = document.createElement('div');
    stack.className = 'narrative-stack';
    stack.style.setProperty('--nc-accent', qColour);

    const cardsCount = n.cards.length;

    n.cards.forEach((card, i) => {
      const c = document.createElement('div');
      c.className = 'narrative-card stack-card';
      c.setAttribute('role', 'button');
      c.setAttribute('tabindex', i === 0 ? '0' : '-1');
      c.setAttribute('aria-label', card.title + '. Card ' + (i + 1) + ' of ' + cardsCount + '. Press to shuffle.');
      c.style.setProperty('--nc-accent', qColour);
      c.dataset.idx = String(i);
      // Bookend cards (first and last) get a slightly thicker accent strip
      if (i === 0 || i === cardsCount - 1) c.classList.add('is-bookend');

      const icon = document.createElement('div');
      icon.className = 'nc-icon';
      icon.style.background = qColour + '14';
      icon.style.color = qColour;
      icon.innerHTML = NARRATIVE_ICONS[card.icon] || '';
      c.appendChild(icon);

      // Page reference badge (top-right corner)
      if (card.page) {
        const pg = document.createElement('div');
        pg.className = 'nc-page';
        pg.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> <span>Page ' + card.page + '</span>';
        c.appendChild(pg);
      }

      // Step indicator: coloured number badge + position label.
      // Bookend cards (first / last) read "FIRST OF n" and "LAST OF n" so the
      // user can see at a glance where they are in the sequence.
      const step = document.createElement('div');
      step.className = 'nc-step';
      const num = document.createElement('span');
      num.className = 'nc-step-num';
      num.textContent = String(i + 1);
      step.appendChild(num);
      const stepText = document.createElement('span');
      stepText.className = 'nc-step-text';
      let label;
      if (i === 0) label = '<span class="nc-step-marker">First</span> of ' + cardsCount;
      else if (i === cardsCount - 1) label = '<span class="nc-step-marker">Last</span> of ' + cardsCount;
      else label = (i + 1) + ' of ' + cardsCount;
      stepText.innerHTML = label;
      step.appendChild(stepText);
      c.appendChild(step);

      const title = document.createElement('h3');
      title.textContent = card.title;
      c.appendChild(title);

      const body = document.createElement('p');
      body.textContent = card.body;
      c.appendChild(body);

      // Subtle "tap for next" hint on the front card; fades away after first click
      if (i === 0) {
        const hint = document.createElement('div');
        hint.className = 'stack-hint';
        hint.innerHTML = 'Tap for next <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
        c.appendChild(hint);
      }

      stack.appendChild(c);
    });

    // Indicator dots (also clickable to jump)
    const indicator = document.createElement('div');
    indicator.className = 'stack-indicator';
    const dots = document.createElement('div');
    dots.className = 'stack-dots';
    for (let i = 0; i < cardsCount; i++) {
      const d = document.createElement('button');
      d.type = 'button';
      d.className = 'stack-dot';
      d.setAttribute('aria-label', 'Show card ' + (i + 1));
      d.dataset.idx = String(i);
      if (i === 0) { d.classList.add('active'); d.style.background = qColour; }
      dots.appendChild(d);
    }
    indicator.appendChild(dots);

    // Stack state and behaviour
    let activeIdx = 0;
    let isAnimating = false;

    function applyPositions() {
      const cardEls = Array.from(stack.querySelectorAll('.stack-card'));
      cardEls.forEach((el) => {
        el.classList.remove('pos-front', 'pos-mid', 'pos-back');
        const i = parseInt(el.dataset.idx, 10);
        const pos = (i - activeIdx + cardsCount) % cardsCount;
        if (pos === 0) {
          el.classList.add('pos-front');
          el.setAttribute('tabindex', '0');
          el.setAttribute('aria-hidden', 'false');
        } else if (pos === cardsCount - 1) {
          el.classList.add('pos-back');
          el.setAttribute('tabindex', '-1');
          el.setAttribute('aria-hidden', 'true');
        } else {
          el.classList.add('pos-mid');
          el.setAttribute('tabindex', '-1');
          el.setAttribute('aria-hidden', 'true');
        }
      });
      Array.from(dots.children).forEach((d, di) => {
        if (di === activeIdx) {
          d.classList.add('active');
          d.style.background = qColour;
        } else {
          d.classList.remove('active');
          d.style.background = '';
        }
      });
    }

    function shuffleNext() {
      if (isAnimating) return;
      const cardEls = Array.from(stack.querySelectorAll('.stack-card'));
      const front = cardEls.find(el => el.classList.contains('pos-front'));
      if (!front) return;
      isAnimating = true;

      // Hide the hint after first shuffle
      const hint = stack.querySelector('.stack-hint');
      if (hint) hint.classList.add('fade-out');

      // Advance index so other cards transition into their new spots
      activeIdx = (activeIdx + 1) % cardsCount;
      applyPositions();
      // The leaving card should run the shuffleAway animation, not just slide to back
      front.classList.remove('pos-front', 'pos-mid', 'pos-back');
      front.classList.add('shuffling');

      try { if (typeof playMINext === 'function') playMINext(); } catch(e){}

      setTimeout(() => {
        front.classList.remove('shuffling');
        applyPositions();
        isAnimating = false;
        // Move keyboard focus to the new front card so keyboard users can keep going
        const newFront = stack.querySelector('.stack-card.pos-front');
        if (newFront && document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('stack-card')) {
          newFront.focus();
        }
      }, 650);
    }

    function jumpTo(targetIdx) {
      if (isAnimating || targetIdx === activeIdx) return;
      activeIdx = targetIdx;
      applyPositions();
      try { if (typeof playMISelect === 'function') playMISelect(); } catch(e){}
    }

    stack.addEventListener('click', (e) => {
      const c = e.target.closest('.stack-card');
      if (c && c.classList.contains('pos-front')) shuffleNext();
    });

    stack.addEventListener('keydown', (e) => {
      const c = e.target.closest('.stack-card');
      if (!c || !c.classList.contains('pos-front')) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        shuffleNext();
      }
    });

    dots.addEventListener('click', (e) => {
      const d = e.target.closest('.stack-dot');
      if (!d) return;
      jumpTo(parseInt(d.dataset.idx, 10));
    });

    applyPositions();

    sec.appendChild(stack);
    sec.appendChild(indicator);
  }

  // Bridge line + downward arrow that hands off to the model below
  if (n.bridge) {
    const bridge = document.createElement('div');
    bridge.className = 'narrative-bridge';

    const lLine = document.createElement('div');
    lLine.className = 'nb-line';
    lLine.style.background = 'linear-gradient(90deg, transparent, ' + qColour + ')';
    lLine.style.opacity = '.45';

    const text = document.createElement('p');
    text.className = 'nb-text';
    text.textContent = '\u201C' + n.bridge + '\u201D';

    const rLine = document.createElement('div');
    rLine.className = 'nb-line';
    rLine.style.background = 'linear-gradient(90deg, ' + qColour + ', transparent)';
    rLine.style.opacity = '.45';

    bridge.appendChild(lLine);
    bridge.appendChild(text);
    bridge.appendChild(rLine);
    sec.appendChild(bridge);

    const arrow = document.createElement('div');
    arrow.className = 'narrative-arrow';
    arrow.style.color = qColour;
    arrow.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
    sec.appendChild(arrow);
  }

  return sec;
}

function buildTryItWidget(tryIt, qColour) {
  const card = document.createElement('div');
  card.className = 'tryit-card slide-up delay4';
  card.style.setProperty('--ti-accent', qColour);

  // Header row
  const head = document.createElement('div');
  head.className = 'tryit-head';
  const headLeft = document.createElement('div');
  const eb = document.createElement('p');
  eb.className = 'tryit-eyebrow';
  eb.textContent = tryIt.eyebrow || 'Try it';
  eb.style.color = qColour;
  const ttl = document.createElement('h3');
  ttl.className = 'tryit-title';
  ttl.textContent = tryIt.title || 'See the difference';
  headLeft.appendChild(eb);
  headLeft.appendChild(ttl);
  if (tryIt.sub) {
    const sub = document.createElement('p');
    sub.className = 'tryit-sub';
    sub.textContent = tryIt.sub;
    headLeft.appendChild(sub);
  }
  const counter = document.createElement('div');
  counter.className = 'tryit-counter';
  head.appendChild(headLeft);
  head.appendChild(counter);
  card.appendChild(head);

  // Scenario label chip
  const chip = document.createElement('div');
  chip.className = 'tryit-chip';
  chip.style.background = qColour + '14';
  chip.style.color = qColour;
  card.appendChild(chip);

  // Brief panel that cross-fades
  const panel = document.createElement('div');
  panel.className = 'tryit-panel';
  const panelText = document.createElement('p');
  panelText.className = 'tryit-text';
  panel.appendChild(panelText);
  card.appendChild(panel);

  // Toggle row
  const row = document.createElement('div');
  row.className = 'tryit-row';

  const lbl1 = document.createElement('span');
  lbl1.className = 'tryit-side tryit-side-vague active';
  lbl1.textContent = 'Vague';

  const toggle = document.createElement('button');
  toggle.type = 'button';
  toggle.className = 'tryit-toggle';
  toggle.setAttribute('aria-label', 'Toggle between vague and explicit');
  toggle.setAttribute('role', 'switch');
  toggle.setAttribute('aria-checked', 'false');
  const knob = document.createElement('span');
  knob.className = 'tryit-knob';
  toggle.appendChild(knob);

  const lbl2 = document.createElement('span');
  lbl2.className = 'tryit-side tryit-side-explicit';
  lbl2.textContent = 'Explicit';

  row.appendChild(lbl1);
  row.appendChild(toggle);
  row.appendChild(lbl2);

  const next = document.createElement('button');
  next.type = 'button';
  next.className = 'tryit-next';
  next.innerHTML = 'Next example <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  next.style.color = qColour;

  card.appendChild(row);
  card.appendChild(next);

  // State
  let idx = 0;
  let mode = 'vague'; // 'vague' | 'explicit'
  const total = tryIt.scenarios.length;

  function render(animateText) {
    const sc = tryIt.scenarios[idx];
    chip.textContent = 'Scenario: ' + sc.label;
    counter.textContent = (idx + 1) + ' of ' + total;
    const newText = mode === 'vague' ? sc.vague : sc.explicit;

    // Update toggle visual state
    if (mode === 'explicit') {
      toggle.classList.add('on');
      toggle.setAttribute('aria-checked', 'true');
      lbl1.classList.remove('active');
      lbl2.classList.add('active');
      panel.classList.add('explicit');
      toggle.style.background = qColour;
    } else {
      toggle.classList.remove('on');
      toggle.setAttribute('aria-checked', 'false');
      lbl2.classList.remove('active');
      lbl1.classList.add('active');
      panel.classList.remove('explicit');
      toggle.style.background = '#cfd6dd';
    }

    if (animateText) {
      panelText.classList.add('fade-out');
      setTimeout(() => {
        panelText.textContent = newText;
        panelText.classList.remove('fade-out');
      }, 180);
    } else {
      panelText.textContent = newText;
    }
  }

  toggle.addEventListener('click', () => {
    mode = (mode === 'vague') ? 'explicit' : 'vague';
    try {
      if (mode === 'explicit' && typeof playMISelect === 'function') playMISelect();
      else if (mode === 'vague' && typeof playMIDeselect === 'function') playMIDeselect();
    } catch(e){}
    render(true);
  });

  next.addEventListener('click', () => {
    idx = (idx + 1) % total;
    mode = 'vague';
    try { if (typeof playMINext === 'function') playMINext(); } catch(e){}
    render(true);
  });

  // Initial render (no animation)
  render(false);

  return card;
}

    const prompts = [
      { q: 'Where on this continuum do you naturally sit day to day?',
         hint: 'Think about the version of yourself that your team sees most often. Not your best day, not your worst, but the consistent everyday signal you send about who you are as a leader.' },
      { q: 'How might your team describe your style when you are under pressure?',
         hint: 'Pressure pulls leaders toward the edges. Some become more distant, others overcompensate with forced informality. Which way do you drift, and how visible is it to those around you?' },
      { q: 'What is one behaviour that tells your team you are genuinely approachable?',
         hint: 'Think of something specific and observable, not a value or intention. What do people actually see or experience that signals the door is open?' },
      { q: 'What would shift for your team if you moved one step closer to the centre?',
         hint: 'If you sit toward Hostile or Aloof, think about what becomes possible when people feel safer. If toward Buddy, think about what becomes possible when you can hold a difficult conversation without it damaging the relationship.' }
    ];

    const deck = document.createElement('div');
    deck.className = 'rf-deck-wrap';

    let dealtCount = 0;

    function buildCard(idx) {
      const p = prompts[idx];
      const card = document.createElement('div');
      card.className = 'rf-card';
      card.setAttribute('data-pos', idx);
      card.setAttribute('data-idx', idx);
      card.innerHTML =
        '<div class="rf-card-logo">' + STORY_SVG + '</div>' +
        '<div class="rf-card-counter">Prompt ' + (idx+1) + ' of ' + prompts.length + '</div>' +
        '<div class="rf-card-question">' + p.q + '</div>' +
        '<div class="rf-card-hint">' + p.hint + '</div>' +
        '<div class="rf-card-cta"><span>Click to deal</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>';
      return card;
    }

    const doneBanner = document.createElement('div');
    doneBanner.className = 'rf-done';
    doneBanner.innerHTML = '<div class="rf-done-title">Thank you for reflecting</div><div class="rf-done-sub">Authentic leadership grows through exactly this kind of honest self-examination. Come back to these prompts after your next challenging week.</div><button class="rf-done-restart">&#8635; Deal again</button>';

    function renderDeck() {
      deck.innerHTML = '';
      // Build cards back-to-front so DOM order matches z-index
      for (let i = prompts.length - 1; i >= 0; i--) {
        deck.appendChild(buildCard(i));
      }
      deck.appendChild(doneBanner);
      attachClick();
    }

    function attachClick() {
      const front = deck.querySelector('.rf-card[data-pos="0"]');
      if (!front) return;
      front.addEventListener('click', function onClick() {
        playCardFlip();
        front.classList.add('dealt');
        front.removeEventListener('click', onClick);

        // Advance the position of all remaining cards
        deck.querySelectorAll('.rf-card:not(.dealt)').forEach(c => {
          const pos = parseInt(c.getAttribute('data-pos'), 10);
          c.setAttribute('data-pos', Math.max(0, pos - 1));
        });

        dealtCount++;

        front.addEventListener('animationend', () => {
          front.style.display = 'none';
          if (dealtCount >= prompts.length) {
            doneBanner.style.display = 'block';
          } else {
            attachClick();
          }
        }, { once: true });
      });
    }

    doneBanner.querySelector('.rf-done-restart').addEventListener('click', () => {
      dealtCount = 0;
      doneBanner.style.display = 'none';
      renderDeck();
    });

    renderDeck();
    rfOuter.appendChild(deck);

    cont.appendChild(rfDivider);
    cont.appendChild(rfOuter);
  }

  if (seg.hasVisionSteps) {
    const vsDivider = document.createElement('div');

    vsDivider.innerHTML = '<div class="ws-divider-line"></div><div class="ws-divider-label"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fa6b02" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> A four-step process</div><div class="ws-divider-line"></div>';

    vsTitle.textContent = 'Building your vision, step by step';

    const vsSub = document.createElement('div');

    vsOuter.appendChild(vsTitle);
    vsOuter.appendChild(vsSub);

    const STEPS = [
      {
        title: 'Project your mind forward',
        body: 'Step out of today and into the next year or two. Picture yourself looking back from a future point where things have gone well. What does the team look like? What is the work like? What feels different?',
        prompt: 'Pick a horizon (six months, a year, two years) and let your mind settle there. The goal is not certainty; it is to give yourself permission to imagine.'
      },
      {
        title: 'Write the team vision in concrete terms',
        body: 'Describe the team performing at its very best. Not values, not adjectives: what would they actually be doing day to day? How would you know they were succeeding? You do not need an essay. A few honest, specific statements are enough.',
        prompt: 'If a colleague who had never met your team read your statements, would they be able to picture what success looks like? If not, get more specific.'
      },
      {
        title: 'Do the same for each individual',
        body: 'Now zoom in. Picture each person on your team performing at their best. Hold on to your belief that you can make a difference, even with people who are currently struggling or coasting. What does each person look like in the future state?',
        prompt: 'This is where many leaders stop short. Push past the easy ones. The most important visions to articulate are often the ones that feel hardest to imagine.'
      },
      {
        title: 'Look back from the future',

      dot.className = 'vs-dot';
      dot.setAttribute('aria-label', 'Step ' + (i+1) + ': ' + s.title);
      dot.textContent = String(i+1);
      dot.addEventListener('click', () => { goToStep(i); });
      rail.appendChild(dot);
    });

    const panel = document.createElement('div');
    panel.className = 'vs-panel';

    // Delegated handler for pills (handles all data-go pills inside the panel)
    panel.addEventListener('click', function(e){
      const pill = e.target.closest('.vs-pill');
      if (!pill) return;
      const target = pill.getAttribute('data-go');
      if (target && typeof goDetail === 'function') {
        try { playTooltipReveal(); } catch(err){}
        goDetail(target);
      }
    });

    function renderPanel() {
      const s = STEPS[currentStep];

      const linkCard = isLast
        ? '<div class="vs-link-card">' +
            '<div class="vs-link-card-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>' +

          '</button>' +
        '</div>';

      // Update rail
      rail.querySelectorAll('.vs-dot').forEach((d, i) => {

      if (nextBtn) nextBtn.addEventListener('click', () => goToStep(currentStep + 1));

const app = document.getElementById('app');
let currentPage = null;

function showPage(el) {
  if (currentPage) app.removeChild(currentPage);
  app.appendChild(el);
  currentPage = el;
  window.scrollTo(0, 0);
}

function goHome() {
  window.location.hash = '';
  showPage(buildWheelPage(goDetail));
}

function goDetail(id) {
  const seg = SEGMENTS.find(s => s.id === id);
  if (!seg) return goHome();
  window.location.hash = '#/' + id;
  showPage(buildDetailPage(seg, goHome));
}

function goWorksheet(id) {
  const seg = SEGMENTS.find(s => s.id === id);
  if (!seg) return goHome();
  window.location.hash = '#/' + id + '/worksheet';
  showPage(buildWorksheetPage(seg));
}

  `;

  // Instruction
  const instr = document.createElement('div');
  instr.className = uid + '-instr';
  instr.innerHTML =
    '<div class="' + uid + '-instr-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>' +
    '<div class="' + uid + '-instr-text">Click any brick to see what happens when it is removed.</div>';
  wrap.appendChild(instr);

  // Stage with tower
  const stage = document.createElement('div');
  stage.className = uid + '-stage';

  const tower = document.createElement('div');
  tower.className = uid + '-tower';

  const ground = document.createElement('div');
  ground.className = uid + '-ground';

  const brickEls = {};
  LEVELS.forEach(level => {
    const brick = document.createElement('div');
    brick.className = uid + '-brick';
    brick.dataset.level = level.num;
    brick.innerHTML =
      '<div class="' + uid + '-num">' + level.num + '</div>' +
      '<div class="' + uid + '-text">' +
      '<span class="' + uid + '-label">' + level.label + '</span>' +
      '<span class="' + uid + '-sub">' + level.sub + '</span></div>';
    brick.addEventListener('click', () => removeBrick(level.num));
    tower.appendChild(brick);
    brickEls[level.num] = brick;
  });

  stage.appendChild(tower);
  stage.appendChild(ground);
  wrap.appendChild(stage);

  // Message panel
  const msg = document.createElement('div');
  msg.className = uid + '-msg';
  msg.innerHTML =
    '<div class="' + uid + '-msg-default">' +
    '<div class="' + uid + '-msg-default-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>' +
    '<div>The tower is whole. Click any brick to disturb it.</div></div>';
  wrap.appendChild(msg);

  // Rebuild button
  const rebuildRow = document.createElement('div');
  rebuildRow.className = uid + '-rebuild-row';
  const rebuildBtn = document.createElement('button');
  rebuildBtn.className = uid + '-rebuild';
  rebuildBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 14.85-6.85L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-14.85 6.85L3 16"/><path d="M3 21v-5h5"/></svg> Rebuild the tower';
  rebuildBtn.addEventListener('click', rebuild);
  rebuildRow.appendChild(rebuildBtn);
  wrap.appendChild(rebuildRow);

  let isAnimating = false;

  function removeBrick(level) {
    if (isAnimating) return;
    isAnimating = true;

    LEVELS.forEach(lv => {
      const el = brickEls[lv.num];
      if (lv.num === level) {
        el.classList.add('removed');
      } else if (lv.num > level) {
        // Bricks above the removed one tumble; closer to the gap goes first
        const distance = lv.num - level;
        const fallDir = (distance % 2 === 1) ? 'fall-l' : 'fall-r';
        const delay = (distance - 1) * 0.10;
        el.style.animationDelay = delay + 's';
        setTimeout(() => {
          el.classList.add('tumble', fallDir);
        }, 80);
      }
    });

    // Update message after a brief beat to feel reactive
    const removed = LEVELS.find(l => l.num === level);
    setTimeout(() => {
      msg.classList.add('impact');
      msg.innerHTML =
        '<div class="' + uid + '-msg-eyebrow">' + removed.label + ' removed</div>' +
        '<div class="' + uid + '-msg-text">' + removed.msg + '</div>';
    }, 200);

    // Show rebuild button after animation settles
    setTimeout(() => {
      rebuildBtn.classList.add('show');
      isAnimating = false;
    }, 1100);

    try { playReturn(); } catch(e) {}
  }

  function rebuild() {
    if (isAnimating) return;
    isAnimating = true;
    LEVELS.forEach(lv => {
      const el = brickEls[lv.num];
      el.classList.remove('removed', 'tumble', 'fall-l', 'fall-r');
      el.style.animationDelay = '';
    });
    msg.classList.remove('impact');
    msg.innerHTML =
      '<div class="' + uid + '-msg-default">' +
      '<div class="' + uid + '-msg-default-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>' +
      '<div>The tower is whole. Click any brick to disturb it.</div></div>';
    rebuildBtn.classList.remove('show');
    try { playMIBegin(); } catch(e) {}
    setTimeout(() => { isAnimating = false; }, 400);
  }

  return wrap;
}

    try { playMIBack(); } catch(e) {}
  });

  return wrap;

function buildComingSoonPage() {
  const page = document.createElement('div');
  page.className = 'page cs-page';

  // Back button
  const backBtn = document.createElement('button');
  backBtn.className = 'back-btn';
  backBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Return to wheel';
  backBtn.addEventListener('click', () => { playReturn(); goHome(); });
  page.appendChild(buildHeader(backBtn));

  // Scene
  const scene = document.createElement('div');
  scene.className = 'cs-scene';
  scene.innerHTML = '<div class="cs-bg"></div>';

  const canvas = document.createElement('canvas');
  canvas.className = 'cs-stars';
  scene.appendChild(canvas);

  const solar = document.createElement('div');
  solar.className = 'cs-solar';

  // Dashed orbit ring SVG
  const orbitSVG = document.createElementNS('http://www.w3.org/2000/svg','svg');
  orbitSVG.className = 'cs-orbit-svg';
  solar.appendChild(orbitSVG);

  // Sun (Story logo as white silhouette on warm golden sphere)
  const sun = document.createElement('div');
  sun.className = 'cs-sun';
  sun.innerHTML = `<div class="cs-sun-body"><div class="cs-sun-shine"></div><span class="cs-sun-wordmark">STORY</span></div>`;
  solar.appendChild(sun);

  // 4 planets: one per quadrant colour, equally spaced, slightly different speeds
  const CS_PLANETS = [
    { c:'#FA6B02', hi:'#FFA94D', dk:'#7D3300', spd:0.54, off:0           },
    { c:'#009FA0', hi:'#3DD6D7', dk:'#005152', spd:0.41, off:Math.PI*0.5 },
    { c:'#1A3A5C', hi:'#3A6898', dk:'#0A1A2C', spd:0.62, off:Math.PI     },
    { c:'#0061AD', hi:'#3A9AE0', dk:'#002D5C', spd:0.47, off:Math.PI*1.5 },
  ];
  const planetEls = CS_PLANETS.map(p => {
    const w = document.createElement('div');
    w.className = 'cs-planet-wrap';
    w.innerHTML = `<div class="cs-planet" style="background:radial-gradient(circle at 35% 30%,${p.hi},${p.c} 52%,${p.dk});box-shadow:0 0 22px 5px ${p.c}99"><span class="cs-planet-label">Under<br>Construction</span></div>`;
    solar.appendChild(w);
    return w;
  });

  scene.appendChild(solar);

  // Title block at bottom
  const bottom = document.createElement('div');
  bottom.className = 'cs-bottom';
  bottom.innerHTML = '<h2 class="cs-title">Coming Soon</h2><p class="cs-sub">More sections of the Liberator wheel are currently under development and will be available shortly.</p>';
  scene.appendChild(bottom);

  page.appendChild(scene);

  // Kick off animations after the DOM has rendered
  setTimeout(() => {
    const sw = scene.offsetWidth  || 800;
    const sh = scene.offsetHeight || 480;
    const cx = sw / 2;
    const cy = sh * 0.42;
    const rx = Math.min(sw * 0.34, 265);
    const ry = rx * 0.30;

    // Position sun
    sun.style.left = cx + 'px';
    sun.style.top  = cy + 'px';

    // Draw dashed orbit ellipse
    orbitSVG.setAttribute('width',  (rx * 2 + 4).toString());
    orbitSVG.setAttribute('height', (ry * 2 + 4).toString());
    orbitSVG.style.left = cx + 'px';
    orbitSVG.style.top  = cy + 'px';
    const ell = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    ell.setAttribute('cx', (rx + 2).toString());
    ell.setAttribute('cy', (ry + 2).toString());
    ell.setAttribute('rx', rx.toString());
    ell.setAttribute('ry', ry.toString());
    ell.setAttribute('fill',         'none');
    ell.setAttribute('stroke',       'rgba(255,255,255,0.09)');
    ell.setAttribute('stroke-width', '1');
    ell.setAttribute('stroke-dasharray','6 10');
    orbitSVG.appendChild(ell);

    // Twinkling star canvas
    canvas.width  = sw;
    canvas.height = sh;
    const ctx = canvas.getContext('2d');
    const stars = Array.from({length:210}, () => ({
      x: Math.random() * sw,
      y: Math.random() * sh,
      r: Math.random() * 1.5 + 0.2,
      ph: Math.random() * Math.PI * 2,
      spd: 0.5 + Math.random() * 1.1
    }));

    const drawStars = () => {
      if (!page.isConnected) return;
      const t = Date.now() / 1000;
      ctx.clearRect(0, 0, sw, sh);
      stars.forEach(s => {
        const a = 0.22 + 0.62 * (0.5 + 0.5 * Math.sin(s.ph + t * s.spd));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    };
    drawStars();

    // Planet orbit animation
    const animPlanets = () => {
      if (!page.isConnected) return;
      const t = Date.now() / 1000;
      CS_PLANETS.forEach((p, i) => {
        const ang  = p.off + t * p.spd;
        const x    = cx + rx * Math.cos(ang);
        const y    = cy + ry * Math.sin(ang);
        // sinV: 1 = front/closest (bottom of ellipse), -1 = back/furthest (top)
        const sinV = Math.sin(ang);
        const sc   = 0.48 + 0.62 * (0.5 + 0.5 * sinV);   // 0.48 (far) to 1.10 (close)
        const op   = (0.52 + 0.48 * (0.5 + 0.5 * sinV)).toFixed(2);
        const zi   = sinV > 0 ? 8 : 3;                    // in front of or behind sun
        const el   = planetEls[i];
        el.style.left      = x + 'px';
        el.style.top       = y + 'px';
        el.style.transform = `translate(-50%,-50%) scale(${sc.toFixed(3)})`;
        el.style.zIndex    = zi;
        el.style.opacity   = op;
      });
      requestAnimationFrame(animPlanets);
    };
    animPlanets();

  }, 80);

  return page;
}

function goComingSoon() {
  window.location.hash = '#/coming-soon';
  showPage(buildComingSoonPage());
}

// Handle direct URL navigation
function handleHash() {
  const hash = window.location.hash;
  if (hash === '#/coming-soon') { goComingSoon(); return; }
  if (hash.startsWith('#/')) {
    const path = hash.slice(2);
    if (path === 'individual-needs/maslow') { goMaslow(); return; }
    if (path === 'individual-needs/building-blocks') { goBuildingBlocks(); return; }
    if (path.endsWith('/worksheet')) {
      const id = path.replace('/worksheet','');
      const seg = SEGMENTS.find(s => s.id === id);
      if (seg && seg.hasWorksheet) { goWorksheet(id); return; }
    }
    const seg = SEGMENTS.find(s => s.id === path);
    if (seg) { goDetail(path); return; }
  }
  goHome();
}

// ── Action Planner (Performance Navigator) ──
function buildActionPlanner() {
  const uid = 'ap' + Math.random().toString(36).slice(2, 7);
  let step = 1;
  const TOTAL = 3;
  const state = {
    name: '', behaviour: '',
    diagnosisType: null, recommendedAction: '', fromNavigator: false,
    specificPlan: '', when: '', successLooks: '', reviewDate: ''
  };

  const DIAG = {
    'cant-do': { label:"Can't Do", sub:'Skills or knowledge gap', color:'#009FA0', darkColor:'#007070' },
    'wont-do': { label:"Won't Do", sub:'Attitude or motivation issue', color:'#fa6b02', darkColor:'#c04e00' },
    'positive': { label:'Performance Improved', sub:'Recognition and reinforcement needed', color:'#0061AD', darkColor:'#004B86' }
  };

  const wrap = document.createElement('div');
  wrap.id = 'nav-action-planner';
  wrap.style.cssText = 'font-family:"Barlow",sans-serif;width:100%';

  const styleEl = document.createElement('style');
  styleEl.textContent = `
    .${uid}-prog{display:flex;align-items:center;gap:0;margin-bottom:22px}
    .${uid}-pseg{flex:1;height:4px;border-radius:2px;background:#e4edf5;transition:background .35s}
    .${uid}-pseg.done{background:#004B86}
    .${uid}-pseg.active{background:#0061AD}
    .${uid}-pgap{width:6px;flex:0 0 6px}
    .${uid}-hd{margin-bottom:18px}
    .${uid}-hnum{font-size:11px;font-weight:700;color:#8fa0b0;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px}
    .${uid}-htitle{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:#004B86;line-height:1.2}
    .${uid}-hsub{font-size:13px;color:#667788;margin-top:6px;line-height:1.6}
    .${uid}-lbl{font-size:12px;font-weight:600;color:#445566;margin-bottom:6px;margin-top:14px;letter-spacing:.04em;display:block}
    .${uid}-inp{width:100%;border:2px solid #d4e3f0;border-radius:10px;padding:10px 14px;font-family:"Barlow",sans-serif;font-size:14px;color:#222;resize:vertical;transition:border-color .2s;outline:none;background:white;box-sizing:border-box}
    .${uid}-inp:focus{border-color:#0061AD}
    .${uid}-ta{min-height:86px;line-height:1.6}
    .${uid}-hint{font-size:11.5px;color:#99aabb;margin-top:4px;font-style:italic;line-height:1.5}
    .${uid}-from-nav{border-radius:12px;padding:13px 16px;margin-bottom:16px;animation:${uid}Fi .35s ease both}
    .${uid}-from-nav-ey{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.75;margin-bottom:5px}
    .${uid}-from-nav-label{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800;color:white;margin-bottom:4px}
    .${uid}-from-nav-action{font-size:12.5px;color:rgba(255,255,255,.85);line-height:1.55}
    .${uid}-diag-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .${uid}-dc{border-radius:12px;padding:14px;cursor:pointer;border:2.5px solid transparent;transition:all .18s ease;position:relative}
    .${uid}-dc:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.18)}
    .${uid}-dc.sel{border-color:rgba(255,255,255,.85);box-shadow:0 8px 24px rgba(0,0,0,.28);transform:translateY(-2px)}
    .${uid}-dc-label{font-weight:800;font-size:14px;color:white;margin-bottom:3px;font-family:"Barlow Condensed",sans-serif;letter-spacing:.02em;font-size:17px}
    .${uid}-dc-sub{font-size:11.5px;color:rgba(255,255,255,.75);line-height:1.4}
    .${uid}-rec-box{background:#EAF4FB;border-left:3px solid #0061AD;border-radius:0 10px 10px 0;padding:12px 14px;margin-top:14px;font-size:13px;color:#004B86;line-height:1.6}
    .${uid}-rec-ey{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8fa0b0;margin-bottom:4px}
    .${uid}-nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px;flex-wrap:wrap}
    .${uid}-navl{display:flex;gap:8px;flex-wrap:wrap}
    .${uid}-btn{border:none;border-radius:20px;padding:10px 22px;font-family:"Barlow",sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s ease}
    .${uid}-ghost{background:#f0f5fa;color:#556677}
    .${uid}-ghost:hover{background:#e0ecf5}
    .${uid}-primary{background:#0061AD;color:white;box-shadow:0 4px 16px rgba(0,97,173,.28)}
    .${uid}-primary:hover{background:#004B86;transform:translateY(-1px)}
    .${uid}-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .${uid}-dl{background:#0061AD;color:white;box-shadow:0 6px 20px rgba(0,97,173,.32);display:flex;align-items:center;gap:7px}
    .${uid}-dl:hover{background:#004B86;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,97,173,.42)}
    .${uid}-preview{margin-top:22px;border-radius:14px;overflow:hidden;animation:${uid}Fi .35s ease both}
    .${uid}-prevhd{padding:14px 18px}
    .${uid}-prevey{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:3px}
    .${uid}-prevname{font-family:"Barlow Condensed",sans-serif;font-size:21px;font-weight:800;color:white;line-height:1.1}
    .${uid}-prevbody{background:white;padding:14px 18px 12px}
    .${uid}-prevrow{margin-bottom:10px}
    .${uid}-prevrlbl{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#99aabb;margin-bottom:3px}
    .${uid}-prevrval{font-size:13px;color:#222;line-height:1.6}
    .${uid}-diag-badge{display:inline-flex;align-items:center;border-radius:6px;padding:4px 11px;font-size:12px;font-weight:700;color:white}
    @keyframes ${uid}Fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  `;
  wrap.appendChild(styleEl);

  // Pre-fill listener from Navigator
  const navHandler = (e) => {
    state.diagnosisType = e.detail.diagnosisType;
    state.recommendedAction = e.detail.action;
    state.fromNavigator = true;
    // If the user defined behaviours in the Navigator, carry that text into the planner
    // unless they have already typed something different here themselves.
    if (e.detail.behaviour && !state.behaviour.trim()) {
      state.behaviour = e.detail.behaviour;
    }
    if (state.name.trim() && state.behaviour.trim()) step = 2;
    render();
  };
  document.addEventListener('liberatorNavOutcome', navHandler);

  function diagInfo() { return DIAG[state.diagnosisType] || null; }

  function buildProg() {
    const prog = document.createElement('div'); prog.className = uid + '-prog';
    for (let i = 1; i <= TOTAL; i++) {

  function buildPreview() {

    if (state.specificPlan && step >= 2) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Action</div><div class="${uid}-prevrval">${state.specificPlan.substring(0,120)}${state.specificPlan.length>120?'...':''}</div>`;

    if (state.reviewDate && step >= 3) {

      r.innerHTML = `<div class="${uid}-prevrlbl">Review date</div><div class="${uid}-prevrval">${state.reviewDate}</div>`;

    }

    return pr;

  function render() {
    [...wrap.children].forEach(c => { if (c !== styleEl) c.remove(); });
    wrap.appendChild(buildProg());
    const cont = document.createElement('div'); cont.style.animation = uid + 'Fi .3s ease both';
    if (step === 1) s1(cont); else if (step === 2) s2(cont); else if (step === 3) s3(cont);

    if (state.name) wrap.appendChild(buildPreview());

  function mkHd(num, title, sub) {
    const el = document.createElement('div'); el.className = uid + '-hd';
    el.innerHTML = `<div class="${uid}-hnum">Step ${num} of ${TOTAL}</div><div class="${uid}-htitle">${title}</div>${sub?'<div class="'+uid+'-hsub">'+sub+'</div>':''}`;

  }

  function mkInp(placeholder, val, rows, onInput) {
    const el = rows ? document.createElement('textarea') : document.createElement('input');
    el.className = uid + '-inp' + (rows ? ' ' + uid + '-ta' : '');

    el.addEventListener('input', onInput);
    return el;
  }

  function s1(c) {
    c.appendChild(mkHd(1, 'Who and what?', 'Define the person and the specific behaviour you are seeing.'));
    if (state.fromNavigator && state.diagnosisType) {
      const di = diagInfo();
      const banner = document.createElement('div'); banner.className = uid + '-from-nav'; banner.style.background = `linear-gradient(135deg,${di.darkColor},${di.color})`;
      banner.innerHTML = `<div class="${uid}-from-nav-ey">Diagnosis from Navigator</div><div class="${uid}-from-nav-label">${di.label}: ${di.sub}</div><div class="${uid}-from-nav-action">${state.recommendedAction}</div>`;
      c.appendChild(banner);
    }
    const ln = document.createElement('label'); ln.className = uid + '-lbl'; ln.textContent = "Team member's name"; c.appendChild(ln);
    const iName = mkInp('e.g. Jamie, Sam...', state.name, 0, e => { state.name = e.target.value; nxt.disabled = !state.name.trim() || !state.behaviour.trim(); });
    c.appendChild(iName);
    const lb = document.createElement('label'); lb.className = uid + '-lbl'; lb.textContent = 'Specific behaviour observed'; c.appendChild(lb);
    const hint = document.createElement('div'); hint.className = uid + '-hint'; hint.textContent = 'Describe what you are actually seeing or hearing. Stay at the outer layers of the Onion: behaviour, not character.'; c.appendChild(hint);
    const iBeh = mkInp('e.g. Over the past three weeks I have noticed...', state.behaviour, 3, e => { state.behaviour = e.target.value; nxt.disabled = !state.name.trim() || !state.behaviour.trim(); });
    c.appendChild(iBeh);
    const navRow = document.createElement('div'); navRow.className = uid + '-nav';
    navRow.appendChild(document.createElement('span'));
    const nxt = document.createElement('button'); nxt.className = uid + '-btn ' + uid + '-primary';
    nxt.textContent = 'Next: Diagnosis \u2192'; nxt.disabled = !state.name.trim() || !state.behaviour.trim();
    nxt.addEventListener('click', () => { playMINext(); step = 2; render(); });
    navRow.appendChild(nxt); c.appendChild(navRow);
  }

  function s2(c) {
    c.appendChild(mkHd(2, 'Diagnosis and plan', state.fromNavigator ? 'Your Navigator diagnosis is shown below. Confirm it and write your specific plan.' : 'Select the diagnosis type, then write your plan.'));
    const di = diagInfo();
    if (state.fromNavigator && di) {
      const banner = document.createElement('div'); banner.className = uid + '-from-nav'; banner.style.background = `linear-gradient(135deg,${di.darkColor},${di.color})`;
      banner.innerHTML = `<div class="${uid}-from-nav-ey">Navigator diagnosis</div><div class="${uid}-from-nav-label">${di.label}</div><div class="${uid}-from-nav-action">${state.recommendedAction}</div>`;
      c.appendChild(banner);
    } else {
      const ll = document.createElement('label'); ll.className = uid + '-lbl'; ll.textContent = 'What is your diagnosis?'; c.appendChild(ll);
      const cards = document.createElement('div'); cards.className = uid + '-diag-cards';
      [['cant-do', DIAG['cant-do']], ['wont-do', DIAG['wont-do']]].forEach(([id, info]) => {
        const card = document.createElement('div'); card.className = uid + '-dc'; card.style.background = info.color;
        if (state.diagnosisType === id) card.classList.add('sel');
        card.innerHTML = `<div class="${uid}-dc-label">${info.label}</div><div class="${uid}-dc-sub">${info.sub}</div>`;
        card.addEventListener('click', () => {
          state.diagnosisType = id; playStrokesExpand();
          cards.querySelectorAll('.' + uid + '-dc').forEach(el => el.classList.remove('sel'));
          card.classList.add('sel');
        });
        cards.appendChild(card);
      });
      c.appendChild(cards);
      const lrec = document.createElement('label'); lrec.className = uid + '-lbl'; lrec.textContent = 'Recommended approach (from Navigator or your own judgement)'; c.appendChild(lrec);
      const iRec = mkInp('What does the Navigator recommend, or what do you judge the right approach to be?', state.recommendedAction, 2, e => { state.recommendedAction = e.target.value; });
      c.appendChild(iRec);
    }
    const lsp = document.createElement('label'); lsp.className = uid + '-lbl'; lsp.textContent = 'Your specific plan: what exactly will you do?'; c.appendChild(lsp);
    const iSp = mkInp(di ? di.label + ': ' + state.recommendedAction.substring(0, 60) + '...' : 'Describe the specific action you will take...', state.specificPlan, 3, e => { state.specificPlan = e.target.value; nxt.disabled = !state.specificPlan.trim(); });
    c.appendChild(iSp);
    const lw = document.createElement('label'); lw.className = uid + '-lbl'; lw.textContent = 'When will you do this?'; c.appendChild(lw);
    const iW = mkInp('e.g. This week, before our 1:1 on Thursday...', state.when, 0, e => { state.when = e.target.value; });
    c.appendChild(iW);
    const navRow = document.createElement('div'); navRow.className = uid + '-nav';
    const back = document.createElement('button'); back.className = uid + '-btn ' + uid + '-ghost'; back.innerHTML = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); step = 1; render(); }); navRow.appendChild(back);
    const nxt = document.createElement('button'); nxt.className = uid + '-btn ' + uid + '-primary';
    nxt.textContent = 'Next: Follow-through \u2192'; nxt.disabled = !state.specificPlan.trim();
    nxt.addEventListener('click', () => { playMINext(); step = 3; render(); });
    navRow.appendChild(nxt); c.appendChild(navRow);
  }

  function s3(c) {
    c.appendChild(mkHd(3, 'Follow-through', 'How will you know it is working, and when will you check in?'));
    const lsl = document.createElement('label'); lsl.className = uid + '-lbl'; lsl.textContent = 'What will improvement look like? How will you know it is working?'; c.appendChild(lsl);
    const iSl = mkInp('Describe the specific observable changes you expect to see...', state.successLooks, 3, e => { state.successLooks = e.target.value; }); c.appendChild(iSl);
    const lrd = document.createElement('label'); lrd.className = uid + '-lbl'; lrd.textContent = 'Review date: when will you formally check in on progress?'; c.appendChild(lrd);
    const iRd = mkInp('e.g. Two weeks from now, 10 June, our next 1:1...', state.reviewDate, 0, e => { state.reviewDate = e.target.value; }); c.appendChild(iRd);
    const navRow = document.createElement('div'); navRow.className = uid + '-nav';
    const leftBtns = document.createElement('div'); leftBtns.className = uid + '-navl';
    const back = document.createElement('button'); back.className = uid + '-btn ' + uid + '-ghost'; back.innerHTML = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); step = 2; render(); });
    const restart = document.createElement('button'); restart.className = uid + '-btn ' + uid + '-ghost'; restart.innerHTML = '\u21BA Start again';
    restart.addEventListener('click', () => {
      playMIBack();
      Object.assign(state, { name:'', behaviour:'', diagnosisType:null, recommendedAction:'', fromNavigator:false, specificPlan:'', when:'', successLooks:'', reviewDate:'' });
      step = 1; render();
    });
    leftBtns.appendChild(back); leftBtns.appendChild(restart);
    const dlBtn = document.createElement('button'); dlBtn.className = uid + '-btn ' + uid + '-dl';
    dlBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download Action Plan';
    dlBtn.addEventListener('click', () => { playMIDownload(); downloadActionPlannerPDF(state); });
    navRow.appendChild(leftBtns); navRow.appendChild(dlBtn); c.appendChild(navRow);
  }

  render();
  return wrap;
}

function downloadActionPlannerPDF(state) {
  try {
    const W = 595.28, H = 841.89, M = 50;
    let objCount = 0; const objects = [];
    function addObj(data) { objCount++; objects.push({ id: objCount, data }); return objCount; }
    function escPDF(str) { return String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
    function sanitize(str) {
      if (!str) return '';
      return String(str).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/\u2013|\u2014/g,'-').replace(/\u2026/g,'...').replace(/[^\x00-\x7F]/g,'');
    }
    function wrapText(text, maxChars) {
      if (!text) return [''];
      const words = sanitize(text).split(/\s+/); const lines = []; let line = '';
      words.forEach(w => { if ((line+' '+w).trim().length > maxChars) { lines.push(line.trim()); line = w; } else { line = (line+' '+w).trim(); } });
      if (line) lines.push(line.trim());
      return lines.length ? lines : [''];
    }
    function hexRGB(hex) {
      if (!hex||hex[0]!=='#') return '0.10 0.23 0.36';
      return (parseInt(hex.slice(1,3),16)/255).toFixed(2)+' '+(parseInt(hex.slice(3,5),16)/255).toFixed(2)+' '+(parseInt(hex.slice(5,7),16)/255).toFixed(2);
    }
    const DIAG = {
      'cant-do':{ label:"Can't Do", sub:'Skills or knowledge gap', color:'#009FA0' },
      'wont-do':{ label:"Won't Do", sub:'Attitude or motivation issue', color:'#fa6b02' },
      'positive':{ label:'Performance Improved', sub:'Recognition needed', color:'#0061AD' }
    };
    const di = state.diagnosisType ? DIAG[state.diagnosisType] : null;
    const diagColor = di ? hexRGB(di.color) : '0.10 0.23 0.36';
    const navy = '0.10 0.23 0.36'; const blue = '0.00 0.38 0.68';
    const white = '1 1 1'; const grey = '0.45 0.45 0.45'; const light = '0.93 0.96 0.99';
    const lh = 15;
    let s = ''; let y = H - M;

    // Header
    s += `${blue} rg\n${M} ${H-M-48} ${W-2*M} 48 re f\n${white} rg\n`;
    s += `BT /F1 15 Tf ${M+12} ${H-M-30} Td (${escPDF('Story Liberator - Action Planner')}) Tj ET\n`;
    s += `BT /F2 8 Tf ${W-M-178} ${H-M-30} Td (${escPDF('Performance Navigator | Liberator Programme')}) Tj ET\n`;
    s += `${diagColor} rg\n${M} ${H-M-58} ${W-2*M} 10 re f\n`;
    y = H - M - 76;

    // Name
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('ACTION PLAN FOR')}) Tj ET\n`; y -= 7;
    s += `${light} rg\n${M} ${y-36} ${W-2*M} 36 re f\n${blue} rg\n`;
    s += `BT /F1 15 Tf ${M+10} ${y-23} Td (${escPDF(sanitize(state.name)||'(No name given)')}) Tj ET\n`; y -= 50;

    // Behaviour
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('OBSERVED BEHAVIOUR')}) Tj ET\n`; y -= 7;
    const bl = wrapText(state.behaviour||'(Not recorded)', 80); const bh = Math.max(44, bl.length*lh+18);
    s += `${light} rg\n${M} ${y-bh} ${W-2*M} ${bh} re f\n0.2 0.2 0.2 rg\n`;
    let by2 = y-14; bl.forEach(l => { s += `BT /F2 10 Tf ${M+10} ${by2} Td (${escPDF(l)}) Tj ET\n`; by2-=lh; }); y -= bh+14;

    // Diagnosis
    if (di) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('DIAGNOSIS')}) Tj ET\n`; y -= 7;
      s += `${diagColor} rg\n${M} ${y-32} 220 32 re f\n${white} rg\n`;
      s += `BT /F1 12 Tf ${M+10} ${y-20} Td (${escPDF(di.label)}) Tj ET\n`;
      s += `${grey} rg\nBT /F2 9 Tf ${M+236} ${y-20} Td (${escPDF(di.sub)}) Tj ET\n`;
      y -= 46;
    }

    // Recommended approach
    if (state.recommendedAction) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('RECOMMENDED APPROACH')}) Tj ET\n`; y -= 7;
      const rl = wrapText(state.recommendedAction, 80); const rh = Math.max(36, rl.length*lh+18);
      s += `${light} rg\n${M} ${y-rh} ${W-2*M} ${rh} re f\n`;
      s += `${diagColor} rg\n${M} ${y-rh} 5 ${rh} re f\n0.2 0.2 0.2 rg\n`;
      let ry = y-14; rl.forEach(l => { s += `BT /F2 10 Tf ${M+13} ${ry} Td (${escPDF(l)}) Tj ET\n`; ry-=lh; }); y -= rh+14;
    }

    // Specific plan
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('YOUR SPECIFIC PLAN')}) Tj ET\n`; y -= 7;
    const pl = wrapText(state.specificPlan||'(Not recorded)', 80); const ph = Math.max(52, pl.length*lh+20);
    s += `${blue} rg\n${M} ${y-ph} ${W-2*M} ${ph} re f\n${white} rg\n`;
    let py = y-16; pl.forEach(l => { s += `BT /F2 11 Tf ${M+12} ${py} Td (${escPDF(l)}) Tj ET\n`; py-=lh+1; }); y -= ph+14;

    // When + review in two columns
    const colW = (W-2*M-10)/2;
    if (state.when || state.reviewDate) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('WHEN')}) Tj ET\n`;
      s += `BT /F1 10 Tf ${M+colW+10} ${y} Td (${escPDF('REVIEW DATE')}) Tj ET\n`; y -= 7;
      s += `${light} rg\n${M} ${y-30} ${colW} 30 re f\n${M+colW+10} ${y-30} ${colW} 30 re f\n0.2 0.2 0.2 rg\n`;
      if (state.when) s += `BT /F2 10 Tf ${M+10} ${y-19} Td (${escPDF(sanitize(state.when).substring(0,42))}) Tj ET\n`;
      if (state.reviewDate) s += `BT /F2 10 Tf ${M+colW+20} ${y-19} Td (${escPDF(sanitize(state.reviewDate).substring(0,42))}) Tj ET\n`;
      y -= 44;
    }

    // Success
    if (state.successLooks) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('WHAT IMPROVEMENT LOOKS LIKE')}) Tj ET\n`; y -= 7;
      const sl = wrapText(state.successLooks, 80); const sh = Math.max(36, sl.length*lh+18);
      s += `${light} rg\n${M} ${y-sh} ${W-2*M} ${sh} re f\n`;
      s += `${blue} rg\n${M} ${y-sh} 5 ${sh} re f\n0.2 0.2 0.2 rg\n`;
      let sy = y-14; sl.forEach(l => { s += `BT /F2 10 Tf ${M+13} ${sy} Td (${escPDF(l)}) Tj ET\n`; sy-=lh; });
    }

    s += `${grey} rg\nBT /F2 8 Tf ${M} ${M-10} Td (${escPDF('Story Contracting - Liberator Programme - Action Planner - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId   = addObj('');
    const font1Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const streamBytes = new TextEncoder().encode(s);
    const streamId  = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
    const pageId    = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);
    objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

    let pdf = '%PDF-1.4\n'; const offsets = [];
    objects.forEach(obj => { offsets.push(pdf.length); pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`; });
    const xo = pdf.length;
    pdf += `xref\n0 ${objCount+1}\n0000000000 65535 f \n`;
    offsets.forEach(off => { pdf += String(off).padStart(10,'0') + ' 00000 n \n'; });
    pdf += `trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xo}\n%%EOF`;

    const blob = new Blob([pdf], { type:'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'Action-Plan-' + new Date().toISOString().slice(0,10) + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error('PDF error', e); }
}

    const nxt = document.createElement('button'); nxt.className = uid + '-btn ' + uid + '-primary';
    nxt.textContent = 'Next: Beacons \u2192'; nxt.disabled = !state.name.trim();
    nxt.addEventListener('click', () => { playMINext(); step = 2; render(); });
    navRow.appendChild(nxt); c.appendChild(navRow);
  }

  function s2(c) {
    c.appendChild(mkHd(2, 'Plan your beacons', 'Beacons are your formal review checkpoints: the moments you stop, assess progress, and re-route if needed. Set up to three.'));

    state.beacons.forEach((beacon, i) => {
      const row = document.createElement('div'); row.className = uid + '-beacon-row';

      row.appendChild(num);
