        {name:'Nurture',                 desc:'Helping people achieve their goals; listening to them; providing close support as well as time and attention'},
        {name:'Gregariousness',          desc:'Meeting and working with a wide range of people, including the public'},
        {name:'Solitude',                desc:'Having space to get on with things without contact or distraction from other people'},
        {name:'Affiliation',             desc:'Having close relationships; being part of a team; working interdependently with others and being liked and respected by them'},
        {name:'Dedication',              desc:'Helping the wider community; doing something worthwhile; making the world a better place to be'},
        {name:'Relating',                desc:'Responding to different individual needs; dealing with difficult interpersonal situations; trusting and being trusted; resolving conflict'}
      ]},
    { id:'achievement', label:'Achievement', color:'#1A3A5C', light:'rgba(26,58,92,.10)',
      factors:[
        {name:'Task Focus',              desc:'Having a liking for detail and analysis; using skills and knowledge; enjoying specific tasks; intellectual challenge; focusing on the job in hand'},
        {name:'Goal Orientation',        desc:'Working to targets; a future perspective to achieve tangible results; output rather than input focused; problem solving; achieving business results'},
        {name:'Power & Authority',       desc:'Having control over others; being able to direct them and control work and events; making big decisions; being regarded as the source of authority'},
        {name:'Responsibility',          desc:'Leading others; taking and accepting responsibility for decisions; making a difference; doing what is necessary to ensure company success'},
        {name:'Initiative & Independence',desc:'Using own initiative; dislike of bureaucracy and red tape; operating independently; deciding own course of action'},
        {name:'Creativity',              desc:'Generating ideas; producing something new; finding new ways'},
        {name:'Challenge',               desc:'Being stretched; liking energy and hard work and competitive situations; responding to pressure and deadlines; being active and challenged'}
      ]},
    { id:'enjoyment', label:'Enjoyment', color:'#009FA0', light:'rgba(0,159,160,.10)',
      factors:[
        {name:'Suitability',             desc:'Comfort in knowing capability to do job based on previous experience; perceived match of knowledge and skills'},
        {name:'Structure',               desc:'Operating to guidelines and systems; organising and planning; meeting standards; creating order, procedure and systems'},
        {name:'Security',                desc:'Job security; knowing what is going on; a liking for certainty'},
        {name:'Tangible Reward',         desc:'Money; status; glamour; perks'},
        {name:'Variety & Fun',           desc:'Enjoyment and fun; difference; travel; location; not repetitive or being bored'},
        {name:'Recognition',             desc:'Being well regarded and appreciated; feeling good about self and work; self-development'},
        {name:'Comfort',                 desc:'Working moderate hours; not dealing with unpleasant or difficult situations; keeping clear of anxiety and stress; avoiding failure'}
      ]}
  ];

  const ALL = [];
  CATS.forEach(cat => cat.factors.forEach(f => ALL.push(Object.assign({}, f, {catId:cat.id, catLabel:cat.label, catColor:cat.color, catLight:cat.light}))));

  let phase = 'browse';
  let activeTab = 'people';
  let sel6 = new Set();
  let top2 = new Set();
  let leastSet = new Set();

  const wrap = document.createElement('div');
  wrap.style.cssText = 'font-family:"Barlow",sans-serif;width:100%;user-select:none';

  const styleEl = document.createElement('style');
  styleEl.textContent = `
    .${uid}-steps{display:flex;align-items:center;gap:0;margin-bottom:16px}
    .${uid}-step{flex:1;height:3px;border-radius:2px;background:#e4edf5;transition:background .3s}
    .${uid}-step.done{background:#009FA0}
    .${uid}-step.active{background:#0061AD}
    .${uid}-step-gap{width:4px}
    .${uid}-instr{background:#f0f6fc;border-radius:12px;padding:12px 16px;margin-bottom:12px}
    .${uid}-instr-title{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:16px;color:#004B86;margin-bottom:3px}
    .${uid}-instr-sub{font-size:12px;color:#666;line-height:1.5}
    .${uid}-counter{display:inline-flex;align-items:center;gap:8px;background:#0061AD;color:white;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin-bottom:12px;transition:background .3s}
    .${uid}-counter.full{background:#009FA0}
    .${uid}-tabs{display:flex;gap:6px;margin-bottom:12px}
    .${uid}-tab{flex:1;padding:8px 4px;border:none;border-radius:10px;font-family:"Barlow",sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .18s;background:#e4edf5;color:#666}
    .${uid}-tab.active{color:white}
    .${uid}-rows{display:flex;flex-direction:column;gap:6px}
    .${uid}-row{background:white;border-radius:10px;border:1.5px solid #e4edf5;border-left-width:3px;padding:10px 14px;animation:${uid}FIn .22s ease both}
    @keyframes ${uid}FIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .${uid}-row-name{font-weight:700;font-size:13px;margin-bottom:3px}
    .${uid}-row-desc{font-size:11.5px;color:#666;line-height:1.5}
    .${uid}-chips{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .${uid}-chip{border-radius:12px;padding:10px 12px 10px 12px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;background:#f4f8fc;animation:${uid}FIn .22s ease both}
    .${uid}-chip:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .${uid}-chip-cat{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
    .${uid}-chip-name{font-size:12px;font-weight:700;color:#004B86;line-height:1.3;padding-right:20px}
    .${uid}-chip-desc{font-size:10px;color:#666;line-height:1.4;margin-top:5px}
    .${uid}-chip.selected{background:white;box-shadow:0 4px 16px rgba(0,0,0,.1)}
    .${uid}-chip.dimmed{opacity:.28;pointer-events:none}
    .${uid}-chip.top2-pick{outline:3px solid gold;outline-offset:1px}
    .${uid}-chip-check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;background:#e4edf5;color:#aaa;font-weight:700;transition:all .18s;flex-shrink:0}
    .${uid}-chip.selected .${uid}-chip-check{color:white}
    .${uid}-pae{margin:14px 0}
    .${uid}-pae-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
    .${uid}-pae-label{font-size:11px;font-weight:700;width:82px;flex-shrink:0}
    .${uid}-pae-track{flex:1;background:#e4edf5;border-radius:20px;height:20px;overflow:hidden}
    .${uid}-pae-fill{height:100%;border-radius:20px;transition:width 1.1s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;padding-left:8px;width:0%}
    .${uid}-pae-count{font-size:10px;font-weight:800;color:white;white-space:nowrap}
    .${uid}-pae-score{font-size:11px;font-weight:700;width:28px;text-align:right;flex-shrink:0}
    .${uid}-hero-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
    .${uid}-hero{border-radius:14px;padding:14px 14px 14px 14px;color:white;position:relative;overflow:hidden;animation:${uid}FIn .36s ease both}
    .${uid}-hero-eyebrow{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:4px}
    .${uid}-hero-name{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;letter-spacing:.02em;margin-bottom:6px;padding-right:28px}
    .${uid}-hero-desc{font-size:10px;color:rgba(255,255,255,.85);line-height:1.55}
    .${uid}-hero-num{position:absolute;top:8px;right:12px;font-family:"Barlow Condensed",sans-serif;font-size:42px;font-weight:800;color:rgba(255,255,255,.14);line-height:1}
    .${uid}-tag-group{margin-bottom:12px}
    .${uid}-tag-group-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#8A8E91;margin-bottom:7px}
    .${uid}-tags{display:flex;flex-wrap:wrap;gap:6px}
    .${uid}-tag{border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;color:white}
    .${uid}-tag.least{background:#e4edf5;color:#666}
    .${uid}-interp{background:linear-gradient(135deg,#004B86,#0061AD);border-radius:14px;padding:16px 18px;margin:14px 0}
    .${uid}-interp-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:6px}
    .${uid}-interp-text{font-size:12px;color:rgba(255,255,255,.9);line-height:1.7}
    .${uid}-nav{display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap}
    .${uid}-btn{border:none;border-radius:20px;padding:11px 20px;font-family:"Barlow",sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
    .${uid}-btn-primary{background:#0061AD;color:white;box-shadow:0 4px 14px rgba(0,97,173,.2)}
    .${uid}-btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,97,173,.3)}
    .${uid}-btn-primary:disabled{background:#b0c4d8;cursor:not-allowed}
    .${uid}-btn-ghost{background:#e4edf5;color:#666}
    .${uid}-btn-ghost:hover{background:#d0dce8;color:#333}
    .${uid}-btn-download{background:#009FA0;color:white;box-shadow:0 4px 14px rgba(0,159,160,.2)}
    .${uid}-btn-download:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,159,160,.3)}
    .${uid}-ml{margin-left:auto}
    .${uid}-begin{display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 0 6px}
    .${uid}-begin-title{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:18px;color:#004B86;margin-bottom:6px}
    .${uid}-begin-sub{font-size:12px;color:#666;line-height:1.6;max-width:320px;margin-bottom:16px}
    .${uid}-divider{height:1px;background:#e4edf5;margin:14px 0}
  `;

  function getCat(id) { return CATS.find(c => c.id === id); }
  function getFactor(name) { return ALL.find(f => f.name === name); }

  function buildSteps(current) {
    const d = document.createElement('div');
    d.className = uid+'-steps';
    [1,2,3,4].forEach((n,i) => {
      const s = document.createElement('div');
      s.className = uid+'-step'+(n < current?' done':n===current?' active':'');
      d.appendChild(s);
      if (i<3){const g=document.createElement('div');g.className=uid+'-step-gap';d.appendChild(g);}
    });
    return d;
  }

  function buildCounter(count, max, label) {
    const d = document.createElement('div');
    d.className = uid+'-counter'+(count>=max?' full':'');
    d.innerHTML = '<span>'+count+' / '+max+'</span><span>'+label+'</span>';
    return d;
  }

  function buildChip(f, isSelected, isDimmed, isTop2) {
    const chip = document.createElement('div');
    chip.className = uid+'-chip'+(isSelected?' selected':'')+(isDimmed?' dimmed':'')+(isTop2?' top2-pick':'');
    chip.style.borderColor = isSelected ? f.catColor : 'transparent';
    chip.style.color = f.catColor;
    chip.innerHTML =
      '<div class="'+uid+'-chip-cat">'+f.catLabel+'</div>'+
      '<div class="'+uid+'-chip-name">'+f.name+'</div>'+
      (isSelected ? '<div class="'+uid+'-chip-desc">'+f.desc+'</div>' : '')+
      '<div class="'+uid+'-chip-check" style="background:'+(isSelected?f.catColor:'#e4edf5')+'">'+
        (isTop2?'&#9733;':'&#10003;')+'</div>';
    return chip;
  }

  function renderBrowse() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);

    const tabBar = document.createElement('div');
    tabBar.className = uid+'-tabs';
    CATS.forEach(cat => {
      const t = document.createElement('button');
      t.className = uid+'-tab'+(cat.id===activeTab?' active':'');
      t.textContent = cat.label;
      t.style.background = cat.id===activeTab ? cat.color : '';
      t.addEventListener('click', () => { playMITab(cat.id); activeTab=cat.id; renderBrowse(); });
      tabBar.appendChild(t);
    });
    wrap.appendChild(tabBar);

    const cat = getCat(activeTab);
    const rows = document.createElement('div');
    rows.className = uid+'-rows';
    cat.factors.forEach((f,i) => {
      const row = document.createElement('div');
      row.className = uid+'-row';
      row.style.animationDelay = (i*0.04)+'s';
      row.style.borderLeftColor = cat.color;
      row.innerHTML = '<div class="'+uid+'-row-name" style="color:'+cat.color+'">'+f.name+'</div>'+
                      '<div class="'+uid+'-row-desc">'+f.desc+'</div>';
      rows.appendChild(row);
    });
    wrap.appendChild(rows);

    const begin = document.createElement('div');
    begin.className = uid+'-begin';
    begin.innerHTML = '<div class="'+uid+'-begin-title">Ready to explore your motivation pattern?</div>'+
      '<div class="'+uid+'-begin-sub">Browse all three categories first, then begin your personal reflection. It takes about two minutes and works best when you are honest with yourself.</div>';
    const btn = document.createElement('button');
    btn.className = uid+'-btn '+uid+'-btn-primary';
    btn.textContent = 'Begin reflection \u2192';
    btn.addEventListener('click', () => { playMIBegin(); sel6.clear(); top2.clear(); leastSet.clear(); renderSelect6(); });
    begin.appendChild(btn);
    wrap.appendChild(begin);
  }

  function renderSelect6() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);
    wrap.appendChild(buildSteps(2));

    const instr = document.createElement('div');
    instr.className = uid+'-instr';
    instr.innerHTML = '<div class="'+uid+'-instr-title">Step 1: Select your top 6</div>'+
      '<div class="'+uid+'-instr-sub">Which six factors matter most to you? Think about who you are, not who you think you should be.</div>';
    wrap.appendChild(instr);
    wrap.appendChild(buildCounter(sel6.size, 6, 'selected'));

    const chips = document.createElement('div');
    chips.className = uid+'-chips';
    ALL.forEach((f,i) => {
      const isSel = sel6.has(f.name);
      const isDim = sel6.size>=6 && !isSel;
      const chip = buildChip(f, isSel, isDim, false);
      chip.style.animationDelay = (i*0.025)+'s';
      chip.addEventListener('click', () => {
        if (sel6.has(f.name)) { sel6.delete(f.name); playMIDeselect(); }
        else if (sel6.size<6) { sel6.add(f.name); playMISelect(); }
        renderSelect6();
      });
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);

    const nav = document.createElement('div');
    nav.className = uid+'-nav';
    const back = document.createElement('button');
    back.className = uid+'-btn '+uid+'-btn-ghost';
    back.textContent = '\u2190 Browse factors';
    back.addEventListener('click', () => { playMIBack(); renderBrowse(); });
    const next = document.createElement('button');
    next.className = uid+'-btn '+uid+'-btn-primary '+uid+'-ml';
    next.textContent = 'Next: Pick your top 2 \u2192';
    next.disabled = sel6.size!==6;
    next.addEventListener('click', () => { if(sel6.size===6){ playMINext(); top2.clear();renderSelect2();} });
    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderSelect2() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);
    wrap.appendChild(buildSteps(3));

    const instr = document.createElement('div');
    instr.className = uid+'-instr';
    instr.innerHTML = '<div class="'+uid+'-instr-title">Step 2: Your top 2 of all</div>'+
      '<div class="'+uid+'-instr-sub">From your six, which two are your most important motivators of all? These are your primary drivers.</div>';
    wrap.appendChild(instr);
    wrap.appendChild(buildCounter(top2.size, 2, 'chosen'));

    const chips = document.createElement('div');
    chips.className = uid+'-chips';
    sel6.forEach((name,i) => {
      const f = getFactor(name);
      const isSel = top2.has(name);
      const isDim = top2.size>=2 && !isSel;
      const chip = buildChip(f, isSel, isDim, isSel);
      chip.addEventListener('click', () => {
        if (top2.has(name)) { top2.delete(name); playMIDeselect(); }
        else if (top2.size<2) { top2.add(name); playMISelect(); }
        renderSelect2();
      });
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);

    const nav = document.createElement('div');
    nav.className = uid+'-nav';
    const back = document.createElement('button');
    back.className = uid+'-btn '+uid+'-btn-ghost';
    back.textContent = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); renderSelect6(); });
    const next = document.createElement('button');
    next.className = uid+'-btn '+uid+'-btn-primary '+uid+'-ml';
    next.textContent = 'Next: Least important \u2192';
    next.disabled = top2.size!==2;
    next.addEventListener('click', () => { if(top2.size===2){ playMINext(); leastSet.clear();renderSelectLeast();} });
    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderSelectLeast() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);
    wrap.appendChild(buildSteps(4));

    const instr = document.createElement('div');
    instr.className = uid+'-instr';
    instr.innerHTML = '<div class="'+uid+'-instr-title">Step 3: Least important</div>'+
      '<div class="'+uid+'-instr-sub">From the remaining factors, select those that matter least to you right now. There is no right or wrong answer here.</div>';
    wrap.appendChild(instr);

    const counter = document.createElement('div');
    counter.className = uid+'-counter'+(leastSet.size>0?' full':'');
    counter.textContent = leastSet.size+' selected';
    wrap.appendChild(counter);

    const chips = document.createElement('div');
    chips.className = uid+'-chips';
    ALL.filter(f => !sel6.has(f.name)).forEach((f,i) => {
      const isSel = leastSet.has(f.name);
      const chip = buildChip(f, isSel, false, false);
      chip.style.animationDelay = (i*0.03)+'s';
      chip.addEventListener('click', () => {
        if (leastSet.has(f.name)) { leastSet.delete(f.name); playMIDeselect(); }
        else { leastSet.add(f.name); playMISelect(); }
        renderSelectLeast();
      });
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);

    const nav = document.createElement('div');
    nav.className = uid+'-nav';
    const back = document.createElement('button');
    back.className = uid+'-btn '+uid+'-btn-ghost';
    back.textContent = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); renderSelect2(); });
    const next = document.createElement('button');
    next.className = uid+'-btn '+uid+'-btn-primary '+uid+'-ml';
    next.textContent = 'See my profile \u2192';
    next.addEventListener('click', () => { playMIComplete(); renderProfile(); });
    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderProfile() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);
    wrap.appendChild(buildSteps(5));

    const scores = {people:0, achievement:0, enjoyment:0};
    sel6.forEach(name => { const f=getFactor(name); if(f) scores[f.catId]++; });

    const titleEl = document.createElement('div');
    titleEl.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:#004B86;margin-bottom:14px';
    titleEl.textContent = 'Your Motivation Profile';
    wrap.appendChild(titleEl);

    // PAE bars
    const pae = document.createElement('div');
    pae.className = uid+'-pae';
    CATS.forEach(cat => {
      const score = scores[cat.id];
      const pct = Math.round((score/6)*100);
      const row = document.createElement('div');
      row.className = uid+'-pae-row';
      const fill = document.createElement('div');
      fill.className = uid+'-pae-fill';
      fill.style.background = cat.color;
      fill.setAttribute('data-pct', pct);
      fill.innerHTML = score>0?'<span class="'+uid+'-pae-count">'+score+' of 6</span>':'';
      row.innerHTML = '<div class="'+uid+'-pae-label" style="color:'+cat.color+'">'+cat.label+'</div>'+
                      '<div class="'+uid+'-pae-track"></div>'+
                      '<div class="'+uid+'-pae-score" style="color:'+cat.color+'">'+score+'</div>';
      row.querySelector('.'+uid+'-pae-track').appendChild(fill);
      pae.appendChild(row);
    });
    wrap.appendChild(pae);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        wrap.querySelectorAll('.'+uid+'-pae-fill').forEach(el => { el.style.width = el.getAttribute('data-pct')+'%'; });
      });
    });

    // Top 2 heroes
    const heroLabel = document.createElement('div');
    heroLabel.className = uid+'-tag-group-label';
    heroLabel.textContent = 'Your top 2 motivators';
    wrap.appendChild(heroLabel);

    const heroPair = document.createElement('div');
    heroPair.className = uid+'-hero-pair';
    [...top2].forEach((name,i) => {
      const f = getFactor(name);
      const hero = document.createElement('div');
      hero.className = uid+'-hero';
      hero.style.background = f.catColor;
      hero.style.animationDelay = (i*0.1)+'s';
      hero.innerHTML = '<div class="'+uid+'-hero-num">'+(i+1)+'</div>'+
                       '<div class="'+uid+'-hero-eyebrow">'+f.catLabel+'</div>'+
                       '<div class="'+uid+'-hero-name">'+f.name+'</div>'+
                       '<div class="'+uid+'-hero-desc">'+f.desc+'</div>';
      heroPair.appendChild(hero);
    });
    wrap.appendChild(heroPair);

    // Top 6 tags
    const top6Group = document.createElement('div');
    top6Group.className = uid+'-tag-group';
    top6Group.innerHTML = '<div class="'+uid+'-tag-group-label">All 6 of your key motivators</div>';
    const top6Tags = document.createElement('div');
    top6Tags.className = uid+'-tags';
    sel6.forEach(name => {
      const f = getFactor(name);
      const tag = document.createElement('div');
      tag.className = uid+'-tag';
      tag.style.background = f.catColor;
      tag.textContent = f.name + (top2.has(name)?' \u2605':'');
      top6Tags.appendChild(tag);
    });
    top6Group.appendChild(top6Tags);
    wrap.appendChild(top6Group);

    // Least important
    if (leastSet.size>0) {
      const leastGroup = document.createElement('div');
      leastGroup.className = uid+'-tag-group';
      leastGroup.innerHTML = '<div class="'+uid+'-tag-group-label">Factors you rated least important</div>';
      const leastTags = document.createElement('div');
      leastTags.className = uid+'-tags';
      leastSet.forEach(name => {
        const tag = document.createElement('div');
        tag.className = uid+'-tag least';
        tag.textContent = name;
        leastTags.appendChild(tag);
      });
      leastGroup.appendChild(leastTags);
      wrap.appendChild(leastGroup);
    }

    // Interpretation
    const domCat = CATS.reduce((a,b) => scores[a.id]>=scores[b.id]?a:b);
    const interpMap = {
      people:'Your profile shows a strong People orientation. To make the most of this as a leader, pair it with Achievement focus to ensure your care for others drives real results. High People motivation is your superpower when it creates movement, not just connection.',
      achievement:'Your profile shows a strong Achievement orientation. This is a hallmark of effective Leader-Developers. Stay mindful of your Enjoyment needs to prevent tunnel vision, and keep People motivation visible so your team feels the human side of your drive.',
      enjoyment:'Your profile shows strong Enjoyment motivators. These are the conditions that allow you to sustain performance without burning out. Work to ensure Achievement and People motivators are also present, so your environment supports both you and the people around you.'
    };
    const interp = document.createElement('div');
    interp.className = uid+'-interp';
    interp.innerHTML = '<div class="'+uid+'-interp-label">A note on your profile</div>'+
                       '<div class="'+uid+'-interp-text">'+interpMap[domCat.id]+'</div>';
    wrap.appendChild(interp);

    const div = document.createElement('div');
    div.className = uid+'-divider';
    wrap.appendChild(div);

    const nav = document.createElement('div');
    nav.className = uid+'-nav';
    const restart = document.createElement('button');
    restart.className = uid+'-btn '+uid+'-btn-ghost';
    restart.textContent = '\u21BA Start again';
    restart.addEventListener('click', () => {
      playMIBack();
      sel6.clear(); top2.clear(); leastSet.clear();
      phase='browse'; activeTab='people'; renderBrowse();
    });
    const dl = document.createElement('button');
    dl.className = uid+'-btn '+uid+'-btn-download '+uid+'-ml';
    dl.textContent = '\u2193 Download profile';
    dl.addEventListener('click', () => { playMIDownload(); generateMotivationPDF(top2, sel6, leastSet, scores); });
    nav.appendChild(restart); nav.appendChild(dl);
    wrap.appendChild(nav);
  }

  renderBrowse();
  return wrap;
}

function buildAARVisual() {

    { q:'Why was there a difference?', icon:'🔍' },
    { q:'What can we learn?', icon:'💡' }
  ];
  qs.forEach((item, i) => {
    const y = i * 44 + 14;
    addRect(svg, 50, y, 310, 36, i===3?'#004B86':'#0061AD', 8);

  const beaconInfo = {

    try {

      osc1.type = 'sine';
      osc1.frequency.value = 880;
      g1.gain.setValueAtTime(0, now);
      g1.gain.linearRampToValueAtTime(0.018, now + 0.005);
      g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.65);
      osc1.connect(g1); g1.connect(ctx.destination);
      osc1.start(now); osc1.stop(now + 0.7);
      // Softer upper partial for warmth
      const osc2 = ctx.createOscillator(), g2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = 1320;
      g2.gain.setValueAtTime(0, now);
      g2.gain.linearRampToValueAtTime(0.009, now + 0.005);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
      osc2.connect(g2); g2.connect(ctx.destination);
      osc2.start(now); osc2.stop(now + 0.4);
    } catch(e) {}
  }

  // Subtle minimise sound

    try {
      const ctx = getCtx(), now = ctx.currentTime;

      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.exponentialRampToValueAtTime(280, now + 0.18);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.014, now + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);

      osc.start(now); osc.stop(now + 0.22);
    } catch(e) {}
  }

  // Alarm warble: two short urgent descending pulses
  function playAlarmWarble() {
    try {
      const ctx = getCtx(), now = ctx.currentTime;
      [{start:0, f1:780, f2:520}, {start:0.22, f1:700, f2:460}].forEach(({start, f1, f2}) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(f1, now + start);
        osc.frequency.exponentialRampToValueAtTime(f2, now + start + 0.16);
        g.gain.setValueAtTime(0, now + start);
        g.gain.linearRampToValueAtTime(0.016, now + start + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, now + start + 0.18);

  wrap.innerHTML = `<svg id="${fp}s" viewBox="0 0 490 240" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;overflow:visible">

@keyframes ${fp}P{0%,100%{opacity:.55;r:17}50%{opacity:1;r:20}}

<!-- Main route -->

<!-- Beacon A — pulse ring signals clickability -->
<g class="${fp}b ${fp}b1 ${fp}pin" id="${fp}pinA">

</svg>

<!-- Beacon / alarm info panel -->
<div id="${fp}panel" style="display:none;border-left:3px solid #0061AD;border-radius:10px;padding:11px 14px;margin:6px 0 10px;animation:fpPanelIn .22s ease both;position:relative">

    <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="rgba(208,72,98,.15)" stroke="#D04862" stroke-width="1.8"/><circle cx="8" cy="8" r="3" fill="#D04862"/></svg>
    <span style="font-size:10px;color:#888;font-family:'Barlow',sans-serif">Alarm: course correction</span>
  </div>
  <div style="display:flex;align-items:center;gap:7px;flex-shrink:0;margin-left:auto">

</div>`;

  // Animate plane along path
  setTimeout(() => {
    const routeEl = document.getElementById(`${fp}r`);
    const planeEl = document.getElementById(`${fp}p`);
    if (!routeEl || !planeEl) return;
    const totalLen = routeEl.getTotalLength();
    const duration = 3200, delay = 300;
    const startTime = performance.now() + delay;
    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function step(now) {
      const elapsed = now - startTime;
      if (elapsed < 0) { requestAnimationFrame(step); return; }
      const t = ease(Math.min(elapsed / duration, 1));
      const len = t * totalLen;
      const pt  = routeEl.getPointAtLength(len);
      const pt2 = routeEl.getPointAtLength(Math.min(len + 6, totalLen));
      const ang = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
      planeEl.setAttribute('transform', `translate(${pt.x.toFixed(1)},${pt.y.toFixed(1)}) rotate(${ang.toFixed(1)})`);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }, 100);

  // Wire up beacon clicks and alarm hover

    const ptitle   = document.getElementById(`${fp}ptitle`);

    const aripple  = document.getElementById(`${fp}aripple`);
    let activePin  = null;
    let alarmReady = false;

    // Alarm becomes interactive after its fade-in completes (1.75s + 0.5s)
    setTimeout(() => { alarmReady = true; }, 2400);

    function triggerSonar(letter) {
      const el = document.getElementById(`${fp}sonar${letter}`);
      if (!el) return;
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = `${fp}SR .7s ease-out forwards`;
    }

    function triggerAlarmRipple() {
      if (!aripple) return;
      aripple.classList.remove('active');
      void aripple.offsetWidth;
      aripple.classList.add('active');
    }

    function showPanel(id, title, text, colour, isAlarm) {
      ptitle.textContent = title;
      ptext.textContent  = text;
      panel.style.borderLeftColor = colour;
      panel.style.background = isAlarm ? 'rgba(208,72,98,.07)' : '#EAF4FB';
      panel.style.display = 'block';
      panel.style.animation = 'none';
      void panel.offsetWidth;
      panel.style.animation = 'fpPanelIn .22s ease both';
    }

    function closePanel() {
      playMinimise();
      panel.style.display = 'none';
      activePin = null;
    }

    // Beacon clicks
    ['A','B','C','D'].forEach(letter => {
      const pin = document.getElementById(`${fp}pin${letter}`);
      if (!pin) return;
      pin.addEventListener('click', () => {
        if (activePin === letter) { closePanel(); return; }
        activePin = letter;
        playSonar();
        triggerSonar(letter);
        const info = beaconInfo[letter];
        showPanel(letter, `${letter}: ${info.title}`, info.text, '#0061AD', false);
      });
    });

    // Alarm hover
    if (alarmEl) {
      alarmEl.addEventListener('mouseenter', () => {
        if (!alarmReady) return;
        playAlarmWarble();
        triggerAlarmRipple();
      });

      // Alarm click: show panel
      alarmEl.addEventListener('click', () => {
        if (!alarmReady) return;
        if (activePin === 'alarm') { closePanel(); return; }
        activePin = 'alarm';
        playSonar();
        triggerAlarmRipple();
        showPanel(
          'alarm',
          'GPS Alarm: Off Course',
          'An observable deviation from the expected standard. Performance, attitude or behaviour has shifted away from what was agreed. The effective leader acts immediately rather than storing this up for a formal review. The alarm is not a punishment, it is navigation: it exists to bring things back on track as quickly and constructively as possible.',
          '#D04862',
          true
        );
      });
    }

    if (closeBtn) closeBtn.addEventListener('click', closePanel);
  }, 500);

  setTimeout(() => { wrap.style.opacity = '1'; }, 50);

  // Scroll beckon toward the Flight Plan Sheet below
  const fpBeckonStyle = document.createElement('style');
  fpBeckonStyle.textContent = `
    @keyframes fpBeckonBob { 0%,100%{transform:translateY(0);opacity:.45} 50%{transform:translateY(5px);opacity:.9} }
    @keyframes fpBeckonFade { from{opacity:0} to{opacity:1} }
    .fp-beckon { display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:22px;animation:fpBeckonFade 1.2s 2s ease both; }
    .fp-beckon-text { font-size:11px;font-weight:600;color:#8fa0b0;letter-spacing:.12em;text-transform:uppercase; }
    .fp-beckon-arrows { display:flex;flex-direction:column;align-items:center;gap:1px;animation:fpBeckonBob 2.2s ease-in-out infinite; }
  `;
  wrap.appendChild(fpBeckonStyle);
  const fpBeckon = document.createElement('div');
  fpBeckon.className = 'fp-beckon';
  fpBeckon.innerHTML = `
    <div class="fp-beckon-text">Chart your flight plan below</div>

// ============================================================
function buildOverlaySVG(onHover, onClick, onHoverHub, onClickHub) {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('id','overlay-svg');
  svg.setAttribute('viewBox','0 0 2200 2200');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%';

  const wedgeEls = [];

  SEGMENTS.forEach(seg => {
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', wedgePath(CX, CY, R_INNER, R_OUTER, seg.startAngle, seg.endAngle));
    path.setAttribute('class', 'ov-wedge');
    path.dataset.id = seg.id;
    path.addEventListener('mouseenter', () => onHover(seg.id));
    path.addEventListener('click', () => onClick(seg.id));
    svg.appendChild(path);
    wedgeEls.push(path);
  });

  // Centre hub — outer pulse ring, inner pulse ring, then transparent hit circle
  const hubRingOuter = document.createElementNS(NS, 'circle');
  hubRingOuter.setAttribute('cx', CX); hubRingOuter.setAttribute('cy', CY); hubRingOuter.setAttribute('r', R_INNER + 30);
  hubRingOuter.setAttribute('class', 'hub-ring-outer');
  svg.appendChild(hubRingOuter);

  const hubRing = document.createElementNS(NS, 'circle');
  hubRing.setAttribute('cx', CX); hubRing.setAttribute('cy', CY); hubRing.setAttribute('r', R_INNER - 10);
  hubRing.setAttribute('class', 'hub-ring');
  svg.appendChild(hubRing);

  const hubCircle = document.createElementNS(NS, 'circle');
  hubCircle.setAttribute('cx', CX); hubCircle.setAttribute('cy', CY); hubCircle.setAttribute('r', R_INNER);
  hubCircle.setAttribute('class', 'hub-circle');
  hubCircle.addEventListener('mouseenter', () => {
    svg.classList.add('hub-hovered');
    onHoverHub(true);
  });
  hubCircle.addEventListener('mouseleave', () => {
    svg.classList.remove('hub-hovered');
    onHoverHub(false);
  });
  hubCircle.addEventListener('click', () => onClickHub());
  svg.appendChild(hubCircle);

  svg.addEventListener('mouseleave', () => { svg.classList.remove('hub-hovered'); onHover(null); });

  return { svg, wedgeEls };
}

//  WHEEL PAGE
// ============================================================
function buildWheelPage(onOpen) {
  const page = document.createElement('div');
  page.className = 'page page-home';
  page.style.background = '#EAF4FB';

  let hoveredId = null;

  // Create hoverBar before overlay so callbacks can reference it
  const hoverBar = document.createElement('div');
  hoverBar.className = 'hover-bar idle';
  const hoverBarContent = document.createElement('div');
  hoverBarContent.className = 'hover-bar-content';
  hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to see what each section covers</div>';
  hoverBar.appendChild(hoverBarContent);

  const wheelSVG = getWheelSVG();
  const container = document.createElement('div');
  container.className = 'wheel-svg-container';
  container.appendChild(wheelSVG);

  const { svg: overlaySVG, wedgeEls } = buildOverlaySVG(
    (id) => {
      if (id !== null && id !== hoveredId) playShush();
      hoveredId = id;

      if (id) {
        container.classList.add('has-hover');
        wedgeEls.forEach(w => {
          w.classList.toggle('active', w.dataset.id === id);
        });
        const seg = SEGMENTS.find(s => s.id === id);
        hoverBar.className = 'hover-bar active';
        hoverBar.style.background = QUADRANT_COLOURS[seg.quadrant];
        hoverBarContent.innerHTML = `
          <div class="quadrant-label" style="color:rgba(255,255,255,.6)">${seg.quadrant}</div>
          <div class="segment-label" style="color:white">${seg.label}</div>
          <div class="click-hint" style="color:rgba(255,255,255,.5)">Click to explore</div>
        `;
      } else {
        container.classList.remove('has-hover');
        wedgeEls.forEach(w => w.classList.remove('active'));
        hoverBar.className = 'hover-bar idle';
        hoverBar.style.background = '';
        hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to see what each section covers</div>';
      }
    },
    (id) => {
      playChime();
      onOpen(id);
    },
    (isHovered) => {
      if (isHovered) {
        playShush();
        container.classList.remove('has-hover');
        wedgeEls.forEach(w => w.classList.remove('active'));
        hoverBar.className = 'hover-bar active';
        hoverBar.style.background = 'linear-gradient(135deg,#004B86,#0061AD)';
        hoverBarContent.innerHTML = `
          <div class="quadrant-label" style="color:rgba(255,255,255,.6)">The Liberator Programme</div>
          <div class="segment-label" style="color:white">High Challenge &amp; High Support</div>
          <div class="click-hint" style="color:rgba(255,255,255,.5)">More coming soon</div>
        `;
      } else {
        hoverBar.className = 'hover-bar idle';
        hoverBar.style.background = '';
        hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to see what each section covers</div>';
      }
    },
    () => {
      // Centre click — Coming Soon page
      goComingSoon();
      playChime();
    }
  );
  container.appendChild(overlaySVG);

  const wheelWrap = document.createElement('div');
  wheelWrap.className = 'wheel-wrap';
  wheelWrap.appendChild(container);
  wheelWrap.appendChild(hoverBar);

  const wheelCol = document.createElement('div');
  wheelCol.className = 'wheel-col';
  wheelCol.appendChild(wheelWrap);

  // Info column
  const infoCol = document.createElement('div');
  infoCol.className = 'info-col';

  const c1 = document.createElement('div');
  c1.className = 'card';
  c1.innerHTML = '<h2>Story Liberator</h2><p>This interactive tool supports the Liberator Programme. The wheel maps 15 leadership behaviours across four quadrants: Enabling, Visioning, Mobilising, and Developing. Click any segment to explore the model and guidance behind it.</p>';

  const c2 = document.createElement('div');
  c2.className = 'card';
  c2.innerHTML = '<h2>How to use</h2><p>Hover over any section of the wheel to see which quadrant it belongs to and what it covers. Click to open a detailed page with a leadership model, explanation, and key takeaways you can apply in your role.</p>';

  infoCol.appendChild(c1);
  infoCol.appendChild(c2);

  const layout = document.createElement('div');
  layout.className = 'wheel-layout';
  layout.appendChild(wheelCol);
  layout.appendChild(infoCol);

  const centerBlock = document.createElement('div');
  centerBlock.className = 'center-block';
  centerBlock.innerHTML = '<h1 class="title">Story Liberator</h1><p class="subtitle">An interactive leadership toolkit for the Liberator Programme. Explore the wheel to discover models, frameworks, and approaches that will support your growth as a leader at Story.</p>';

  const cont = document.createElement('div');
  cont.className = 'container';
  cont.appendChild(centerBlock);
  cont.appendChild(layout);

  page.appendChild(buildHeader());
  page.appendChild(cont);
  return page;
}

const app = document.getElementById('app');
let currentPage = null;

function showPage(el) {
  if (currentPage) app.removeChild(currentPage);
  app.appendChild(el);
  currentPage = el;
  window.scrollTo(0, 0);
}

function goHome() {
  window.location.hash = '';
  showPage(buildWheelPage(goDetail));
}

function goDetail(id) {
  const seg = SEGMENTS.find(s => s.id === id);
  if (!seg) return goHome();
  window.location.hash = '#/' + id;
  showPage(buildDetailPage(seg, goHome));
}

function goWorksheet(id) {
  const seg = SEGMENTS.find(s => s.id === id);
  if (!seg) return goHome();
  window.location.hash = '#/' + id + '/worksheet';
  showPage(buildWorksheetPage(seg));
}

// ── Worksheet page ──
function buildWorksheetPage(seg) {
  const page = document.createElement('div');
  page.className = 'page';
  page.style.background = '#EAF4FB';

  const qColour = QUADRANT_COLOURS[seg.quadrant];

  btnRow.className = 'ws-back-btns';

  const backBtn = document.createElement('button');

//  COMING SOON PAGE
// ============================================================
function buildComingSoonPage() {
  const page = document.createElement('div');
  page.className = 'page cs-page';

  // Back button
  const backBtn = document.createElement('button');
  backBtn.className = 'back-btn';
  backBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Return to wheel';
  backBtn.addEventListener('click', () => { playReturn(); goHome(); });
  page.appendChild(buildHeader(backBtn));

  // Scene
  const scene = document.createElement('div');
  scene.className = 'cs-scene';
  scene.innerHTML = '<div class="cs-bg"></div>';

  const canvas = document.createElement('canvas');
  canvas.className = 'cs-stars';
  scene.appendChild(canvas);

  const solar = document.createElement('div');
  solar.className = 'cs-solar';

  // Dashed orbit ring SVG
  const orbitSVG = document.createElementNS('http://www.w3.org/2000/svg','svg');
  orbitSVG.className = 'cs-orbit-svg';
  solar.appendChild(orbitSVG);

  // Sun (Story logo as white silhouette on warm golden sphere)
  const sun = document.createElement('div');
  sun.className = 'cs-sun';
  sun.innerHTML = `<div class="cs-sun-body"><div class="cs-sun-shine"></div><span class="cs-sun-wordmark">STORY</span></div>`;
  solar.appendChild(sun);

  // 4 planets: one per quadrant colour, equally spaced, slightly different speeds
  const CS_PLANETS = [
    { c:'#FA6B02', hi:'#FFA94D', dk:'#7D3300', spd:0.54, off:0           },
    { c:'#009FA0', hi:'#3DD6D7', dk:'#005152', spd:0.41, off:Math.PI*0.5 },
    { c:'#1A3A5C', hi:'#3A6898', dk:'#0A1A2C', spd:0.62, off:Math.PI     },
    { c:'#0061AD', hi:'#3A9AE0', dk:'#002D5C', spd:0.47, off:Math.PI*1.5 },
  ];
  const planetEls = CS_PLANETS.map(p => {
    const w = document.createElement('div');
    w.className = 'cs-planet-wrap';
    w.innerHTML = `<div class="cs-planet" style="background:radial-gradient(circle at 35% 30%,${p.hi},${p.c} 52%,${p.dk});box-shadow:0 0 22px 5px ${p.c}99"><span class="cs-planet-label">Under<br>Construction</span></div>`;
    solar.appendChild(w);
    return w;
  });

  scene.appendChild(solar);

  // Title block at bottom
  const bottom = document.createElement('div');
  bottom.className = 'cs-bottom';
  bottom.innerHTML = '<h2 class="cs-title">Coming Soon</h2><p class="cs-sub">More sections of the Liberator wheel are currently under development and will be available shortly.</p>';
  scene.appendChild(bottom);

  page.appendChild(scene);

  // Kick off animations after the DOM has rendered
  setTimeout(() => {
    const sw = scene.offsetWidth  || 800;
    const sh = scene.offsetHeight || 480;
    const cx = sw / 2;
    const cy = sh * 0.42;
    const rx = Math.min(sw * 0.34, 265);
    const ry = rx * 0.30;

    // Position sun
    sun.style.left = cx + 'px';
    sun.style.top  = cy + 'px';

    // Draw dashed orbit ellipse
    orbitSVG.setAttribute('width',  (rx * 2 + 4).toString());
    orbitSVG.setAttribute('height', (ry * 2 + 4).toString());
    orbitSVG.style.left = cx + 'px';
    orbitSVG.style.top  = cy + 'px';
    const ell = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    ell.setAttribute('cx', (rx + 2).toString());
    ell.setAttribute('cy', (ry + 2).toString());
    ell.setAttribute('rx', rx.toString());
    ell.setAttribute('ry', ry.toString());
    ell.setAttribute('fill',         'none');
    ell.setAttribute('stroke',       'rgba(255,255,255,0.09)');
    ell.setAttribute('stroke-width', '1');
    ell.setAttribute('stroke-dasharray','6 10');
    orbitSVG.appendChild(ell);

    // Twinkling star canvas
    canvas.width  = sw;
    canvas.height = sh;
    const ctx = canvas.getContext('2d');
    const stars = Array.from({length:210}, () => ({
      x: Math.random() * sw,
      y: Math.random() * sh,
      r: Math.random() * 1.5 + 0.2,
      ph: Math.random() * Math.PI * 2,
      spd: 0.5 + Math.random() * 1.1
    }));

    const drawStars = () => {
      if (!page.isConnected) return;
      const t = Date.now() / 1000;
      ctx.clearRect(0, 0, sw, sh);
      stars.forEach(s => {
        const a = 0.22 + 0.62 * (0.5 + 0.5 * Math.sin(s.ph + t * s.spd));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    };
    drawStars();

    // Planet orbit animation
    const animPlanets = () => {
      if (!page.isConnected) return;
      const t = Date.now() / 1000;
      CS_PLANETS.forEach((p, i) => {
        const ang  = p.off + t * p.spd;
        const x    = cx + rx * Math.cos(ang);
        const y    = cy + ry * Math.sin(ang);
        // sinV: 1 = front/closest (bottom of ellipse), -1 = back/furthest (top)
        const sinV = Math.sin(ang);
        const sc   = 0.48 + 0.62 * (0.5 + 0.5 * sinV);   // 0.48 (far) to 1.10 (close)
        const op   = (0.52 + 0.48 * (0.5 + 0.5 * sinV)).toFixed(2);
        const zi   = sinV > 0 ? 8 : 3;                    // in front of or behind sun
        const el   = planetEls[i];
        el.style.left      = x + 'px';
        el.style.top       = y + 'px';
        el.style.transform = `translate(-50%,-50%) scale(${sc.toFixed(3)})`;
        el.style.zIndex    = zi;
        el.style.opacity   = op;
      });
      requestAnimationFrame(animPlanets);
    };
    animPlanets();

  }, 80);

  return page;
}

function goComingSoon() {
  window.location.hash = '#/coming-soon';
  showPage(buildComingSoonPage());
}

// Handle direct URL navigation
function handleHash() {
  const hash = window.location.hash;
  if (hash === '#/coming-soon') { goComingSoon(); return; }
  if (hash.startsWith('#/')) {
    const path = hash.slice(2);
    if (path.endsWith('/worksheet')) {
      const id = path.replace('/worksheet','');
      const seg = SEGMENTS.find(s => s.id === id);
      if (seg && seg.hasWorksheet) { goWorksheet(id); return; }
    }
    const seg = SEGMENTS.find(s => s.id === path);
    if (seg) { goDetail(path); return; }
  }
  goHome();
}

// ── Action Planner (Performance Navigator) ──
function buildActionPlanner() {
  const uid = 'ap' + Math.random().toString(36).slice(2, 7);
  let step = 1;
  const TOTAL = 3;
  const state = {
    name: '', behaviour: '',
    diagnosisType: null, recommendedAction: '', fromNavigator: false,
    specificPlan: '', when: '', successLooks: '', reviewDate: ''
  };

  const DIAG = {
    'cant-do': { label:"Can't Do", sub:'Skills or knowledge gap', color:'#009FA0', darkColor:'#007070' },
    'wont-do': { label:"Won't Do", sub:'Attitude or motivation issue', color:'#fa6b02', darkColor:'#c04e00' },
    'positive': { label:'Performance Improved', sub:'Recognition and reinforcement needed', color:'#0061AD', darkColor:'#004B86' }
  };

  const wrap = document.createElement('div');
  wrap.id = 'nav-action-planner';
  wrap.style.cssText = 'font-family:"Barlow",sans-serif;width:100%';

  const styleEl = document.createElement('style');
  styleEl.textContent = `
    .${uid}-prog{display:flex;align-items:center;gap:0;margin-bottom:22px}
    .${uid}-pseg{flex:1;height:4px;border-radius:2px;background:#e4edf5;transition:background .35s}
    .${uid}-pseg.done{background:#004B86}
    .${uid}-pseg.active{background:#0061AD}
    .${uid}-pgap{width:6px;flex:0 0 6px}
    .${uid}-hd{margin-bottom:18px}
    .${uid}-hnum{font-size:11px;font-weight:700;color:#8fa0b0;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px}
    .${uid}-htitle{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:#004B86;line-height:1.2}
    .${uid}-hsub{font-size:13px;color:#667788;margin-top:6px;line-height:1.6}
    .${uid}-lbl{font-size:12px;font-weight:600;color:#445566;margin-bottom:6px;margin-top:14px;letter-spacing:.04em;display:block}
    .${uid}-inp{width:100%;border:2px solid #d4e3f0;border-radius:10px;padding:10px 14px;font-family:"Barlow",sans-serif;font-size:14px;color:#222;resize:vertical;transition:border-color .2s;outline:none;background:white;box-sizing:border-box}
    .${uid}-inp:focus{border-color:#0061AD}
    .${uid}-ta{min-height:86px;line-height:1.6}
    .${uid}-hint{font-size:11.5px;color:#99aabb;margin-top:4px;font-style:italic;line-height:1.5}
    .${uid}-from-nav{border-radius:12px;padding:13px 16px;margin-bottom:16px;animation:${uid}Fi .35s ease both}
    .${uid}-from-nav-ey{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.75;margin-bottom:5px}
    .${uid}-from-nav-label{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800;color:white;margin-bottom:4px}
    .${uid}-from-nav-action{font-size:12.5px;color:rgba(255,255,255,.85);line-height:1.55}
    .${uid}-diag-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .${uid}-dc{border-radius:12px;padding:14px;cursor:pointer;border:2.5px solid transparent;transition:all .18s ease;position:relative}
    .${uid}-dc:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.18)}
    .${uid}-dc.sel{border-color:rgba(255,255,255,.85);box-shadow:0 8px 24px rgba(0,0,0,.28);transform:translateY(-2px)}
    .${uid}-dc-label{font-weight:800;font-size:14px;color:white;margin-bottom:3px;font-family:"Barlow Condensed",sans-serif;letter-spacing:.02em;font-size:17px}
    .${uid}-dc-sub{font-size:11.5px;color:rgba(255,255,255,.75);line-height:1.4}
    .${uid}-rec-box{background:#EAF4FB;border-left:3px solid #0061AD;border-radius:0 10px 10px 0;padding:12px 14px;margin-top:14px;font-size:13px;color:#004B86;line-height:1.6}
    .${uid}-rec-ey{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8fa0b0;margin-bottom:4px}
    .${uid}-nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px;flex-wrap:wrap}
    .${uid}-navl{display:flex;gap:8px;flex-wrap:wrap}
    .${uid}-btn{border:none;border-radius:20px;padding:10px 22px;font-family:"Barlow",sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s ease}
    .${uid}-ghost{background:#f0f5fa;color:#556677}
    .${uid}-ghost:hover{background:#e0ecf5}
    .${uid}-primary{background:#0061AD;color:white;box-shadow:0 4px 16px rgba(0,97,173,.28)}
    .${uid}-primary:hover{background:#004B86;transform:translateY(-1px)}
    .${uid}-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .${uid}-dl{background:#0061AD;color:white;box-shadow:0 6px 20px rgba(0,97,173,.32);display:flex;align-items:center;gap:7px}
    .${uid}-dl:hover{background:#004B86;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,97,173,.42)}
    .${uid}-preview{margin-top:22px;border-radius:14px;overflow:hidden;animation:${uid}Fi .35s ease both}
    .${uid}-prevhd{padding:14px 18px}
    .${uid}-prevey{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:3px}
    .${uid}-prevname{font-family:"Barlow Condensed",sans-serif;font-size:21px;font-weight:800;color:white;line-height:1.1}
    .${uid}-prevbody{background:white;padding:14px 18px 12px}
    .${uid}-prevrow{margin-bottom:10px}
    .${uid}-prevrlbl{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#99aabb;margin-bottom:3px}
    .${uid}-prevrval{font-size:13px;color:#222;line-height:1.6}
    .${uid}-diag-badge{display:inline-flex;align-items:center;border-radius:6px;padding:4px 11px;font-size:12px;font-weight:700;color:white}
    @keyframes ${uid}Fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  `;
  wrap.appendChild(styleEl);

  // Pre-fill listener from Navigator
  const navHandler = (e) => {
    state.diagnosisType = e.detail.diagnosisType;
    state.recommendedAction = e.detail.action;
    state.fromNavigator = true;
    if (state.name.trim()) step = 2;
    render();
  };
  document.addEventListener('liberatorNavOutcome', navHandler);

  function diagInfo() { return DIAG[state.diagnosisType] || null; }

  function buildProg() {
    const prog = document.createElement('div'); prog.className = uid + '-prog';
    for (let i = 1; i <= TOTAL; i++) {
      const s = document.createElement('div'); s.className = uid + '-pseg';
      if (i < step) s.classList.add('done'); else if (i === step) s.classList.add('active');
      prog.appendChild(s);
      if (i < TOTAL) { const g = document.createElement('div'); g.className = uid + '-pgap'; prog.appendChild(g); }
    }
    return prog;
  }

  function buildPreview() {
    const di = diagInfo();
    const hdColor = di ? di.color : '#0061AD';
    const pr = document.createElement('div'); pr.className = uid + '-preview';
    const hd = document.createElement('div'); hd.className = uid + '-prevhd'; hd.style.background = `linear-gradient(135deg,${di ? di.darkColor : '#004B86'},${hdColor})`;
    hd.innerHTML = `<div class="${uid}-prevey">Action plan for</div><div class="${uid}-prevname">${state.name || 'Your team member'}</div>`;
    pr.appendChild(hd);
    const body = document.createElement('div'); body.className = uid + '-prevbody';
    if (state.behaviour) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Observed behaviour</div><div class="${uid}-prevrval">${state.behaviour.substring(0,120)}${state.behaviour.length>120?'...':''}</div>`;
      body.appendChild(r);
    }
    if (di && step >= 2) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Diagnosis</div><div class="${uid}-diag-badge" style="background:${di.color}">${di.label}</div>`;
      body.appendChild(r);
    }
    if (state.specificPlan && step >= 2) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Action</div><div class="${uid}-prevrval">${state.specificPlan.substring(0,120)}${state.specificPlan.length>120?'...':''}</div>`;
      body.appendChild(r);
    }
    if (state.reviewDate && step >= 3) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Review date</div><div class="${uid}-prevrval">${state.reviewDate}</div>`;
      body.appendChild(r);
    }
    pr.appendChild(body);
    return pr;
  }

  function render() {
    [...wrap.children].forEach(c => { if (c !== styleEl) c.remove(); });
    wrap.appendChild(buildProg());
    const cont = document.createElement('div'); cont.style.animation = uid + 'Fi .3s ease both';

  function s2(c) {
    c.appendChild(mkHd(2, 'Diagnosis and plan', state.fromNavigator ? 'Your Navigator diagnosis is shown below. Confirm it and write your specific plan.' : 'Select the diagnosis type, then write your plan.'));
    const di = diagInfo();
    if (state.fromNavigator && di) {
      const banner = document.createElement('div'); banner.className = uid + '-from-nav'; banner.style.background = `linear-gradient(135deg,${di.darkColor},${di.color})`;
      banner.innerHTML = `<div class="${uid}-from-nav-ey">Navigator diagnosis</div><div class="${uid}-from-nav-label">${di.label}</div><div class="${uid}-from-nav-action">${state.recommendedAction}</div>`;

    } else {

      const cards = document.createElement('div'); cards.className = uid + '-diag-cards';
      [['cant-do', DIAG['cant-do']], ['wont-do', DIAG['wont-do']]].forEach(([id, info]) => {
        const card = document.createElement('div'); card.className = uid + '-dc'; card.style.background = info.color;
        if (state.diagnosisType === id) card.classList.add('sel');

        card.addEventListener('click', () => {
          state.diagnosisType = id; playStrokesExpand();

      const lrec = document.createElement('label'); lrec.className = uid + '-lbl'; lrec.textContent = 'Recommended approach (from Navigator or your own judgement)'; c.appendChild(lrec);
      const iRec = mkInp('What does the Navigator recommend, or what do you judge the right approach to be?', state.recommendedAction, 2, e => { state.recommendedAction = e.target.value; });
      c.appendChild(iRec);
    }
    const lsp = document.createElement('label'); lsp.className = uid + '-lbl'; lsp.textContent = 'Your specific plan: what exactly will you do?'; c.appendChild(lsp);
    const iSp = mkInp(di ? di.label + ': ' + state.recommendedAction.substring(0, 60) + '...' : 'Describe the specific action you will take...', state.specificPlan, 3, e => { state.specificPlan = e.target.value; nxt.disabled = !state.specificPlan.trim(); });
    c.appendChild(iSp);
    const lw = document.createElement('label'); lw.className = uid + '-lbl'; lw.textContent = 'When will you do this?'; c.appendChild(lw);
    const iW = mkInp('e.g. This week, before our 1:1 on Thursday...', state.when, 0, e => { state.when = e.target.value; });
    c.appendChild(iW);
    const navRow = document.createElement('div'); navRow.className = uid + '-nav';
    const back = document.createElement('button'); back.className = uid + '-btn ' + uid + '-ghost'; back.innerHTML = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); step = 1; render(); }); navRow.appendChild(back);
    const nxt = document.createElement('button'); nxt.className = uid + '-btn ' + uid + '-primary';
    nxt.textContent = 'Next: Follow-through \u2192'; nxt.disabled = !state.specificPlan.trim();

  function s3(c) {

    const lsl = document.createElement('label'); lsl.className = uid + '-lbl'; lsl.textContent = 'What will improvement look like? How will you know it is working?'; c.appendChild(lsl);

    const lrd = document.createElement('label'); lrd.className = uid + '-lbl'; lrd.textContent = 'Review date: when will you formally check in on progress?'; c.appendChild(lrd);
    const iRd = mkInp('e.g. Two weeks from now, 10 June, our next 1:1...', state.reviewDate, 0, e => { state.reviewDate = e.target.value; }); c.appendChild(iRd);

    dlBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download Action Plan';
    dlBtn.addEventListener('click', () => { playMIDownload(); downloadActionPlannerPDF(state); });
    navRow.appendChild(leftBtns); navRow.appendChild(dlBtn); c.appendChild(navRow);
  }

  render();
  return wrap;
}

function downloadActionPlannerPDF(state) {
  try {
    const W = 595.28, H = 841.89, M = 50;
    let objCount = 0; const objects = [];
    function addObj(data) { objCount++; objects.push({ id: objCount, data }); return objCount; }
    function escPDF(str) { return String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
    function sanitize(str) {
      if (!str) return '';
      return String(str).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/\u2013|\u2014/g,'-').replace(/\u2026/g,'...').replace(/[^\x00-\x7F]/g,'');
    }
    function wrapText(text, maxChars) {
      if (!text) return [''];
      const words = sanitize(text).split(/\s+/); const lines = []; let line = '';
      words.forEach(w => { if ((line+' '+w).trim().length > maxChars) { lines.push(line.trim()); line = w; } else { line = (line+' '+w).trim(); } });
      if (line) lines.push(line.trim());
      return lines.length ? lines : [''];
    }
    function hexRGB(hex) {
      if (!hex||hex[0]!=='#') return '0.10 0.23 0.36';
      return (parseInt(hex.slice(1,3),16)/255).toFixed(2)+' '+(parseInt(hex.slice(3,5),16)/255).toFixed(2)+' '+(parseInt(hex.slice(5,7),16)/255).toFixed(2);
    }
    const DIAG = {
      'cant-do':{ label:"Can't Do", sub:'Skills or knowledge gap', color:'#009FA0' },
      'wont-do':{ label:"Won't Do", sub:'Attitude or motivation issue', color:'#fa6b02' },
      'positive':{ label:'Performance Improved', sub:'Recognition needed', color:'#0061AD' }
    };
    const di = state.diagnosisType ? DIAG[state.diagnosisType] : null;
    const diagColor = di ? hexRGB(di.color) : '0.10 0.23 0.36';
    const navy = '0.10 0.23 0.36'; const blue = '0.00 0.38 0.68';
    const white = '1 1 1'; const grey = '0.45 0.45 0.45'; const light = '0.93 0.96 0.99';
    const lh = 15;
    let s = ''; let y = H - M;

    // Header
    s += `${blue} rg\n${M} ${H-M-48} ${W-2*M} 48 re f\n${white} rg\n`;
    s += `BT /F1 15 Tf ${M+12} ${H-M-30} Td (${escPDF('Story Liberator - Action Planner')}) Tj ET\n`;
    s += `BT /F2 8 Tf ${W-M-178} ${H-M-30} Td (${escPDF('Performance Navigator | Liberator Programme')}) Tj ET\n`;
    s += `${diagColor} rg\n${M} ${H-M-58} ${W-2*M} 10 re f\n`;
    y = H - M - 76;

    // Name
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('ACTION PLAN FOR')}) Tj ET\n`; y -= 7;
    s += `${light} rg\n${M} ${y-36} ${W-2*M} 36 re f\n${blue} rg\n`;
    s += `BT /F1 15 Tf ${M+10} ${y-23} Td (${escPDF(sanitize(state.name)||'(No name given)')}) Tj ET\n`; y -= 50;

    // Behaviour
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('OBSERVED BEHAVIOUR')}) Tj ET\n`; y -= 7;
    const bl = wrapText(state.behaviour||'(Not recorded)', 80); const bh = Math.max(44, bl.length*lh+18);
    s += `${light} rg\n${M} ${y-bh} ${W-2*M} ${bh} re f\n0.2 0.2 0.2 rg\n`;
    let by2 = y-14; bl.forEach(l => { s += `BT /F2 10 Tf ${M+10} ${by2} Td (${escPDF(l)}) Tj ET\n`; by2-=lh; }); y -= bh+14;

    // Diagnosis
    if (di) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('DIAGNOSIS')}) Tj ET\n`; y -= 7;
      s += `${diagColor} rg\n${M} ${y-32} 220 32 re f\n${white} rg\n`;
      s += `BT /F1 12 Tf ${M+10} ${y-20} Td (${escPDF(di.label)}) Tj ET\n`;
      s += `${grey} rg\nBT /F2 9 Tf ${M+236} ${y-20} Td (${escPDF(di.sub)}) Tj ET\n`;
      y -= 46;
    }

    // Recommended approach
    if (state.recommendedAction) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('RECOMMENDED APPROACH')}) Tj ET\n`; y -= 7;
      const rl = wrapText(state.recommendedAction, 80); const rh = Math.max(36, rl.length*lh+18);
      s += `${light} rg\n${M} ${y-rh} ${W-2*M} ${rh} re f\n`;
      s += `${diagColor} rg\n${M} ${y-rh} 5 ${rh} re f\n0.2 0.2 0.2 rg\n`;
      let ry = y-14; rl.forEach(l => { s += `BT /F2 10 Tf ${M+13} ${ry} Td (${escPDF(l)}) Tj ET\n`; ry-=lh; }); y -= rh+14;
    }

    // Specific plan
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('YOUR SPECIFIC PLAN')}) Tj ET\n`; y -= 7;
    const pl = wrapText(state.specificPlan||'(Not recorded)', 80); const ph = Math.max(52, pl.length*lh+20);
    s += `${blue} rg\n${M} ${y-ph} ${W-2*M} ${ph} re f\n${white} rg\n`;
    let py = y-16; pl.forEach(l => { s += `BT /F2 11 Tf ${M+12} ${py} Td (${escPDF(l)}) Tj ET\n`; py-=lh+1; }); y -= ph+14;

    // When + review in two columns
    const colW = (W-2*M-10)/2;
    if (state.when || state.reviewDate) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('WHEN')}) Tj ET\n`;
      s += `BT /F1 10 Tf ${M+colW+10} ${y} Td (${escPDF('REVIEW DATE')}) Tj ET\n`; y -= 7;
      s += `${light} rg\n${M} ${y-30} ${colW} 30 re f\n${M+colW+10} ${y-30} ${colW} 30 re f\n0.2 0.2 0.2 rg\n`;
      if (state.when) s += `BT /F2 10 Tf ${M+10} ${y-19} Td (${escPDF(sanitize(state.when).substring(0,42))}) Tj ET\n`;
      if (state.reviewDate) s += `BT /F2 10 Tf ${M+colW+20} ${y-19} Td (${escPDF(sanitize(state.reviewDate).substring(0,42))}) Tj ET\n`;
      y -= 44;
    }

    // Success
    if (state.successLooks) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('WHAT IMPROVEMENT LOOKS LIKE')}) Tj ET\n`; y -= 7;
      const sl = wrapText(state.successLooks, 80); const sh = Math.max(36, sl.length*lh+18);
      s += `${light} rg\n${M} ${y-sh} ${W-2*M} ${sh} re f\n`;
      s += `${blue} rg\n${M} ${y-sh} 5 ${sh} re f\n0.2 0.2 0.2 rg\n`;
      let sy = y-14; sl.forEach(l => { s += `BT /F2 10 Tf ${M+13} ${sy} Td (${escPDF(l)}) Tj ET\n`; sy-=lh; });
    }

    s += `${grey} rg\nBT /F2 8 Tf ${M} ${M-10} Td (${escPDF('Story Contracting - Liberator Programme - Action Planner - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId   = addObj('');
    const font1Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const streamBytes = new TextEncoder().encode(s);
    const streamId  = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
    const pageId    = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);
    objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

    let pdf = '%PDF-1.4\n'; const offsets = [];
    objects.forEach(obj => { offsets.push(pdf.length); pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`; });
    const xo = pdf.length;
    pdf += `xref\n0 ${objCount+1}\n0000000000 65535 f \n`;
    offsets.forEach(off => { pdf += String(off).padStart(10,'0') + ' 00000 n \n'; });
    pdf += `trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xo}\n%%EOF`;

    const blob = new Blob([pdf], { type:'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'Action-Plan-' + new Date().toISOString().slice(0,10) + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error('PDF error', e); }
}

      prog.appendChild(seg);
      if (i < TOTAL) { const g = document.createElement('div'); g.className = uid + '-pgap'; prog.appendChild(g); }
    }
    return prog;
  }

  function buildPreview() {
    const pr = document.createElement('div');

        filledBeacons.map((b, i) => `<div class="${uid}-bchip">Beacon ${state.beacons.indexOf(b)+1}${b.date ? ': ' + b.date : ''}</div>`).join('') + '</div>';

  function s3(c) {

    const gpsContent = document.createElement('div'); gpsContent.className = uid + '-icon-content';
    const gpsLabel = document.createElement('div'); gpsLabel.className = uid + '-icon-label'; gpsLabel.style.color = '#0061AD'; gpsLabel.textContent = 'GPS Signal';
    const gpsHint = document.createElement('div'); gpsHint.className = uid + '-icon-hint'; gpsHint.textContent = 'What will you look for to catch them doing something right between beacons? What does being on course look like day to day?';
    const gpsInp = mkInp('e.g. I will watch for occasions when they take initiative without prompting...', state.gps, 3, e => { state.gps = e.target.value; });
    gpsContent.appendChild(gpsLabel); gpsContent.appendChild(gpsHint); gpsContent.appendChild(gpsInp);
    gpsRow.appendChild(gpsIcon); gpsRow.appendChild(gpsContent); c.appendChild(gpsRow);

    const alarmRow = document.createElement('div'); alarmRow.className = uid + '-icon-row';
    alarmRow.style.background = '#fff8f9';
    const alarmIcon = document.createElement('div'); alarmIcon.className = uid + '-icon-box';
    alarmIcon.style.background = '#fff0f2';
    alarmIcon.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="rgba(208,72,98,.15)" stroke="#D04862" stroke-width="1.8"/><circle cx="8" cy="8" r="3" fill="#D04862"/></svg>';
    const alarmContent = document.createElement('div'); alarmContent.className = uid + '-icon-content';
    const alarmLabel = document.createElement('div'); alarmLabel.className = uid + '-icon-label'; alarmLabel.style.color = '#D04862'; alarmLabel.textContent = 'Alarm Trigger';
    const alarmHint = document.createElement('div'); alarmHint.className = uid + '-icon-hint'; alarmHint.textContent = 'What would off course look like for this person? What is your early warning sign that something has shifted?';
    const alarmInp = mkInp('e.g. Missing agreed deadlines, withdrawal from team conversations...', state.alarm, 3, e => { state.alarm = e.target.value; });
    alarmContent.appendChild(alarmLabel); alarmContent.appendChild(alarmHint); alarmContent.appendChild(alarmInp);
    alarmRow.appendChild(alarmIcon); alarmRow.appendChild(alarmContent); c.appendChild(alarmRow);

    const corrRow = document.createElement('div'); corrRow.className = uid + '-icon-row';
    const corrIcon = document.createElement('div'); corrIcon.className = uid + '-icon-box';
    corrIcon.style.background = '#EAF4FB';
    corrIcon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A3A5C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.64"/></svg>';

    restart.innerHTML = '\u21BA Start again'; restart.addEventListener('click', () => {
      playMIBack();
      state.name = ''; state.destination = ''; state.timeline = '';
      state.beacons = [{ date: '', notes: '' }, { date: '', notes: '' }, { date: '', notes: '' }];
      state.gps = ''; state.alarm = ''; state.correction = '';

    });

    const dlBtn = document.createElement('button'); dlBtn.className = uid + '-btn ' + uid + '-dl';
    dlBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download Flight Plan';
    dlBtn.addEventListener('click', () => { playMIDownload(); downloadFlightPlanPDF(state); });
    navRow.appendChild(leftBtns); navRow.appendChild(dlBtn); c.appendChild(navRow);

  render();

function downloadFlightPlanPDF(state) {
  try {
    const W = 595.28, H = 841.89, M = 50;
    let objCount = 0;
    const objects = [];
    function addObj(data) { objCount++; objects.push({ id: objCount, data }); return objCount; }
    function escPDF(str) { return String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
    function sanitize(str) {
      if (!str) return '';
      return String(str).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/\u2013|\u2014/g,'-').replace(/\u2026/g,'...').replace(/[^\x00-\x7F]/g,'');
    }
    function wrapText(text, maxChars) {
      if (!text) return [''];
      const words = sanitize(text).split(/\s+/); const lines = []; let line = '';
      words.forEach(w => { if ((line+' '+w).trim().length > maxChars) { lines.push(line.trim()); line = w; } else { line = (line+' '+w).trim(); } });
      if (line) lines.push(line.trim());
      return lines.length ? lines : [''];
    }

    const navy  = '0.00 0.22 0.39';
    const blue  = '0.00 0.38 0.68';
    const red   = '0.82 0.28 0.38';
    const white = '1 1 1';
    const grey  = '0.45 0.45 0.45';
    const light = '0.93 0.96 0.99';
    const lh = 15;
    let s = ''; let y = H - M;

    // Header bar
    s += `${blue} rg\n${M} ${H-M-48} ${W-2*M} 48 re f\n${white} rg\n`;
    s += `BT /F1 16 Tf ${M+12} ${H-M-30} Td (${escPDF('Story Liberator - Flight Plan Sheet')}) Tj ET\n`;
    s += `BT /F2 8 Tf ${W-M-168} ${H-M-30} Td (${escPDF('Liberator Programme | p.192-194')}) Tj ET\n`;
    // Blue accent strip
    s += `${blue} rg\n${M} ${H-M-58} ${W-2*M} 10 re f\n`;
    y = H - M - 76;

    // Team member + destination block
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('FLIGHT PLAN FOR')}) Tj ET\n`; y -= 7;
    s += `${light} rg\n${M} ${y-36} ${W-2*M} 36 re f\n${navy} rg\n`;
    s += `BT /F1 15 Tf ${M+10} ${y-23} Td (${escPDF(sanitize(state.name) || '(No name given)')}) Tj ET\n`; y -= 50;

    if (state.destination) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('DESTINATION')}) Tj ET\n`; y -= 7;
      const dl = wrapText(state.destination, 80); const dh = Math.max(36, dl.length*lh+18);
      s += `${blue} rg\n${M} ${y-dh} ${W-2*M} ${dh} re f\n${white} rg\n`;
      let dy = y-15; dl.forEach(l => { s += `BT /F2 11 Tf ${M+10} ${dy} Td (${escPDF(l)}) Tj ET\n`; dy-=lh; }); y -= dh+14;
    }

    if (state.timeline) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('TIMELINE')}) Tj ET\n`; y -= 7;
      s += `${light} rg\n${M} ${y-28} ${W-2*M} 28 re f\n0.2 0.2 0.2 rg\n`;
      s += `BT /F2 10 Tf ${M+10} ${y-18} Td (${escPDF(sanitize(state.timeline))}) Tj ET\n`; y -= 42;
    }

    // Beacons
    const filledBeacons = state.beacons.filter(b => b.date || b.notes);
    if (filledBeacons.length) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('BEACONS: FORMAL REVIEW CHECKPOINTS')}) Tj ET\n`; y -= 8;
      const bColW = (W - 2*M - (filledBeacons.length-1)*8) / filledBeacons.length;
      let bx = M;
      filledBeacons.forEach((b, i) => {
        const idx = state.beacons.indexOf(b);
        const bLines = wrapText(b.notes || '', 30);
        const bh = Math.max(56, bLines.length*13+36);
        s += `${blue} rg\n${bx} ${y-bh} ${bColW} ${bh} re f\n`;
        s += `${white} rg\nBT /F1 9 Tf ${bx+8} ${y-14} Td (${escPDF('Beacon ' + (idx+1))}) Tj ET\n`;
        if (b.date) s += `BT /F2 9 Tf ${bx+8} ${y-26} Td (${escPDF(sanitize(b.date))}) Tj ET\n`;
        if (b.notes) { let ny = y-38; bLines.forEach(l => { s += `BT /F2 8 Tf ${bx+8} ${ny} Td (${escPDF(l)}) Tj ET\n`; ny-=13; }); }
        bx += bColW + 8;
      });
      y -= Math.max(56, 8*13+36) + 16;
    }

    // GPS Signal
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('GPS SIGNAL: CONTINUOUS RECOGNITION PLAN')}) Tj ET\n`; y -= 7;
    const gl = wrapText(state.gps || '(Not completed)', 80); const gh = Math.max(44, gl.length*lh+18);
    s += `${light} rg\n${M} ${y-gh} ${W-2*M} ${gh} re f\n`;
    s += `${blue} rg\n${M} ${y-gh} 6 ${gh} re f\n0.2 0.2 0.2 rg\n`;
    let gy = y-14; gl.forEach(l => { s += `BT /F2 10 Tf ${M+14} ${gy} Td (${escPDF(l)}) Tj ET\n`; gy-=lh; }); y -= gh+14;

    // Alarm
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('ALARM TRIGGER: WHAT OFF COURSE LOOKS LIKE')}) Tj ET\n`; y -= 7;
    const al = wrapText(state.alarm || '(Not completed)', 80); const ah = Math.max(44, al.length*lh+18);
    s += `0.98 0.94 0.95 rg\n${M} ${y-ah} ${W-2*M} ${ah} re f\n`;
    s += `${red} rg\n${M} ${y-ah} 6 ${ah} re f\n0.2 0.2 0.2 rg\n`;
    let ay = y-14; al.forEach(l => { s += `BT /F2 10 Tf ${M+14} ${ay} Td (${escPDF(l)}) Tj ET\n`; ay-=lh; }); y -= ah+14;

    // Course correction
    if (state.correction) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('COURSE CORRECTION PLAN')}) Tj ET\n`; y -= 7;
      const cl = wrapText(state.correction, 80); const ch = Math.max(44, cl.length*lh+18);
      s += `${light} rg\n${M} ${y-ch} ${W-2*M} ${ch} re f\n`;
      s += `${blue} rg\n${M} ${y-ch} 6 ${ch} re f\n0.2 0.2 0.2 rg\n`;
      let cy = y-14; cl.forEach(l => { s += `BT /F2 10 Tf ${M+14} ${cy} Td (${escPDF(l)}) Tj ET\n`; cy-=lh; });
    }

    // Footer
    s += `${grey} rg\nBT /F2 8 Tf ${M} ${M-10} Td (${escPDF('Story Contracting - Liberator Programme - Flight Plan Sheet - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId   = addObj('');
    const font1Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const streamBytes = new TextEncoder().encode(s);
    const streamId  = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
    const pageId    = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);
    objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

    let pdf = '%PDF-1.4\n'; const offsets = [];
    objects.forEach(obj => { offsets.push(pdf.length); pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`; });
    const xrefOffset = pdf.length;
    pdf += `xref\n0 ${objCount+1}\n0000000000 65535 f \n`;
    offsets.forEach(off => { pdf += String(off).padStart(10,'0') + ' 00000 n \n'; });
    pdf += `trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

    const blob = new Blob([pdf], { type:'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href = url;
    a.download = 'Flight-Plan-' + new Date().toISOString().slice(0,10) + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error('PDF error', e); }
}

// ── Feedback Planner ──

  const TOTAL = 4;
