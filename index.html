function buildNavigatorVisual() {
  // Decision tree data — follows the canonical Performance Navigator flow exactly
  const nodes = {
    define: {
      type:'input', label:'Step 1', heading:'Define the behaviours',
      text:'Be specific about what you want to address. Vague behaviours are far harder to tackle than clear ones.',
      fields:[
        { id:'undesirable', label:'Present undesirable behaviour', placeholder:'What is happening now that needs to change? Describe the behaviour, not the character.' },
        { id:'desirable',   label:'Future desirable behaviour',   placeholder:'What should you see or hear instead? Be as specific as you can.' }
      ],
      next:'q_matter'
    },
    q_matter: {
      type:'decision', label:'Step 2',
      text:'Do these matter in terms of actual performance?',
      yes:'q_knows', no:'end_livewith'
    },
    end_livewith: {
      type:'outcome',
      text:'Live with the situation. Focus only on what matters.',
      note:'Not every imperfection needs correcting. Concentrate your energy where it counts.'
    },
    q_knows: {
      type:'decision', label:'Step 3',
      text:'Does the person clearly know what is expected?',
      yes:'q_acid', no:'a_describe'
    },
    a_describe: {
      type:'action', label:'Step 4',
      text:'Describe what is required in explicit behavioural terms, then monitor subsequent performance closely.',
      next:'q_now_well'
    },
    q_now_well: {
      type:'decision', label:'Step 5',
      text:'Is the person now performing well?',
      yes:'end_reinforce', no:'q_acid'
    },
    end_reinforce: {
      type:'outcome',
      text:'Recognise and reinforce the new behaviour.',
      note:'Specific, timely recognition is what makes new behaviour stick.'
    },
    q_acid: {
      type:'decision', label:'The Acid Test',
      text:'Could the person do what was required if their life depended on it?',
      yes:'won_q_matters', no:'cant_q_past',
      yesLabel:"Yes, they could (Won't Do)", noLabel:"No, they couldn't (Can't Do)"
    },

    // ── CAN'T DO pathway: skills / capability issue ──────────────
    cant_q_past: {
      type:'decision', label:"Can't Do: Step 6",
      text:'Has the person done the work correctly in the past?',
      yes:'cant_q_regular', no:'end_train'
    },
    end_train: {
      type:'outcome',
      text:'Provide specific, accurate training and monitor results.',
      note:'They have not yet built the capability. Invest in proper training before judging the performance.'
    },
    cant_q_regular: {
      type:'decision', label:"Can't Do: Step 7",
      text:'Does the person use the skills required regularly?',
      yes:'cant_q_problems', no:'end_practice'
    },
    end_practice: {
      type:'outcome',
      text:'Increase the amount of practice and coaching.',
      note:'Skills fade without use. Build practice into the routine and stay close enough to coach.'
    },
    cant_q_problems: {
      type:'decision', label:"Can't Do: Step 8",
      text:'Is the person still having problems?',
      yes:'a_remedial', no:'end_monitor'
    },
    end_monitor: {
      type:'outcome',
      text:'Continue monitoring and reinforcing improvement.',
      note:'Things are on track. Stay close enough to keep them there.'
    },
    a_remedial: {
      type:'action', label:"Can't Do: Action",
      text:'Increase the amount of feedback. Provide remedial training and coaching, and monitor the results.',
      next:'cant_q_design'
    },
    cant_q_design: {
      type:'decision', label:"Can't Do: Step 9",
      text:'Is the job badly designed, or could it be simplified?',
      yes:'end_redesign', no:'cant_q_potential'
    },
    end_redesign: {
      type:'outcome',
      text:'Redesign the job to simplify it where possible. Review methods and equipment.',
      note:'Sometimes the task itself is the barrier, not the person.'
    },
    cant_q_potential: {
      type:'decision', label:"Can't Do: Step 10",
      text:'Does the person have appropriate potential for this work?',
      yes:'end_targeted', no:'end_redeploy_cant'
    },
    end_targeted: {
      type:'outcome',
      text:'Continue targeted support, coaching, feedback and monitoring.',
      note:'The potential is there. Stay invested, and return to Step 8 if problems continue.'
    },
    end_redeploy_cant: {
      type:'outcome',
      text:'Redeploy to suitable work, if available. Otherwise, process dismissal.',
      note:'When capability and potential are both absent, the kindest path is usually a better fit, or a formal parting of ways.'
    },

    // ── WON'T DO pathway: attitude / motivation / consequences ───
    won_q_matters: {
      type:'decision', label:"Won't Do: Step 11",
      text:"Does the person feel that it doesn't matter whether they perform well or not?",
      yes:'end_strong_fb', no:'won_q_penalised'
    },
    end_strong_fb: {
      type:'outcome',
      text:'Give strong and frequent feedback. Create positive and negative outcomes.',
      note:'Make performance visible and consequential, both ways.'
    },
    won_q_penalised: {
      type:'decision', label:"Won't Do: Step 12",
      text:'Does the person feel penalised for doing the right thing?',
      yes:'end_remove_penalties', no:'won_q_good_for_bad'
    },
    end_remove_penalties: {
      type:'outcome',
      text:'Act to remove the penalties.',
      note:'Doing the right thing should never cost more than doing the wrong thing.'
    },
    won_q_good_for_bad: {
      type:'decision', label:"Won't Do: Step 13",
      text:'Are there good outcomes if the person does the wrong thing?',
      yes:'end_create_outcomes', no:'won_q_design'
    },
    end_create_outcomes: {
      type:'outcome',
      text:'Create positive outcomes for good performance. Include negative outcomes if poor performance continues.',
      note:'Reward the behaviour you want. Make sure the wrong path is the harder path.'
    },
    won_q_design: {
      type:'decision', label:"Won't Do: Step 14",
      text:'Are there any job design characteristics which get in the way of good performance?',
      yes:'end_remove_design', no:'won_q_potential'
    },
    end_remove_design: {
      type:'outcome',
      text:'Act to remove such characteristics.',
      note:'Even willing people can be blocked by structural barriers. Clear the path.'
    },
    won_q_potential: {
      type:'decision', label:"Won't Do: Step 15",
      text:'Does the person have appropriate potential for this work?',
      yes:'end_structured_pm', no:'end_redeploy_won'
    },
    end_structured_pm: {
      type:'outcome',
      text:'Continue structured performance management. Reinforce expectations, consequences and support, and review regularly.',
      note:'The potential is there. Stay disciplined and consistent.'
    },
    end_redeploy_won: {
      type:'outcome',
      text:'Redeploy to suitable work, if available. Otherwise, process dismissal.',
      note:'When potential is absent and the will to engage is missing, formal pathways protect everyone involved.'
    }
  };

  const wrap = document.createElement('div');
  wrap.className = 'nav-wrap';

  let trail = [];
  let currentId = 'define';
  const definedBehaviours = { undesirable: '', desirable: '' };
  const escHtml = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  function render() {
    wrap.innerHTML = '';
    const node = nodes[currentId];

    // Trail of visited steps
    if (trail.length > 0) {
      const trailEl = document.createElement('div');
      trailEl.className = 'nav-trail';
      trail.forEach((t, i) => {
        const trailNode = nodes[t.id];
        const step = document.createElement('div');
        step.className = 'nav-step visited';
        const headlineText = trailNode.heading || trailNode.text;
        let detailHtml = '';
        if (trailNode.type === 'input') {
          const bits = [];
          if (t.values && t.values.undesirable) bits.push('<div class="nav-step-input"><span class="nav-step-input-tag">Now</span> ' + escHtml(t.values.undesirable) + '</div>');
          if (t.values && t.values.desirable)   bits.push('<div class="nav-step-input"><span class="nav-step-input-tag">Want</span> ' + escHtml(t.values.desirable) + '</div>');
          detailHtml = bits.length ? bits.join('') : '<div class="nav-step-answer">Behaviours defined</div>';
        } else if (t.answer) {
          const ansLabel = t.answer === 'yes' ? (trailNode.yesLabel || 'Yes') : (trailNode.noLabel || 'No');
          detailHtml = '<div class="nav-step-answer">' + ansLabel + '</div>';
        }
        step.innerHTML = `<div class="nav-step-num">${i+1}</div><div class="nav-step-body"><div class="nav-step-text">${headlineText}</div>${detailHtml}</div>`;
        trailEl.appendChild(step);
      });
      wrap.appendChild(trailEl);
    }

    // Current node
    const current = document.createElement('div');

    if (node.type === 'input') {
      current.className = 'nav-current input';
      const headingHtml = node.heading ? `<div class="nav-q-heading">${node.heading}</div>` : '';
      current.innerHTML = `<div class="nav-q-label">${node.label}</div>${headingHtml}<div class="nav-q-text">${node.text}</div>`;

      const fieldsWrap = document.createElement('div');
      fieldsWrap.className = 'nav-inputs';
      node.fields.forEach(field => {
        const fwrap = document.createElement('div');
        fwrap.className = 'nav-input-field';
        const lbl = document.createElement('label');
        lbl.className = 'nav-input-label';
        lbl.textContent = field.label;
        const ta = document.createElement('textarea');
        ta.className = 'nav-input-ta';
        ta.placeholder = field.placeholder;
        ta.value = definedBehaviours[field.id] || '';
        ta.rows = 2;
        ta.addEventListener('input', e => { definedBehaviours[field.id] = e.target.value; });
        fwrap.appendChild(lbl);
        fwrap.appendChild(ta);
        fieldsWrap.appendChild(fwrap);
      });
      current.appendChild(fieldsWrap);

      const btn = document.createElement('button');
      btn.className = 'nav-yn yes nav-input-continue';
      btn.textContent = 'Continue \u2192';
      btn.addEventListener('click', () => {
        trail.push({ id: currentId, values: { ...definedBehaviours } });
        currentId = node.next;
        render();
      });
      current.appendChild(btn);
    } else if (node.type === 'action') {
      current.className = 'nav-current decision';
      current.innerHTML = `<div class="nav-q-label">${node.label}</div><div class="nav-q-text">${node.text}</div>`;
      const btn = document.createElement('button');
      btn.className = 'nav-yn yes';
      btn.style.maxWidth = '200px';
      btn.textContent = 'Continue';
      btn.addEventListener('click', () => {
        trail.push({ id: currentId, answer: null });
        currentId = node.next;
        render();
      });
      current.appendChild(btn);
    } else if (node.type === 'decision') {
      current.className = 'nav-current decision';
      current.innerHTML = `<div class="nav-q-label">${node.label}</div><div class="nav-q-text">${node.text}</div>`;
      const btns = document.createElement('div');
      btns.className = 'nav-btns';
      const yesBtn = document.createElement('button');
      yesBtn.className = 'nav-yn yes';
      yesBtn.textContent = node.yesLabel || 'Yes';
      yesBtn.addEventListener('click', () => {
        trail.push({ id: currentId, answer: 'yes' });
        currentId = node.yes;
        render();
      });
      const noBtn = document.createElement('button');
      noBtn.className = 'nav-yn no';
      noBtn.textContent = node.noLabel || 'No';
      noBtn.addEventListener('click', () => {
        trail.push({ id: currentId, answer: 'no' });
        currentId = node.no;
        render();
      });
      btns.appendChild(yesBtn);
      btns.appendChild(noBtn);
      current.appendChild(btns);
    } else if (node.type === 'outcome') {
      current.className = 'nav-current outcome';
      current.innerHTML = `<div class="nav-q-label">Recommended Action</div><div class="nav-outcome-text">${node.text}</div><div class="nav-outcome-note">${node.note}</div>`;
      if (currentId !== 'end_livewith') {
        const positiveIds = ['end_reinforce','end_monitor'];
        const cantDoIds   = ['end_train','end_practice','end_redesign','end_targeted','end_redeploy_cant'];
        const wontDoIds   = ['end_strong_fb','end_remove_penalties','end_create_outcomes','end_remove_design','end_structured_pm','end_redeploy_won'];
        const diagType = positiveIds.includes(currentId) ? 'positive' : cantDoIds.includes(currentId) ? 'cant-do' : wontDoIds.includes(currentId) ? 'wont-do' : 'positive';
        const planBtn = document.createElement('button');
        planBtn.className = 'nav-plan-btn';
        planBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Plan your action';
        planBtn.addEventListener('click', () => {
          // Combine the defined behaviours into a single description for the planner
          let behaviourText = '';
          if (definedBehaviours.undesirable) behaviourText = definedBehaviours.undesirable;
          if (definedBehaviours.desirable) {
            behaviourText += (behaviourText ? '\n\nWhat I want to see instead: ' : '') + definedBehaviours.desirable;
          }
          document.dispatchEvent(new CustomEvent('liberatorNavOutcome', {
            detail: {
              diagnosisType: diagType,
              action: node.text,
              note: node.note,
              outcomeId: currentId,
              behaviour: behaviourText,
              undesirable: definedBehaviours.undesirable,
              desirable: definedBehaviours.desirable
            }
          }));
          const plannerEl = document.getElementById('nav-action-planner');
          if (plannerEl) setTimeout(() => plannerEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
          playMINext();
        });
        current.appendChild(planBtn);
      }
    }

    wrap.appendChild(current);

    // Footer + reset
    const footer = document.createElement('div');
    footer.className = 'nav-footer';
    footer.innerHTML = '<p>Identify solution, act on it, and follow through consistently</p>';
    wrap.appendChild(footer);

    if (trail.length > 0) {
      const reset = document.createElement('button');
      reset.className = 'nav-reset';
      reset.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> Start again';
      reset.addEventListener('click', () => {
        trail = [];
        currentId = 'define';
        definedBehaviours.undesirable = '';
        definedBehaviours.desirable = '';
        render();
      });
      wrap.appendChild(reset);
    }

    wrap.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  render();

  const navOuter = document.createElement('div');
  navOuter.appendChild(wrap);

  // Scroll beckon toward the Action Planner below
  const navBeckonStyle = document.createElement('style');
  navBeckonStyle.textContent = `
    @keyframes navBeckonBob { 0%,100%{transform:translateY(0);opacity:.45} 50%{transform:translateY(5px);opacity:.9} }
    @keyframes navBeckonFade { from{opacity:0} to{opacity:1} }
    .nav-beckon { display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:22px;animation:navBeckonFade 1.2s 1s ease both; }
    .nav-beckon-text { font-size:11px;font-weight:600;color:#8fa0b0;letter-spacing:.12em;text-transform:uppercase; }
    .nav-beckon-arrows { display:flex;flex-direction:column;align-items:center;gap:1px;animation:navBeckonBob 2.2s ease-in-out infinite; }
  `;
  navOuter.appendChild(navBeckonStyle);
  const navBeckon = document.createElement('div');
  navBeckon.className = 'nav-beckon';
  navBeckon.innerHTML = `
    <div class="nav-beckon-text">Turn your diagnosis into an action plan below</div>
    <div class="nav-beckon-arrows">
      <svg width="20" height="10" viewBox="0 0 20 10" fill="none"><polyline points="2,2 10,8 18,2" stroke="#0061AD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/></svg>
      <svg width="20" height="10" viewBox="0 0 20 10" fill="none"><polyline points="2,2 10,8 18,2" stroke="#0061AD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/></svg>
    </div>
  `;
  navOuter.appendChild(navBeckon);

  return navOuter;
}

  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:relative;width:100%;font-family:"Barlow",sans-serif';

  const styleEl = document.createElement('style');
  styleEl.textContent = `
    @keyframes ${uid}-arrow-left { 0%{transform:scaleX(0);transform-origin:right center;opacity:0} 100%{transform:scaleX(1);transform-origin:right center;opacity:1} }
    @keyframes ${uid}-arrow-right { 0%{transform:scaleX(0);transform-origin:left center;opacity:0} 100%{transform:scaleX(1);transform-origin:left center;opacity:1} }

    { row:0, col:1, bg:'#1A3A5C', textColor:'#ffffff', dotColor:'rgba(255,255,255,.6)', badgeBg:'rgba(255,255,255,.2)', badgeText:'#ffffff', badge:'Most Effective', typeLabel:'Positive Conditional', typeSub:'For doing', quote:'"That was a good report you produced. It was clear, concise and summed up the issues."', note:'The most powerful Stroke in leadership. Specific, genuine, and directly linked to observable behaviour. It reinforces exactly what you want to see more of and builds real confidence.' },

    { row:1, col:0, bg:'#22357A', textColor:'#ffffff', dotColor:'rgba(255,255,255,.6)', badgeBg:'rgba(255,255,255,.18)', badgeText:'#ffffff', badge:'Never Appropriate', typeLabel:'Negative Unconditional', typeSub:'For being', quote:'"You\'re a waste of space."', note:'Attacks who someone is, not what they did. It provokes the strongest possible defensive reaction, destroys psychological safety, and has no place in any approach to empowering leadership.' }

  hint.className = `${uid}-hint`;

    { letter:'1', label:'Spot the step',      colour:'#01A4AB', freq:523, title:'Spot an improvement',        body:'Look for a step forward, something different, or better than before. High performance on its own deserves appreciation, but it is the improvement that carries the greatest developmental signal. Praising attendance at basic meetings debases the currency of feedback.' },
    { letter:'2', label:'Catch and name it',  colour:'#1A3A5C', freq:587, title:'Be specific and genuine',    body:'Name exactly what you saw, and why it matters. Use the Conditional Positive Stroke: link the recognition directly to the behaviour. Vague praise lands weakly. Specific, genuine recognition reaches people.' },
    { letter:'3', label:'Reinforce it',       colour:'#0061AD', freq:659, title:'Consolidate the achievement', body:'Give the person time to own the step. Celebrate the landing before moving on. But do not keep repeating the same praise: that signals to stay put rather than grow. Consolidation is a pause, not a destination.' },
    { letter:'4', label:'Encourage the next', colour:'#22357A', freq:784, title:'Keep the journey moving',     body:'True excellence is always a moving state. Once a step is consolidated, the leader\'s role is to encourage the next one. The cycle then repeats: spot, catch, reinforce, encourage forward.' }

    }

    .${uid}-hex-wrap {
      position: relative;
      display: inline-block;
      margin: 0 auto 32px;
      animation: ${uid}-glow 4.5s ease-in-out infinite, ${uid}-rule-rise 0.9s ease both;
      animation-delay: 0s, 0.25s;
    }

    .${uid}-hex-svg {
      display: block;
      width: 360px;
      height: auto;
      max-width: 100%;
    }

    .${uid}-hex-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed','Arial Narrow',sans-serif;
      font-size: 25px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.015em;
      padding: 0 44px;
      line-height: 1.2;
      text-shadow: 0 1px 12px rgba(0,0,0,0.35);
    }

    .${uid}-subtitle {
      font-family: 'Barlow',sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.80);
      line-height: 1.75;
      max-width: 480px;
      margin: 0 auto;
      animation: ${uid}-sub-rise 0.9s ease both;
      animation-delay: 0.55s;
    }
    .${uid}-subtitle .${uid}-soft {
      letter-spacing: 0.18em;
      opacity: 0.7;
    }
    .${uid}-subtitle .${uid}-bold {
      color: rgba(255,255,255,0.95);
      font-weight: 600;
    }

    .${uid}-spotlight {
      position: absolute;
      width: 520px;
      height: 520px;
      left: 0;
      top: 0;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(232,100,160,0.34) 0%,
        rgba(232,74,134,0.20) 18%,
        rgba(216,49,110,0.10) 36%,
        rgba(216,49,110,0.04) 52%,
        transparent 68%
      );
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.65s ease;
      mix-blend-mode: screen;
      z-index: 1;
      will-change: transform, opacity;
      transform: translate3d(-9999px, -9999px, 0);
    }
    .${uid}-spotlight.${uid}-spotlight-on {
      opacity: 1;
    }

    @media (max-width: 620px) {
      .${uid}-banner { padding: 40px 22px 44px; }
      .${uid}-eyebrow { font-size: 22px; margin-bottom: 22px; }
      .${uid}-hex-svg { width: 290px; }
      .${uid}-hex-text { font-size: 20px; padding: 0 32px; }
      .${uid}-subtitle { font-size: 14px; }
      .${uid}-hex-tr, .${uid}-hex-bl { width: 46px; height: 46px; }
      .${uid}-spotlight { width: 360px; height: 360px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .${uid}-spotlight { display: none; }
    }
  `;
  banner.appendChild(styleEl);

  // Decorative dot patterns (concentric arcs of small dots)
  const SVG_NS = 'http://www.w3.org/2000/svg';
  function makeDots(extraClass) {
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', '0 0 260 260');
    svg.setAttribute('class', `${uid}-dots ${extraClass}`);
    for (let r = 50; r < 260; r += 16) {
      const dotCount = Math.floor((r / 16) * 1.8);
      for (let i = 0; i < dotCount; i++) {
        const a = (i / dotCount) * 90;
        const rad = a * Math.PI / 180;
        const x = 30 + r * Math.cos(rad);
        const y = 30 + r * Math.sin(rad);
        if (x > 260 || y > 260) continue;
        const dot = document.createElementNS(SVG_NS, 'circle');
        dot.setAttribute('cx', x.toFixed(1));
        dot.setAttribute('cy', y.toFixed(1));
        dot.setAttribute('r', 1.6);
        dot.setAttribute('fill', '#D8316E');
        dot.setAttribute('opacity', (0.85 - r/320).toFixed(2));
        svg.appendChild(dot);
      }
    }
    return svg;
  }
  banner.appendChild(makeDots(`${uid}-dots-tl`));
  banner.appendChild(makeDots(`${uid}-dots-br`));

  // Corner hexagon clusters (echoes the Liberator branding)
  function makeHexCluster(extraClass) {
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', '0 0 64 64');
    svg.setAttribute('class', `${uid}-hex-accent ${extraClass}`);
    const hexA = document.createElementNS(SVG_NS, 'polygon');
    hexA.setAttribute('points', '14,8 32,8 41,24 32,40 14,40 5,24');
    hexA.setAttribute('fill', '#D8316E');
    hexA.setAttribute('opacity', '0.80');
    svg.appendChild(hexA);
    const hexB = document.createElementNS(SVG_NS, 'polygon');
    hexB.setAttribute('points', '34,22 52,22 61,38 52,54 34,54 25,38');
    hexB.setAttribute('fill', '#1A3A5C');
    hexB.setAttribute('stroke', '#D8316E');
    hexB.setAttribute('stroke-width', '1.8');
    svg.appendChild(hexB);
    return svg;
  }
  banner.appendChild(makeHexCluster(`${uid}-hex-tr`));
  banner.appendChild(makeHexCluster(`${uid}-hex-bl`));

  // Subtle moving shimmer
  const shimmer = document.createElement('div');
  shimmer.className = `${uid}-shimmer`;
  banner.appendChild(shimmer);

  // Content: eyebrow, hexagon callout, contrasting subtitle
  const content = document.createElement('div');
  content.className = `${uid}-content`;
  content.innerHTML = `
    <div class="${uid}-eyebrow">The Cardinal Rule</div>
    <div class="${uid}-hex-wrap">
      <svg class="${uid}-hex-svg" viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="${uid}-hexBorder" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E84A86"/>
            <stop offset="55%" stop-color="#D8316E"/>
            <stop offset="100%" stop-color="#A8275A"/>
          </linearGradient>
          <linearGradient id="${uid}-hexFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(216,49,110,0.18)"/>
            <stop offset="100%" stop-color="rgba(216,49,110,0.06)"/>
          </linearGradient>
        </defs>
        <polygon points="42,100 96,18 264,18 318,100 264,182 96,182"
                 fill="url(#${uid}-hexFill)"
                 stroke="url(#${uid}-hexBorder)"
                 stroke-width="2.6"
                 stroke-linejoin="round"/>
      </svg>
      <div class="${uid}-hex-text">Catch Someone Doing Something Right!</div>
    </div>
    <div class="${uid}-subtitle">
      Rather than the more usual<span class="${uid}-soft"> ... </span><br>
      ignoring what is going well<br>
      and <span class="${uid}-bold">blitzing what is going wrong!</span>
    </div>
  `;
  banner.appendChild(content);

  // Spotlight follow: a soft warm pool of light that tracks just behind the
  // cursor as it moves across the card. Uses a lerped target position so the
  // light glides rather than snaps, giving a sense that the card is quietly
  // aware of you. Fades in on enter, drifts out on leave.
  const spotlight = document.createElement('div');
  spotlight.className = `${uid}-spotlight`;
  banner.appendChild(spotlight);

  const SPOT_HALF = 260; // half of the 520px spotlight square
  let spotX = 0, spotY = 0, targetX = 0, targetY = 0, spotRaf = null;

  function spotAnimate() {
    spotX += (targetX - spotX) * 0.16;
    spotY += (targetY - spotY) * 0.16;
    spotlight.style.transform =
      `translate3d(${(spotX - SPOT_HALF).toFixed(1)}px, ${(spotY - SPOT_HALF).toFixed(1)}px, 0)`;
    if (Math.abs(targetX - spotX) > 0.4 || Math.abs(targetY - spotY) > 0.4) {
      spotRaf = requestAnimationFrame(spotAnimate);
    } else {
      spotRaf = null;
    }
  }

  banner.addEventListener('mouseenter', (e) => {
    const rect = banner.getBoundingClientRect();
    // Start the spotlight already at the cursor, no swooping in from elsewhere
    targetX = spotX = e.clientX - rect.left;
    targetY = spotY = e.clientY - rect.top;
    spotlight.style.transform =
      `translate3d(${spotX - SPOT_HALF}px, ${spotY - SPOT_HALF}px, 0)`;
    spotlight.classList.add(`${uid}-spotlight-on`);
  });

  banner.addEventListener('mousemove', (e) => {
    const rect = banner.getBoundingClientRect();
    targetX = e.clientX - rect.left;
    targetY = e.clientY - rect.top;
    if (!spotRaf) spotRaf = requestAnimationFrame(spotAnimate);
  });

  banner.addEventListener('mouseleave', () => {
    spotlight.classList.remove(`${uid}-spotlight-on`);
  });

  return banner;
}

    .${uid}-y-hi { font-family:"Barlow",sans-serif; font-size:11px; font-weight:700;
      color:#aaa; letter-spacing:.1em; text-transform:uppercase;
      writing-mode:vertical-rl; transform:rotate(180deg); margin-bottom:4px;
      padding:6px 4px; border-radius:20px; background:transparent;
      transition:color .25s ease, background .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
    .${uid}-y-line-wrap { flex:1; display:flex; align-items:center; justify-content:center; }
    .${uid}-y-lo { font-family:"Barlow",sans-serif; font-size:11px; font-weight:700;
      color:#aaa; letter-spacing:.1em; text-transform:uppercase;
      writing-mode:vertical-rl; transform:rotate(180deg); margin-top:4px;
      padding:6px 4px; border-radius:20px; background:transparent;
      transition:color .25s ease, background .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
    .${uid}-y-hi.lit { color:white; background:#009FA0; transform:rotate(180deg) scale(1.15);
      box-shadow:0 2px 12px rgba(0,159,160,.45); }
    .${uid}-y-lo.lit { color:white; background:#fa6b02; transform:rotate(180deg) scale(1.15);
      box-shadow:0 2px 12px rgba(250,107,2,.45); }

    /* SVG axis line */
    .${uid}-axis-svg { overflow:visible; }

    /* Grid area */
    .${uid}-grid-col { flex:1; }
    .${uid}-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; position:relative; }

    /* Cells */
    .${uid}-cell { border-radius:14px; padding:16px 14px; min-height:130px; position:relative;
      overflow:hidden; cursor:default;
      transition:transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease, opacity .3s ease; }
    .${uid}-cell.hovered { transform:scale(1.18); z-index:10; }
    .${uid}-cell.dimmed  { opacity:.28; transform:scale(.94); }
    .${uid}-cell-label { font-family:"Barlow Condensed",sans-serif; font-size:14px; font-weight:800;
      color:white; margin-bottom:6px; text-transform:uppercase; letter-spacing:.07em; }
    .${uid}-cell-desc  { font-size:10px; color:rgba(255,255,255,.82); line-height:1.5; }

    /* Clickable dot indicator */
    .${uid}-dot { position:absolute; bottom:10px; right:10px; width:8px; height:8px;
      border-radius:50%; background:rgba(255,255,255,.55); pointer-events:none; }
    .${uid}-dot::after { content:''; position:absolute; inset:-4px; border-radius:50%;
      background:rgba(255,255,255,.22); animation:${uid}DotPulse 2.2s ease-in-out infinite; }
    @keyframes ${uid}DotPulse {
      0%,100% { transform:scale(1);   opacity:.7; }
      50%      { transform:scale(2.2); opacity:0;  }
    }
    .${uid}-cell.dimmed .${uid}-dot { opacity:.3; }

    /* See example pill */
    .${uid}-pill { position:absolute; bottom:9px; right:22px;
      display:flex; align-items:center; gap:5px;
      background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3);
      border-radius:20px; padding:4px 10px 4px 8px;
      font-family:"Barlow",sans-serif; font-size:10px; font-weight:700;
      color:white; letter-spacing:.06em; text-transform:uppercase;
      pointer-events:none; white-space:nowrap;
      opacity:0; transform:translateY(4px);
      transition:opacity .2s ease, transform .2s ease; }
    .${uid}-pill::before { content:''; width:6px; height:6px; border-radius:50%;
      background:rgba(255,255,255,.7); flex-shrink:0; }
    .${uid}-cell.hovered .${uid}-pill { opacity:1; transform:translateY(0); }
    .${uid}-cell.dimmed .${uid}-dot { opacity:.3; }

    /* Shimmer sweep */
    .${uid}-sweep { position:absolute; top:-50%; left:-75%; width:50%; height:200%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);
      transform:skewX(-20deg); pointer-events:none; animation:${uid}Sw .55s ease forwards; }
    @keyframes ${uid}Sw { from{left:-75%} to{left:150%} }

    /* Centre circle */
    .${uid}-centre { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:122px; height:122px; border-radius:50%;
      background:linear-gradient(145deg,#0061AD 0%,#004B86 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:10px; z-index:5;
      box-shadow:0 4px 22px rgba(0,97,173,.42), 0 0 0 3px rgba(255,255,255,.14);
      transition:box-shadow .3s ease; }
    .${uid}-centre.pulse { animation:${uid}Pulse .72s ease; }
    @keyframes ${uid}Pulse {
      0%,100% { box-shadow:0 4px 22px rgba(0,97,173,.42), 0 0 0 3px rgba(255,255,255,.14); }
      42%      { box-shadow:0 6px 52px rgba(0,170,255,.78), 0 0 0 8px rgba(255,255,255,.44), 0 0 80px rgba(0,160,255,.22); }
    }
    .${uid}-ct   { font-size:7.5px; font-weight:700; color:white; line-height:1.45; text-transform:uppercase; letter-spacing:.05em; }
    .${uid}-cdiv { width:28px; height:1px; background:rgba(255,255,255,.28); margin:4px auto; }

    /* X axis row */
    .${uid}-x-row { display:flex; align-items:center; gap:0; margin-top:14px;
                    padding-left:60px; /* matches y-col width */ }
    .${uid}-x-label { font-family:"Barlow Condensed",sans-serif; font-size:9px; font-weight:700;
      color:#888; letter-spacing:.14em; text-transform:uppercase;
      text-align:center; margin-bottom:4px; }
    .${uid}-x-track { display:flex; align-items:center; gap:0; width:100%; }
    .${uid}-x-lo { font-family:"Barlow",sans-serif; font-size:11px; font-weight:700;
      color:#aaa; letter-spacing:.1em; text-transform:uppercase; margin-right:8px; flex-shrink:0;
      padding:4px 8px; border-radius:20px; background:transparent;
      transition:color .25s ease, background .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
    .${uid}-x-hi { font-family:"Barlow",sans-serif; font-size:11px; font-weight:700;
      color:#aaa; letter-spacing:.1em; text-transform:uppercase; margin-left:8px; flex-shrink:0;
      padding:4px 8px; border-radius:20px; background:transparent;
      transition:color .25s ease, background .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
    .${uid}-x-lo.lit { color:white; background:#009FA0; transform:scale(1.15);
      box-shadow:0 2px 12px rgba(0,159,160,.45); }
    .${uid}-x-hi.lit { color:white; background:#fa6b02; transform:scale(1.15);
      box-shadow:0 2px 12px rgba(250,107,2,.45); }
    .${uid}-x-line-wrap { flex:1; }

    /* Attribution */
    .${uid}-attrib { text-align:center; font-size:9px; color:#aaa; font-style:italic; margin-top:12px; }

    /* Scenario modal */
    .${uid}-modal-backdrop { position:absolute; inset:0; background:rgba(10,24,48,.55);
      border-radius:14px; z-index:20; display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .22s ease; backdrop-filter:blur(2px); }
    .${uid}-modal-backdrop.open { opacity:1; pointer-events:all; }
    .${uid}-modal-card { position:relative; width:88%; max-width:320px; border-radius:18px;
      padding:24px 22px 20px; color:white; box-shadow:0 16px 48px rgba(0,0,0,.35);
      transform:scale(.88) translateY(10px); transition:transform .28s cubic-bezier(.34,1.56,.64,1);
      overflow:hidden; }
    .${uid}-modal-backdrop.open .${uid}-modal-card { transform:scale(1) translateY(0); }
    .${uid}-modal-eyebrow { font-size:9px; font-weight:700; letter-spacing:.2em;
      text-transform:uppercase; color:rgba(255,255,255,.6); margin-bottom:6px; }
    .${uid}-modal-title { font-family:"Barlow Condensed",sans-serif; font-size:26px;
      font-weight:800; color:white; letter-spacing:.02em; margin-bottom:14px; }
    .${uid}-modal-divider { height:1px; background:rgba(255,255,255,.22); margin-bottom:14px; }
    .${uid}-modal-scenario-label { font-size:9px; font-weight:700; letter-spacing:.18em;
      text-transform:uppercase; color:rgba(255,255,255,.55); margin-bottom:8px; }
    .${uid}-modal-scenario { font-size:13px; color:rgba(255,255,255,.92); line-height:1.7; }
    .${uid}-modal-close { position:absolute; top:14px; right:14px; width:28px; height:28px;
      border-radius:50%; background:rgba(255,255,255,.18); border:none; color:white;
      font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .15s ease; line-height:1; }
    .${uid}-modal-close:hover { background:rgba(255,255,255,.32); }
    .${uid}-modal-shimmer { position:absolute; top:-50%; left:-75%; width:50%; height:200%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
      transform:skewX(-20deg); animation:${uid}MSw .7s .1s ease forwards; pointer-events:none; }
    @keyframes ${uid}MSw { from{left:-75%} to{left:150%} }
    .${uid}-cell { cursor:pointer; }
  `;
  container.appendChild(styleEl);

  // Helper: draw an SVG axis line with arrowhead
  function makeAxisSVG(isVertical, length) {
    const NS = 'http://www.w3.org/2000/svg';
    const w = isVertical ? 16 : length;
    const h = isVertical ? length : 16;
    const svg = document.createElementNS(NS,'svg');
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.setAttribute('width', w); svg.setAttribute('height', h);
    svg.style.overflow = 'visible';

    const defs = document.createElementNS(NS,'defs');
    const marker = document.createElementNS(NS,'marker');
    marker.setAttribute('id', `${uid}-arr-${isVertical?'v':'h'}`);
    marker.setAttribute('markerWidth','6'); marker.setAttribute('markerHeight','6');
    marker.setAttribute('refX','3'); marker.setAttribute('refY','3');
    marker.setAttribute('orient','auto');
    const poly = document.createElementNS(NS,'polygon');
    poly.setAttribute('points','0 0, 6 3, 0 6');
    poly.setAttribute('fill','#ccc');
    marker.appendChild(poly); defs.appendChild(marker); svg.appendChild(defs);

    const line = document.createElementNS(NS,'line');
    if (isVertical) {
      line.setAttribute('x1', w/2); line.setAttribute('y1', h);
      line.setAttribute('x2', w/2); line.setAttribute('y2', 0);
    } else {
      line.setAttribute('x1', 0);   line.setAttribute('y1', h/2);
      line.setAttribute('x2', w);   line.setAttribute('y2', h/2);
    }
    line.setAttribute('stroke','#ccc'); line.setAttribute('stroke-width','1.5');
    line.setAttribute('marker-end', `url(#${uid}-arr-${isVertical?'v':'h'})`);
    svg.appendChild(line);
    return svg;
  }

  // ---- Build layout ----
  const wrap = document.createElement('div');
  wrap.className = `${uid}-wrap`;

  // Middle row: Y axis + grid
  const midRow = document.createElement('div');
  midRow.className = `${uid}-mid-row`;

  // Y axis column — now flex-row: line sub-col then label
  const yCol = document.createElement('div');
  yCol.className = `${uid}-y-col`;

  // Sub-col: just Hi, line, Lo
  const yAxisPart = document.createElement('div');
  yAxisPart.className = `${uid}-y-axis-part`;

  const yHi = document.createElement('div');
  yHi.className = `${uid}-y-hi`; yHi.id = `${uid}-y-hi`; yHi.textContent = 'High';

  const yLineWrap = document.createElement('div');
  yLineWrap.className = `${uid}-y-line-wrap`;
  const yLineSvgHolder = document.createElement('div');
  yLineSvgHolder.style.cssText = 'width:16px;height:100%;display:flex;align-items:center;justify-content:center';
  yLineWrap.appendChild(yLineSvgHolder);

  const yLo = document.createElement('div');
  yLo.className = `${uid}-y-lo`; yLo.id = `${uid}-y-lo`; yLo.textContent = 'Low';

  yAxisPart.appendChild(yHi);
  yAxisPart.appendChild(yLineWrap);
  yAxisPart.appendChild(yLo);

  // Label sits to the right of the arrow line
  const yLabel = document.createElement('div');
  yLabel.className = `${uid}-y-label`;
  yLabel.textContent = 'Joint Decision Making';

  yCol.appendChild(yAxisPart);
  yCol.appendChild(yLabel);
  midRow.appendChild(yCol);

  // Grid column
  const gridCol = document.createElement('div');
  gridCol.className = `${uid}-grid-col`;

  const grid = document.createElement('div');
  grid.className = `${uid}-grid`;

  // Centre circle
  const centre = document.createElement('div');
  centre.className = `${uid}-centre`; centre.id = `${uid}-centre`;
  centre.innerHTML = `
    <div class="${uid}-ct">High Challenge<br>High Support</div>
    <div class="${uid}-cdiv"></div>
    <div class="${uid}-ct">Situational<br>Consistency</div>
    <div class="${uid}-cdiv"></div>
    <div class="${uid}-ct" style="font-size:7px;opacity:.85">Positive Regard<br>&amp; Genuineness</div>
  `;
  grid.appendChild(centre);

  const cells = [
    { label:'Coaching',
      desc:'Leader facilitates, encourages and supports team member\'s judgements and provides advice',
      scenario:'An experienced team member is facing a challenge or decision and would benefit from structured questions that help them think it through and reach their own conclusion.',
      bg:'#009FA0', glowRgb:'0,159,160', xPos:'low', yPos:'high', toneA:523, toneB:659 },
    { label:'Mentoring',
      desc:'Leader briefs team member in what is required, but also seeks their opinions and judgements',
      scenario:'A capable but still developing colleague is taking on a new responsibility and needs guidance, context and occasional steer from someone more experienced.',
      bg:'#0061AD', glowRgb:'0,97,173', xPos:'high', yPos:'high', toneA:659, toneB:880 },
    { label:'Delegating',
      desc:'Leader hands over complete discretion for a task so that the team member manages it and makes decisions for self',
      scenario:'A trusted, proven colleague is given full ownership of a familiar task, with clear outcomes agreed and minimal intervention needed.',
      bg:'#1A3A5C', glowRgb:'26,58,92', xPos:'low', yPos:'low', toneA:440, toneB:554 },
    { label:'Directing',
      desc:'Leader gives explicit briefing for a task and monitors performance closely',
      scenario:'A new starter is carrying out a safety-critical process for the first time and needs clear instruction, close checking, and no ambiguity.',
      bg:'#fa6b02', glowRgb:'250,107,2', xPos:'high', yPos:'low', toneA:784, toneB:988 }
  ];

  cells.forEach(c => {
    const cell = document.createElement('div');
    cell.className = `${uid}-cell`;
    cell.style.background = c.bg;
    // Right-column cells get right-aligned text so the centre circle does not obscure it
    if (c.xPos === 'high') {
      cell.style.textAlign = 'right';
    }
    cell.innerHTML = `<div class="${uid}-cell-label">${c.label}</div><div class="${uid}-cell-desc">${c.desc}</div><div class="${uid}-pill">See example</div><div class="${uid}-dot"></div>`;

    cell.addEventListener('mouseenter', () => {
      grid.querySelectorAll(`.${uid}-cell`).forEach(el => {
        if (el !== cell) { el.classList.add('dimmed');  el.classList.remove('hovered'); el.style.boxShadow = ''; }
        else             { el.classList.add('hovered'); el.classList.remove('dimmed');
                           el.style.boxShadow = `0 14px 40px rgba(${c.glowRgb},.55)`; }
      });

      // Shimmer sweep
      const old = cell.querySelector(`.${uid}-sweep`);
      if (old) old.remove();
      const sweep = document.createElement('div');
      sweep.className = `${uid}-sweep`;
      cell.appendChild(sweep);
      setTimeout(() => { if (sweep.parentNode) sweep.remove(); }, 600);

      // Centre pulse
      const centreEl = document.getElementById(`${uid}-centre`);
      centreEl.classList.remove('pulse');
      void centreEl.offsetWidth;
      centreEl.classList.add('pulse');

      // Axis highlights
      const yhEl = document.getElementById(`${uid}-y-hi`);
      const ylEl = document.getElementById(`${uid}-y-lo`);
      const xhEl = document.getElementById(`${uid}-x-hi`);
      const xlEl = document.getElementById(`${uid}-x-lo`);
      if (yhEl) { yhEl.classList.toggle('lit', c.yPos === 'high'); yhEl.classList.toggle('dimmed-ax', c.yPos !== 'high'); }
      if (ylEl) { ylEl.classList.toggle('lit', c.yPos === 'low');  ylEl.classList.toggle('dimmed-ax', c.yPos !== 'low'); }
      if (xhEl) { xhEl.classList.toggle('lit', c.xPos === 'high'); xhEl.classList.toggle('dimmed-ax', c.xPos !== 'high'); }
      if (xlEl) { xlEl.classList.toggle('lit', c.xPos === 'low');  xlEl.classList.toggle('dimmed-ax', c.xPos !== 'low'); }

      // Also update arrow colours in SVG
      document.querySelectorAll(`#${uid}-arr-v polygon, #${uid}-arr-h polygon`).forEach(p => p.setAttribute('fill','#aaa'));

      // Sound
      try {
        const ctx = getCtx(), now = ctx.currentTime;
        [c.toneA, c.toneB].forEach((freq, i) => {
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.type = 'sine'; osc.frequency.value = freq;
          const t = now + i * 0.06;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.02 - i * 0.006, t + 0.016);
          g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
          osc.connect(g); g.connect(ctx.destination);
          osc.start(t); osc.stop(t + 0.6);
        });
      } catch(e) {}
    });

    cell.addEventListener('mouseleave', () => {
      grid.querySelectorAll(`.${uid}-cell`).forEach(el => {
        el.classList.remove('dimmed','hovered');
        el.style.boxShadow = '';
      });
      [document.getElementById(`${uid}-y-hi`), document.getElementById(`${uid}-y-lo`),
       document.getElementById(`${uid}-x-hi`), document.getElementById(`${uid}-x-lo`)].forEach(el => {
        if (el) { el.classList.remove('lit','dimmed-ax'); }
      });
    });

    // Click handler: show scenario modal
    cell.addEventListener('click', () => {
      const backdrop = document.getElementById(`${uid}-backdrop`);
      const card = document.getElementById(`${uid}-modal-card`);
      // Update card colour and content
      card.style.background = c.bg;
      card.querySelector(`.${uid}-modal-title`).textContent = c.label;
      card.querySelector(`.${uid}-modal-scenario`).textContent = c.scenario;
      // Re-trigger shimmer
      const oldShimmer = card.querySelector(`.${uid}-modal-shimmer`);
      if (oldShimmer) oldShimmer.remove();
      const shimmer = document.createElement('div');
      shimmer.className = `${uid}-modal-shimmer`;
      card.appendChild(shimmer);
      setTimeout(() => { if (shimmer.parentNode) shimmer.remove(); }, 900);
      backdrop.classList.add('open');
      playChime();
    });

    grid.appendChild(cell);
  });

  // Build modal backdrop (scoped inside the grid wrapper)
  const backdrop = document.createElement('div');
  backdrop.className = `${uid}-modal-backdrop`;
  backdrop.id = `${uid}-backdrop`;

  const modalCard = document.createElement('div');
  modalCard.className = `${uid}-modal-card`;
  modalCard.id = `${uid}-modal-card`;
  modalCard.innerHTML = `
    <button class="${uid}-modal-close" id="${uid}-modal-close" aria-label="Close">✕</button>
    <div class="${uid}-modal-eyebrow">When to use this style</div>
    <div class="${uid}-modal-title"></div>
    <div class="${uid}-modal-divider"></div>
    <div class="${uid}-modal-scenario-label">Example scenario</div>
    <div class="${uid}-modal-scenario"></div>
  `;

  backdrop.appendChild(modalCard);

  // Close on backdrop click (outside card)
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) backdrop.classList.remove('open');
  });
  // Close button
  modalCard.querySelector(`#${uid}-modal-close`).addEventListener('click', () => {
    backdrop.classList.remove('open');
  });
  // Close on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') backdrop.classList.remove('open');
  });

  gridCol.style.position = 'relative';
  gridCol.appendChild(grid);
  gridCol.appendChild(backdrop);
  midRow.appendChild(gridCol);
  wrap.appendChild(midRow);

  // ---- X axis row ----
  const xBlock = document.createElement('div');
  xBlock.style.cssText = 'padding-left:60px;margin-top:14px';

  const xLabelRow = document.createElement('div');
  xLabelRow.className = `${uid}-x-label`;
  xLabelRow.textContent = "Leader's Explicit Direction";
  xBlock.appendChild(xLabelRow);

  const xTrack = document.createElement('div');
  xTrack.className = `${uid}-x-track`;

  const xLo = document.createElement('div');
  xLo.className = `${uid}-x-lo`; xLo.id = `${uid}-x-lo`; xLo.textContent = 'Low';

  const xLineWrap = document.createElement('div');
  xLineWrap.className = `${uid}-x-line-wrap`;
  const xLineSvgHolder = document.createElement('div');
  xLineSvgHolder.style.cssText = 'width:100%;height:16px';
  xLineWrap.appendChild(xLineSvgHolder);

  const xHi = document.createElement('div');
  xHi.className = `${uid}-x-hi`; xHi.id = `${uid}-x-hi`; xHi.textContent = 'High';

  xTrack.appendChild(xLo);
  xTrack.appendChild(xLineWrap);
  xTrack.appendChild(xHi);
  xBlock.appendChild(xTrack);
  wrap.appendChild(xBlock);

  // Attribution
  const attrib = document.createElement('div');
  attrib.className = `${uid}-attrib`;
  attrib.textContent = 'Based on Blanchard, Zigarmi & Zigarmi 1985';
  wrap.appendChild(attrib);

  container.appendChild(wrap);

  // Draw axis SVG lines once layout is in the DOM and has size
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // Y line
      const yH = yLineWrap.offsetHeight;
      if (yH > 0) {
        const ysvg = makeAxisSVG(true, yH);
        ysvg.style.cssText = 'width:16px;height:100%;display:block';
        yLineSvgHolder.innerHTML = '';
        yLineSvgHolder.appendChild(ysvg);
      }
      // X line
      const xW = xLineSvgHolder.offsetWidth;
      if (xW > 0) {
        const xsvg = makeAxisSVG(false, xW);
        xsvg.style.cssText = 'width:100%;height:16px;display:block';
        xLineSvgHolder.innerHTML = '';
        xLineSvgHolder.appendChild(xsvg);
      }
    });
  });

  return container;
}

function buildMotivationInventoryVisual() {
  const uid = 'mi' + Math.random().toString(36).slice(2,7);

  // Official 21 statements from The Liberator (pp. 224-225)
  const STATEMENTS = [
    { id: 1,  text: 'Knowing what is going on; a liking for certainty; job security', factor: 'Security', cat: 'Enjoyment' },
    { id: 2,  text: 'Using own initiative; dislike of bureaucracy and red tape; operating independently; deciding own course of action', factor: 'Initiative and Independence', cat: 'Achievement' },
    { id: 3,  text: 'Knowing own capability to do job based on previous experience; own match of knowledge and skills', factor: 'Suitability', cat: 'Enjoyment' },
    { id: 4,  text: 'Helping people achieve their goals; listening to them; providing close support as well as time and attention', factor: 'Nurture', cat: 'People' },
    { id: 5,  text: 'Achieving tangible results; connecting with a future perspective; problem solving; output rather than input focused', factor: 'Goal Orientation', cat: 'Achievement' },
    { id: 6,  text: 'Having close relationships; being part of a team; working interdependently with others and being liked and respected by them', factor: 'Affiliation', cat: 'People' },

  function buildProg() {
    const p = document.createElement('div'); p.className = uid + '-prog';
    const TOTAL = 4;
    const current = step >= 5 ? 5 : step;
    for (let i = 1; i <= TOTAL; i++) {
      const seg = document.createElement('div'); seg.className = uid + '-pseg';
      if (current > i) seg.classList.add('done');
      else if (current === i) seg.classList.add('active');
      p.appendChild(seg);
      if (i < TOTAL) { const g = document.createElement('div'); g.className = uid + '-pgap'; p.appendChild(g); }
    }
    return p;
  }

  function mkHd(num, title, sub) {
    const el = document.createElement('div'); el.className = uid + '-hd';

      '<div class="' + uid + '-hnum">Step ' + num + ' of 4</div>' +
      '<div class="' + uid + '-htitle">' + title + '</div>' +
      '<div class="' + uid + '-hsub">' + sub + '</div></div>';
    return el;
  }

  function mkCounter(count, max, label) {
    const c = document.createElement('div'); c.className = uid + '-counter' + (count >= max ? ' full' : '');

    return c;
  }

  function mkCard(stmt, opts) {
    opts = opts || {};

    if (opts.selected) card.classList.add('selected');
    if (opts.top) card.classList.add('top');
    if (opts.dimmed) card.classList.add('dimmed');
    if (opts.locked) card.classList.add('locked');

    const num = document.createElement('div'); num.className = uid + '-num'; num.textContent = stmt.id;
    const text = document.createElement('div'); text.className = uid + '-text'; text.textContent = stmt.text;
    card.appendChild(num);
    card.appendChild(text);

    if (opts.locked && opts.points) {
      const badge = document.createElement('div'); badge.className = uid + '-badge';
      const colourMap = { 6:'linear-gradient(135deg,#F4A766 0%,#E08A4A 100%)', 4:'#01A4AB', 3:'#0061AD', 2:'#5a8bb8', 1:'#8fa0b0' };

      card.appendChild(badge);

      tick.textContent = opts.top ? '\u2605' : (opts.selected ? '\u2713' : '');
      card.appendChild(tick);

    if (opts.onClick) card.addEventListener('click', opts.onClick);
    return card;

  function renderS1() {

    wrap.appendChild(mkCounter(s1.size, 6, 'chosen'));

    const list = document.createElement('div'); list.className = uid + '-list';

      const isSel = s1.has(stmt.id);
      const isLimited = !isSel && s1.size >= 6;
      const card = mkCard(stmt, {
        selected: isSel,
        dimmed: isLimited,
        onClick: () => {
          const wasComplete = isStepComplete();
          if (isSel) { s1.delete(stmt.id); playMIDeselect(); }
          else if (s1.size < 6) { s1.add(stmt.id); playMISelect(); }

    wrap.appendChild(mkHd(2, 'Your over-riding motivator', 'From the six you chose, mark the ONE statement of over-riding importance to you. The other five will receive 4 points each as very high importance.'));

    const list = document.createElement('div'); list.className = uid + '-list';
    STATEMENTS.filter(s => s1.has(s.id)).forEach(stmt => {
      const isTop = topId === stmt.id;
      const card = mkCard(stmt, {
        top: isTop,
        selected: !isTop && topId !== null,
        onClick: () => {
          const wasComplete = isStepComplete();
          if (topId === stmt.id) { topId = null; playMIDeselect(); }
          else { topId = stmt.id; playMISelect(); }
          render();
          if (!wasComplete && isStepComplete()) celebrateCompletion();
        }
      });
      list.appendChild(card);
    });
    wrap.appendChild(list);

    const hint = document.createElement('div'); hint.className = uid + '-hint';
    hint.textContent = topId ? 'Your top motivator is highlighted in amber. The other five will receive 4 points each.' : 'Select one statement that stands out above all others.';
    wrap.appendChild(hint);

    const nav = document.createElement('div'); nav.className = uid + '-nav';
    const back = document.createElement('button'); back.className = uid + '-btn ' + uid + '-ghost';
    back.innerHTML = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); step = 1; render(); });

    const next = document.createElement('button'); next.className = uid + '-btn ' + uid + '-primary';
    next.disabled = topId === null;
    next.innerHTML = 'Next: High importance \u2192';
    next.addEventListener('click', () => {
      if (topId !== null) { playMINext(); step = 3; render(); }
    });

    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderS3() {
    wrap.appendChild(mkHd(3, 'Five of high importance', 'From the remaining fifteen statements, choose the FIVE that are of high importance to you. These will receive 3 points each.'));
    wrap.appendChild(mkCounter(s3.size, 5, 'chosen'));

    const list = document.createElement('div'); list.className = uid + '-list';
    STATEMENTS.forEach(stmt => {
      if (s1.has(stmt.id)) {
        const isTop = topId === stmt.id;
        const card = mkCard(stmt, { locked: true, points: isTop ? 6 : 4 });
        list.appendChild(card);
      } else {
        const isSel = s3.has(stmt.id);
        const isLimited = !isSel && s3.size >= 5;
        const card = mkCard(stmt, {
          selected: isSel,
          dimmed: isLimited,
          onClick: () => {
            const wasComplete = isStepComplete();
            if (isSel) { s3.delete(stmt.id); playMIDeselect(); }
            else if (s3.size < 5) { s3.add(stmt.id); playMISelect(); }
            render();
            if (!wasComplete && isStepComplete()) celebrateCompletion();
          }
        });
        list.appendChild(card);
      }
    });
    wrap.appendChild(list);

    const nav = document.createElement('div'); nav.className = uid + '-nav';
    const back = document.createElement('button'); back.className = uid + '-btn ' + uid + '-ghost';
    back.innerHTML = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); step = 2; render(); });

    const next = document.createElement('button'); next.className = uid + '-btn ' + uid + '-primary';
    next.disabled = s3.size !== 5;
    next.innerHTML = 'Next: Moderate importance \u2192';
    next.addEventListener('click', () => {
      if (s3.size === 5) { playMINext(); step = 4; render(); }
    });

    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderS4() {
    wrap.appendChild(mkHd(4, 'Five of moderate importance', 'From the remaining ten, choose the FIVE that are of moderate importance to you. These will receive 2 points each. The remaining five will receive 1 point.'));
    wrap.appendChild(mkCounter(s4.size, 5, 'chosen'));

    const list = document.createElement('div'); list.className = uid + '-list';
    STATEMENTS.forEach(stmt => {
      if (s1.has(stmt.id)) {
        const isTop = topId === stmt.id;
        const card = mkCard(stmt, { locked: true, points: isTop ? 6 : 4 });
        list.appendChild(card);
      } else if (s3.has(stmt.id)) {
        const card = mkCard(stmt, { locked: true, points: 3 });
        list.appendChild(card);
      } else {
        const isSel = s4.has(stmt.id);
        const isLimited = !isSel && s4.size >= 5;
        const card = mkCard(stmt, {
          selected: isSel,
          dimmed: isLimited,
          onClick: () => {
            const wasComplete = isStepComplete();
            if (isSel) { s4.delete(stmt.id); playMIDeselect(); }
            else if (s4.size < 5) { s4.add(stmt.id); playMISelect(); }
            render();
            if (!wasComplete && isStepComplete()) celebrateCompletion();
          }
        });
        list.appendChild(card);
      }
    });
    wrap.appendChild(list);

    const nav = document.createElement('div'); nav.className = uid + '-nav';
    const back = document.createElement('button'); back.className = uid + '-btn ' + uid + '-ghost';
    back.innerHTML = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); step = 3; render(); });

    const next = document.createElement('button'); next.className = uid + '-btn ' + uid + '-primary';
    next.disabled = s4.size !== 5;
    next.innerHTML = 'Reveal results \u2192';
    next.addEventListener('click', () => {
      if (s4.size === 5) { playMIComplete(); step = 5; render(); }
    });

    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderResults() {
    const totals = {};
    CAT_ORDER.forEach(cat => totals[cat] = categoryTotal(cat));
    const maxTotal = Math.max(...Object.values(totals));

    const hd = document.createElement('div'); hd.className = uid + '-res-hd';
    hd.innerHTML =
      '<div class="' + uid + '-res-eyebrow">Your Motivation Profile</div>' +
      '<div class="' + uid + '-res-title">What drives you most</div>' +
      '<p class="' + uid + '-res-sub">Below is a summary of where your motivation sits across the three categories: People, Achievement and Enjoyment. Effective Leader-Developers tend to have both high Achievement and People motivation, with sufficient Enjoyment to avoid stress or tunnel vision.</p>';
    wrap.appendChild(hd);

    // Top motivator
    const topStmt = getById(topId);
    const topCard = document.createElement('div'); topCard.className = uid + '-top-card';
    topCard.innerHTML =
      '<div class="' + uid + '-top-icon">\u2605</div>' +
      '<div class="' + uid + '-top-body">' +
      '<div class="' + uid + '-top-eyebrow">Most over-riding motivator \u00B7 ' + topStmt.cat + '</div>' +
      '<div class="' + uid + '-top-factor">' + topStmt.factor + '</div>' +
      '<div class="' + uid + '-top-text">' + topStmt.text + '</div></div>';
    wrap.appendChild(topCard);

    // Category bars
    const bal = document.createElement('div'); bal.className = uid + '-bal';
    const balTitle = document.createElement('div'); balTitle.className = uid + '-bal-title';
    balTitle.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A3A5C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18l9-12 9 12"/></svg> Category balance';
    bal.appendChild(balTitle);

    CAT_ORDER.forEach((cat, idx) => {
      const total = totals[cat];
      const pct = (total / maxTotal) * 100;
      const row = document.createElement('div'); row.className = uid + '-bar-row';
      row.innerHTML =
        '<div class="' + uid + '-bar-lbl">' +
        '<div class="' + uid + '-bar-name">' + cat + '</div>' +
        '<div class="' + uid + '-bar-score" style="color:' + CATS[cat].color + '">' + total + '</div>' +
        '</div>' +
        '<div class="' + uid + '-bar-track"><div class="' + uid + '-bar-fill" style="background:' + CATS[cat].color + '"></div></div>';
      bal.appendChild(row);
      setTimeout(() => {
        const fill = row.querySelector('.' + uid + '-bar-fill');
        if (fill) fill.style.width = pct + '%';
      }, 120 + idx * 80);
    });
    wrap.appendChild(bal);

    // Factor breakdown
    const fb = document.createElement('div'); fb.className = uid + '-fb';
    const fbTitle = document.createElement('div'); fbTitle.className = uid + '-fb-title';
    fbTitle.textContent = 'Factor breakdown';
    fb.appendChild(fbTitle);

    CAT_ORDER.forEach(cat => {
      const catEl = document.createElement('div'); catEl.className = uid + '-fb-cat';
      const catHd = document.createElement('div'); catHd.className = uid + '-fb-cat-hd';
      catHd.style.background = CATS[cat].color;
      catHd.innerHTML = '<span>' + cat + '</span><span class="' + uid + '-fb-cat-tot">' + totals[cat] + '</span>';
      catEl.appendChild(catHd);

      const list = document.createElement('div'); list.className = uid + '-fb-list';
      const catStmts = STATEMENTS.filter(s => s.cat === cat).sort((a, b) => pointsFor(b.id) - pointsFor(a.id));
      catStmts.forEach(s => {
        const pts = pointsFor(s.id);
        const row = document.createElement('div'); row.className = uid + '-fb-row';
        row.innerHTML =
          '<div class="' + uid + '-fb-pts" style="background:' + CATS[cat].color + '">' + pts + '</div>' +
          '<div class="' + uid + '-fb-name">' + s.factor + '</div>';
        list.appendChild(row);
      });
      catEl.appendChild(list);
      fb.appendChild(catEl);
    });
    wrap.appendChild(fb);

    // Interpretation
    const interp = document.createElement('div'); interp.className = uid + '-interp';
    interp.innerHTML =
      '<div class="' + uid + '-interp-eyebrow">Reading your profile</div>' +
      '<p class="' + uid + '-interp-text">An individual\u2019s scores cannot be classified as \u2018good\u2019 or \u2018bad\u2019. Whether they are right depends on a match with the role and situation. The key insight is the <strong>combination</strong> of factors. The expression \u2018they are a people person\u2019 is meaningless: a strong orientation towards others may be to influence them, support them, just be with them, or have deeper relationships with them. Both Task Focus and Goal Orientation are forms of Achievement motivation, but they differ in kind. Look at the relative weights, and consider how this pattern shows up in your work.</p>';
    wrap.appendChild(interp);

    // Nav
    const nav = document.createElement('div'); nav.className = uid + '-nav';
    const left = document.createElement('div'); left.className = uid + '-navl';
    const back = document.createElement('button'); back.className = uid + '-btn ' + uid + '-ghost';
    back.innerHTML = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); step = 4; render(); });
    const restart = document.createElement('button'); restart.className = uid + '-btn ' + uid + '-ghost';
    restart.innerHTML = '\u21BA Start over';
    restart.addEventListener('click', () => {
      playMIBack();
      s1.clear(); topId = null; s3.clear(); s4.clear(); step = 0; render();
    });
    left.appendChild(back); left.appendChild(restart);

    const dl = document.createElement('button'); dl.className = uid + '-btn ' + uid + '-dl';
    dl.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download profile';
    dl.addEventListener('click', () => {
      playMIDownload();
      generateMotivationPDF({
        topId: topId,
        s1: Array.from(s1),
        s3: Array.from(s3),
        s4: Array.from(s4),
        statements: STATEMENTS,
        totals: totals
      });
    });

    nav.appendChild(left); nav.appendChild(dl);
    wrap.appendChild(nav);
  }

  render();
  return wrap;
}

function buildAARVisual() {
  const svg = createSVG(400, 200);

    { q:'What was supposed to happen?', icon:'🎯' },
    { q:'What actually happened?', icon:'📋' },
    { q:'Why was there a difference?', icon:'🔍' },
    { q:'What can we learn?', icon:'💡' }
  ];
  qs.forEach((item, i) => {
    const y = i * 44 + 14;

function buildFlightPlanVisual() {
  const fp = 'fp' + Math.random().toString(36).slice(2,7);
  const wrap = document.createElement('div');
  wrap.style.cssText = 'width:100%;opacity:0;transition:opacity .5s ease;margin-top:8px;position:relative;font-family:"Barlow",sans-serif';

  const routeD = 'M 45,210 C 75,178 118,130 158,96 C 172,84 186,78 198,80 C 216,83 234,57 256,51 C 270,47 282,63 279,82 C 276,102 272,136 281,165 C 288,184 298,192 305,190 C 328,182 368,138 402,96 C 418,80 432,71 440,71';

  const beaconInfo = {
    A: { title:'Departure', text:'The journey begins. Clear expectations are established: the destination is known, the standard is set, and the leader is ready to navigate.' },
    B: { title:'First Beacon', text:'A formal review checkpoint. Progress is confirmed, the route is assessed, and re-routing happens here if needed. The destination has not changed.' },
    C: { title:'Course Corrected', text:'After the GPS alarm flagged an off-course deviation, immediate feedback brought things back on track. The route resumes without waiting for the next beacon.' },
    D: { title:'Destination Approach', text:'Sustained performance, continuously reinforced. The journey here was shaped by consistent, timely recognition and honest course corrections along the way.' }
  };

  // Navigation instrument ping - clean two-partial tone with natural decay
  function playSonar() {
    try {
      const ctx = getCtx(), now = ctx.currentTime;
      // Fundamental partial
      const osc1 = ctx.createOscillator(), g1 = ctx.createGain();
      osc1.type = 'sine';
      osc1.frequency.value = 880;
      g1.gain.setValueAtTime(0, now);
      g1.gain.linearRampToValueAtTime(0.018, now + 0.005);
      g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.65);
      osc1.connect(g1); g1.connect(ctx.destination);
      osc1.start(now); osc1.stop(now + 0.7);
      // Softer upper partial for warmth
      const osc2 = ctx.createOscillator(), g2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = 1320;
      g2.gain.setValueAtTime(0, now);
      g2.gain.linearRampToValueAtTime(0.009, now + 0.005);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
      osc2.connect(g2); g2.connect(ctx.destination);
      osc2.start(now); osc2.stop(now + 0.4);
    } catch(e) {}
  }

  // Subtle minimise sound
  function playMinimise() {
    try {
      const ctx = getCtx(), now = ctx.currentTime;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.exponentialRampToValueAtTime(280, now + 0.18);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.014, now + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.22);
    } catch(e) {}
  }

  // Alarm warble: two short urgent descending pulses
  function playAlarmWarble() {
    try {
      const ctx = getCtx(), now = ctx.currentTime;
      [{start:0, f1:780, f2:520}, {start:0.22, f1:700, f2:460}].forEach(({start, f1, f2}) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(f1, now + start);
        osc.frequency.exponentialRampToValueAtTime(f2, now + start + 0.16);
        g.gain.setValueAtTime(0, now + start);
        g.gain.linearRampToValueAtTime(0.016, now + start + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, now + start + 0.18);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(now + start); osc.stop(now + start + 0.2);
      });
    } catch(e) {}
  }

  wrap.innerHTML = `<svg id="${fp}s" viewBox="0 0 490 240" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;overflow:visible">

@keyframes ${fp}P{0%,100%{opacity:.55;r:17}50%{opacity:1;r:20}}

  // Animate plane along path
  setTimeout(() => {
    const routeEl = document.getElementById(`${fp}r`);
    const planeEl = document.getElementById(`${fp}p`);
    if (!routeEl || !planeEl) return;
    const totalLen = routeEl.getTotalLength();
    const duration = 3200, delay = 300;
    const startTime = performance.now() + delay;
    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function step(now) {
      const elapsed = now - startTime;
      if (elapsed < 0) { requestAnimationFrame(step); return; }
      const t = ease(Math.min(elapsed / duration, 1));
      const len = t * totalLen;
      const pt  = routeEl.getPointAtLength(len);
      const pt2 = routeEl.getPointAtLength(Math.min(len + 6, totalLen));
      const ang = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
      planeEl.setAttribute('transform', `translate(${pt.x.toFixed(1)},${pt.y.toFixed(1)}) rotate(${ang.toFixed(1)})`);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }, 100);

  // Wire up beacon clicks and alarm hover
  setTimeout(() => {
    const panel    = document.getElementById(`${fp}panel`);
    const ptitle   = document.getElementById(`${fp}ptitle`);
    const ptext    = document.getElementById(`${fp}ptext`);
    const closeBtn = document.getElementById(`${fp}close`);
    const alarmEl  = document.getElementById(`${fp}alarmEl`);
    const aripple  = document.getElementById(`${fp}aripple`);
    let activePin  = null;
    let alarmReady = false;

    // Alarm becomes interactive after its fade-in completes (1.75s + 0.5s)
    setTimeout(() => { alarmReady = true; }, 2400);

    function triggerSonar(letter) {
      const el = document.getElementById(`${fp}sonar${letter}`);
      if (!el) return;
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = `${fp}SR .7s ease-out forwards`;
    }

    function triggerAlarmRipple() {
      if (!aripple) return;
      aripple.classList.remove('active');
      void aripple.offsetWidth;
      aripple.classList.add('active');
    }

    function showPanel(id, title, text, colour, isAlarm) {
      ptitle.textContent = title;
      ptext.textContent  = text;
      panel.style.borderLeftColor = colour;
      panel.style.background = isAlarm ? 'rgba(208,72,98,.07)' : '#EAF4FB';
      panel.style.display = 'block';
      panel.style.animation = 'none';
      void panel.offsetWidth;
      panel.style.animation = 'fpPanelIn .22s ease both';
    }

    function closePanel() {
      playMinimise();
      panel.style.display = 'none';
      activePin = null;
    }

    // Beacon clicks
    ['A','B','C','D'].forEach(letter => {
      const pin = document.getElementById(`${fp}pin${letter}`);
      if (!pin) return;
      pin.addEventListener('click', () => {
        if (activePin === letter) { closePanel(); return; }
        activePin = letter;
        playSonar();
        triggerSonar(letter);
        const info = beaconInfo[letter];
        showPanel(letter, `${letter}: ${info.title}`, info.text, '#0061AD', false);
      });
    });

    // Alarm hover
    if (alarmEl) {
      alarmEl.addEventListener('mouseenter', () => {
        if (!alarmReady) return;
        playAlarmWarble();
        triggerAlarmRipple();
      });

      // Alarm click: show panel
      alarmEl.addEventListener('click', () => {
        if (!alarmReady) return;
        if (activePin === 'alarm') { closePanel(); return; }
        activePin = 'alarm';
        playSonar();
        triggerAlarmRipple();
        showPanel(
          'alarm',
          'GPS Alarm: Off Course',
          'An observable deviation from the expected standard. Performance, attitude or behaviour has shifted away from what was agreed. The effective leader acts immediately rather than storing this up for a formal review. The alarm is not a punishment, it is navigation: it exists to bring things back on track as quickly and constructively as possible.',
          '#D04862',
          true
        );
      });
    }

    if (closeBtn) closeBtn.addEventListener('click', closePanel);
  }, 500);

  setTimeout(() => { wrap.style.opacity = '1'; }, 50);

  // Scroll beckon toward the Flight Plan Sheet below
  const fpBeckonStyle = document.createElement('style');
  fpBeckonStyle.textContent = `
    @keyframes fpBeckonBob { 0%,100%{transform:translateY(0);opacity:.45} 50%{transform:translateY(5px);opacity:.9} }

    .fp-beckon-arrows { display:flex;flex-direction:column;align-items:center;gap:1px;animation:fpBeckonBob 2.2s ease-in-out infinite; }
  `;
  wrap.appendChild(fpBeckonStyle);

  fpBeckon.className = 'fp-beckon';
  fpBeckon.innerHTML = `

      </svg>

  `;
  wrap.appendChild(fpBeckon);

function createSVG(w, h) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.style.width = '100%';
  svg.style.height = 'auto';
  return svg;
}
function addRect(svg, x, y, w, h, fill, r=0) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','rect');
  el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('width',w); el.setAttribute('height',h);
  el.setAttribute('fill',fill); el.setAttribute('rx',r);
  svg.appendChild(el);
  return el;
}
function addCircle(svg, cx, cy, r, fill, stroke, sw) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','circle');
  el.setAttribute('cx',cx); el.setAttribute('cy',cy); el.setAttribute('r',r); el.setAttribute('fill',fill);
  if(stroke){el.setAttribute('stroke',stroke);el.setAttribute('stroke-width',sw);}
  svg.appendChild(el); return el;
}
function addText(svg, x, y, text, fill, size, weight, rotate) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','text');
  el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('text-anchor','middle');
  el.setAttribute('dominant-baseline','middle');
  el.setAttribute('fill',fill); el.setAttribute('font-size',size);
  el.setAttribute('font-family',"'Barlow',sans-serif");
  if(weight) el.setAttribute('font-weight',weight);
  if(rotate) el.setAttribute('transform',`rotate(${rotate},${x},${y})`);
  el.textContent = text;
  svg.appendChild(el); return el;
}
function addLine(svg, x1, y1, x2, y2, stroke, sw, dash) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','line');
  el.setAttribute('x1',x1); el.setAttribute('y1',y1); el.setAttribute('x2',x2); el.setAttribute('y2',y2);
  el.setAttribute('stroke',stroke); el.setAttribute('stroke-width',sw);
  if(dash) el.setAttribute('stroke-dasharray',dash);
  svg.appendChild(el); return el;
}
function addTrapezoid(svg, x, y, w, h, fill, r) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','rect');
  el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('width',w); el.setAttribute('height',h);
  el.setAttribute('fill',fill); el.setAttribute('rx',r);
  svg.appendChild(el); return el;
}
