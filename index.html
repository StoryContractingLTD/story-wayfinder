      return String(str).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/\u2013|\u2014/g,'-').replace(/\u2026/g,'...').replace(/[^\x00-\x7F]/g,'');
    }
    function wrapText(text, maxChars) {
      if (!text) return [''];
      const words = sanitize(text).split(/\s+/); const lines = []; let line = '';
      words.forEach(w => { if ((line+' '+w).trim().length > maxChars) { lines.push(line.trim()); line = w; } else { line = (line+' '+w).trim(); } });
      if (line) lines.push(line.trim());
      return lines.length ? lines : [''];
    }

    // Colours (RGB 0-1)
    const navy   = '0.10 0.23 0.36';
    const teal   = '0.00 0.64 0.65';
    const tealD  = '0.00 0.46 0.47';
    const blue   = '0.00 0.38 0.68';
    const amber  = '0.96 0.65 0.40';
    const amberL = '1.00 0.95 0.88';
    const amberT = '0.55 0.31 0.12';
    const white  = '1 1 1';
    const grey   = '0.45 0.45 0.45';
    const light  = '0.95 0.97 0.99';
    const text   = '0.15 0.15 0.15';

    const lh = 13;
    let s = ''; let y = H - M;

    // Header bar (teal with amber stripe)
    s += `${tealD} rg\n${M} ${H-M-58} ${W-2*M} 58 re f\n`;
    s += `${amber} rg\n${M} ${H-M-62} ${W-2*M} 4 re f\n`;
    s += `${white} rg\n`;
    s += `BT /F1 17 Tf ${M+14} ${H-M-26} Td (${escPDF('Motivation Inventory')}) Tj ET\n`;
    s += `BT /F2 9 Tf ${M+14} ${H-M-44} Td (${escPDF('Your motivation profile - Liberator Programme | pp. 224-225')}) Tj ET\n`;

    y = H - M - 80;

    // Date
    const today = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    s += `${grey} rg\nBT /F1 9 Tf ${M} ${y} Td (${escPDF('GENERATED')}) Tj ET\n`; y -= 7;
    s += `${light} rg\n${M} ${y-22} ${W-2*M} 22 re f\n${text} rg\n`;
    s += `BT /F2 11 Tf ${M+10} ${y-15} Td (${escPDF(today)}) Tj ET\n`; y -= 36;

    // Top motivator
    const topStmt = state.statements.find(st => st.id === state.topId);
    const topLines = wrapText(topStmt.text, 76);
    const topBoxH = 32 + topLines.length * lh;

    s += `${grey} rg\nBT /F1 9 Tf ${M} ${y} Td (${escPDF('MOST OVER-RIDING MOTIVATOR')}) Tj ET\n`; y -= 8;
    s += `${amberL} rg\n${M} ${y-topBoxH} ${W-2*M} ${topBoxH} re f\n`;
    s += `${amber} rg\n${M} ${y-topBoxH} 4 ${topBoxH} re f\n`;
    s += `${amberT} rg\nBT /F1 8 Tf ${M+12} ${y-14} Td (${escPDF((topStmt.cat + ' - ' + topStmt.factor).toUpperCase())}) Tj ET\n`;
    let ty = y - 14 - 14;
    s += `${text} rg\n`;
    topLines.forEach(l => {
      s += `BT /F2 10 Tf ${M+12} ${ty} Td (${escPDF(l)}) Tj ET\n`;
      ty -= lh;
    });
    y -= topBoxH + 14;

    // Category balance
    s += `${grey} rg\nBT /F1 9 Tf ${M} ${y} Td (${escPDF('CATEGORY BALANCE')}) Tj ET\n`; y -= 8;

    const cats = ['People','Achievement','Enjoyment'];
    const catColours = { 'People': blue, 'Achievement': navy, 'Enjoyment': teal };
    const totals = state.totals;
    const maxTotal = Math.max(...cats.map(c => totals[c]));
    const labelW = 100;
    const scoreW = 30;
    const trackX = M + labelW;
    const trackW = (W - 2*M) - labelW - scoreW;

    cats.forEach(cat => {
      const total = totals[cat];
      const colour = catColours[cat];
      const fillW = trackW * (total / maxTotal);
      const barH = 20;

      // Background
      s += `${light} rg\n${M} ${y-barH} ${W-2*M} ${barH} re f\n`;
      // Label
      s += `${text} rg\nBT /F1 11 Tf ${M+10} ${y-14} Td (${escPDF(cat)}) Tj ET\n`;
      // Track
      s += `${white} rg\n${trackX} ${y-barH+4} ${trackW} ${barH-8} re f\n`;
      // Fill
      s += `${colour} rg\n${trackX} ${y-barH+4} ${fillW} ${barH-8} re f\n`;
      // Score on right
      s += `${colour} rg\nBT /F1 12 Tf ${trackX + trackW + 6} ${y-14} Td (${escPDF(total.toString())}) Tj ET\n`;

      y -= barH + 3;
    });
    y -= 14;

    // Factor breakdown by category
    cats.forEach(cat => {
      const colour = catColours[cat];
      // Cat header
      s += `${colour} rg\n${M} ${y-22} ${W-2*M} 22 re f\n`;
      s += `${white} rg\nBT /F1 11 Tf ${M+12} ${y-15} Td (${escPDF(cat.toUpperCase())}) Tj ET\n`;
      s += `BT /F1 12 Tf ${W-M-32} ${y-15} Td (${escPDF(totals[cat].toString())}) Tj ET\n`;
      y -= 24;

      const catStmts = state.statements
        .filter(st => st.cat === cat)
        .map(st => {
          const pts = state.topId === st.id ? 6 : (state.s1.includes(st.id) ? 4 : (state.s3.includes(st.id) ? 3 : (state.s4.includes(st.id) ? 2 : 1)));
          return { st, pts };
        })
        .sort((a, b) => b.pts - a.pts);

      catStmts.forEach(({ st, pts }) => {
        const rowH = 16;
        s += `${light} rg\n${M} ${y-rowH} ${W-2*M} ${rowH} re f\n`;
        // Score badge
        s += `${colour} rg\n${M+6} ${y-rowH+2} 24 ${rowH-4} re f\n`;
        s += `${white} rg\nBT /F1 11 Tf ${M+14} ${y-12} Td (${escPDF(pts.toString())}) Tj ET\n`;
        // Factor name
        s += `${text} rg\nBT /F1 9 Tf ${M+38} ${y-11} Td (${escPDF(st.factor)}) Tj ET\n`;
        y -= rowH + 1;
      });
      y -= 8;
    });

    // Footer
    s += `${grey} rg\nBT /F2 8 Tf ${M} ${M-16} Td (${escPDF('Story Contracting - Liberator Programme - Motivation Inventory - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

    // Build PDF
    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId   = addObj('');
    const font1Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const streamBytes = new TextEncoder().encode(s);
    const streamId  = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
    const pageId    = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);
    objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

    let pdf = '%PDF-1.4\n'; const offsets = [];
    objects.forEach(obj => { offsets.push(pdf.length); pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`; });
    const xrefOffset = pdf.length;
    pdf += `xref\n0 ${objCount+1}\n0000000000 65535 f \n`;
    offsets.forEach(off => { pdf += String(off).padStart(10,'0') + ' 00000 n \n'; });
    pdf += `trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

    const blob = new Blob([pdf], { type:'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href = url;
    a.download = 'Motivation-Inventory-' + new Date().toISOString().slice(0,10) + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error('Motivation PDF error', e); }
}

// ── Initialize ──
// Welcome overlay: unlocks audio on click, then reveals the app
const welcomeOverlay = document.getElementById('welcome');
const welcomeBtn = document.getElementById('welcome-btn');
welcomeBtn.addEventListener('click', function() {
  getCtx(); // unlock audio
  audioReady = true;
  welcomeOverlay.classList.add('dismissed');
  setTimeout(() => { welcomeOverlay.style.display = 'none'; }, 500);
});

window.addEventListener('hashchange', handleHash);
handleHash();

// ── Idle Nudge ──
(function() {
  const NUDGE_ITEMS = [
    { id:'be-explicit',  label:'Be explicit',               sub:'The Onion Model and Change Sheet', colour:'#1A3A5C' },
    { id:'get-to-root',  label:'Get to the root of issues', sub:'Performance Navigator',            colour:'#1A3A5C' },
    { id:'empower-team', label:'Empower team members',      sub:'Situational Leadership',           colour:'#0061AD' }
  ];
  let nudgeTimer = null, fadeTimer = null, nudgeEl = null;

  function buildNudge() {
    const el = document.createElement('div');
    el.className = 'idle-nudge'; el.id = 'idle-nudge';
    el.innerHTML =
      '<div class="idle-nudge-header">' +
        '<span class="idle-nudge-title">Not sure where to start?</span>' +
        '<button class="idle-nudge-close" id="idle-nudge-close" aria-label="Dismiss">&#x2715;</button>' +
      '</div>' +
      '<p class="idle-nudge-text">Here are three great places to begin exploring the Liberator wheel.</p>' +
      '<div class="idle-nudge-links">' +
        NUDGE_ITEMS.map(function(s) {
          return '<a class="idle-nudge-link" href="#/' + s.id + '" data-nudge-link>' +
            '<span class="idle-nudge-dot" style="background:' + s.colour + '"></span>' +
            '<span><span class="idle-nudge-label">' + s.label + '</span>' +
            '<span class="idle-nudge-sub">' + s.sub + '</span></span></a>';
        }).join('') +
      '</div>';
    document.body.appendChild(el);
    el.querySelector('#idle-nudge-close').addEventListener('click', function() {
      playNudgeClose();
      hideNudge();
    });
    el.querySelectorAll('[data-nudge-link]').forEach(function(a) { a.addEventListener('click', hideNudge); });
    return el;
  }

  function isHomePage() {
    var hash = window.location.hash.replace('#/','').trim();
    if (!hash) return true;
    return !SEGMENTS.find(function(s){ return s.id === hash; });
  }

  function showNudge() {
    var overlay = document.getElementById('welcome');
    if (overlay && !overlay.classList.contains('dismissed')) return;
    if (!isHomePage()) return;
    if (!nudgeEl) nudgeEl = buildNudge();
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        nudgeEl.classList.add('visible');
        clearTimeout(fadeTimer);
        fadeTimer = setTimeout(hideNudge, 15000);
      });
    });
  }

  function hideNudge() {
    clearTimeout(fadeTimer);
    if (!nudgeEl || !nudgeEl.classList.contains('visible')) return;
    nudgeEl.style.transition = 'opacity 1.2s ease-in-out, transform 1.2s ease-in-out';
    nudgeEl.style.opacity = '0';
    nudgeEl.style.transform = 'translateY(12px)';
    setTimeout(function() {
      if (nudgeEl) { nudgeEl.classList.remove('visible'); nudgeEl.style.opacity = ''; nudgeEl.style.transform = ''; nudgeEl.style.transition = ''; }
    }, 1200);
  }

  function resetTimer() {
    clearTimeout(nudgeTimer); hideNudge();
    if (isHomePage()) nudgeTimer = setTimeout(showNudge, 10000);
  }

  // Single point of truth for scheduling the nudge. Always clears the
  // previous timer before setting a new one so timers can never leak.
  function scheduleNudge() {
    clearTimeout(nudgeTimer);
    if (isHomePage()) nudgeTimer = setTimeout(showNudge, 10000);
  }

  // Deliberate user actions dismiss the nudge AND reset the show timer.
  // Mousemove is intentionally excluded — moving the cursor is too low a bar,
  // and a user reaching toward the nudge to click a suggestion would otherwise
  // dismiss it before they got there.
  ['keydown','mousedown','touchstart','scroll'].forEach(function(evt) {
    window.addEventListener(evt, function(e) {
      // Clicks/touches inside the nudge itself are handled by the link
      // and close-button click handlers — don't fight them here.
      if (nudgeEl && nudgeEl.classList.contains('visible') && e.target && nudgeEl.contains(e.target)) return;
      resetTimer();
    }, { passive:true });
  });

  // Mousemove only resets the inactivity counter for the *next* nudge —
  // it never hides a currently-visible one. The 15-second fadeTimer in
  // showNudge() handles natural dismissal.
  window.addEventListener('mousemove', scheduleNudge, { passive:true });
  window.addEventListener('hashchange', function() {
    hideNudge();
    scheduleNudge();
  });
  document.getElementById('welcome-btn').addEventListener('click', scheduleNudge);
})();
</script>
