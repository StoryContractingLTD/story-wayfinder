    back.innerHTML = '\u2190 Back'; back.addEventListener('click', () => { playMIBack(); step = 1; render(); });
    navRow.appendChild(back);
    const nxt = document.createElement('button'); nxt.className = uid + '-btn ' + uid + '-primary';
    nxt.textContent = 'Next: Navigation plan \u2192';
    nxt.addEventListener('click', () => { playMINext(); step = 3; render(); });
    navRow.appendChild(nxt); c.appendChild(navRow);
  }

  function s3(c) {
    c.appendChild(mkHd(3, 'Your navigation plan', 'How will you keep the journey on course between beacons?'));

    const gpsRow = document.createElement('div'); gpsRow.className = uid + '-icon-row';
    const gpsIcon = document.createElement('div'); gpsIcon.className = uid + '-icon-box';
    gpsIcon.style.background = '#EAF4FB';
    gpsIcon.innerHTML = '<svg width="20" height="14" viewBox="0 0 20 14" fill="none"><path d="M0,7L4,1L8,13L12,1L16,7L20,7" stroke="#0061AD" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const gpsContent = document.createElement('div'); gpsContent.className = uid + '-icon-content';
    const gpsLabel = document.createElement('div'); gpsLabel.className = uid + '-icon-label'; gpsLabel.style.color = '#0061AD'; gpsLabel.textContent = 'GPS Signal';
    const gpsHint = document.createElement('div'); gpsHint.className = uid + '-icon-hint'; gpsHint.textContent = 'What will you look for to catch them doing something right between beacons? What does being on course look like day to day?';
    const gpsInp = mkInp('e.g. I will watch for occasions when they take initiative without prompting...', state.gps, 3, e => { state.gps = e.target.value; });
    gpsContent.appendChild(gpsLabel); gpsContent.appendChild(gpsHint); gpsContent.appendChild(gpsInp);
    gpsRow.appendChild(gpsIcon); gpsRow.appendChild(gpsContent); c.appendChild(gpsRow);

    const alarmRow = document.createElement('div'); alarmRow.className = uid + '-icon-row';
    alarmRow.style.background = '#fff8f9';
    const alarmIcon = document.createElement('div'); alarmIcon.className = uid + '-icon-box';
    alarmIcon.style.background = '#fff0f2';
    alarmIcon.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="rgba(208,72,98,.15)" stroke="#D04862" stroke-width="1.8"/><circle cx="8" cy="8" r="3" fill="#D04862"/></svg>';
    const alarmContent = document.createElement('div'); alarmContent.className = uid + '-icon-content';
    const alarmLabel = document.createElement('div'); alarmLabel.className = uid + '-icon-label'; alarmLabel.style.color = '#D04862'; alarmLabel.textContent = 'Alarm Trigger';
    const alarmHint = document.createElement('div'); alarmHint.className = uid + '-icon-hint'; alarmHint.textContent = 'What would off course look like for this person? What is your early warning sign that something has shifted?';
    const alarmInp = mkInp('e.g. Missing agreed deadlines, withdrawal from team conversations...', state.alarm, 3, e => { state.alarm = e.target.value; });
    alarmContent.appendChild(alarmLabel); alarmContent.appendChild(alarmHint); alarmContent.appendChild(alarmInp);
    alarmRow.appendChild(alarmIcon); alarmRow.appendChild(alarmContent); c.appendChild(alarmRow);

    const corrRow = document.createElement('div'); corrRow.className = uid + '-icon-row';
    const corrIcon = document.createElement('div'); corrIcon.className = uid + '-icon-box';
    corrIcon.style.background = '#EAF4FB';
    corrIcon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A3A5C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.64"/></svg>';
    const corrContent = document.createElement('div'); corrContent.className = uid + '-icon-content';
    const corrLabel = document.createElement('div'); corrLabel.className = uid + '-icon-label'; corrLabel.style.color = '#1A3A5C'; corrLabel.textContent = 'Course Correction';
    const corrHint = document.createElement('div'); corrHint.className = uid + '-icon-hint'; corrHint.textContent = 'If the alarm triggers, what is your immediate response? How will you bring them back on track without waiting for the next beacon?';
    const corrInp = mkInp('e.g. Have a direct conversation within 48 hours, focused on the specific behaviour...', state.correction, 3, e => { state.correction = e.target.value; });
    corrContent.appendChild(corrLabel); corrContent.appendChild(corrHint); corrContent.appendChild(corrInp);
    corrRow.appendChild(corrIcon); corrRow.appendChild(corrContent); c.appendChild(corrRow);

    const navRow = document.createElement('div'); navRow.className = uid + '-nav';
    const leftBtns = document.createElement('div'); leftBtns.className = uid + '-navl';
    const back = document.createElement('button'); back.className = uid + '-btn ' + uid + '-ghost';
    back.innerHTML = '\u2190 Back'; back.addEventListener('click', () => { playMIBack(); step = 2; render(); });
    const restart = document.createElement('button'); restart.className = uid + '-btn ' + uid + '-ghost';
    restart.innerHTML = '\u21BA Start again'; restart.addEventListener('click', () => {
      playMIBack();
      state.name = ''; state.destination = ''; state.timeline = '';
      state.beacons = [{ date: '', notes: '' }, { date: '', notes: '' }, { date: '', notes: '' }];
      state.gps = ''; state.alarm = ''; state.correction = '';
      step = 1; render();
    });
    leftBtns.appendChild(back); leftBtns.appendChild(restart);
    const dlBtn = document.createElement('button'); dlBtn.className = uid + '-btn ' + uid + '-dl';
    dlBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download Flight Plan';
    dlBtn.addEventListener('click', () => { playMIDownload(); downloadFlightPlanPDF(state); });
    navRow.appendChild(leftBtns); navRow.appendChild(dlBtn); c.appendChild(navRow);
  }

  render();
  return wrap;
}

function downloadFlightPlanPDF(state) {
  try {
    const W = 595.28, H = 841.89, M = 50;
    let objCount = 0;
    const objects = [];
    function addObj(data) { objCount++; objects.push({ id: objCount, data }); return objCount; }
    function escPDF(str) { return String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
    function sanitize(str) {
      if (!str) return '';
      return String(str).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/\u2013|\u2014/g,'-').replace(/\u2026/g,'...').replace(/[^\x00-\x7F]/g,'');
    }
    function wrapText(text, maxChars) {
      if (!text) return [''];
      const words = sanitize(text).split(/\s+/); const lines = []; let line = '';
      words.forEach(w => { if ((line+' '+w).trim().length > maxChars) { lines.push(line.trim()); line = w; } else { line = (line+' '+w).trim(); } });
      if (line) lines.push(line.trim());
      return lines.length ? lines : [''];
    }

    const navy  = '0.00 0.22 0.39';
    const blue  = '0.00 0.38 0.68';
    const red   = '0.82 0.28 0.38';
    const white = '1 1 1';
    const grey  = '0.45 0.45 0.45';
    const light = '0.93 0.96 0.99';
    const lh = 15;
    let s = ''; let y = H - M;

    // Header bar
    s += `${blue} rg\n${M} ${H-M-48} ${W-2*M} 48 re f\n${white} rg\n`;
    s += `BT /F1 16 Tf ${M+12} ${H-M-30} Td (${escPDF('Story Liberator - Flight Plan Sheet')}) Tj ET\n`;
    s += `BT /F2 8 Tf ${W-M-168} ${H-M-30} Td (${escPDF('Liberator Programme | p.192-194')}) Tj ET\n`;
    // Blue accent strip
    s += `${blue} rg\n${M} ${H-M-58} ${W-2*M} 10 re f\n`;
    y = H - M - 76;

    // Team member + destination block
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('FLIGHT PLAN FOR')}) Tj ET\n`; y -= 7;
    s += `${light} rg\n${M} ${y-36} ${W-2*M} 36 re f\n${navy} rg\n`;
    s += `BT /F1 15 Tf ${M+10} ${y-23} Td (${escPDF(sanitize(state.name) || '(No name given)')}) Tj ET\n`; y -= 50;

    if (state.destination) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('DESTINATION')}) Tj ET\n`; y -= 7;
      const dl = wrapText(state.destination, 80); const dh = Math.max(36, dl.length*lh+18);
      s += `${blue} rg\n${M} ${y-dh} ${W-2*M} ${dh} re f\n${white} rg\n`;
      let dy = y-15; dl.forEach(l => { s += `BT /F2 11 Tf ${M+10} ${dy} Td (${escPDF(l)}) Tj ET\n`; dy-=lh; }); y -= dh+14;
    }

    if (state.timeline) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('TIMELINE')}) Tj ET\n`; y -= 7;
      s += `${light} rg\n${M} ${y-28} ${W-2*M} 28 re f\n0.2 0.2 0.2 rg\n`;
      s += `BT /F2 10 Tf ${M+10} ${y-18} Td (${escPDF(sanitize(state.timeline))}) Tj ET\n`; y -= 42;
    }

    // Beacons
    const filledBeacons = state.beacons.filter(b => b.date || b.notes);
    if (filledBeacons.length) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('BEACONS: FORMAL REVIEW CHECKPOINTS')}) Tj ET\n`; y -= 8;
      const bColW = (W - 2*M - (filledBeacons.length-1)*8) / filledBeacons.length;
      let bx = M;
      filledBeacons.forEach((b, i) => {
        const idx = state.beacons.indexOf(b);
        const bLines = wrapText(b.notes || '', 30);
        const bh = Math.max(56, bLines.length*13+36);
        s += `${blue} rg\n${bx} ${y-bh} ${bColW} ${bh} re f\n`;
        s += `${white} rg\nBT /F1 9 Tf ${bx+8} ${y-14} Td (${escPDF('Beacon ' + (idx+1))}) Tj ET\n`;
        if (b.date) s += `BT /F2 9 Tf ${bx+8} ${y-26} Td (${escPDF(sanitize(b.date))}) Tj ET\n`;
        if (b.notes) { let ny = y-38; bLines.forEach(l => { s += `BT /F2 8 Tf ${bx+8} ${ny} Td (${escPDF(l)}) Tj ET\n`; ny-=13; }); }
        bx += bColW + 8;
      });
      y -= Math.max(56, 8*13+36) + 16;
    }

    // GPS Signal
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('GPS SIGNAL: CONTINUOUS RECOGNITION PLAN')}) Tj ET\n`; y -= 7;
    const gl = wrapText(state.gps || '(Not completed)', 80); const gh = Math.max(44, gl.length*lh+18);
    s += `${light} rg\n${M} ${y-gh} ${W-2*M} ${gh} re f\n`;
    s += `${blue} rg\n${M} ${y-gh} 6 ${gh} re f\n0.2 0.2 0.2 rg\n`;
    let gy = y-14; gl.forEach(l => { s += `BT /F2 10 Tf ${M+14} ${gy} Td (${escPDF(l)}) Tj ET\n`; gy-=lh; }); y -= gh+14;

    // Alarm
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('ALARM TRIGGER: WHAT OFF COURSE LOOKS LIKE')}) Tj ET\n`; y -= 7;
    const al = wrapText(state.alarm || '(Not completed)', 80); const ah = Math.max(44, al.length*lh+18);
    s += `0.98 0.94 0.95 rg\n${M} ${y-ah} ${W-2*M} ${ah} re f\n`;
    s += `${red} rg\n${M} ${y-ah} 6 ${ah} re f\n0.2 0.2 0.2 rg\n`;
    let ay = y-14; al.forEach(l => { s += `BT /F2 10 Tf ${M+14} ${ay} Td (${escPDF(l)}) Tj ET\n`; ay-=lh; }); y -= ah+14;

    // Course correction
    if (state.correction) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('COURSE CORRECTION PLAN')}) Tj ET\n`; y -= 7;
      const cl = wrapText(state.correction, 80); const ch = Math.max(44, cl.length*lh+18);
      s += `${light} rg\n${M} ${y-ch} ${W-2*M} ${ch} re f\n`;
      s += `${blue} rg\n${M} ${y-ch} 6 ${ch} re f\n0.2 0.2 0.2 rg\n`;
      let cy = y-14; cl.forEach(l => { s += `BT /F2 10 Tf ${M+14} ${cy} Td (${escPDF(l)}) Tj ET\n`; cy-=lh; });
    }

    // Footer
    s += `${grey} rg\nBT /F2 8 Tf ${M} ${M-10} Td (${escPDF('Story Contracting - Liberator Programme - Flight Plan Sheet - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId   = addObj('');
    const font1Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const streamBytes = new TextEncoder().encode(s);
    const streamId  = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
    const pageId    = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);
    objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

    let pdf = '%PDF-1.4\n'; const offsets = [];
    objects.forEach(obj => { offsets.push(pdf.length); pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`; });
    const xrefOffset = pdf.length;
    pdf += `xref\n0 ${objCount+1}\n0000000000 65535 f \n`;
    offsets.forEach(off => { pdf += String(off).padStart(10,'0') + ' 00000 n \n'; });
    pdf += `trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

    const blob = new Blob([pdf], { type:'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href = url;
    a.download = 'Flight-Plan-' + new Date().toISOString().slice(0,10) + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error('PDF error', e); }
}

// ── Feedback Planner ──
function buildFeedbackPlanner() {

    .${uid}-lbl{font-size:12px;font-weight:600;color:#445566;margin-bottom:6px;margin-top:14px;letter-spacing:.04em;display:block}

    .${uid}-sc.sel{border-color:rgba(255,255,255,.88);box-shadow:0 8px 28px rgba(0,0,0,.34);transform:translateY(-2px)}
    .${uid}-scbadge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:rgba(255,255,255,.2);color:rgba(255,255,255,.9);border-radius:4px;padding:2px 7px;margin-bottom:8px}
    .${uid}-sclabel{font-weight:700;font-size:13px;color:white;margin-bottom:5px}
    .${uid}-scdesc{font-size:11px;color:rgba(255,255,255,.78);line-height:1.5}

    .${uid}-prevbody{background:white;padding:16px 18px 14px}
    .${uid}-prevrow{margin-bottom:11px}
    .${uid}-prevrlbl{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#99aabb;margin-bottom:3px}
    .${uid}-prevrval{font-size:13.5px;color:#222;line-height:1.6}
    .${uid}-prevtype{display:inline-flex;align-items:center;border-radius:6px;padding:4px 11px;font-size:12px;font-weight:700;color:white}
    .${uid}-prevwords{background:#f0f6fb;border-radius:8px;padding:12px 14px;font-size:14px;color:#1A3A5C;font-style:italic;line-height:1.65;min-height:44px}
    .${uid}-prevwords.empty{color:#aabbc4;font-style:italic}

    @keyframes ${uid}Fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  `;
  wrap.appendChild(styleEl);

  function getStroke() { return state.strokeType ? STROKES.find(s => s.id === state.strokeType) : null; }

  function buildProg() {
    const prog = document.createElement('div');
    prog.className = uid + '-prog';
    for (let i = 1; i <= TOTAL; i++) {
      const seg = document.createElement('div');
      seg.className = uid + '-pseg';
      if (i < step) seg.classList.add('done');
      else if (i === step) seg.classList.add('active');
      prog.appendChild(seg);
      if (i < TOTAL) { const g = document.createElement('div'); g.className = uid + '-pgap'; prog.appendChild(g); }
    }
    return prog;
  }

  function buildPreviewEl() {
    const stroke = getStroke();
    const color = stroke ? stroke.color : '#0061AD';
    const pr = document.createElement('div');
    pr.className = uid + '-preview';
    const hd = document.createElement('div');
    hd.className = uid + '-prevhd';
    hd.style.background = color;
    hd.innerHTML = `<div class="${uid}-prevey">Feedback note for</div><div class="${uid}-prevname">${state.name || 'Your team member'}</div>`;
    const body = document.createElement('div');
    body.className = uid + '-prevbody';
    if (state.context) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Situation</div><div class="${uid}-prevrval">${state.context}</div>`;
      body.appendChild(r);
    }
    if (state.observation) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Observation</div><div class="${uid}-prevrval">${state.observation}</div>`;
      body.appendChild(r);
    }
    if (stroke) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Feedback type</div><div class="${uid}-prevtype" style="background:${color}">${stroke.label}</div>`;
      body.appendChild(r);
    }
    if (step >= 4) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      const wEl = document.createElement('div');
      wEl.className = uid + '-prevwords' + (state.words ? '' : ' empty');
      wEl.id = uid + '-prevwords';
      wEl.textContent = state.words ? '"' + state.words + '"' : 'Write your feedback above and it will appear here...';
      r.innerHTML = `<div class="${uid}-prevrlbl">Your feedback note</div>`;
      r.appendChild(wEl);
      body.appendChild(r);
    }
    if (state.timing && step >= 4) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Delivery</div><div class="${uid}-prevrval">${state.timing}</div>`;
      body.appendChild(r);
    }
    pr.appendChild(hd); pr.appendChild(body);
    return pr;
  }

  function render() {
    [...wrap.children].forEach(c => { if (c !== styleEl) c.remove(); });
    wrap.appendChild(buildProg());
    const cont = document.createElement('div');
    cont.style.animation = uid + 'Fi .3s ease both';
    if (step === 1) s1(cont);
    else if (step === 2) s2(cont);
    else if (step === 3) s3(cont);
    else if (step === 4) s4(cont);
    wrap.appendChild(cont);
    if (step >= 2) wrap.appendChild(buildPreviewEl());
  }

  function mkHd(num, title, sub) {
    const el = document.createElement('div'); el.className = uid + '-hd';
    el.innerHTML = `<div class="${uid}-hnum">Step ${num} of ${TOTAL}</div><div class="${uid}-htitle">${title}</div>${sub ? '<div class="'+uid+'-hsub">'+sub+'</div>' : ''}`;
    return el;
  }

  function mkNav(c, onBack, onNext, nextLbl, nextDis) {
    const n = document.createElement('div'); n.className = uid + '-nav';
    const spacer = document.createElement('span');
    if (onBack) {
      const b = document.createElement('button'); b.className = uid + '-btn ' + uid + '-ghost';
      b.innerHTML = '\u2190 Back'; b.addEventListener('click', onBack); n.appendChild(b);
    } else { n.appendChild(spacer); }
    const nx = document.createElement('button'); nx.className = uid + '-btn ' + uid + '-primary';
    nx.textContent = nextLbl + ' \u2192'; nx.disabled = nextDis;
    nx.addEventListener('click', onNext); n.appendChild(nx); c.appendChild(n);
    return nx;
  }

  function s1(c) {
    c.appendChild(mkHd(1, 'Set the scene', 'Who is this feedback for, and what prompted it?'));
    const ln = document.createElement('label'); ln.className = uid + '-lbl'; ln.textContent = "Team member's name"; c.appendChild(ln);
    const iName = document.createElement('input'); iName.className = uid + '-inp'; iName.type = 'text';
    iName.placeholder = 'e.g. Jamie, Sam...'; iName.value = state.name;
    iName.addEventListener('input', () => { state.name = iName.value; nxt.disabled = !state.name.trim(); });
    c.appendChild(iName);
    const lc = document.createElement('label'); lc.className = uid + '-lbl'; lc.textContent = 'Situation or context'; c.appendChild(lc);
    const iCtx = document.createElement('textarea'); iCtx.className = uid + '-inp ' + uid + '-ta';
    iCtx.placeholder = 'Briefly describe the situation or event that prompted this feedback...'; iCtx.value = state.context;
    iCtx.addEventListener('input', () => { state.context = iCtx.value; }); c.appendChild(iCtx);
    const nxt = mkNav(c, null, () => { playMINext(); step = 2; render(); }, 'Next', !state.name.trim());
  }

  function s2(c) {
    c.appendChild(mkHd(2, 'What did you observe?', 'Describe the specific behaviour or action. Stay at the outer layers of the Onion: what you saw or heard, not your interpretation of who they are.'));
    const hint = document.createElement('div'); hint.className = uid + '-hint';
    hint.textContent = 'Tip: Starting with "I noticed..." or "I observed..." keeps this grounded in what you actually saw or heard.'; c.appendChild(hint);
    const lo = document.createElement('label'); lo.className = uid + '-lbl'; lo.textContent = 'Specific observation'; c.appendChild(lo);
    const iObs = document.createElement('textarea'); iObs.className = uid + '-inp ' + uid + '-ta'; iObs.style.minHeight = '100px';
    iObs.placeholder = 'e.g. I noticed that you stepped in to support a colleague during the handover without being asked, and stayed until the work was complete...'; iObs.value = state.observation;
    iObs.addEventListener('input', () => { state.observation = iObs.value; nxt.disabled = !state.observation.trim(); }); c.appendChild(iObs);
    const nxt = mkNav(c, () => { playMIBack(); step = 1; render(); }, () => { playMINext(); step = 3; render(); }, 'Next: Choose type', !state.observation.trim());
  }

  function s3(c) {
    c.appendChild(mkHd(3, 'Choose the type of feedback', 'Select the stroke type that best fits your intention. Positive Conditional is the most powerful and is usually the right choice.'));
    const grid = document.createElement('div'); grid.className = uid + '-strokes';
    let warnEl;
    STROKES.forEach(stroke => {
      const card = document.createElement('div'); card.className = uid + '-sc'; card.style.background = stroke.color;
      if (state.strokeType === stroke.id) card.classList.add('sel');
      card.innerHTML = `<div class="${uid}-scbadge">${stroke.badge}</div><div class="${uid}-sclabel">${stroke.label}</div><div class="${uid}-scdesc">${stroke.desc}</div>${stroke.starter ? '<div class="'+uid+'-scstart">'+stroke.starter+'</div>' : ''}`;
      card.addEventListener('click', () => {
        state.strokeType = stroke.id; playStrokesExpand();
        grid.querySelectorAll('.' + uid + '-sc').forEach(el => el.classList.remove('sel'));
        card.classList.add('sel');
        if (warnEl) warnEl.classList.toggle('show', stroke.warning === true);
        nxt.disabled = false;
      });
      grid.appendChild(card);
    });
    c.appendChild(grid);
    warnEl = document.createElement('div');
    warnEl.className = uid + '-warn' + (state.strokeType === 'neg-uncond' ? ' show' : '');
    warnEl.innerHTML = '<strong>Consider reframing this.</strong> A Negative Unconditional stroke targets who someone is rather than what they did. This can cause lasting damage to trust and confidence. Ask yourself: could you describe the specific behaviour instead, and use Negative Conditional?';
    c.appendChild(warnEl);
    const nxt = mkNav(c, () => { playMIBack(); step = 2; render(); }, () => { playMINext(); step = 4; render(); }, 'Next: Your words', !state.strokeType);
  }

  function s4(c) {
    const stroke = getStroke();
    c.appendChild(mkHd(4, 'Your feedback note', "Use the sentence starter as a guide, not a script. Write naturally and in a way that sounds like you."));
    if (stroke && stroke.starter) {
      const st = document.createElement('div'); st.className = uid + '-starter';
      st.innerHTML = `<em>Sentence starter: ${stroke.label}</em>${stroke.starter}`; c.appendChild(st);
    }
    const lw = document.createElement('label'); lw.className = uid + '-lbl'; lw.textContent = 'Write your feedback'; c.appendChild(lw);
    const iWords = document.createElement('textarea'); iWords.className = uid + '-inp ' + uid + '-ta'; iWords.style.minHeight = '110px';
    iWords.placeholder = stroke && stroke.starter ? stroke.starter : 'Write your feedback here...'; iWords.value = state.words;
    iWords.addEventListener('input', () => {
      state.words = iWords.value;
      const pw = wrap.querySelector('#' + uid + '-prevwords');
      if (pw) { pw.classList.toggle('empty', !state.words); pw.textContent = state.words ? '"' + state.words + '"' : 'Write your feedback above and it will appear here...'; }
    });
    c.appendChild(iWords);
    const lt = document.createElement('label'); lt.className = uid + '-lbl'; lt.textContent = 'When will you deliver this? (optional)'; c.appendChild(lt);
    const iTiming = document.createElement('input'); iTiming.className = uid + '-inp'; iTiming.type = 'text';
    iTiming.placeholder = 'e.g. Before end of day, In our 1:1 on Thursday...'; iTiming.value = state.timing;
    iTiming.addEventListener('input', () => { state.timing = iTiming.value; }); c.appendChild(iTiming);

    const navRow = document.createElement('div'); navRow.className = uid + '-nav';
    const leftBtns = document.createElement('div'); leftBtns.className = uid + '-navl';
    const backBtn = document.createElement('button'); backBtn.className = uid + '-btn ' + uid + '-ghost';
    backBtn.innerHTML = '\u2190 Back'; backBtn.addEventListener('click', () => { playMIBack(); step = 3; render(); });
    const restartBtn = document.createElement('button'); restartBtn.className = uid + '-btn ' + uid + '-ghost';
    restartBtn.innerHTML = '\u21BA Start again'; restartBtn.addEventListener('click', () => { playMIBack(); state.name=''; state.context=''; state.observation=''; state.strokeType=null; state.words=''; state.timing=''; step=1; render(); });
    leftBtns.appendChild(backBtn); leftBtns.appendChild(restartBtn);
    const dlBtn = document.createElement('button'); dlBtn.className = uid + '-btn ' + uid + '-dl';
    dlBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download Feedback Plan';
    dlBtn.addEventListener('click', () => { playMIDownload(); downloadFeedbackPlannerPDF(state, stroke); });
    navRow.appendChild(leftBtns); navRow.appendChild(dlBtn); c.appendChild(navRow);
  }

  render();
  return wrap;
}

function downloadFeedbackPlannerPDF(state, stroke) {
  try {
    const W = 595.28, H = 841.89, M = 50;
    let objCount = 0;
    const objects = [];
    function addObj(data) { objCount++; objects.push({ id: objCount, data }); return objCount; }

    function escPDF(str) { return String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
    function sanitize(str) {
      if (!str) return '';
      return String(str).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/\u2013|\u2014/g,'-').replace(/\u2026/g,'...').replace(/[^\x00-\x7F]/g,'');
    }
    function wrapText(text, maxChars) {
      if (!text) return [''];
      const words = sanitize(text).split(/\s+/); const lines = []; let line = '';
      words.forEach(w => { if ((line+' '+w).trim().length > maxChars) { lines.push(line.trim()); line = w; } else { line = (line+' '+w).trim(); } });
      if (line) lines.push(line.trim());
      return lines.length ? lines : [''];
    }
    function hexRGB(hex) {
      if (!hex || hex[0]!=='#') return '0.10 0.23 0.36';
      return (parseInt(hex.slice(1,3),16)/255).toFixed(2)+' '+(parseInt(hex.slice(3,5),16)/255).toFixed(2)+' '+(parseInt(hex.slice(5,7),16)/255).toFixed(2);
    }

    const sColor = stroke ? hexRGB(stroke.color) : '0.10 0.23 0.36';
    const sLabel = stroke ? sanitize(stroke.label) : 'Not selected';
    const blue = '0.00 0.38 0.68'; const dark = '0.10 0.23 0.36';
    const white = '1 1 1'; const grey = '0.45 0.45 0.45'; const light = '0.93 0.96 0.99';
    const lh = 15;
    let s = ''; let y = H - M;

    // Header bar
    s += `${blue} rg\n${M} ${H-M-44} ${W-2*M} 44 re f\n${white} rg\n`;
    s += `BT /F1 15 Tf ${M+12} ${H-M-28} Td (${escPDF('Story Liberator - Feedback Planner')}) Tj ET\n`;
    s += `BT /F2 8 Tf ${W-M-158} ${H-M-28} Td (${escPDF('Liberator Programme | p.175-205')}) Tj ET\n`;
    // Stroke type colour band
    s += `${sColor} rg\n${M} ${H-M-56} ${W-2*M} 12 re f\n`;
    y = H - M - 74;

    // Who
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('FEEDBACK FOR')}) Tj ET\n`; y -= 7;
    s += `${light} rg\n${M} ${y-34} ${W-2*M} 34 re f\n${dark} rg\n`;
    s += `BT /F1 14 Tf ${M+10} ${y-21} Td (${escPDF(sanitize(state.name) || '(No name given)')}) Tj ET\n`; y -= 48;

    // Context
    if (state.context) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('SITUATION / CONTEXT')}) Tj ET\n`; y -= 7;
      const cl = wrapText(state.context, 80); const ch = Math.max(36, cl.length*lh+18);
      s += `${light} rg\n${M} ${y-ch} ${W-2*M} ${ch} re f\n0.2 0.2 0.2 rg\n`;
      let cy = y-14; cl.forEach(l => { s += `BT /F2 10 Tf ${M+10} ${cy} Td (${escPDF(l)}) Tj ET\n`; cy-=lh; }); y -= ch+16;
    }

    // Observation
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('WHAT I OBSERVED')}) Tj ET\n`; y -= 7;
    const ol = wrapText(state.observation || '(No observation recorded)', 80); const oh = Math.max(52, ol.length*lh+18);
    s += `${light} rg\n${M} ${y-oh} ${W-2*M} ${oh} re f\n0.2 0.2 0.2 rg\n`;
    let oy2 = y-14; ol.forEach(l => { s += `BT /F2 10 Tf ${M+10} ${oy2} Td (${escPDF(l)}) Tj ET\n`; oy2-=lh; }); y -= oh+16;

    // Feedback type
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('FEEDBACK TYPE')}) Tj ET\n`; y -= 7;
    s += `${sColor} rg\n${M} ${y-30} 230 30 re f\n${white} rg\n`;
    s += `BT /F1 11 Tf ${M+10} ${y-19} Td (${escPDF(sLabel)}) Tj ET\n`;
    if (stroke && stroke.starter) {
      s += `${grey} rg\n`; const sl = wrapText('Sentence starter: ' + stroke.starter, 82);
      let sy = y-38; sl.forEach(l => { s += `BT /F2 9 Tf ${M} ${sy} Td (${escPDF(l)}) Tj ET\n`; sy-=13; }); y -= 30+sl.length*13+36;
    } else { y -= 46; }

    // Feedback note
    s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('YOUR FEEDBACK NOTE')}) Tj ET\n`; y -= 7;
    const wl = wrapText(state.words || '(No feedback note written)', 78); const wh = Math.max(70, wl.length*lh+24);
    s += `${sColor} rg\n${M} ${y-wh} ${W-2*M} ${wh} re f\n${white} rg\n`;
    let wy = y-16; wl.forEach(l => { s += `BT /F2 11 Tf ${M+12} ${wy} Td (${escPDF(l)}) Tj ET\n`; wy-=lh+1; }); y -= wh+16;

    // Delivery note
    if (state.timing) {
      s += `${grey} rg\nBT /F1 10 Tf ${M} ${y} Td (${escPDF('DELIVERY NOTE')}) Tj ET\n`; y -= 7;
      s += `${light} rg\n${M} ${y-30} ${W-2*M} 30 re f\n0.2 0.2 0.2 rg\n`;
      s += `BT /F2 10 Tf ${M+10} ${y-19} Td (${escPDF(sanitize(state.timing))}) Tj ET\n`;
    }

    // Footer
    s += `${grey} rg\nBT /F2 8 Tf ${M} ${M-10} Td (${escPDF('Story Contracting - Liberator Programme - Feedback Planner - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId = addObj('');
    const font1Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const streamBytes = new TextEncoder().encode(s);
    const streamId = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
    const pageId = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);
    objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

    let pdf = '%PDF-1.4\n'; const offsets = [];
    objects.forEach(obj => { offsets.push(pdf.length); pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`; });
    const xrefOffset = pdf.length;
    pdf += `xref\n0 ${objCount+1}\n0000000000 65535 f \n`;
    offsets.forEach(off => { pdf += String(off).padStart(10,'0') + ' 00000 n \n'; });
    pdf += `trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

    const blob = new Blob([pdf], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'Feedback-Plan-' + new Date().toISOString().slice(0,10) + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error('PDF error', e); }
}

// ============================================================
//  ASSERTION REHEARSAL (M3: Be appropriately assertive)
// ============================================================
function buildAssertionRehearsal() {
  const uid = 'ar' + Math.random().toString(36).slice(2, 7);
  let step = 1;
  const TOTAL = 6;
  const state = {
    name: '', situation: '',
    coreMessage: '',
    feeling: '',
    want: '',
    diversions: [{ them: '', you: '' }, { them: '', you: '' }],
    mindset: { iup: false, tone: false, hold: false }
  };

  // Triggers for live coaching
  const QUALIFIERS = ['perhaps', 'maybe', 'a little', 'kind of', 'sort of', 'just', 'a bit', 'might', 'possibly', 'if you wouldn\'t mind', 'if you don\'t mind', 'when you get a chance', 'when you have time', 'i guess', 'i suppose'];
  const HEDGES = ['^we ', '^they ', '^the company ', '^the team ', '^people ', '^one ', '^my boss ', '^the organisation ', '^the rules '];

  const wrap = document.createElement('div');
  wrap.style.cssText = 'font-family:"Barlow",sans-serif;width:100%';

  const styleEl = document.createElement('style');
  styleEl.textContent = `
    .${uid}-prog{display:flex;align-items:center;gap:0;margin-bottom:22px}
    .${uid}-pseg{flex:1;height:4px;border-radius:2px;background:#e4edf5;transition:background .35s}
    .${uid}-pseg.done{background:#1A3A5C}
    .${uid}-pseg.active{background:#1A3A5C}
    .${uid}-pgap{width:6px;flex:0 0 6px}

    .${uid}-hd{margin-bottom:18px}
    .${uid}-hnum{font-size:11px;font-weight:700;color:#8fa0b0;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px}
    .${uid}-htitle{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:#1A3A5C;line-height:1.2}
    .${uid}-hsub{font-size:13px;color:#667788;margin-top:6px;line-height:1.6}

    .${uid}-lbl{font-size:12px;font-weight:600;color:#445566;margin-bottom:6px;margin-top:14px;letter-spacing:.04em;display:block}
    .${uid}-inp{width:100%;border:2px solid #d4e3f0;border-radius:10px;padding:10px 14px;font-family:"Barlow",sans-serif;font-size:14px;color:#222;resize:vertical;transition:border-color .2s;outline:none;background:white;box-sizing:border-box}
    .${uid}-inp:focus{border-color:#1A3A5C}
    .${uid}-ta{min-height:88px;line-height:1.6}
    .${uid}-hint{font-size:11.5px;color:#99aabb;margin-top:4px;margin-bottom:8px;line-height:1.5;font-style:italic}

    .${uid}-coachrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:0}
    .${uid}-chip{display:inline-flex;align-items:center;gap:5px;background:#fff5e6;border:1px solid #f5cf94;color:#8a4a00;border-radius:14px;padding:5px 10px;font-size:11.5px;line-height:1.3;animation:${uid}-fi .3s ease both}
    .${uid}-chip svg{flex:0 0 auto}
    .${uid}-chip.green{background:#eaf6ee;border-color:#a9d8b6;color:#1f6a3a}

    .${uid}-starter{background:#EAF0F8;border-radius:9px;padding:11px 14px;font-size:12.5px;color:#1A3A5C;font-style:italic;line-height:1.55;margin-bottom:12px;border-left:3px solid #1A3A5C}
    .${uid}-starter em{font-style:normal;display:block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#8fa0b0;margin-bottom:5px;font-weight:700}

    .${uid}-divrow{background:#f7faff;border:1.5px solid #dce6f0;border-radius:12px;padding:12px 14px;margin-bottom:10px;animation:${uid}-fi .35s ease both}
    .${uid}-divlbl{font-family:"Barlow Condensed",sans-serif;font-size:11.5px;font-weight:700;color:#1A3A5C;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
    .${uid}-divlbl.you{color:#0061AD;margin-top:10px}

    .${uid}-addbtn{background:transparent;border:1.5px dashed #1A3A5C;color:#1A3A5C;border-radius:10px;padding:9px 14px;font-family:"Barlow",sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-top:4px;transition:all .15s ease}
    .${uid}-addbtn:hover{background:#1A3A5C;color:white}
    .${uid}-addbtn:disabled{opacity:.4;cursor:not-allowed}
    .${uid}-removebtn{background:transparent;border:none;color:#99aabb;cursor:pointer;font-size:11px;font-weight:600;text-decoration:underline;margin-top:6px;padding:2px 0;font-family:inherit}
    .${uid}-removebtn:hover{color:#c0392b}

    .${uid}-checkrow{display:flex;align-items:flex-start;gap:12px;background:#f7faff;border:1.5px solid #dce6f0;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .18s ease}
    .${uid}-checkrow:hover{border-color:#b8c8db}
    .${uid}-checkrow.checked{background:#eaf0f8;border-color:#1A3A5C}
    .${uid}-checkbox{flex:0 0 auto;width:22px;height:22px;border-radius:6px;border:2px solid #b8c8db;background:white;display:flex;align-items:center;justify-content:center;transition:all .18s ease;margin-top:1px}
    .${uid}-checkrow.checked .${uid}-checkbox{background:#1A3A5C;border-color:#1A3A5C}
    .${uid}-checkbox svg{opacity:0;transition:opacity .15s ease}
    .${uid}-checkrow.checked .${uid}-checkbox svg{opacity:1}
    .${uid}-checktitle{font-weight:700;font-size:14px;color:#1A3A5C;margin-bottom:3px}
    .${uid}-checkdesc{font-size:12.5px;color:#667788;line-height:1.55}

    .${uid}-nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px;flex-wrap:wrap}
    .${uid}-navl{display:flex;gap:8px;flex-wrap:wrap}
    .${uid}-btn{border:none;border-radius:20px;padding:10px 22px;font-family:"Barlow",sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s ease}
    .${uid}-ghost{background:#f0f5fa;color:#556677}
    .${uid}-ghost:hover{background:#e0ecf5}
    .${uid}-primary{background:#1A3A5C;color:white;box-shadow:0 4px 16px rgba(26,58,92,.28)}
    .${uid}-primary:hover{background:#0f2640;transform:translateY(-1px)}
    .${uid}-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .${uid}-dl{background:#1A3A5C;color:white;box-shadow:0 6px 20px rgba(26,58,92,.32);display:flex;align-items:center;gap:7px}
    .${uid}-dl:hover{background:#0f2640;transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,58,92,.42)}

    .${uid}-preview{margin-top:22px;border-radius:14px;overflow:hidden;animation:${uid}-fi .35s ease both}
    .${uid}-prevhd{padding:14px 18px;background:#1A3A5C}
    .${uid}-prevey{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:4px}
    .${uid}-prevname{font-family:"Barlow Condensed",sans-serif;font-size:21px;font-weight:800;color:white;line-height:1.1}
    .${uid}-prevbody{background:white;padding:16px 18px 14px}
    .${uid}-prevrow{margin-bottom:11px}
    .${uid}-prevrlbl{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#99aabb;margin-bottom:3px}
    .${uid}-prevrval{font-size:13.5px;color:#222;line-height:1.6}
    .${uid}-prevquote{background:#eaf0f8;border-left:3px solid #1A3A5C;border-radius:0 8px 8px 0;padding:10px 14px;font-style:italic;color:#1A3A5C;line-height:1.55;font-size:13.5px}

    @keyframes ${uid}-fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  `;
  wrap.appendChild(styleEl);

  function buildProg() {
    const prog = document.createElement('div');
    prog.className = uid + '-prog';
    for (let i = 1; i <= TOTAL; i++) {
      const seg = document.createElement('div');
      seg.className = uid + '-pseg';
      if (i < step) seg.classList.add('done');
      else if (i === step) seg.classList.add('active');
      prog.appendChild(seg);
      if (i < TOTAL) { const g = document.createElement('div'); g.className = uid + '-pgap'; prog.appendChild(g); }
    }
    return prog;
  }

  function buildPreviewEl() {
    const pr = document.createElement('div');
    pr.className = uid + '-preview';
    const hd = document.createElement('div');
    hd.className = uid + '-prevhd';
    hd.innerHTML = `<div class="${uid}-prevey">Rehearsal for a conversation with</div><div class="${uid}-prevname">${state.name || 'Your team member'}</div>`;
    const body = document.createElement('div');
    body.className = uid + '-prevbody';

    if (state.situation) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Situation</div><div class="${uid}-prevrval">${state.situation}</div>`;
      body.appendChild(r);
    }
    if (state.coreMessage && step >= 2) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">Core message</div><div class="${uid}-prevquote">"${state.coreMessage}"</div>`;
      body.appendChild(r);
    }
    if (state.feeling && step >= 3) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">How I feel</div><div class="${uid}-prevquote">"${state.feeling}"</div>`;
      body.appendChild(r);
    }
    if (state.want && step >= 4) {
      const r = document.createElement('div'); r.className = uid + '-prevrow';
      r.innerHTML = `<div class="${uid}-prevrlbl">What I want</div><div class="${uid}-prevquote">"${state.want}"</div>`;
      body.appendChild(r);
    }
    if (step >= 5) {
      const filled = state.diversions.filter(d => d.them.trim() || d.you.trim());
      if (filled.length) {
        const r = document.createElement('div'); r.className = uid + '-prevrow';
        let inner = `<div class="${uid}-prevrlbl">Broken record responses</div>`;
        filled.forEach((d, i) => {
          inner += `<div style="margin-bottom:8px;font-size:13px;line-height:1.55"><div style="color:#667788"><strong>If they say:</strong> ${d.them || '(not specified)'}</div><div style="color:#1A3A5C;margin-top:2px"><strong>I will say:</strong> ${d.you || '(not specified)'}</div></div>`;
        });
        r.innerHTML = inner;
        body.appendChild(r);
      }
    }
    pr.appendChild(hd); pr.appendChild(body);
    return pr;
  }

  function render() {
    [...wrap.children].forEach(c => { if (c !== styleEl) c.remove(); });
    wrap.appendChild(buildProg());
    const cont = document.createElement('div');
    cont.style.animation = uid + '-fi .3s ease both';
    if (step === 1) s1(cont);
    else if (step === 2) s2(cont);
    else if (step === 3) s3(cont);
    else if (step === 4) s4(cont);
    else if (step === 5) s5(cont);
    else if (step === 6) s6(cont);
    wrap.appendChild(cont);
    if (step >= 2) wrap.appendChild(buildPreviewEl());
  }

  function mkHd(num, title, sub) {
    const el = document.createElement('div'); el.className = uid + '-hd';
    el.innerHTML = `<div class="${uid}-hnum">Step ${num} of ${TOTAL}</div><div class="${uid}-htitle">${title}</div>${sub ? '<div class="'+uid+'-hsub">'+sub+'</div>' : ''}`;
    return el;
  }

  function mkNav(c, onBack, onNext, nextLbl, nextDis) {
    const n = document.createElement('div'); n.className = uid + '-nav';
    const spacer = document.createElement('span');
    if (onBack) {
      const b = document.createElement('button'); b.className = uid + '-btn ' + uid + '-ghost';
      b.innerHTML = '\u2190 Back'; b.addEventListener('click', onBack); n.appendChild(b);
    } else { n.appendChild(spacer); }
    const nx = document.createElement('button'); nx.className = uid + '-btn ' + uid + '-primary';
    nx.textContent = nextLbl + ' \u2192'; nx.disabled = nextDis;
    nx.addEventListener('click', onNext); n.appendChild(nx); c.appendChild(n);
    return nx;
  }

  // ── Live coaching: scan text and emit chips ──
  function coachCoreMessage(text, container) {
    container.innerHTML = '';
    if (!text || !text.trim()) return;
    const lower = text.toLowerCase().trim();
    const found = [];
    QUALIFIERS.forEach(q => {
      const re = new RegExp('\\b' + q.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\$&') + '\\b', 'i');
      if (re.test(lower)) found.push({ type:'qualifier', word:q });
    });
    HEDGES.forEach(h => {
      const re = new RegExp(h, 'i');
      if (re.test(lower)) {
        const w = h.replace(/^\^/,'').trim();
        found.push({ type:'hedge', word:w });
      }
    });
    if (!/\bi\b/i.test(text) && text.trim().length > 6) {
      found.push({ type:'no-i' });
    }
    found.forEach(f => {
      const chip = document.createElement('span');
      chip.className = uid + '-chip';
      const icon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
      let msg = '';
      if (f.type === 'qualifier') msg = `"${f.word}" may dilute the message`;
      else if (f.type === 'hedge') msg = `Try owning this with "I" rather than "${f.word}"`;
      else if (f.type === 'no-i') msg = 'Consider starting with "I" to own the message';
      chip.innerHTML = icon + ' ' + msg;
      container.appendChild(chip);
    });
    if (!found.length && text.trim().length > 10) {
      const chip = document.createElement('span');
      chip.className = uid + '-chip green';
      chip.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Clear and direct: no qualifiers detected';
      container.appendChild(chip);
    }
  }

  function s1(c) {
    c.appendChild(mkHd(1, 'The conversation', 'Who is this with, and what is it about?'));
    const ln = document.createElement('label'); ln.className = uid + '-lbl'; ln.textContent = 'Who is the conversation with?'; c.appendChild(ln);
    const iName = document.createElement('input'); iName.className = uid + '-inp'; iName.type = 'text';
    iName.placeholder = 'e.g. Jamie, Sam, the team...'; iName.value = state.name;
    iName.addEventListener('input', () => { state.name = iName.value; nxt.disabled = !state.name.trim() || !state.situation.trim(); });
    c.appendChild(iName);

    const lc = document.createElement('label'); lc.className = uid + '-lbl'; lc.textContent = 'What is the situation?'; c.appendChild(lc);
    const iCtx = document.createElement('textarea'); iCtx.className = uid + '-inp ' + uid + '-ta';
    iCtx.placeholder = 'Briefly describe what has been happening, and what needs to change or be addressed...'; iCtx.value = state.situation;
    iCtx.addEventListener('input', () => { state.situation = iCtx.value; nxt.disabled = !state.name.trim() || !state.situation.trim(); }); c.appendChild(iCtx);
    const nxt = mkNav(c, null, () => { playMINext(); step = 2; render(); }, 'Next: Your core message', !state.name.trim() || !state.situation.trim());
  }

  function s2(c) {
    c.appendChild(mkHd(2, 'Your core message', 'The single most important sentence. Direct, owned, and free of waffle. This is what you keep coming back to if the conversation gets diverted.'));
    const st = document.createElement('div'); st.className = uid + '-starter';
    st.innerHTML = `<em>Sentence starters</em>"I want you to..." &nbsp;\u2022&nbsp; "I need you to..." &nbsp;\u2022&nbsp; "I am asking you to..."`; c.appendChild(st);

    const hint = document.createElement('div'); hint.className = uid + '-hint';
    hint.textContent = 'Tip: Use the "I" statement, keep it short, avoid qualifiers like "perhaps", "maybe", or "if you wouldn\'t mind". Don\'t hide behind "we", "they", or "the company".';
    c.appendChild(hint);

    const lo = document.createElement('label'); lo.className = uid + '-lbl'; lo.textContent = 'Your core message'; c.appendChild(lo);
    const iMsg = document.createElement('textarea'); iMsg.className = uid + '-inp ' + uid + '-ta'; iMsg.style.minHeight = '90px';
    iMsg.placeholder = 'e.g. I want you to write down the actions we agree at our weekly meetings.'; iMsg.value = state.coreMessage;

    const coachRow = document.createElement('div'); coachRow.className = uid + '-coachrow';

    iMsg.addEventListener('input', () => {
      state.coreMessage = iMsg.value;
      nxt.disabled = !state.coreMessage.trim();
      coachCoreMessage(state.coreMessage, coachRow);
      // refresh preview live
      const oldPrev = wrap.querySelector('.' + uid + '-preview');
      if (oldPrev) { const newPrev = buildPreviewEl(); newPrev.style.animation = 'none'; oldPrev.replaceWith(newPrev); }
    });
    c.appendChild(iMsg);
    c.appendChild(coachRow);
    if (state.coreMessage) coachCoreMessage(state.coreMessage, coachRow);

    const nxt = mkNav(c, () => { playMIBack(); step = 1; render(); }, () => { playMINext(); step = 3; render(); }, 'Next: How you feel', !state.coreMessage.trim());
  }

  function s3(c) {
    c.appendChild(mkHd(3, 'How you feel about it', 'Naming a feeling adds genuine weight to the message. The greatest reward you have to give is yourself, so do not hide behind a flat, impersonal tone.'));
    const st = document.createElement('div'); st.className = uid + '-starter';
    st.innerHTML = `<em>Sentence starters</em>"I feel concerned that..." &nbsp;\u2022&nbsp; "I feel pleased when..." &nbsp;\u2022&nbsp; "I feel disappointed because..."`; c.appendChild(st);

    const lf = document.createElement('label'); lf.className = uid + '-lbl'; lf.textContent = 'Your feeling, in your own words'; c.appendChild(lf);
    const iFeel = document.createElement('textarea'); iFeel.className = uid + '-inp ' + uid + '-ta'; iFeel.style.minHeight = '76px';
    iFeel.placeholder = 'e.g. I feel concerned that without written actions, things will keep slipping.'; iFeel.value = state.feeling;
    iFeel.addEventListener('input', () => {
      state.feeling = iFeel.value;
      nxt.disabled = !state.feeling.trim();
      const oldPrev = wrap.querySelector('.' + uid + '-preview');
      if (oldPrev) { const newPrev = buildPreviewEl(); newPrev.style.animation = 'none'; oldPrev.replaceWith(newPrev); }
    });
    c.appendChild(iFeel);
    const nxt = mkNav(c, () => { playMIBack(); step = 2; render(); }, () => { playMINext(); step = 4; render(); }, 'Next: What you want', !state.feeling.trim());
  }

  function s4(c) {
    c.appendChild(mkHd(4, 'What you specifically want', 'The clear, observable action. Specific, time-bound where possible, and described in behaviour rather than attitude.'));
    const hint = document.createElement('div'); hint.className = uid + '-hint';
    hint.textContent = 'Tip: Aim for something a stranger watching could tell whether or not had been done. "Be more proactive" is too vague. "Send me a written list of agreed actions within an hour of each weekly meeting" is clear.';
    c.appendChild(hint);
    const lw = document.createElement('label'); lw.className = uid + '-lbl'; lw.textContent = 'What you want them to do'; c.appendChild(lw);
    const iWant = document.createElement('textarea'); iWant.className = uid + '-inp ' + uid + '-ta'; iWant.style.minHeight = '90px';
    iWant.placeholder = 'e.g. From now on, send me a written list of the agreed actions within an hour of each weekly meeting.'; iWant.value = state.want;
    iWant.addEventListener('input', () => {
      state.want = iWant.value;
      nxt.disabled = !state.want.trim();
      const oldPrev = wrap.querySelector('.' + uid + '-preview');
      if (oldPrev) { const newPrev = buildPreviewEl(); newPrev.style.animation = 'none'; oldPrev.replaceWith(newPrev); }
    });
    c.appendChild(iWant);
    const nxt = mkNav(c, () => { playMIBack(); step = 3; render(); }, () => { playMINext(); step = 5; render(); }, 'Next: Anticipate diversions', !state.want.trim());
  }

  function s5(c) {
    c.appendChild(mkHd(5, 'Broken record: anticipating diversions', 'The Broken Record technique is sticking to your point and not allowing the conversation to be sidetracked. Think about what they are likely to say to deflect, and prepare your assertive comeback. You do not have to argue: just calmly repeat what you want.'));

    const list = document.createElement('div');
    function renderList() {
      list.innerHTML = '';
      state.diversions.forEach((d, i) => {
        const row = document.createElement('div');
        row.className = uid + '-divrow';

function downloadAssertionRehearsalPDF(state) {
  try {
    const W = 595.28, H = 841.89, M = 50;
    let objCount = 0;
    const objects = [];
    function addObj(data) { objCount++; objects.push({ id: objCount, data }); return objCount; }

    function escPDF(str) { return String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
    function sanitize(str) {
      if (!str) return '';
      return String(str).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/\u2013|\u2014/g,'-').replace(/\u2026/g,'...').replace(/[^\x00-\x7F]/g,'');
    }
    function wrapText(text, maxChars) {
      if (!text) return [''];
      const words = sanitize(text).split(/\s+/); const lines = []; let line = '';
      words.forEach(w => { if ((line+' '+w).trim().length > maxChars) { lines.push(line.trim()); line = w; } else { line = (line+' '+w).trim(); } });
      if (line) lines.push(line.trim());
      return lines.length ? lines : [''];
    }

    const navy = '0.10 0.23 0.36';
    const navyDark = '0.06 0.15 0.25';
    const white = '1 1 1';
    const grey = '0.45 0.45 0.45';
    const lightGrey = '0.93 0.96 0.99';
    const accentBg = '0.92 0.94 0.97';
    const lh = 14;

    let pages = [];
    let s = '';
    let y = H - M;

    function newPage() {
      if (s.length) pages.push(s);
      s = '';
      y = H - M;
    }

    function ensureSpace(needed) {
      if (y - needed < M + 30) {
        newPage();
        // Page header on continuation pages
        s += `${navy} rg\n${M} ${H-M-26} ${W-2*M} 26 re f\n${white} rg\n`;
        s += `BT /F1 11 Tf ${M+10} ${H-M-17} Td (${escPDF('Story Liberator - Assertion Rehearsal (continued)')}) Tj ET\n`;
        y = H - M - 44;
      }
    }

    function drawSectionLabel(label) {
      ensureSpace(20);
      s += `${grey} rg\nBT /F1 9 Tf ${M} ${y} Td (${escPDF(label.toUpperCase())}) Tj ET\n`;
      y -= 6;
    }

    function drawTextBlock(text, opts) {
      const o = opts || {};
      const bg = o.bg || lightGrey;
      const fg = o.fg || '0.13 0.18 0.24';
      const fontSize = o.fontSize || 10;
      const maxChars = o.maxChars || 78;
      const padX = o.padX || 12;
      const padY = o.padY || 12;
      const minHeight = o.minHeight || 30;
      const italic = o.italic ? 'F3' : 'F2';
      const lines = wrapText(text || '(not specified)', maxChars);
      const blockH = Math.max(minHeight, lines.length * lh + padY*2 - 4);
      ensureSpace(blockH + 8);
      s += `${bg} rg\n${M} ${y - blockH} ${W-2*M} ${blockH} re f\n${fg} rg\n`;
      let ty = y - padY - 8;
      lines.forEach(l => {
        s += `BT /${italic} ${fontSize} Tf ${M + padX} ${ty} Td (${escPDF(l)}) Tj ET\n`;
        ty -= lh;
      });
      y -= blockH + 14;
    }

    function drawQuoteBlock(text, label) {
      const lines = wrapText(text || '(not specified)', 76);
      const blockH = Math.max(38, lines.length * (lh+1) + 22);
      ensureSpace(blockH + 14);
      // Side bar in navy
      s += `${navy} rg\n${M} ${y - blockH} 4 ${blockH} re f\n`;
      // Light bg
      s += `${accentBg} rg\n${M+4} ${y - blockH} ${W-2*M-4} ${blockH} re f\n`;
      // Text
      s += `${navyDark} rg\n`;
      let ty = y - 16;
      if (label) {
        s += `${grey} rg\nBT /F1 8 Tf ${M+14} ${ty} Td (${escPDF(label.toUpperCase())}) Tj ET\n`;
        ty -= 12;
      }
      s += `${navyDark} rg\n`;
      lines.forEach(l => {
        s += `BT /F3 11 Tf ${M+14} ${ty} Td (${escPDF('"' + l + '"')}) Tj ET\n`;
        ty -= lh+1;
      });
      y -= blockH + 14;
    }

    // ── PAGE 1: Header ──
    s += `${navy} rg\n${M} ${H-M-46} ${W-2*M} 46 re f\n${white} rg\n`;
    s += `BT /F1 16 Tf ${M+12} ${H-M-29} Td (${escPDF('Story Liberator - Assertion Rehearsal')}) Tj ET\n`;
    s += `BT /F2 8 Tf ${W-M-160} ${H-M-29} Td (${escPDF('Liberator Programme | p.167-174')}) Tj ET\n`;
    // Subtitle band
    s += `0.92 0.94 0.97 rg\n${M} ${H-M-72} ${W-2*M} 26 re f\n${navyDark} rg\n`;
    s += `BT /F3 10 Tf ${M+12} ${H-M-58} Td (${escPDF('A rehearsal script for an upcoming conversation. Read it through before you speak.')}) Tj ET\n`;
    y = H - M - 92;

    // Conversation with
    drawSectionLabel('Conversation with');
    drawTextBlock(state.name, { bg: lightGrey, minHeight: 28, fontSize: 12 });

    // Situation
    drawSectionLabel('The situation');
    drawTextBlock(state.situation, { bg: lightGrey, minHeight: 50 });

    // Core message - highlighted
    drawSectionLabel('My core message (the line I keep coming back to)');
    drawQuoteBlock(state.coreMessage);

    // Feeling
    drawSectionLabel('How I feel about it');
    drawQuoteBlock(state.feeling);

    // What I want
    drawSectionLabel('What I specifically want');
    drawQuoteBlock(state.want);

    // Diversions
    const filled = (state.diversions || []).filter(d => (d.them && d.them.trim()) || (d.you && d.you.trim()));
    if (filled.length) {
      drawSectionLabel('Broken record: my prepared responses');
      filled.forEach((d, i) => {
        ensureSpace(80);
        // Light bordered card
        const themLines = wrapText('If they say: ' + (d.them || '(not specified)'), 78);
        const youLines = wrapText('I will say: ' + (d.you || '(not specified)'), 78);
        const blockH = Math.max(70, themLines.length*lh + youLines.length*lh + 36);
        s += `${lightGrey} rg\n${M} ${y - blockH} ${W-2*M} ${blockH} re f\n`;
        s += `${navy} rg\n${M} ${y - blockH} 3 ${blockH} re f\n`;
        let ty = y - 16;
        s += `${grey} rg\nBT /F1 8 Tf ${M+14} ${ty} Td (${escPDF('DIVERSION ' + (i+1))}) Tj ET\n`;
        ty -= 12;
        s += `0.20 0.20 0.20 rg\n`;
        themLines.forEach(l => { s += `BT /F2 10 Tf ${M+14} ${ty} Td (${escPDF(l)}) Tj ET\n`; ty -= lh; });
        ty -= 4;
        s += `${navyDark} rg\n`;
        youLines.forEach(l => { s += `BT /F1 10 Tf ${M+14} ${ty} Td (${escPDF(l)}) Tj ET\n`; ty -= lh; });
        y -= blockH + 10;
      });
    }

    // Mindset commitments
    drawSectionLabel('Mindset commitments before I speak');
    const commits = [
      { ok: state.mindset && state.mindset.iup, label: 'I will hold both of us as fundamentally OK. I treat them as a person of worth, even if their behaviour on this occasion is not.' },
      { ok: state.mindset && state.mindset.tone, label: 'I will use a clean, even tone. No sarcasm, no stings, no dressing it up.' },
      { ok: state.mindset && state.mindset.hold, label: 'I will hold my ground without trampling theirs. I will not be deflected.' }
    ];
    commits.forEach(c => {
      ensureSpace(24);
      // Tick box
      s += `${white} rg\n${M+1} ${y-16} 14 14 re f\n`;
      s += `0.6 0.6 0.6 RG\n0.8 w\n${M+1} ${y-16} 14 14 re S\n`;
      if (c.ok) {
        s += `${navy} rg\n${M+3} ${y-14} 10 10 re f\n${white} rg\n`;
        // Simple tick (drawn as two lines)
        s += `1 w\n${M+5} ${y-9} m ${M+7} ${y-12} l ${M+13} ${y-5} l S\n`;
      }
      s += `0.20 0.20 0.20 rg\n`;
      const lns = wrapText(c.label, 84);
      let ty = y - 11;
      lns.forEach((l, idx) => {
        s += `BT /F2 10 Tf ${M+22} ${ty} Td (${escPDF(l)}) Tj ET\n`;
        ty -= lh;
      });
      y -= Math.max(20, lns.length * lh + 6);
    });

    // Footer (last page)
    s += `${grey} rg\nBT /F2 8 Tf ${M} ${M-10} Td (${escPDF('Story Contracting - Liberator Programme - Assertion Rehearsal - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

    pages.push(s);

    // ── Build PDF ──
    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId = addObj('');
    const font1Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const font3Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Oblique >>');

    const pageIds = [];
    pages.forEach(pageContent => {
      const streamBytes = new TextEncoder().encode(pageContent);
      const streamId = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${pageContent}endstream`);
      const pageId = addObj(`<< /Type /Page /Parent ${pagesId} 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R /F3 ${font3Id} 0 R >> >> >>`);
      pageIds.push(pageId);
    });
    objects[1].data = `<< /Type /Pages /Kids [${pageIds.map(id => id + ' 0 R').join(' ')}] /Count ${pageIds.length} >>`;

    let pdf = '%PDF-1.4\n'; const offsets = [];
    objects.forEach(obj => { offsets.push(pdf.length); pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`; });
    const xrefOffset = pdf.length;
    pdf += `xref\n0 ${objCount+1}\n0000000000 65535 f \n`;
    offsets.forEach(off => { pdf += String(off).padStart(10,'0') + ' 00000 n \n'; });
    pdf += `trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

    const blob = new Blob([pdf], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'Assertion-Rehearsal-' + new Date().toISOString().slice(0,10) + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error('PDF error', e); }
}

// ── PDF Generator ──
function downloadChangeSheetPDF(issue, less, more) {
  // Simple PDF builder - no libraries needed
  const W = 595.28, H = 841.89; // A4 in points
  const M = 50; // margin
  const blue = '0 0.38 0.68';
  const white = '1 1 1';
  const grey = '0.4 0.4 0.4';

  let objects = [];
  let objCount = 0;
  let content = '';

  function addObj(str) {
    objCount++;
    objects.push({ id: objCount, data: str });
    return objCount;
  }

  function wrapText(text, maxChars) {
    if (!text) return [''];
    const words = text.split(/\s+/);
    const lines = [];
    let line = '';
    words.forEach(w => {
      if ((line + ' ' + w).trim().length > maxChars) {
        lines.push(line.trim());
        line = w;
      } else {
        line = (line + ' ' + w).trim();
      }
    });
    if (line) lines.push(line.trim());
    return lines.length ? lines : [''];
  }

  function escPDF(str) {
    return str.replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
  }

  // Build page stream
  let s = '';
  const lh = 16; // line height
  let y = H - M;

  // Title bar
  s += `${blue} rg\n`;
  s += `${M} ${H - M - 40} ${W - 2*M} 40 re f\n`;
  s += `${white} rg\n`;
  s += `BT /F1 16 Tf ${M + 12} ${H - M - 27} Td (${escPDF('Story Liberator - Change Sheet')}) Tj ET\n`;
  s += `BT /F2 9 Tf ${W - M - 120} ${H - M - 27} Td (${escPDF('Liberator Programme - p.126')}) Tj ET\n`;

  y = H - M - 60;

  // Performance Issue section
  s += `${grey} rg\n`;
  s += `BT /F1 11 Tf ${M} ${y} Td (${escPDF('Issue')}) Tj ET\n`;
  y -= 6;
  s += `0.78 0.82 0.87 rg\n`;
  const issueLines = wrapText(issue || '(No issue described)', 75);
  const issueBoxH = Math.max(60, issueLines.length * lh + 20);
  s += `${M} ${y - issueBoxH} ${W - 2*M} ${issueBoxH} re f\n`;
  s += `0.2 0.2 0.2 rg\n`;
  let iy = y - 16;
  issueLines.forEach(line => {
    s += `BT /F2 10 Tf ${M + 10} ${iy} Td (${escPDF(line)}) Tj ET\n`;
    iy -= lh;
  });
  y -= issueBoxH + 20;

  // Two columns
  const colW = (W - 2*M - 16) / 2;
  const colH = 340;

  // Left column header
  s += `${blue} rg\n`;
  s += `${M} ${y - 42} ${colW} 42 re f\n`;
  s += `${white} rg\n`;
  s += `BT /F1 9 Tf ${M + 8} ${y - 16} Td (${escPDF('Present Undesirable Behaviours')}) Tj ET\n`;
  s += `BT /F2 8 Tf ${M + 8} ${y - 30} Td (${escPDF('(Less of required)')}) Tj ET\n`;

  // Right column header
  s += `${blue} rg\n`;
  s += `${M + colW + 16} ${y - 42} ${colW} 42 re f\n`;
  s += `${white} rg\n`;
  s += `BT /F1 9 Tf ${M + colW + 24} ${y - 16} Td (${escPDF('Future Desirable Behaviours')}) Tj ET\n`;
  s += `BT /F2 8 Tf ${M + colW + 24} ${y - 30} Td (${escPDF('(More of required)')}) Tj ET\n`;

  y -= 42;

  // Left column body
  s += `0.95 0.97 0.99 rg\n`;
  s += `${M} ${y - colH} ${colW} ${colH} re f\n`;
  s += `0.2 0.2 0.2 rg\n`;
  const lessLines = wrapText(less || '', 38);
  let ly = y - 16;
  lessLines.forEach(line => {
    if (ly > y - colH + 10) {
      s += `BT /F2 10 Tf ${M + 10} ${ly} Td (${escPDF(line)}) Tj ET\n`;
      ly -= lh;
    }
  });

  // Right column body
  s += `0.95 0.97 0.99 rg\n`;
  s += `${M + colW + 16} ${y - colH} ${colW} ${colH} re f\n`;
  s += `0.2 0.2 0.2 rg\n`;
  const moreLines = wrapText(more || '', 38);
  let ry = y - 16;
  moreLines.forEach(line => {
    if (ry > y - colH + 10) {
      s += `BT /F2 10 Tf ${M + colW + 26} ${ry} Td (${escPDF(line)}) Tj ET\n`;
      ry -= lh;
    }
  });

  // Column borders
  s += `0.78 0.82 0.87 RG\n0.5 w\n`;
  s += `${M} ${y - colH} ${colW} ${colH} re S\n`;
  s += `${M + colW + 16} ${y - colH} ${colW} ${colH} re S\n`;

  // Footer
  const fy = y - colH - 30;
  s += `${grey} rg\n`;
  s += `BT /F2 8 Tf ${M} ${fy} Td (${escPDF('Story Contracting - Liberator Programme - Change Sheet - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

  // Build PDF structure
  const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
  const pagesId = addObj(''); // placeholder
  const font1Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
  const font2Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
  const streamBytes = new TextEncoder().encode(s);
  const streamId = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
  const pageId = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);

  // Update pages object
  objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

  // Assemble PDF
  let pdf = '%PDF-1.4\n';
  const offsets = [];
  objects.forEach(obj => {
    offsets.push(pdf.length);
    pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`;
  });
  const xrefOffset = pdf.length;
  pdf += `xref\n0 ${objCount + 1}\n0000000000 65535 f \n`;
  offsets.forEach(off => {
    pdf += String(off).padStart(10, '0') + ' 00000 n \n';
  });
  pdf += `trailer\n<< /Size ${objCount + 1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

  // Download
  const blob = new Blob([pdf], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Change-Sheet-' + new Date().toISOString().slice(0,10) + '.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
