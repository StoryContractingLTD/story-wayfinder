<!DOCTYPE html>
<html lang="en" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Story Liberator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#EAF4FB;font-family:'Barlow',system-ui,sans-serif;color:#333}
#app{min-height:100vh}

/* Welcome overlay */
.welcome-overlay{position:fixed;inset:0;z-index:100;background:#EAF4FB;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .4s ease,visibility .4s ease}
.welcome-overlay.dismissed{opacity:0;visibility:hidden;pointer-events:none}
.welcome-inner{text-align:center;max-width:480px;padding:32px;animation:fadeIn .6s ease both}
.welcome-logo{margin:0 auto 28px}
.welcome-logo svg{height:44px;width:auto}
.welcome-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:52px;font-weight:800;color:#004B86;letter-spacing:-.02em;line-height:1.1}
.welcome-sub{color:#666;font-size:16px;line-height:1.7;margin-top:16px}
.welcome-btn{display:inline-flex;align-items:center;gap:10px;margin-top:28px;background:#0061AD;color:white;border:none;border-radius:24px;padding:14px 32px;font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 8px 28px rgba(0,97,173,.25);transition:transform .15s ease,box-shadow .15s ease}
.welcome-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,97,173,.35)}
.welcome-btn:active{transform:scale(.97)}
.welcome-pulse{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.8);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* Page transitions */
.page{min-height:100vh;animation:pageIn .32s ease both}
@keyframes pageIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.page-home{animation:fadeIn .28s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px}
.header-left{display:flex;align-items:center;gap:16px}
.divider{width:1px;height:28px;background:#c8d8e8}
.tag{font-size:12px;font-weight:600;color:#8fa0b0;letter-spacing:.2em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px}
.as-logo{height:34px;position:relative;overflow:hidden;border-radius:3px}
.as-logo::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-20deg);animation:asShimmer 4.5s 2s ease-in-out infinite;z-index:1}
@keyframes asShimmer{0%{left:-75%}100%{left:150%}}
.as-logo svg{height:34px;width:auto;border-radius:3px;display:block}
.logo{display:inline-flex;align-items:center;justify-content:center;height:40px}
.logo svg{height:36px;width:auto}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:4px 32px 48px}
.center-block{text-align:center;max-width:620px;margin:0 auto 18px}
.title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:48px;font-weight:800;color:#004B86;letter-spacing:-.02em}
.subtitle{color:#666;font-size:16px;line-height:1.75;margin-top:12px}

/* Wheel layout */
.wheel-layout{display:flex;gap:28px;align-items:flex-start;justify-content:center}
.wheel-col{flex:0 0 auto;width:min(648px,90vw)}
.info-col{flex:1;min-width:280px;max-width:380px;display:flex;flex-direction:column;gap:20px}
.card{background:white;border-radius:28px;padding:28px;box-shadow:0 6px 24px rgba(0,97,173,.07)}
.card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:21px;font-weight:800;color:#004B86;margin-bottom:12px}
.card p{color:#666;line-height:1.75;font-size:14.5px}

/* Wheel container */
.wheel-wrap{position:relative;width:100%;background:white;border-radius:28px;padding:16px 16px 0;box-shadow:0 16px 48px rgba(0,97,173,.13),0 2px 12px rgba(0,0,0,.05);overflow:hidden}
.wheel-svg-container{position:relative;width:100%;padding-bottom:100%}
.wheel-svg-container>svg{position:absolute;top:0;left:0;width:100%;height:100%}
.wheel-svg-container>#overlay-svg{z-index:2;cursor:pointer}
.wheel-svg-container>#main-wheel{z-index:1}

/* Overlay wedge styles */
.ov-wedge{fill:transparent;stroke:transparent;transition:fill .22s ease}
.wheel-svg-container.has-hover .ov-wedge{fill:rgba(10,30,60,0.55)}
.wheel-svg-container.has-hover .ov-wedge.active{fill:transparent}

/* Centre hub overlay */
.hub-circle { fill:transparent; cursor:pointer; }
.hub-ring { fill:none; stroke:rgba(255,255,255,0); stroke-width:0;
  transform-origin:1100px 1100px; pointer-events:none;
  transition:stroke .3s ease, stroke-width .3s ease; }
.hub-ring-outer { fill:none; stroke:rgba(255,255,255,0); stroke-width:0;
  transform-origin:1100px 1100px; pointer-events:none;
  transition:stroke .3s ease; }
.hub-hovered .hub-ring {
  stroke:rgba(255,255,255,.7); stroke-width:28;
  animation:hubPulse 1.6s ease-in-out infinite;
}
.hub-hovered .hub-ring-outer {
  stroke:rgba(255,255,255,.25); stroke-width:16;
  animation:hubPulseOuter 1.6s ease-in-out infinite;
}
@keyframes hubPulse {
  0%,100% { stroke-width:20; stroke:rgba(255,255,255,.5);  transform:scale(1);    }
  50%      { stroke-width:36; stroke:rgba(255,255,255,.85); transform:scale(1.10); }
}
@keyframes hubPulseOuter {
  0%,100% { stroke-width:10; stroke:rgba(255,255,255,.18); transform:scale(1);    }
  50%      { stroke-width:20; stroke:rgba(255,255,255,.38); transform:scale(1.18); }
}
.hover-bar{height:68px;margin:8px -16px 0;border-radius:0 0 28px 28px;display:flex;align-items:center;justify-content:center;padding:10px 20px;transition:all .25s ease;overflow:hidden}
.hover-bar.idle{background:#f0f6fc}
.hover-bar.active{background:#0061AD}
.hover-bar-content{text-align:center;transition:opacity .18s ease;width:100%}
.hover-bar .quadrant-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}
.hover-bar .segment-label{font-weight:600;font-size:15px}
.hover-bar .idle-text{color:#8fa0b0;font-size:13px;font-weight:500;line-height:1.6}
.hover-bar .click-hint{font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-top:4px;opacity:0.5}

/* Back button */
.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;border:none;border-radius:20px;padding:10px 18px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;color:#004B86;box-shadow:0 4px 16px rgba(0,97,173,.12);transition:transform .15s ease}
.back-btn:hover{transform:translateY(-2px)}
.back-btn:active{transform:scale(.97)}

/* Detail page hero */
.hero{border-radius:28px;padding:30px 36px;margin-bottom:24px;position:relative;overflow:hidden}
.hero-blob1{position:absolute;top:-40px;right:-20px;width:200px;height:200px;border-radius:50%;background:white;opacity:.055;pointer-events:none}
.hero-blob2{position:absolute;bottom:-30px;right:80px;width:110px;height:110px;border-radius:50%;background:white;opacity:.04;pointer-events:none}
.hero-eyebrow{color:rgba(255,255,255,.7);font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;margin-bottom:8px}
.hero h1{color:white;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:42px;font-weight:800;letter-spacing:-.01em}
.hero p{color:rgba(255,255,255,.82);font-size:15px;margin-top:8px;line-height:1.65;max-width:620px}

/* Detail grid */
.detail-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:24px}
.model-card{background:white;border-radius:28px;padding:28px;box-shadow:0 8px 28px rgba(0,97,173,.08)}
.model-eyebrow{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A8E91;margin-bottom:4px}
.model-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:24px;font-weight:800;color:#004B86;margin-bottom:8px}
.model-card .desc{color:#666;font-size:14px;line-height:1.65;margin-bottom:20px}
.right-col{display:flex;flex-direction:column;gap:20px}
.bullets-card{background:white;border-radius:28px;padding:24px;box-shadow:0 8px 28px rgba(0,97,173,.08)}
.bullets-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:20px;font-weight:800;color:#004B86;margin-bottom:14px}
.bullet-item{background:#EAF4FB;border-radius:14px;padding:10px 14px;font-size:14px;color:#004B86;font-weight:500;margin-bottom:10px}
.note-card{border-radius:28px;padding:24px;box-shadow:0 8px 28px rgba(0,97,173,.12)}
.note-eyebrow{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-bottom:8px}
.note-card p{color:rgba(255,255,255,.88);font-size:14px;line-height:1.72}

/* Book reference card */
.book-card{background:white;border-radius:28px;padding:20px 24px;box-shadow:0 8px 28px rgba(0,97,173,.08);display:flex;align-items:center;gap:16px}
.book-icon{width:48px;height:58px;flex-shrink:0;position:relative}
.book-icon .book-body{width:40px;height:52px;border-radius:3px 6px 6px 3px;position:absolute;top:3px;left:4px;box-shadow:2px 2px 8px rgba(0,0,0,.12)}
.book-icon .book-spine{width:6px;height:52px;border-radius:3px 0 0 3px;position:absolute;top:3px;left:0;opacity:.85}
.book-icon .book-pages{position:absolute;top:7px;left:12px;right:8px}
.book-icon .book-pages span{display:block;height:2px;background:rgba(255,255,255,.5);border-radius:1px;margin-bottom:4px}
@keyframes bookBounce{0%{transform:rotate(-3deg) scale(0.9)}40%{transform:rotate(2deg) scale(1.05)}70%{transform:rotate(-1deg) scale(1)}100%{transform:rotate(0) scale(1)}}
.book-icon{animation:bookBounce .5s .7s ease both;transform-origin:bottom left}
.book-card .book-info{flex:1}
.book-card .book-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8A8E91;margin-bottom:2px}
.book-card .book-pages-text{font-weight:600;font-size:14px;color:#004B86}

/* Model visual containers */
.model-visual{margin-top:16px;min-height:200px}
.model-visual svg{width:100%;height:auto}

/* Animations */
.slide-up{animation:slideUp .36s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.delay1{animation-delay:.04s}
.delay2{animation-delay:.12s}
.delay3{animation-delay:.18s}
.delay4{animation-delay:.24s}

/* Quadrant colour tokens */
:root{
  --q-enabling:#0061AD;
  --q-visioning:#fa6b02;
  --q-mobilising:#1A3A5C;
  --q-developing:#009FA0;
}

/* Responsive */

/* Performance Navigator */
.nav-wrap{background:#f8fbfe;border-radius:16px;padding:20px;border:2px solid #e4edf5}
.nav-trail{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.nav-step{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:12px;border:2px solid #e4edf5;background:white;transition:all .3s ease}
.nav-step.visited{border-color:#fa6b02;background:#fff8f2}
.nav-step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;background:#e4edf5;color:#666;transition:all .3s ease}
.nav-step.visited .nav-step-num{background:#fa6b02;color:white}
.nav-step-body{flex:1;min-width:0}
.nav-step-text{font-size:12px;color:#666;line-height:1.4}
.nav-step.visited .nav-step-text{color:#333}
.nav-step-answer{font-weight:700;color:#fa6b02;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.nav-step-input{font-size:12px;color:#444;line-height:1.5;margin-top:5px;padding:6px 10px;background:rgba(250,107,2,.08);border-radius:8px;word-break:break-word}
.nav-step-input + .nav-step-input{margin-top:4px}
.nav-step-input-tag{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#fa6b02;margin-right:6px;background:white;padding:2px 6px;border-radius:4px;vertical-align:1px}
.nav-current{background:white;border-radius:16px;padding:24px;border:2px solid #0061AD;margin-bottom:12px;animation:slideUp .3s ease both}
.nav-current.decision{border-color:#0061AD}
.nav-current.outcome{border-color:#fa6b02;background:#fff8f2}
.nav-current.input{border-color:#0061AD;background:linear-gradient(180deg,#ffffff 0%,#f6fbff 100%)}
.nav-q-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#8A8E91;margin-bottom:6px}
.nav-q-heading{font-family:'Barlow Condensed','Barlow',sans-serif;font-size:22px;font-weight:800;color:#004B86;line-height:1.15;margin-bottom:6px;letter-spacing:.01em}
.nav-q-text{font-size:15px;font-weight:600;color:#004B86;line-height:1.5;margin-bottom:16px}
.nav-current.input .nav-q-text{font-weight:500;color:#445566;font-size:14px}
.nav-inputs{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
.nav-input-field{display:flex;flex-direction:column;gap:6px}
.nav-input-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#0061AD}
.nav-input-ta{width:100%;border:2px solid #d4e3f0;border-radius:10px;padding:10px 14px;font-family:'Barlow',sans-serif;font-size:14px;color:#222;line-height:1.5;resize:vertical;min-height:62px;transition:border-color .2s ease,background .2s ease;outline:none;background:white;box-sizing:border-box}
.nav-input-ta:focus{border-color:#0061AD;background:#fbfdff}
.nav-input-ta::placeholder{color:#9aabbb;font-style:italic}
.nav-input-continue{max-width:240px;display:inline-block}
.nav-outcome-text{font-size:15px;font-weight:600;color:#fa6b02;line-height:1.5;margin-bottom:12px}
.nav-outcome-note{font-size:13px;color:#666;line-height:1.6}
.nav-btns{display:flex;gap:10px}
.nav-yn{flex:1;padding:12px;border:2px solid #d0dce8;border-radius:12px;background:white;font-family:'Barlow',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s ease;text-align:center}
.nav-yn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.nav-yn.yes{color:#0061AD;border-color:#0061AD}
.nav-yn.yes:hover{background:#0061AD;color:white}
.nav-yn.no{color:#1A3A5C;border-color:#1A3A5C}
.nav-yn.no:hover{background:#1A3A5C;color:white}
.nav-reset{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:20px;background:#e4edf5;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;color:#666;cursor:pointer;transition:all .15s ease;margin-top:8px}
.nav-reset:hover{background:#d0dce8;color:#333}
.nav-footer{text-align:center;padding:12px;background:linear-gradient(135deg,#004B86,#0061AD);border-radius:12px;margin-top:12px}
.nav-footer p{color:rgba(255,255,255,.9);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.nav-plan-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;padding:13px 20px;border:none;border-radius:20px;background:linear-gradient(135deg,#1A3A5C,#0061AD);color:white;font-family:'Barlow',sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 6px 20px rgba(26,58,92,.28);transition:all .18s ease;position:relative;overflow:hidden}
.nav-plan-btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(26,58,92,.42)}
.nav-plan-btn::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:skewX(-20deg);animation:navPlanShimmer 3s 1s ease-in-out infinite}
@keyframes navPlanShimmer{0%{left:-75%}100%{left:150%}}

/* Thread banner */
.thread-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#004B86,#0061AD);border-radius:16px;padding:14px 22px;margin-bottom:24px;position:relative;overflow:hidden}
.thread-banner::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transform:skewX(-20deg);animation:threadShimmer 4s 1s ease-in-out infinite}
@keyframes threadShimmer{0%{left:-75%}100%{left:150%}}
.thread-icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.thread-text{display:flex;flex-direction:column;gap:2px}
.thread-main{color:white;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.02em}
.thread-sub{color:rgba(255,255,255,.7);font-size:13px;font-weight:500}

/* Worksheet section divider */
.ws-divider{display:flex;align-items:center;gap:16px;margin:40px 0 24px;padding:0 4px}
.ws-divider-line{flex:1;height:2px;background:linear-gradient(90deg,transparent,#0061AD33,transparent)}
.ws-divider-label{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:#004B86;white-space:nowrap;letter-spacing:.02em}

/* Worksheet button */
.hero-ws-callout{display:flex;align-items:center;gap:8px;margin-top:16px;padding:10px 16px;background:rgba(255,255,255,.14);border-radius:12px;font-size:13px;font-weight:500;color:rgba(255,255,255,.9);line-height:1.5;backdrop-filter:blur(4px)}
.hero-ws-callout svg{flex-shrink:0}
.worksheet-btn{display:flex;align-items:center;gap:10px;width:100%;background:#0061AD;color:white;border:none;border-radius:28px;padding:16px 24px;font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 8px 28px rgba(0,97,173,.15);transition:transform .15s ease,box-shadow .15s ease;position:relative;overflow:hidden}
.worksheet-btn::after{content:'';position:absolute;inset:0;border-radius:28px;box-shadow:0 0 0 0 rgba(0,97,173,.4);animation:btnPulseRing 2.2s 1s ease-out infinite}
@keyframes btnPulseRing{0%{box-shadow:0 0 0 0 rgba(0,97,173,.45)}70%{box-shadow:0 0 0 12px rgba(0,97,173,0)}100%{box-shadow:0 0 0 0 rgba(0,97,173,0)}}
.worksheet-btn::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:skewX(-20deg);animation:btnShimmer 3.5s 1.5s ease-in-out infinite}
@keyframes btnShimmer{0%{left:-75%}100%{left:150%}}
.worksheet-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,97,173,.25)}
.worksheet-btn:active{transform:scale(.97)}

/* Worksheet page */
.ws-card{background:white;border-radius:28px;padding:32px;box-shadow:0 8px 28px rgba(0,97,173,.08);max-width:800px;margin:0 auto}
.ws-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:28px;font-weight:800;color:#004B86;margin-bottom:6px}
.ws-subtitle{color:#666;font-size:14px;line-height:1.6;margin-bottom:24px}
.ws-field-label{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#0061AD;margin-bottom:6px}
.ws-input{width:100%;border:2px solid #d0dce8;border-radius:12px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:15px;color:#333;resize:none;transition:border-color .2s ease;background:#f8fbfe}
.ws-input:focus{outline:none;border-color:#0061AD;background:white}
.ws-columns{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.ws-col-header{color:white;font-weight:700;font-size:13px;text-align:center;padding:12px 14px;border-radius:12px 12px 0 0;line-height:1.4}
.ws-col-body{border:2px solid #d0dce8;border-top:none;border-radius:0 0 12px 12px;min-height:240px}
.ws-col-body textarea{width:100%;min-height:240px;border:none;border-radius:0 0 10px 10px;padding:14px;font-family:'Barlow',sans-serif;font-size:14px;color:#333;resize:vertical;background:transparent}
.ws-col-body textarea:focus{outline:none;background:#f8fbfe}
.ws-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end;flex-wrap:wrap}
.ws-download-btn{display:inline-flex;align-items:center;gap:8px;background:#0061AD;color:white;border:none;border-radius:20px;padding:12px 24px;font-family:'Barlow',sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 16px rgba(0,97,173,.15);transition:transform .15s ease}
.ws-download-btn:hover{transform:translateY(-2px)}
.ws-back-btns{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}

/* Magnify toggle button */
.magnify-btn{display:inline-flex;align-items:center;gap:7px;background:#fff8f0;border:2px solid #f5a84e;border-radius:20px;padding:8px 14px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;color:#b05e00;box-shadow:0 4px 16px rgba(245,168,78,.12);transition:all .18s ease;white-space:nowrap}
.magnify-btn:hover{border-color:#e07b00;background:#fef0dc;transform:translateY(-2px)}
.magnify-btn.active{background:#f5a84e;border-color:#e07b00;color:white;box-shadow:0 4px 16px rgba(245,168,78,.35)}
.magnify-btn svg{flex-shrink:0;transition:transform .18s ease}
.magnify-btn:hover svg{transform:scale(1.1)}
.header-btn-group{display:flex;align-items:center;gap:10px}

/* Large text mode — toggled by .text-lg on the .page element */
.text-lg .hero h1{font-size:50px}
.text-lg .hero p{font-size:17px}
.text-lg .hero-eyebrow{font-size:13px}
.text-lg .model-eyebrow{font-size:13px}
.text-lg .model-card h2{font-size:28px}
.text-lg .model-card .desc{font-size:16px;line-height:1.7}
.text-lg .bullets-card h2{font-size:23px}
.text-lg .bullet-item{font-size:16px;padding:12px 16px}
.text-lg .note-eyebrow{font-size:13px}
.text-lg .note-card p{font-size:16px;line-height:1.78}
.text-lg .book-card .book-label{font-size:12px}
.text-lg .book-card .book-pages-text{font-size:16px}
.text-lg .thread-main{font-size:16px}
.text-lg .thread-sub{font-size:13px}
.text-lg .ws-divider-label{font-size:21px}
.text-lg .model-visual{zoom:1.14}

/* Print styles for PDF download */
@media print{
  body{background:white!important}
  .header,.back-btn,.ws-actions,.ws-back-btns,.welcome-overlay,.btt-wrap{display:none!important}
  .page{animation:none!important;min-height:auto!important}
  .ws-card{box-shadow:none!important;padding:20px!important;border-radius:0!important}
  .ws-input,.ws-col-body textarea{border-color:#ccc!important;background:white!important}
  .container{padding:0!important}
}

/* Back to top button (footer of detail and worksheet pages) */
.btt-wrap{display:flex;justify-content:center;margin:48px auto 24px;animation:bttFade .5s ease both;animation-delay:.2s;opacity:0}
.btt-btn{display:inline-flex;align-items:center;gap:9px;background:white;border:none;border-radius:24px;padding:11px 22px 11px 18px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:13.5px;color:#0061AD;box-shadow:0 4px 16px rgba(0,97,173,.10);transition:all .18s ease;letter-spacing:.02em}
.btt-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,97,173,.18);color:#004B86}
.btt-btn:active{transform:scale(.97)}
.btt-btn svg{flex-shrink:0;transition:transform .18s ease}
.btt-btn:hover svg{transform:translateY(-2px)}
@keyframes bttFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Companion concept preview card (temporary scaffolding on D1 page) */
.companion-preview{max-width:1180px;margin:32px auto 0;background:linear-gradient(135deg,#f7fbfb 0%,#eef8f8 100%);border-radius:18px;padding:18px 22px;border-left:4px solid #01A4AB;box-shadow:0 4px 18px rgba(1,164,171,.10);transition:transform .18s ease, box-shadow .18s ease}
.companion-preview:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(1,164,171,.18)}
.cc-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#007579;margin-bottom:10px}
.cc-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.cc-icon{flex:0 0 50px;width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#01A4AB 0%,#007579 100%);display:flex;align-items:center;justify-content:center;color:white;box-shadow:0 4px 14px rgba(1,164,171,.28)}
.cc-body{flex:1;min-width:240px}
.cc-title{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;color:#1A3A5C;line-height:1.15;margin-bottom:4px}
.cc-text{font-size:13.5px;color:#445566;line-height:1.6}
.cc-cta{flex:0 0 auto;align-self:center;background:#01A4AB;color:white;border:none;border-radius:22px;padding:10px 18px;font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(1,164,171,.28);transition:all .18s ease}
.cc-cta:hover{background:#007579;transform:translateY(-1px);box-shadow:0 8px 20px rgba(1,164,171,.42)}

@media(max-width:900px){
  .wheel-layout{flex-direction:column;align-items:center}
  .wheel-col{width:min(576px,100%)}
  .info-col{max-width:100%}
  .detail-grid{grid-template-columns:1fr}
  .ws-columns{grid-template-columns:1fr}
  .ws-back-btns{flex-direction:column}
}

/* ── Coming Soon Page ──────────────────────────────────────────── */
.cs-page{background:#020810;min-height:100vh;display:flex;flex-direction:column}
.cs-page .header{background:rgba(2,8,16,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07)}
.cs-page .back-btn{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);box-shadow:none}
.cs-page .back-btn:hover{background:rgba(255,255,255,.2);transform:translateY(-1px)}
.cs-page .divider{background:rgba(255,255,255,.15)}
.cs-page .tag{color:rgba(255,255,255,.4)}
.cs-scene{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-height:0}
.cs-bg{position:absolute;inset:0;background:radial-gradient(ellipse 90% 80% at 50% 42%,#0B1E54 0%,#060F2A 52%,#020810 100%)}
.cs-stars{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.cs-solar{position:absolute;inset:0;pointer-events:none;z-index:2}
.cs-sun{position:absolute;width:160px;height:160px;z-index:5;transform:translate(-50%,-50%)}
.cs-sun-body{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 37% 31%,#5BA8D8,#0061AD 46%,#003F73);display:flex;align-items:center;justify-content:center;overflow:hidden;animation:csSunPulse 3.4s ease-in-out infinite}
.cs-sun-wordmark{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-size:32px;letter-spacing:.08em;color:rgba(255,255,255,0.92);text-transform:uppercase;position:relative;z-index:2;text-shadow:0 1px 8px rgba(0,30,80,.35);pointer-events:none;line-height:1}
.cs-sun-shine{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 30deg,transparent,rgba(255,255,255,.14) 12%,transparent 26%,transparent 74%,rgba(255,255,255,.09) 88%,transparent);animation:csSunSpin 16s linear infinite;pointer-events:none;z-index:1}
.cs-orbit-svg{position:absolute;pointer-events:none;z-index:1;transform:translate(-50%,-50%)}
.cs-planet-wrap{position:absolute;will-change:transform}
.cs-planet{width:70px;height:70px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;cursor:default}
.cs-planet-label{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:9.5px;font-weight:700;color:rgba(255,255,255,.93);text-align:center;text-transform:uppercase;letter-spacing:.08em;line-height:1.3;position:relative;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.65)}
.cs-bottom{position:relative;z-index:20;text-align:center;padding:18px 24px 44px;pointer-events:auto}
.cs-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:56px;font-weight:800;color:white;letter-spacing:-.02em;line-height:1;text-shadow:0 2px 32px rgba(0,97,173,.55),0 0 80px rgba(251,140,0,.2)}
.cs-sub{color:rgba(255,255,255,.48);font-size:15px;line-height:1.75;margin-top:10px;max-width:440px;margin-left:auto;margin-right:auto}
@keyframes csSunPulse{0%,100%{box-shadow:0 0 44px 14px rgba(251,140,0,.55),0 0 88px 28px rgba(230,81,0,.28),0 0 160px 56px rgba(230,81,0,.1)}50%{box-shadow:0 0 64px 22px rgba(255,193,7,.65),0 0 120px 44px rgba(230,81,0,.38),0 0 200px 72px rgba(230,81,0,.14)}}
@keyframes csSunSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Idle nudge */
.idle-nudge{position:fixed;bottom:32px;right:32px;z-index:50;max-width:300px;background:white;border-radius:20px;box-shadow:0 12px 40px rgba(0,97,173,.18),0 2px 8px rgba(0,0,0,.06);padding:20px 20px 16px;opacity:0;transform:translateY(16px);transition:opacity 2.8s ease-in-out,transform 2.8s ease-in-out;pointer-events:none}
.idle-nudge.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.idle-nudge-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
.idle-nudge-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;color:#004B86;letter-spacing:.01em;line-height:1.2}
.idle-nudge-close{width:26px;height:26px;border-radius:50%;background:#f0f4f8;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8fa0b0;font-size:13px;flex-shrink:0;transition:background .15s ease,color .15s ease,transform .15s ease}
.idle-nudge-close:hover{background:#dde6f0;color:#555}
@keyframes nudgeCloseBeckon{0%,100%{box-shadow:0 0 0 2px rgba(0,97,173,.18);transform:scale(1)}50%{box-shadow:0 0 0 5px rgba(0,97,173,.32);transform:scale(1.08)}}
.idle-nudge.visible .idle-nudge-close{animation:nudgeCloseBeckon 1.8s ease-in-out 2.5s infinite}
.idle-nudge .idle-nudge-close:hover,.idle-nudge .idle-nudge-close:focus{animation:none}
@media (prefers-reduced-motion: reduce){.idle-nudge.visible .idle-nudge-close{animation:none}}
.idle-nudge-text{font-size:13px;color:#888;line-height:1.6;margin-bottom:14px}
.idle-nudge-links{display:flex;flex-direction:column;gap:6px}
.idle-nudge-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;cursor:pointer;transition:background .15s ease;text-decoration:none;border:none;background:transparent;width:100%;text-align:left}
.idle-nudge-link:hover{background:#f0f4f8}
.idle-nudge-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.idle-nudge-label{font-size:13px;font-weight:600;color:#004B86;line-height:1.3;display:block}
.idle-nudge-sub{font-size:11.5px;color:#8fa0b0;margin-top:1px;display:block}

/* ── Reflection: playing-card stack ─────────────────────────────── */
.rf-deck-wrap{position:relative;width:100%;max-width:360px;margin:0 auto;height:340px}
.rf-card{position:absolute;left:50%;top:0;width:300px;margin-left:-150px;border-radius:18px;background:white;box-shadow:0 6px 24px rgba(0,97,173,.16),0 1px 3px rgba(0,0,0,.06);padding:24px 22px 20px;transition:transform .35s cubic-bezier(.4,1.4,.6,1),box-shadow .25s ease;backface-visibility:hidden;border:1px solid #f0f3f7}
.rf-card[data-pos="0"]{z-index:5;transform:translate(0,0) rotate(0deg);cursor:pointer;animation:rfNudge 6s 3s ease infinite}
.rf-card[data-pos="0"]:hover{transform:translate(0,-3px) rotate(0deg);box-shadow:0 12px 36px rgba(0,97,173,.22),0 1px 3px rgba(0,0,0,.06);animation:none}
.rf-card[data-pos="1"]{z-index:4;transform:translate(8px,6px) rotate(2.6deg);pointer-events:none}
.rf-card[data-pos="2"]{z-index:3;transform:translate(-7px,12px) rotate(-2.4deg);pointer-events:none}
.rf-card[data-pos="3"]{z-index:2;transform:translate(5px,18px) rotate(1.7deg);pointer-events:none}
.rf-card.dealt{animation:rfDeal .55s cubic-bezier(.4,0,.6,1) forwards!important;pointer-events:none}
@keyframes rfDeal{0%{transform:translate(0,0) rotate(0deg);opacity:1}40%{transform:translate(-180px,-30px) rotate(-22deg);opacity:1}100%{transform:translate(-360px,-90px) rotate(-45deg);opacity:0}}
@keyframes rfNudge{0%,82%,100%{transform:translate(0,0) rotate(0deg)}84%{transform:translate(3px,-1px) rotate(.5deg)}87%{transform:translate(-2px,0) rotate(-.4deg)}90%{transform:translate(3px,-1px) rotate(.5deg)}93%{transform:translate(0,0) rotate(0deg)}}
.rf-card-logo{margin-bottom:14px}
.rf-card-counter{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#aab4c2;margin-bottom:10px}
.rf-card-question{font-family:"Barlow Condensed","Arial Narrow",sans-serif;font-size:21px;font-weight:800;color:#004B86;line-height:1.25;margin-bottom:12px}
.rf-card-hint{font-size:12.5px;color:#666;line-height:1.62;border-top:1px solid #f0f0f0;padding-top:11px}
.rf-card-cta{display:flex;align-items:center;justify-content:flex-end;gap:5px;margin-top:14px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#aab4c2;animation:rfCtaPulse 2.4s 1.2s ease infinite}
@keyframes rfCtaPulse{0%,100%{opacity:.45}50%{opacity:1}}
.rf-done{position:absolute;left:50%;top:0;width:300px;margin-left:-150px;border-radius:18px;background:linear-gradient(135deg,#004B86,#0061AD);padding:28px 24px;text-align:center;color:white;display:none;box-shadow:0 8px 28px rgba(0,75,134,.25);animation:rfDoneIn .4s ease both}
@keyframes rfDoneIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rf-done-title{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;margin-bottom:8px}
.rf-done-sub{font-size:13px;opacity:.86;line-height:1.65;margin-bottom:18px}
.rf-done-restart{border:2px solid rgba(255,255,255,.4);background:transparent;color:white;border-radius:20px;padding:8px 22px;font-family:"Barlow",sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.rf-done-restart:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.7)}

/* Full-width model layout (for richly interactive models) */
.detail-grid.fullwidth{display:flex;flex-direction:column;gap:24px}
.detail-grid.fullwidth .model-card{width:100%}
.detail-grid.fullwidth .right-col{display:grid;grid-template-columns:1.2fr .8fr .8fr;gap:24px;width:100%}
@media (max-width:820px){
  .detail-grid.fullwidth .right-col{grid-template-columns:1fr}
}

/* Vision steps activity (Set Clear Vision segment) */
.vs-stage{position:relative;width:100%;max-width:760px;margin:0 auto;min-height:340px}
.vs-rail{position:relative;display:flex;justify-content:space-between;align-items:center;margin:0 auto 28px;max-width:560px;padding:0 18px}
.vs-rail::before{content:"";position:absolute;left:18px;right:18px;top:50%;height:3px;background:linear-gradient(to right,#fbe2cf,#fa6b02,#fbe2cf);transform:translateY(-50%);border-radius:2px;z-index:0}
.vs-dot{position:relative;z-index:1;width:42px;height:42px;border-radius:50%;background:white;border:3px solid #e8d2bf;display:flex;align-items:center;justify-content:center;font-family:"Barlow Condensed","Arial Narrow",sans-serif;font-size:18px;font-weight:800;color:#c9a182;cursor:pointer;transition:all .35s cubic-bezier(.4,1.4,.6,1)}
.vs-dot:hover{transform:scale(1.08);border-color:#fa6b02;color:#fa6b02}
.vs-dot.active{background:#fa6b02;border-color:#fa6b02;color:white;transform:scale(1.12);box-shadow:0 6px 18px rgba(250,107,2,.32)}
.vs-dot.completed{background:#fef0e3;border-color:#fa6b02;color:#fa6b02}
.vs-panel{background:white;border-radius:18px;padding:28px 30px;box-shadow:0 6px 22px rgba(26,58,92,.10);border:1px solid #f0f3f7;min-height:210px;animation:vsPanelIn .42s cubic-bezier(.4,1.4,.6,1)}
@keyframes vsPanelIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.vs-eyebrow{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#fa6b02;margin-bottom:8px}
.vs-step-title{font-family:"Barlow Condensed","Arial Narrow",sans-serif;font-size:26px;font-weight:800;color:#1A3A5C;margin-bottom:10px;line-height:1.2}
.vs-step-body{font-size:14.5px;color:#4a5568;line-height:1.7;margin-bottom:16px}
.vs-prompt{background:#fbf6f0;border-left:3px solid #fa6b02;border-radius:0 10px 10px 0;padding:14px 16px;font-size:13.5px;color:#5d4632;line-height:1.6;font-style:italic}
.vs-prompt strong{color:#1A3A5C;font-weight:700;font-style:normal}
.vs-nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:12px}
.vs-nav-btn{background:#1A3A5C;color:white;border:none;border-radius:22px;padding:9px 22px;font-family:"Barlow",sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.vs-nav-btn:hover:not(:disabled){background:#0f2740;transform:translateY(-1px)}
.vs-nav-btn:disabled{opacity:.32;cursor:not-allowed}
.vs-nav-btn.primary{background:#fa6b02}
.vs-nav-btn.primary:hover:not(:disabled){background:#d95a01}
.vs-progress-text{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#aab4c2}
.vs-link-card{margin-top:22px;background:linear-gradient(135deg,#fef4ea,#ffffff);border:1.5px solid #fdd9b8;border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;animation:vsPanelIn .5s ease}
.vs-link-card-icon{flex:0 0 44px;height:44px;border-radius:50%;background:#fa6b02;display:flex;align-items:center;justify-content:center;color:white}
.vs-link-card-text{flex:1;font-size:13.5px;color:#5d4632;line-height:1.7}
.vs-link-card-text strong{color:#1A3A5C;font-weight:700}
.vs-pill{display:inline-flex;align-items:center;gap:5px;background:#fa6b02;color:white;font-weight:700;padding:3px 11px;border-radius:14px;text-decoration:none;font-size:12.5px;letter-spacing:.01em;cursor:pointer;border:none;font-family:"Barlow",sans-serif;transition:all .18s ease;vertical-align:baseline;line-height:1.35;white-space:nowrap}
.vs-pill:hover{background:#d95a01;transform:translateY(-1px);box-shadow:0 4px 12px rgba(250,107,2,.32)}
.vs-pill:active{transform:translateY(0)}
.vs-pill svg{width:11px;height:11px;flex:0 0 auto}
@media (max-width:600px){
  .vs-rail{max-width:100%;padding:0 8px}
  .vs-dot{width:36px;height:36px;font-size:15px}
  .vs-panel{padding:22px 20px}
  .vs-step-title{font-size:22px}
}

/* Narrative section (three-card foundations between thread banner and model) */
.narrative-section{margin:0 0 26px}
.narrative-header{text-align:center;margin-bottom:22px}
.narrative-eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8A8E91;margin-bottom:12px}
.narrative-quote{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:19px;font-weight:600;line-height:1.5;text-align:center;font-style:italic;padding:14px 28px;border-top:2px solid;border-bottom:2px solid;max-width:720px;margin:0 auto}
.narrative-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}
.narrative-card{background:white;border-radius:22px;padding:24px;box-shadow:0 8px 28px rgba(0,97,173,.08);position:relative;transition:transform .35s ease, box-shadow .35s ease}
.narrative-card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:3px;background:var(--nc-accent);border-radius:0 0 4px 4px}
.narrative-card:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,97,173,.14)}
.narrative-card .nc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.narrative-card .nc-step{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.narrative-card .nc-step-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--nc-accent);color:white;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;flex-shrink:0;letter-spacing:0;line-height:1;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.narrative-card .nc-step-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#6c7480;line-height:1}
.narrative-card .nc-step-marker{font-weight:800;color:var(--nc-accent);margin-right:1px}
.narrative-card.is-bookend::before{height:5px;left:14px;right:14px}
.narrative-card h3{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:23px;font-weight:800;color:#004B86;margin-bottom:10px;line-height:1.2}
.narrative-card p{font-size:14.5px;line-height:1.65;color:#3a4351}
.narrative-bridge{display:flex;align-items:center;gap:18px;padding:8px 4px 6px}
.narrative-bridge .nb-line{flex:1;height:1px}
.narrative-bridge .nb-text{flex:0 1 auto;max-width:600px;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:16px;font-weight:600;color:#004B86;font-style:italic;text-align:center;line-height:1.4;padding:0 6px}
.narrative-arrow{display:flex;justify-content:center;margin-top:4px;animation:nbArrowBob 2.2s ease-in-out infinite}
@keyframes nbArrowBob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(5px);opacity:1}}
.text-lg .narrative-quote{font-size:22px}
.text-lg .narrative-card h3{font-size:26px}
.text-lg .narrative-card p{font-size:16.5px;line-height:1.7}
.text-lg .narrative-card .nc-step-num{width:30px;height:30px;font-size:16px}
.text-lg .narrative-card .nc-step-text{font-size:13.5px}
.text-lg .narrative-bridge .nb-text{font-size:18px}
@media (max-width:980px){
  .narrative-grid{grid-template-columns:1fr}
  .narrative-bridge .nb-line{display:none}
  .narrative-quote{font-size:17px;padding:12px 18px}
}

/* Shuffle stack: clickable card stack that cycles through the cards */
.narrative-stack{position:relative;margin:0 auto 6px;max-width:560px;min-height:310px;perspective:1200px}
.narrative-stack .stack-card{position:absolute;top:0;left:0;right:0;padding-bottom:58px;cursor:default;transition:transform .55s cubic-bezier(.4,1,.5,1), opacity .45s ease, box-shadow .35s ease;transform-origin:center top;outline:none;will-change:transform,opacity}
.narrative-stack .stack-card:focus-visible{box-shadow:0 0 0 3px rgba(0,97,173,.28), 0 14px 36px rgba(0,97,173,.14)}
.narrative-stack .stack-card.pos-front{transform:translateY(0) scale(1);z-index:3;opacity:1;cursor:pointer}
.narrative-stack .stack-card.pos-mid{transform:translateY(10px) scale(.97);z-index:2;opacity:.85;pointer-events:none}
.narrative-stack .stack-card.pos-back{transform:translateY(20px) scale(.94);z-index:1;opacity:.65;pointer-events:none}
.narrative-stack .stack-card.pos-front:hover{transform:translateY(-2px) scale(1.005);box-shadow:0 14px 36px rgba(0,97,173,.14)}
.narrative-stack .stack-card.shuffling{animation:shuffleAway .65s cubic-bezier(.4,.1,.3,1) forwards;z-index:5;pointer-events:none}
@keyframes shuffleAway{
  0%   {transform:translateY(0) translateX(0) rotate(0) scale(1);opacity:1}
  35%  {transform:translateY(-22px) translateX(36px) rotate(6deg) scale(1.02);opacity:.95}
  60%  {transform:translateY(-12px) translateX(8px) rotate(-2deg) scale(.96);opacity:.55}
  100% {transform:translateY(20px) translateX(0) rotate(0) scale(.94);opacity:.65}
}
.stack-hint{position:absolute;bottom:18px;right:22px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#A4ABB4;display:inline-flex;align-items:center;gap:4px;padding:6px 11px;background:#F2F5F8;border-radius:999px;animation:hintPulse 2.2s ease-in-out infinite;transition:opacity .35s ease}
.stack-hint.fade-out{opacity:0}
@keyframes hintPulse{0%,100%{opacity:.7;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}
.nc-page{position:absolute;top:24px;right:24px;display:inline-flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#8A8E91;padding:5px 10px;background:#F2F5F8;border-radius:999px}
.nc-page svg{flex:0 0 auto;opacity:.75}
.stack-indicator{display:flex;justify-content:center;margin:18px 0 18px}
.stack-dots{display:flex;gap:8px;align-items:center}
.stack-dot{width:9px;height:9px;border-radius:50%;border:none;background:#cfd6dd;cursor:pointer;padding:0;transition:width .3s ease, background .3s ease;outline:none}
.stack-dot:hover{background:#a4abb4}
.stack-dot:focus-visible{box-shadow:0 0 0 3px rgba(0,97,173,.25)}
.stack-dot.active{width:24px;border-radius:999px}
.text-lg .narrative-stack{min-height:360px}
@media (max-width:600px){
  .narrative-stack{min-height:370px}
  .stack-hint{bottom:14px;right:14px;font-size:10.5px;padding:5px 9px}
}

/* ── Fable block: animated illustration + story text ─────────────── */
.fable-block{position:relative;background:#fff;border-radius:22px;padding:34px 38px 32px;margin:0 auto 28px;max-width:760px;box-shadow:0 10px 36px rgba(0,97,173,.09);overflow:hidden}
.fable-block::before{content:'';position:absolute;top:0;left:38px;right:38px;height:3px;background:var(--fb-accent,#1A3A5C);border-radius:0 0 4px 4px}
.fable-eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8A8E91;margin-bottom:8px}
.fable-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:26px;font-weight:800;color:#004B86;line-height:1.15;margin:0 0 12px}
.fable-intro{font-size:14.5px;line-height:1.65;color:#3a4351;margin:0 0 20px}
.fable-illustration{position:relative;width:100%;max-width:560px;margin:8px auto 22px;padding:6px 0;opacity:0;transform:translateY(8px);transition:opacity .7s ease, transform .7s ease}
.fable-illustration.is-visible{opacity:1;transform:translateY(0)}
.fable-illustration svg{display:block;width:100%;height:auto;overflow:visible}
.fable-illustration .fb-bob{transform-origin:50% 50%;will-change:transform}
.fable-illustration.is-animated .fb-bob{animation:fbBob 6s ease-in-out 3.6s infinite}
@keyframes fbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
/* Line draw-in: paths get path length set as a CSS var in JS, then transitioned to 0 via class */
.fable-illustration .fb-line{stroke-dasharray:var(--fb-len,1000);stroke-dashoffset:var(--fb-len,1000);transition:stroke-dashoffset 1.6s cubic-bezier(.55,.05,.3,1)}
.fable-illustration.is-animated .fb-line{stroke-dashoffset:0}
.fable-illustration .fb-line.fb-l1{transition-duration:.9s;transition-delay:.05s}
.fable-illustration .fb-line.fb-l2{transition-duration:1.4s;transition-delay:.4s}
.fable-illustration .fb-line.fb-l3{transition-duration:1.4s;transition-delay:.85s}
.fable-illustration .fb-line.fb-l4{transition-duration:.7s;transition-delay:1.45s}
.fable-illustration .fb-line.fb-l5{transition-duration:1.6s;transition-delay:1.65s}
.fable-illustration .fb-line.fb-l6{transition-duration:1.0s;transition-delay:2.0s}
.fable-illustration .fb-shade{opacity:0;transition:opacity 1.1s ease}
.fable-illustration.is-animated .fb-shade{opacity:.42}
.fable-illustration .fb-shade.fb-s1{transition-delay:1.6s}
.fable-illustration .fb-shade.fb-s2{transition-delay:2.4s}
.fable-illustration .fb-shade.fb-s3{transition-delay:2.7s}
.fable-story{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:16.5px;font-weight:500;line-height:1.65;color:#3a4351;font-style:italic;border-left:3px solid var(--fb-accent,#1A3A5C);padding:4px 0 4px 18px;margin:6px 0 4px}
.fable-story p{margin:0 0 12px}
.fable-story p:last-child{margin-bottom:0}
.fable-page{position:absolute;top:34px;right:38px;display:inline-flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#8A8E91;padding:5px 10px;background:#F2F5F8;border-radius:999px}
.fable-page svg{flex:0 0 auto;opacity:.75}
.text-lg .fable-title{font-size:30px}
.text-lg .fable-intro{font-size:16.5px;line-height:1.7}
.text-lg .fable-story{font-size:18.5px;line-height:1.75}
@media (max-width:680px){
  .fable-block{padding:28px 22px 26px}
  .fable-block::before{left:22px;right:22px}
  .fable-page{top:18px;right:22px}
  .fable-title{font-size:22px;padding-right:78px}
}
@media (prefers-reduced-motion:reduce){
  .fable-illustration,.fable-illustration .fb-line,.fable-illustration .fb-shade{transition:none !important}
  .fable-illustration{opacity:1;transform:none}
  .fable-illustration .fb-line{stroke-dashoffset:0 !important}
  .fable-illustration .fb-shade{opacity:.42 !important}
  .fable-illustration.is-animated .fb-bob{animation:none}
}
</style>

const SEGMENTS = [
  // ── Enabling (top-left, 270° to 360°, 3 segments) ──
  {
    id:'empower-team', label:'Empower team members',
    quadrant:'Enabling', startAngle:270, endAngle:300,
    tagline:'Building capability through trust and autonomy',
    desc:'Empowering your team means creating the conditions where people can take ownership, make decisions, and grow. It requires letting go of control while staying connected and supportive.',
    modelTitle:'Situational Leadership (Hersey & Blanchard)',
    modelDesc:'This model suggests that effective leaders adapt their style based on the competence and commitment of the individual. There is no single best leadership style. Instead, the leader must assess the readiness of the person and flex between directing, coaching, supporting, and delegating.',
    bullets:['Assess readiness before choosing your approach','Move from directing to delegating as confidence grows','Match your leadership response to the individual, not the task alone'],
    modelType:'situational'
  },
  {
    id:'delegate-ownership', label:'Delegate task ownership',
    quadrant:'Enabling', startAngle:300, endAngle:330,
    tagline:'Giving genuine responsibility, not just tasks',
    desc:'True delegation is about transferring ownership of outcomes, not just distributing workload. It means trusting people to find their own route while remaining available for support.',
    modelTitle:'Delegation Levels (Jurgen Appelo)',
    modelDesc:'This framework identifies seven levels of delegation, from "Tell" (the leader decides) all the way to "Delegate" (the team decides with no involvement). Understanding where a task sits on this spectrum helps leaders be intentional about how much control they retain.',
    bullets:['Clarify which level of delegation you are using','Make the boundaries of autonomy explicit','Increase delegation levels as trust develops'],
    modelType:'delegation'

  {

    quadrant:'Enabling', startAngle:330, endAngle:360,
    tagline:'Staying consistent through the journey',
    desc:'Providing continued support means being the constant that people can rely on. Like a pilot following a flight plan, the effective Leader-Developer knows their destination, responds to deviations in real time, and consistently steers performance back on course without waiting for the annual review.',
    modelTitle:'The Flight Plan Analogy',
    modelDesc:'Giving feedback is described as a moment of truth: the point at which everything diagnosed, decided, and prepared is put into action. The flight plan is the analogy. Just as a pilot does not wait until landing to discover they are off course, an effective leader does not store up feedback for the annual appraisal. They give it continuously, in real time, hour by hour, day by day. Formal reviews are the beacons on the route: useful checkpoints for re-routing when needed. But the GPS of regular praise and recognition is what keeps people on track between them. Effective leaders are always on the lookout for good performance, catching it at the time and reinforcing it immediately.',
    bullets:[
      'Give feedback in the moment, not stored up for the annual review: immediate and continuous is far more effective than periodic and formal',
      'Positive reinforcement is the GPS signal: catching someone doing something right, at the time, is more powerful than waiting to catch them getting it wrong',
      'Formal appraisals are beacons on the route, useful for re-routing, but the journey requires constant navigation between them'
    ],
    modelType:'flight-plan',
    bookPages:'192-194',
    noteTitle:'Feedback as a habit, not an event',
    noteText:'The most powerful shift a leader can make is treating feedback as a continuous habit rather than a scheduled event. Catching someone doing something right, at the time, immediately, is far more effective than waiting for a formal review. The beacons matter, but it is the GPS signal between them that keeps people on course.',
    hasFlightPlanSheet: true
  },

  // ── Visioning (top-right, 0° to 90°, 4 segments) ──
  {
    id:'authentic-style', label:'Have authentic personal style',
    quadrant:'Visioning', startAngle:0, endAngle:22.5,
    tagline:'Leading as yourself, on solid ground',
    desc:'Authenticity in leadership is not a question of personality, it is a question of consistency. People follow leaders they understand, and understanding begins when a leader is clear about who they are, what they stand for, and how they will behave. The most testing time for this is often a leader\'s first months in a role, when the team is watching closely and forming their early impressions.',
    modelTitle:'A leadership continuum',
    modelDesc:'A leader\'s relationship with their team sits somewhere on a continuum, from Hostile at one extreme to Buddy at the other. Both ends fall away into a chasm: hostile distance damages trust, and forced matey-ness erodes authority. The solid ground between them, where a leader is Approachable and Friendly, is where genuine leadership presence is built. From this position, a leader can stay connected with people while still holding clear personal standards and dealing with any inappropriate behaviour when it arises, without ever being seen as two-faced.',
    bullets:['Approachable and friendly is the solid ground: aloof and matey are the chasms either side','A new leader is being read constantly in their first months: consistency, not charm, is what builds trust','Authenticity holds when standards are visible and applied the same way, regardless of mood or who is in the room'],
    noteTitle:'Genuine, not generic',
    noteText:'Being authentic does not mean being unfiltered. It means being recognisably yourself across every interaction, regardless of mood, audience, or how you feel about the person in front of you. When the team can predict the standards you hold to, even when they cannot predict the day, they begin to trust the leader and not just the moment. That predictability, rooted in High Challenge and High Support with Positive Regard and Genuineness, is what turns personal style into leadership presence.',
    bookPages:'73-75',
    modelType:'approachability',
    hasStyleReflection: true
  },
  {
    id:'step-back', label:'Step back and watch',
    quadrant:'Visioning', startAngle:22.5, endAngle:45,
    tagline:'Listen, question, observe, consult',
    desc:'Leader-Developers add value by seeing where improvements can be made. That begins with stepping back to gather data, observing carefully, asking good questions, and consulting widely before acting. The traps are easy to fall into: moving forward blindly on assumptions, the hero syndrome of expecting miracles in the first hours, or arriving with a ready-made solution before the problem is properly understood.',
    modelTitle:'Reflecting through your colour energies',
    modelDesc:'How we listen, question, observe and consult is shaped by our preferences. Each of the four colour energies brings genuine strengths to this work, and each carries traps if it is overused. Click each energy to surface a few prompts for honest self-reflection on how your preferences support or get in the way of stepping back well.',
    bullets:['Gather data through observation, good questioning, and listening to others','Avoid moving forward blindly, the hero syndrome, or solutioning before understanding','Recognise that perception shapes how you read every situation'],
    noteTitle:'Perception shapes everything',
    noteText:'Two people can stand back and watch the same situation and notice entirely different things. That is not a flaw in the model: it is the model. Stepping back well is not just about pausing before you act, it is about understanding how your own preferences filter what you see and hear, and deliberately consulting others whose preferences are different to widen the picture.',
    bookPages:'75-76',
    modelType:'balcony',
    fullWidthModel:true
  },
  {
    id:'right-course', label:'Decide the right course of action',
    quadrant:'Visioning', startAngle:45, endAngle:67.5,
    tagline:'Making clear decisions with confidence',
    desc:'Decisive leadership does not mean rushing. It means gathering the right information, weighing options thoughtfully, and committing to a direction with clarity, even when conditions are uncertain.',
    modelTitle:'The Decision Matrix (Eisenhower Principle)',
    modelDesc:'This framework helps leaders prioritise decisions by plotting them against two axes: urgency and importance. It reveals which decisions need immediate action, which need planning, which can be delegated, and which should be dropped entirely.',
    bullets:['Separate urgency from importance','Spend more time in the "important but not urgent" space','Use the matrix to communicate priorities to your team'],
    modelType:'matrix'
  },
  {
    id:'clear-vision', label:'Set clear vision',
    quadrant:'Visioning', startAngle:67.5, endAngle:90,
    tagline:'Stepping forward in time and seeing things as they will be',
    desc:'A vision is the image we have of a desired future state. It gives people direction, meaning and purpose, and it sustains effort when things stop being easy. Vision is not just a corporate banner: it works at every scale. A vision for the team, a vision for a project, a vision for an individual. Without it, any movement risks being accidental, and people end up somewhere by drift rather than by design. The skill that often goes under-emphasised is being explicit: turning the picture in your head into clear, concrete words your team can actually work toward.',
    modelTitle:'The Performance Potential Gain Curve',
    modelDesc:'Performance over time tells two very different stories depending on how people are led. When teams are well led, capability grows steadily and performance climbs. When teams are poorly led, performance dips significantly before recovering, and recovers to a lower level. The space between those two paths is the leadership gain: the difference a clear vision and a deliberate leader-developer make to what a team is ultimately capable of.',
    bullets:['Vision works at every scale: project, team, and individual','Being explicit is the under-emphasised skill: the vision in your head is not yet a vision until it has clear words','Vision without action is just a dream, so pair the picture with concrete daily steps','The leader makes the difference: the gain curve only opens up when someone consistently and patiently works the process'],
    modelType:'vision',
    noteTitle:'A vision you cannot describe is not yet a vision',
    noteText:'Leaders often hold a strong sense of where they want to take their team but have never put it into words. A vision that lives only in your head cannot pull anyone toward it. The discipline is to write it down in concrete terms (what people will actually be doing, how you will know they are succeeding) for the team and for each individual within it. You do not need an essay. A few honest, specific statements are enough to turn a private picture into a shared destination.',
    bookPages:'77-82',
    fullWidthModel:true,
    hasVisionSteps:true
  },

  {
    id:'be-explicit', label:'Be explicit',
    quadrant:'Mobilising', startAngle:90, endAngle:108,
    tagline:'Saying what you mean with clarity',
    desc:'Being explicit means removing ambiguity from your communication. It means stating expectations clearly, naming what you see, and not assuming others have read between the lines.',

        { icon:'target', title:'Behaviour, not personality', page:116, body:'Focus on behaviour, not personality. Grounded in Positive Regard and Genuineness, explicitness names what success looks like, and the \u201Ctiger traps\u201D to avoid.' }

      bridge:'The first useful way of crystallising this is through the Onion Model.'
    },
    modelTitle:'The Onion Model',
    modelDesc:'The Onion Model helps separate who a person is from what they do. At the core sit personality and values, which are deep-rooted and not the right target for performance conversations. The more useful focus is on the outer layers, attitudes and behaviours, because these are visible, more changeable, and far easier to address constructively.',
    bullets:['Focus feedback on behaviours and attitudes, not personality','Change is most achievable at the outer layers, where actions and approaches can be seen and shaped','Positive regard and clear explicitness make honest feedback easier to hear and act on'],
    modelType:'onion',
    bookPages:'115-121',
    noteTitle:'Keeping it fair and actionable',
    noteText:'The model is a useful reminder that effective challenge should stay with observable performance, not personal identity. It helps leaders be direct without becoming personal, and supports change by keeping conversations clear, fair and actionable.',
    hasWorksheet: true
  },
  {
    id:'root-issues', label:'Get to the root of issues',
    quadrant:'Mobilising', startAngle:108, endAngle:126,
    tagline:'Looking below the surface',
    desc:'Surface-level fixes rarely solve deep problems. Getting to the root means asking better questions, resisting the urge to jump to solutions, and being willing to sit with discomfort while the real issue reveals itself.',
    narrative:{
      eyebrow:'Why people behave as they do',
      quote:'People aren\u2019t daft. They do things for a reason. Identifying the reason is the most important part of being able to get to the root of the issue.',
      fable:{
        eyebrow:'An old Hungarian fable',
        title:'The fisherman, the snake, and the brandy',
        page:121,
        intro:'Most of us are quick at diagnosing technical problems, but slower with people problems, often falling back on \u2018it\u2019s an attitude issue\u2019 or \u2018they need training\u2019. The truth is usually more interesting. This old fable has much to teach us about why we get the behaviours we get.',

const CX = 1100, CY = 1100;

function polarXY(cx, cy, r, angleDeg) {
  const rad = ((angleDeg - 90) * Math.PI) / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function wedgePath(cx, cy, r0, r1, a0, a1) {
  const p0 = polarXY(cx, cy, r1, a0);
  const p1 = polarXY(cx, cy, r1, a1);
  const p2 = polarXY(cx, cy, r0, a1);
  const p3 = polarXY(cx, cy, r0, a0);
  const large = (a1 - a0) > 180 ? 1 : 0;
  return `M${p0.x.toFixed(1)},${p0.y.toFixed(1)} A${r1},${r1} 0 ${large} 1 ${p1.x.toFixed(1)},${p1.y.toFixed(1)} L${p2.x.toFixed(1)},${p2.y.toFixed(1)} A${r0},${r0} 0 ${large} 0 ${p3.x.toFixed(1)},${p3.y.toFixed(1)} Z`;
}

function buildJohariVisual() {
  const d = document.createElement('div');
  d.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px';
  const cells = [
    { label:'Open Area', sub:'Known to self & others', bg:'#0061AD' },
    { label:'Blind Spot', sub:'Unknown to self, known to others', bg:'#F26522' },
    { label:'Hidden Area', sub:'Known to self, unknown to others', bg:'#009FA0' },
    { label:'Unknown', sub:'Unknown to self & others', bg:'#666' }
  ];
  cells.forEach((c, i) => {
    const cell = document.createElement('div');
    cell.style.cssText = `background:${c.bg};border-radius:14px;padding:14px;color:white;animation:springIn .4s ${i*0.12}s ease both`;
    cell.innerHTML = `<div style="font-weight:700;font-size:13px">${c.label}</div><div style="font-size:11px;opacity:.75;margin-top:6px;line-height:1.4">${c.sub}</div>`;

  });
  const style = document.createElement('style');
  style.textContent = '@keyframes springIn{0%{opacity:0;transform:scale(.84)}70%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}';
  d.appendChild(style);
  return d;
}

      const ctx = getCtx ? getCtx() : new (window.AudioContext||window.webkitAudioContext)();
      const now = ctx.currentTime;
      const freqs = [392.00, 587.33, 783.99]; // G4, D5, G5 — perfect fifth + octave
      const master = ctx.createGain();
      master.gain.setValueAtTime(0, now);
      master.gain.linearRampToValueAtTime(0.020, now + 0.08);
      master.gain.setValueAtTime(0.020, now + 0.32);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 0.95);
      master.connect(ctx.destination);
      freqs.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        g.gain.value = i === 0 ? 0.85 : (i === 1 ? 0.45 : 0.25);
        osc.connect(g); g.connect(master);
        osc.start(now); osc.stop(now + 1.0);
      });
    }catch(e){}
  }
  function playEnergyDeselect(){
    try{
      const ctx = getCtx ? getCtx() : new (window.AudioContext||window.webkitAudioContext)();
      const now = ctx.currentTime;
      const freqs = [261.63, 392.00]; // C4 + G4 — soft, lower fifth
      const master = ctx.createGain();
      master.gain.setValueAtTime(0, now);
      master.gain.linearRampToValueAtTime(0.014, now + 0.05);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
      master.connect(ctx.destination);
      freqs.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        g.gain.value = i === 0 ? 0.8 : 0.4;
        osc.connect(g); g.connect(master);
        osc.start(now); osc.stop(now + 0.6);
      });
    }catch(e){}
  }

  setTimeout(() => {
    wrap.style.opacity = '1';

    const circles    = wrap.querySelectorAll('.se-energy');
    const labels     = wrap.querySelectorAll('.se-static-label');
    const centreFill = wrap.querySelector('#se-centre-fill');
    const centreContent = wrap.querySelector('#se-centre-content');
    const promptBox  = wrap.querySelector('#se-prompt');

    // Start the beckon animation after the entrance is complete
    setTimeout(() => {
      circles.forEach((c, i) => {
        setTimeout(() => c.classList.add('beckon'), i*220);
      });
    }, 1700);

    let activeId = null;

    function setCentreContent(html, animateOut=true) {
      if (animateOut) {
        centreContent.classList.remove('se-content-fade-in');
        centreContent.classList.add('se-content-fade-out');
        setTimeout(() => {
          centreContent.classList.remove('se-content-fade-out');
          centreContent.innerHTML = html;
          centreContent.classList.add('se-content-fade-in');
        }, 250);
      } else {
        centreContent.innerHTML = html;
      }
    }

    function defaultCentre() {
      return '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:30px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#1A3A5C;margin-bottom:14px">Click an energy</div>'+
             '<div style="font-size:22px;line-height:1.45;color:#444;font-weight:500">Each colour brings a different way of stepping back, listening and questioning.</div>';
    }

    function energyCentre(en) {
      return '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:32px;font-weight:800;letter-spacing:.03em;color:'+en.textColor+';margin-bottom:10px;line-height:1">'+en.label+'</div>'+
             '<div style="font-size:18px;line-height:1.45;color:'+en.textColor+';opacity:.95;margin-bottom:11px;font-weight:600"><span style="opacity:.75;font-size:12px;letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:3px">Strength</span>'+en.strength+'</div>'+
             '<div style="font-size:18px;line-height:1.45;color:'+en.textColor+';opacity:.95;font-weight:500"><span style="opacity:.75;font-size:12px;letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:3px">Trap</span>'+en.trap+'</div>';
    }

    function deselect() {
      activeId = null;
      circles.forEach(c => { c.classList.remove('dimmed','travelling'); c.style.transform = ''; c.style.opacity=''; });
      labels.forEach(l => l.classList.remove('hidden'));
      centreFill.setAttribute('fill', 'white');
      setCentreContent(defaultCentre(), true);
      promptBox.style.opacity = '0';
      promptBox.textContent = '';
      playEnergyDeselect();
      // Resume the beckon after a short pause so the model continues to invite exploration
      setTimeout(() => {
        if (activeId === null) {
          circles.forEach((c, i) => setTimeout(() => c.classList.add('beckon'), i*180));
        }
      }, 700);
    }

    function activate(en, sourceCircle) {
      // Stop beckon on first interaction
      circles.forEach(c => c.classList.remove('beckon'));

      activeId = en.id;
      labels.forEach(l => { if (l.getAttribute('data-for') === en.id) l.classList.add('hidden'); else l.classList.remove('hidden'); });

      // Other circles dim immediately
      circles.forEach(c => {
        if (c.getAttribute('data-id') !== en.id) c.classList.add('dimmed');
        else c.classList.remove('dimmed');
      });

      // Build a flying clone that travels from the source circle to the centre
      const svg = wrap.querySelector('#se-svg');
      const clone = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      clone.setAttribute('cx', en.cx);
      clone.setAttribute('cy', en.cy);
      clone.setAttribute('r', 116);
      clone.setAttribute('fill', en.color);
      clone.setAttribute('opacity', '1');
      clone.style.transition = 'cx .6s cubic-bezier(.5,0,.3,1), cy .6s cubic-bezier(.5,0,.3,1), r .6s cubic-bezier(.5,0,.3,1), opacity .25s ease .35s';
      svg.appendChild(clone);

      playEnergySwoop();

      // Fade out the source circle's solid look briefly while clone travels
      sourceCircle.style.transition = 'opacity .3s ease';
      sourceCircle.style.opacity = '.35';

      requestAnimationFrame(() => {
        clone.setAttribute('cx', C.cx);
        clone.setAttribute('cy', C.cy);
        clone.setAttribute('r', C.r);
      });

      // After the morph completes, set the centre fill colour, fade clone, restore source
      setTimeout(() => {
        centreFill.setAttribute('fill', en.color);
        clone.style.opacity = '0';
        sourceCircle.style.opacity = '1';
        setCentreContent(energyCentre(en), true);

        // Show the reflection prompt below
        promptBox.style.borderLeftColor = en.color;
        promptBox.style.background = en.id === 'yellow' ? '#fff8e3' : '#f0f6fc';
        promptBox.style.color = en.color === '#f7c84a' ? '#3a2f00' : en.color;
        promptBox.innerHTML = '<strong style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#888;display:block;margin-bottom:5px;font-weight:700">Reflection prompt</strong><span style="font-weight:700">'+en.prompt+'</span>';
        promptBox.style.opacity = '1';
      }, 600);

      setTimeout(() => { if (clone.parentNode) clone.parentNode.removeChild(clone); }, 950);
    }

    circles.forEach(c => {
      c.addEventListener('click', e => {
        const id = c.getAttribute('data-id');
        const en = ENERGIES.find(x => x.id === id);
        if (!en) return;
        if (activeId === id) {
          deselect();
        } else {
          // If something else is already active, snap centre back to white very briefly first
          if (activeId) {
            centreFill.setAttribute('fill', 'white');
          }
          activate(en, c);
        }
      });
    });
  }, 250);

  return wrap;
}

  // SVG container — viewBox extended below the source 0 0 612 344 to fit the TIME label
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');

      '<stop offset="0%" stop-color="#fa6b02" stop-opacity="0.30"/>' +

  // Faded gridlines — sit behind everything else for quiet structure.
  // Chart area: x 66.7 → 400.3, y 62.9 → 298.4. Five equal divisions each way.
  const grid = document.createElementNS('http://www.w3.org/2000/svg','g');
  grid.setAttribute('stroke', '#e6ecf2');
  grid.setAttribute('stroke-width', '1');
  grid.setAttribute('class', 'ppgc-grid');
  let gridSVG = '';

  for (let i = 1; i <= 4; i++) {
    const x = 66.7 + (333.6 * i / 5);
    gridSVG += '<line x1="'+x.toFixed(1)+'" x2="'+x.toFixed(1)+'" y1="62.9" y2="299.7"/>';

  xLabel.setAttribute('letter-spacing','1');
  xLabel.textContent = 'TIME';
  svg.appendChild(xLabel);

  // Fill area placeholder — populated after render via sampling
  const fill = document.createElementNS('http://www.w3.org/2000/svg','path');
  fill.setAttribute('fill', 'url(#ppgc-fill)');
  fill.setAttribute('opacity', '0');
  fill.setAttribute('class', 'ppgc-fill');
  svg.appendChild(fill);

  // Poorly Led — orange, draws first
  const poor = document.createElementNS('http://www.w3.org/2000/svg','path');
  poor.setAttribute('d', poorD);

  svg.appendChild(poor);

  // Well Led — navy, draws second
  const well = document.createElementNS('http://www.w3.org/2000/svg','path');
  well.setAttribute('d', wellD);
  well.setAttribute('fill','none');
  well.setAttribute('stroke','#1A3A5C');
  well.setAttribute('stroke-width','3');
  well.setAttribute('stroke-linecap','round');
  well.setAttribute('stroke-linejoin','round');
  well.setAttribute('pathLength','100');
  well.setAttribute('class','ppgc-well');
  svg.appendChild(well);

  // Legend (positioned in the empty area to the right of the chart)
  const legend = document.createElementNS('http://www.w3.org/2000/svg','g');
  legend.setAttribute('class','ppgc-legend');
  legend.setAttribute('opacity','0');
  const lx = 425, ly = 130;
  legend.innerHTML =

    '<text x="'+(lx+48)+'" y="'+(ly+64)+'" font-family="Barlow Condensed,Arial Narrow,sans-serif" font-weight="700" font-size="12" fill="#1A3A5C">Performance gain</text>';
  svg.appendChild(legend);

  // Animation styles. pathLength=100 lets us use a constant dashoffset regardless of true path length.
  const style = document.createElementNS('http://www.w3.org/2000/svg','style');
  style.textContent =
    '.ppgc-grid{opacity:0;animation:ppgcFade 0.6s 0s ease-out forwards}' +

    '.ppgc-legend{animation:ppgcFade 0.8s 4.2s ease-out forwards}' +
    '@keyframes ppgcDraw{to{stroke-dashoffset:0}}' +
    '@keyframes ppgcFade{to{opacity:1}}';
  svg.appendChild(style);

  wrap.appendChild(svg);

  // Build the fill polygon by sampling the two paths after they are in the DOM.
  // Using length-parameter sampling: both paths are roughly monotonic in x so this gives
  // a clean polygon between the two curves.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      try {
        const wellLen = well.getTotalLength();
        const poorLen = poor.getTotalLength();
        if (wellLen <= 0 || poorLen <= 0) return;
        const N = 120;
        const wellPts = [], poorPts = [];
        for (let i = 0; i <= N; i++) {
          const t = i / N;
          const wp = well.getPointAtLength(t * wellLen);
          const pp = poor.getPointAtLength(t * poorLen);
          wellPts.push(wp.x.toFixed(1) + ',' + wp.y.toFixed(1));
          poorPts.push(pp.x.toFixed(1) + ',' + pp.y.toFixed(1));

        const fillD = 'M ' + wellPts.join(' L ') + ' L ' + poorPts.slice().reverse().join(' L ') + ' Z';
        fill.setAttribute('d', fillD);
      } catch(e) {
        // Fallback: leave fill empty rather than break the page
        console.warn('PPGC fill sampling failed', e);
      }
    });
  });

  return wrap;
}

      <path d="M1897.02,716.65c-3.34,0-6.56-.4-9.63-1.2-3.08-.8-5.52-1.81-7.31-3.02l3.78-8.14c1.79,1.12,3.91,2.02,6.36,2.73,2.45.7,4.86,1.05,7.24,1.05,2.62,0,4.47-.31,5.56-.95,1.09-.63,1.64-1.5,1.64-2.62,0-.92-.43-1.61-1.27-2.07-.85-.46-1.98-.81-3.38-1.05-1.41-.24-2.95-.48-4.62-.73-1.67-.24-3.36-.57-5.05-.98-1.7-.41-3.25-1.03-4.65-1.85-1.41-.82-2.53-1.94-3.38-3.35-.85-1.41-1.27-3.22-1.27-5.45,0-2.47.71-4.65,2.14-6.54s3.5-3.38,6.22-4.47c2.71-1.09,5.96-1.64,9.75-1.64,2.67,0,5.38.29,8.14.87,2.76.58,5.06,1.43,6.91,2.54l-3.78,8.07c-1.89-1.11-3.79-1.88-5.71-2.29-1.92-.41-3.77-.62-5.56-.62-2.52,0-4.36.34-5.53,1.02-1.16.68-1.74,1.55-1.74,2.62,0,.97.42,1.7,1.27,2.18.85.49,1.97.87,3.38,1.16,1.4.29,2.94.55,4.62.76,1.67.22,3.36.55,5.05.98s3.24,1.05,4.62,1.85c1.38.8,2.51,1.89,3.38,3.27s1.31,3.19,1.31,5.42c0,2.42-.73,4.57-2.18,6.44-1.45,1.87-3.55,3.33-6.29,4.4-2.74,1.07-6.07,1.6-10,1.6Z" style="fill:#fa6b02"/>
    </g>
  </g>
</svg>`;
  // Animate the onion when it scrolls into view
  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          wrap.style.opacity = '1';
          wrap.classList.add('onion-play');
          obs.disconnect();
        }
      });
    }, { threshold: 0.15 });
    requestAnimationFrame(() => obs.observe(wrap));
  } else {
    // Fallback for very old browsers
    wrap.style.opacity = '1';
    wrap.classList.add('onion-play');
  }
  return wrap;
}
