<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Story Liberator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#EAF4FB;font-family:'Barlow',system-ui,sans-serif;color:#333}
#app{min-height:100vh}

/* Welcome overlay */
.welcome-overlay{position:fixed;inset:0;z-index:100;background:#EAF4FB;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .4s ease,visibility .4s ease}
.welcome-overlay.dismissed{opacity:0;visibility:hidden;pointer-events:none}
.welcome-inner{text-align:center;max-width:480px;padding:32px;animation:fadeIn .6s ease both}
.welcome-logo{margin:0 auto 28px}
.welcome-logo svg{height:44px;width:auto}
.welcome-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:52px;font-weight:800;color:#004B86;letter-spacing:-.02em;line-height:1.1}
.welcome-sub{color:#666;font-size:16px;line-height:1.7;margin-top:16px}
.welcome-btn{display:inline-flex;align-items:center;gap:10px;margin-top:28px;background:#0061AD;color:white;border:none;border-radius:24px;padding:14px 32px;font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 8px 28px rgba(0,97,173,.25);transition:transform .15s ease,box-shadow .15s ease}
.welcome-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,97,173,.35)}
.welcome-btn:active{transform:scale(.97)}
.welcome-pulse{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.8);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* Page transitions */
.page{min-height:100vh;animation:pageIn .32s ease both}
@keyframes pageIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.page-home{animation:fadeIn .28s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px}
.header-left{display:flex;align-items:center;gap:16px}
.divider{width:1px;height:28px;background:#c8d8e8}
.tag{font-size:12px;font-weight:600;color:#8fa0b0;letter-spacing:.2em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px}
.as-logo{height:34px;position:relative;overflow:hidden;border-radius:3px}
.as-logo::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-20deg);animation:asShimmer 4.5s 2s ease-in-out infinite;z-index:1}
@keyframes asShimmer{0%{left:-75%}100%{left:150%}}
.as-logo svg{height:34px;width:auto;border-radius:3px;display:block}
.logo{display:inline-flex;align-items:center;justify-content:center;height:40px}
.logo svg{height:36px;width:auto}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:8px 32px 48px}
.center-block{text-align:center;max-width:620px;margin:0 auto 28px}
.title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:48px;font-weight:800;color:#004B86;letter-spacing:-.02em}
.subtitle{color:#666;font-size:16px;line-height:1.75;margin-top:12px}

/* Wheel layout */
.wheel-layout{display:flex;gap:28px;align-items:flex-start;justify-content:center}
.wheel-col{flex:0 0 auto;width:min(648px,90vw)}
.info-col{flex:1;min-width:280px;max-width:380px;display:flex;flex-direction:column;gap:20px}
.card{background:white;border-radius:28px;padding:28px;box-shadow:0 6px 24px rgba(0,97,173,.07)}
.card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:21px;font-weight:800;color:#004B86;margin-bottom:12px}
.card p{color:#666;line-height:1.75;font-size:14.5px}

/* Wheel container */
.wheel-wrap{position:relative;width:100%;background:white;border-radius:28px;padding:16px 16px 0;box-shadow:0 16px 48px rgba(0,97,173,.13),0 2px 12px rgba(0,0,0,.05);overflow:hidden}
.wheel-svg-container{position:relative;width:100%;padding-bottom:100%}
.wheel-svg-container>svg{position:absolute;top:0;left:0;width:100%;height:100%}
.wheel-svg-container>#overlay-svg{z-index:2;cursor:pointer}
.wheel-svg-container>#main-wheel{z-index:1}

/* Overlay wedge styles */
.ov-wedge{fill:transparent;stroke:transparent;transition:fill .22s ease}
.wheel-svg-container.has-hover .ov-wedge{fill:rgba(10,30,60,0.55)}
.wheel-svg-container.has-hover .ov-wedge.active{fill:transparent}

/* Centre hub overlay */
.hub-circle { fill:transparent; cursor:pointer; }
.hub-ring { fill:none; stroke:rgba(255,255,255,0); stroke-width:0;
  transform-origin:1100px 1100px; pointer-events:none;
  transition:stroke .3s ease, stroke-width .3s ease; }
.hub-ring-outer { fill:none; stroke:rgba(255,255,255,0); stroke-width:0;
  transform-origin:1100px 1100px; pointer-events:none;
  transition:stroke .3s ease; }
.hub-hovered .hub-ring {
  stroke:rgba(255,255,255,.7); stroke-width:28;
  animation:hubPulse 1.6s ease-in-out infinite;
}
.hub-hovered .hub-ring-outer {
  stroke:rgba(255,255,255,.25); stroke-width:16;
  animation:hubPulseOuter 1.6s ease-in-out infinite;
}
@keyframes hubPulse {
  0%,100% { stroke-width:20; stroke:rgba(255,255,255,.5);  transform:scale(1);    }
  50%      { stroke-width:36; stroke:rgba(255,255,255,.85); transform:scale(1.10); }
}
@keyframes hubPulseOuter {
  0%,100% { stroke-width:10; stroke:rgba(255,255,255,.18); transform:scale(1);    }
  50%      { stroke-width:20; stroke:rgba(255,255,255,.38); transform:scale(1.18); }
}
.hover-bar{height:76px;margin:8px -16px 0;border-radius:0 0 28px 28px;display:flex;align-items:center;justify-content:center;padding:10px 20px;transition:all .25s ease;overflow:hidden}
.hover-bar.idle{background:#f0f6fc}
.hover-bar.active{background:#0061AD}
.hover-bar-content{text-align:center;transition:opacity .18s ease}
.hover-bar .quadrant-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}
.hover-bar .segment-label{font-weight:600;font-size:15px}
.hover-bar .idle-text{color:#8fa0b0;font-size:13px;font-weight:500}
.hover-bar .click-hint{font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-top:4px;opacity:0.5}

/* Back button */
.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;border:none;border-radius:20px;padding:10px 18px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;color:#004B86;box-shadow:0 4px 16px rgba(0,97,173,.12);transition:transform .15s ease}
.back-btn:hover{transform:translateY(-2px)}
.back-btn:active{transform:scale(.97)}

/* Detail page hero */
.hero{border-radius:28px;padding:30px 36px;margin-bottom:24px;position:relative;overflow:hidden}
.hero-blob1{position:absolute;top:-40px;right:-20px;width:200px;height:200px;border-radius:50%;background:white;opacity:.055;pointer-events:none}
.hero-blob2{position:absolute;bottom:-30px;right:80px;width:110px;height:110px;border-radius:50%;background:white;opacity:.04;pointer-events:none}
.hero-eyebrow{color:rgba(255,255,255,.7);font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;margin-bottom:8px}
.hero h1{color:white;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:42px;font-weight:800;letter-spacing:-.01em}
.hero p{color:rgba(255,255,255,.82);font-size:15px;margin-top:8px;line-height:1.65;max-width:620px}

/* Detail grid */
.detail-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:24px}
.model-card{background:white;border-radius:28px;padding:28px;box-shadow:0 8px 28px rgba(0,97,173,.08)}
.model-eyebrow{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A8E91;margin-bottom:4px}
.model-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:24px;font-weight:800;color:#004B86;margin-bottom:8px}
.model-card .desc{color:#666;font-size:14px;line-height:1.65;margin-bottom:20px}
.right-col{display:flex;flex-direction:column;gap:20px}
.bullets-card{background:white;border-radius:28px;padding:24px;box-shadow:0 8px 28px rgba(0,97,173,.08)}
.bullets-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:20px;font-weight:800;color:#004B86;margin-bottom:14px}
.bullet-item{background:#EAF4FB;border-radius:14px;padding:10px 14px;font-size:14px;color:#004B86;font-weight:500;margin-bottom:10px}
.note-card{border-radius:28px;padding:24px;box-shadow:0 8px 28px rgba(0,97,173,.12)}
.note-eyebrow{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-bottom:8px}
.note-card p{color:rgba(255,255,255,.88);font-size:14px;line-height:1.72}

/* Book reference card */
.book-card{background:white;border-radius:28px;padding:20px 24px;box-shadow:0 8px 28px rgba(0,97,173,.08);display:flex;align-items:center;gap:16px}
.book-icon{width:48px;height:58px;flex-shrink:0;position:relative}
.book-icon .book-body{width:40px;height:52px;border-radius:3px 6px 6px 3px;position:absolute;top:3px;left:4px;box-shadow:2px 2px 8px rgba(0,0,0,.12)}
.book-icon .book-spine{width:6px;height:52px;border-radius:3px 0 0 3px;position:absolute;top:3px;left:0;opacity:.85}
.book-icon .book-pages{position:absolute;top:7px;left:12px;right:8px}
.book-icon .book-pages span{display:block;height:2px;background:rgba(255,255,255,.5);border-radius:1px;margin-bottom:4px}
@keyframes bookBounce{0%{transform:rotate(-3deg) scale(0.9)}40%{transform:rotate(2deg) scale(1.05)}70%{transform:rotate(-1deg) scale(1)}100%{transform:rotate(0) scale(1)}}
.book-icon{animation:bookBounce .5s .7s ease both;transform-origin:bottom left}
.book-card .book-info{flex:1}
.book-card .book-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8A8E91;margin-bottom:2px}
.book-card .book-pages-text{font-weight:600;font-size:14px;color:#004B86}

/* Model visual containers */
.model-visual{margin-top:16px;min-height:200px}
.model-visual svg{width:100%;height:auto}

/* Animations */
.slide-up{animation:slideUp .36s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.delay1{animation-delay:.04s}
.delay2{animation-delay:.12s}
.delay3{animation-delay:.18s}
.delay4{animation-delay:.24s}

/* Quadrant colour tokens */
:root{
  --q-enabling:#0061AD;
  --q-visioning:#fa6b02;
  --q-mobilising:#1A3A5C;
  --q-developing:#009FA0;
}

/* Responsive */

/* Performance Navigator */
.nav-wrap{background:#f8fbfe;border-radius:16px;padding:20px;border:2px solid #e4edf5}
.nav-trail{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.nav-step{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:12px;border:2px solid #e4edf5;background:white;transition:all .3s ease}
.nav-step.visited{border-color:#fa6b02;background:#fff8f2}
.nav-step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;background:#e4edf5;color:#666;transition:all .3s ease}
.nav-step.visited .nav-step-num{background:#fa6b02;color:white}
.nav-step-text{font-size:12px;color:#666;line-height:1.4}
.nav-step.visited .nav-step-text{color:#333}
.nav-step-answer{font-weight:700;color:#fa6b02;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.nav-current{background:white;border-radius:16px;padding:24px;border:2px solid #0061AD;margin-bottom:12px;animation:slideUp .3s ease both}
.nav-current.decision{border-color:#0061AD}
.nav-current.outcome{border-color:#fa6b02;background:#fff8f2}
.nav-q-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#8A8E91;margin-bottom:6px}
.nav-q-text{font-size:15px;font-weight:600;color:#004B86;line-height:1.5;margin-bottom:16px}
.nav-outcome-text{font-size:15px;font-weight:600;color:#fa6b02;line-height:1.5;margin-bottom:12px}
.nav-outcome-note{font-size:13px;color:#666;line-height:1.6}
.nav-btns{display:flex;gap:10px}
.nav-yn{flex:1;padding:12px;border:2px solid #d0dce8;border-radius:12px;background:white;font-family:'Barlow',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s ease;text-align:center}
.nav-yn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.nav-yn.yes{color:#0061AD;border-color:#0061AD}
.nav-yn.yes:hover{background:#0061AD;color:white}
.nav-yn.no{color:#1A3A5C;border-color:#1A3A5C}
.nav-yn.no:hover{background:#1A3A5C;color:white}
.nav-reset{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:20px;background:#e4edf5;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;color:#666;cursor:pointer;transition:all .15s ease;margin-top:8px}
.nav-reset:hover{background:#d0dce8;color:#333}
.nav-footer{text-align:center;padding:12px;background:linear-gradient(135deg,#004B86,#0061AD);border-radius:12px;margin-top:12px}
.nav-footer p{color:rgba(255,255,255,.9);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}

/* Thread banner */
.thread-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#004B86,#0061AD);border-radius:16px;padding:14px 22px;margin-bottom:24px;position:relative;overflow:hidden}
.thread-banner::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transform:skewX(-20deg);animation:threadShimmer 4s 1s ease-in-out infinite}
@keyframes threadShimmer{0%{left:-75%}100%{left:150%}}
.thread-icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.thread-text{display:flex;flex-direction:column;gap:2px}
.thread-main{color:white;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.02em}
.thread-sub{color:rgba(255,255,255,.7);font-size:13px;font-weight:500}

/* Worksheet section divider */
.ws-divider{display:flex;align-items:center;gap:16px;margin:40px 0 24px;padding:0 4px}
.ws-divider-line{flex:1;height:2px;background:linear-gradient(90deg,transparent,#0061AD33,transparent)}
.ws-divider-label{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:#004B86;white-space:nowrap;letter-spacing:.02em}

/* Worksheet button */
.hero-ws-callout{display:flex;align-items:center;gap:8px;margin-top:16px;padding:10px 16px;background:rgba(255,255,255,.14);border-radius:12px;font-size:13px;font-weight:500;color:rgba(255,255,255,.9);line-height:1.5;backdrop-filter:blur(4px)}
.hero-ws-callout svg{flex-shrink:0}
.worksheet-btn{display:flex;align-items:center;gap:10px;width:100%;background:#0061AD;color:white;border:none;border-radius:28px;padding:16px 24px;font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 8px 28px rgba(0,97,173,.15);transition:transform .15s ease,box-shadow .15s ease;position:relative;overflow:hidden}
.worksheet-btn::after{content:'';position:absolute;inset:0;border-radius:28px;box-shadow:0 0 0 0 rgba(0,97,173,.4);animation:btnPulseRing 2.2s 1s ease-out infinite}
@keyframes btnPulseRing{0%{box-shadow:0 0 0 0 rgba(0,97,173,.45)}70%{box-shadow:0 0 0 12px rgba(0,97,173,0)}100%{box-shadow:0 0 0 0 rgba(0,97,173,0)}}
.worksheet-btn::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:skewX(-20deg);animation:btnShimmer 3.5s 1.5s ease-in-out infinite}
@keyframes btnShimmer{0%{left:-75%}100%{left:150%}}
.worksheet-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,97,173,.25)}
.worksheet-btn:active{transform:scale(.97)}

/* Worksheet page */
.ws-card{background:white;border-radius:28px;padding:32px;box-shadow:0 8px 28px rgba(0,97,173,.08);max-width:800px;margin:0 auto}
.ws-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:28px;font-weight:800;color:#004B86;margin-bottom:6px}
.ws-subtitle{color:#666;font-size:14px;line-height:1.6;margin-bottom:24px}
.ws-field-label{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#0061AD;margin-bottom:6px}
.ws-input{width:100%;border:2px solid #d0dce8;border-radius:12px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:15px;color:#333;resize:none;transition:border-color .2s ease;background:#f8fbfe}
.ws-input:focus{outline:none;border-color:#0061AD;background:white}
.ws-columns{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.ws-col-header{color:white;font-weight:700;font-size:13px;text-align:center;padding:12px 14px;border-radius:12px 12px 0 0;line-height:1.4}
.ws-col-body{border:2px solid #d0dce8;border-top:none;border-radius:0 0 12px 12px;min-height:240px}
.ws-col-body textarea{width:100%;min-height:240px;border:none;border-radius:0 0 10px 10px;padding:14px;font-family:'Barlow',sans-serif;font-size:14px;color:#333;resize:vertical;background:transparent}
.ws-col-body textarea:focus{outline:none;background:#f8fbfe}
.ws-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end;flex-wrap:wrap}
.ws-download-btn{display:inline-flex;align-items:center;gap:8px;background:#0061AD;color:white;border:none;border-radius:20px;padding:12px 24px;font-family:'Barlow',sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 16px rgba(0,97,173,.15);transition:transform .15s ease}
.ws-download-btn:hover{transform:translateY(-2px)}
.ws-back-btns{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}

/* Print styles for PDF download */
@media print{
  body{background:white!important}
  .header,.back-btn,.ws-actions,.ws-back-btns,.welcome-overlay{display:none!important}
  .page{animation:none!important;min-height:auto!important}
  .ws-card{box-shadow:none!important;padding:20px!important;border-radius:0!important}
  .ws-input,.ws-col-body textarea{border-color:#ccc!important;background:white!important}
  .container{padding:0!important}
}

@media(max-width:900px){
  .wheel-layout{flex-direction:column;align-items:center}
  .wheel-col{width:min(576px,100%)}
  .info-col{max-width:100%}
  .detail-grid{grid-template-columns:1fr}
  .ws-columns{grid-template-columns:1fr}
  .ws-back-btns{flex-direction:column}
}
</style>
</head>
<body>

    <h1 class="welcome-title">Story Liberator</h1>
    <p class="welcome-sub">Your interactive guide to the leadership models and frameworks in the Liberator Programme. Explore the wheel to discover approaches that will support your growth as a leader at Story.</p>

<script>
// ============================================================
//  DATA
// ============================================================
const QUADRANT_COLOURS = {
  Enabling:   '#0061AD',
  Visioning:  '#fa6b02',
  Mobilising: '#1A3A5C',
  Developing: '#009FA0'
};

const SEGMENTS = [
  // ── Enabling (top-left, 270° to 360°, 3 segments) ──
  {
    id:'empower-team', label:'Empower team members',
    quadrant:'Enabling', startAngle:270, endAngle:300,
    tagline:'Building capability through trust and autonomy',
    desc:'Empowering your team means creating the conditions where people can take ownership, make decisions, and grow. It requires letting go of control while staying connected and supportive.',
    modelTitle:'Situational Leadership (Hersey & Blanchard)',
    modelDesc:'This model suggests that effective leaders adapt their style based on the competence and commitment of the individual. There is no single best leadership style. Instead, the leader must assess the readiness of the person and flex between directing, coaching, supporting, and delegating.',
    bullets:['Assess readiness before choosing your approach','Move from directing to delegating as confidence grows','Match your leadership response to the individual, not the task alone'],
    modelType:'situational'
  },
  {
    id:'delegate-ownership', label:'Delegate task ownership',
    quadrant:'Enabling', startAngle:300, endAngle:330,
    tagline:'Giving genuine responsibility, not just tasks',
    desc:'True delegation is about transferring ownership of outcomes, not just distributing workload. It means trusting people to find their own route while remaining available for support.',
    modelTitle:'Delegation Levels (Jurgen Appelo)',
    modelDesc:'This framework identifies seven levels of delegation, from "Tell" (the leader decides) all the way to "Delegate" (the team decides with no involvement). Understanding where a task sits on this spectrum helps leaders be intentional about how much control they retain.',
    bullets:['Clarify which level of delegation you are using','Make the boundaries of autonomy explicit','Increase delegation levels as trust develops'],
    modelType:'delegation'
  },
  {
    id:'provide-support', label:'Provide continued support',
    quadrant:'Enabling', startAngle:330, endAngle:360,
    tagline:'Staying present without taking over',
    desc:'Continued support means being consistently available, checking in without checking up, and creating a safety net that allows people to take risks and learn from experience.',
    modelTitle:'The Coaching Spectrum',
    modelDesc:'The coaching spectrum shows the range of support a leader can offer, from directive (telling, instructing) to non-directive (listening, reflecting, asking). Effective leaders know when to push and when to pull, adjusting their position on the spectrum depending on the moment.',
    bullets:['Non-directive approaches build long-term capability','Directive support is sometimes necessary and appropriate','Move along the spectrum based on the person and the situation'],
    modelType:'spectrum'
  },

  // ── Visioning (top-right, 0° to 90°, 4 segments) ──
  {
    id:'authentic-style', label:'Have authentic personal style',
    quadrant:'Visioning', startAngle:0, endAngle:22.5,
    tagline:'Leading as yourself, not a character',
    desc:'Authenticity in leadership comes from self-awareness, consistency, and the courage to show up as you truly are. People follow leaders they trust, and trust begins with genuineness.',
    modelTitle:'The Johari Window (Luft & Ingham)',
    modelDesc:'The Johari Window is a framework for understanding self-awareness and how others perceive us. It maps what is known and unknown to self and others across four panes. Effective leaders actively expand the Open area through seeking feedback and appropriate self-disclosure.',
    bullets:['Seek feedback to reduce your Blind Spot','Share appropriately to shrink the Hidden area','Self-awareness is an ongoing practice, not a destination'],
    modelType:'johari'
  },
  {
    id:'step-back', label:'Step back and watch',
    quadrant:'Visioning', startAngle:22.5, endAngle:45,
    tagline:'Observing before intervening',
    desc:'Great leaders know when not to act. Stepping back gives space for others to step forward, and allows you to see patterns, dynamics, and opportunities that are invisible when you are in the middle of things.',
    modelTitle:'Balcony and Dance Floor (Heifetz & Linsky)',
    modelDesc:'This metaphor describes two leadership perspectives: being on the dance floor (in the action) and going to the balcony (observing from above). Leaders who can move between both perspectives make better decisions because they see both the detail and the bigger picture.',
    bullets:['Regularly move between action and observation','Notice patterns that only become visible from a distance','Create deliberate pauses before reacting'],
    modelType:'balcony'
  },
  {
    id:'right-course', label:'Decide the right course of action',
    quadrant:'Visioning', startAngle:45, endAngle:67.5,
    tagline:'Making clear decisions with confidence',
    desc:'Decisive leadership does not mean rushing. It means gathering the right information, weighing options thoughtfully, and committing to a direction with clarity, even when conditions are uncertain.',
    modelTitle:'The Decision Matrix (Eisenhower Principle)',
    modelDesc:'This framework helps leaders prioritise decisions by plotting them against two axes: urgency and importance. It reveals which decisions need immediate action, which need planning, which can be delegated, and which should be dropped entirely.',
    bullets:['Separate urgency from importance','Spend more time in the "important but not urgent" space','Use the matrix to communicate priorities to your team'],
    modelType:'matrix'
  },
  {
    id:'clear-vision', label:'Set clear vision',
    quadrant:'Visioning', startAngle:67.5, endAngle:90,
    tagline:'Painting a compelling picture of the future',
    desc:'A clear vision gives people something to move toward. It creates alignment, energises effort, and helps teams make better decisions because they understand the destination.',
    modelTitle:'Vision to Action Framework',
    modelDesc:'This model connects an aspirational vision to concrete daily actions through a cascading chain: Vision leads to Mission, which informs Strategy, which drives Objectives, which shape Actions. Each level provides more specificity while staying anchored to the overarching purpose.',
    bullets:['A vision should inspire, not just inform','Connect every initiative back to the bigger picture','Revisit and refresh the vision regularly'],
    modelType:'vision'
  },

  // ── Mobilising (bottom-right, 90° to 180°, 5 segments) ──
  {
    id:'be-explicit', label:'Be explicit',
    quadrant:'Mobilising', startAngle:90, endAngle:108,
    tagline:'Saying what you mean with clarity',
    desc:'Being explicit means removing ambiguity from your communication. It means stating expectations clearly, naming what you see, and not assuming others have read between the lines.',
    modelTitle:'The Onion Model',
    modelDesc:'The Onion Model helps separate who a person is from what they do. At the core sit personality and values, which are deep-rooted and not the right target for performance conversations. The more useful focus is on the outer layers, attitudes and behaviours, because these are visible, more changeable, and far easier to address constructively.',
    bullets:['Focus feedback on behaviours and attitudes, not personality','Change is most achievable at the outer layers, where actions and approaches can be seen and shaped','Positive regard and clear explicitness make honest feedback easier to hear and act on'],
    modelType:'onion',
    bookPages:'117-121',
    noteTitle:'Keeping it fair and actionable',
    noteText:'The model is a useful reminder that effective challenge should stay with observable performance, not personal identity. It helps leaders be direct without becoming personal, and supports change by keeping conversations clear, fair and actionable.',
    hasWorksheet: true
  },
  {
    id:'root-issues', label:'Get to the root of issues',
    quadrant:'Mobilising', startAngle:108, endAngle:126,
    tagline:'Looking below the surface',

const CX = 1100, CY = 1100;
const R_INNER = 250;   // just outside hub
const R_OUTER = 730;   // stops before outer quadrant ring

function polarXY(cx, cy, r, angleDeg) {
  const rad = ((angleDeg - 90) * Math.PI) / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function wedgePath(cx, cy, r0, r1, a0, a1) {
  const p0 = polarXY(cx, cy, r1, a0);
  const p1 = polarXY(cx, cy, r1, a1);
  const p2 = polarXY(cx, cy, r0, a1);
  const p3 = polarXY(cx, cy, r0, a0);
  const large = (a1 - a0) > 180 ? 1 : 0;
  return `M${p0.x.toFixed(1)},${p0.y.toFixed(1)} A${r1},${r1} 0 ${large} 1 ${p1.x.toFixed(1)},${p1.y.toFixed(1)} L${p2.x.toFixed(1)},${p2.y.toFixed(1)} A${r0},${r0} 0 ${large} 0 ${p3.x.toFixed(1)},${p3.y.toFixed(1)} Z`;
}

let audioCtx = null;
let audioReady = false;
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
// Warm up AudioContext on first user gesture
document.addEventListener('click', function initAudio(){
  getCtx();
  audioReady = true;
  document.removeEventListener('click', initAudio);
}, {once: true});
document.addEventListener('mousemove', function initAudio2(){
  try { getCtx(); audioReady = true; } catch(e){}
  document.removeEventListener('mousemove', initAudio2);
}, {once: true});
function playShush(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.09),ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(); src.buffer=buf;
    const flt=ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=3800; flt.Q.value=0.7;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.018,now+.008); g.gain.exponentialRampToValueAtTime(.0001,now+.09);
    src.connect(flt); flt.connect(g); g.connect(ctx.destination); src.start(now); src.stop(now+.1);
  }catch(e){}
}
function playChime(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [523.25,783.99].forEach((freq,i)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.025-i*.006,now+.01); g.gain.exponentialRampToValueAtTime(.0001,now+.7);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+.75);
    });
  }catch(e){}
}
function playReturn(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [{f:783.99,d:0},{f:523.25,d:.09}].forEach(({f,d})=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=f;
      g.gain.setValueAtTime(0,now+d); g.gain.linearRampToValueAtTime(.022,now+d+.01); g.gain.exponentialRampToValueAtTime(.0001,now+d+.55);
      osc.connect(g); g.connect(ctx.destination); osc.start(now+d); osc.stop(now+d+.6);
    });
  }catch(e){}
}

function buildNavigatorVisual() {
  // Decision tree data
  const nodes = {
    start: {
      type:'action', label:'Start',
      text:'Define specific performance behaviours, including present undesirable ones and future desirable ones.',
      next:'q1'
    },
    q1: {
      type:'decision', label:'Question 1',
      text:'Does the person clearly know what is expected?',
      yes:'q2', no:'a1'
    },
    a1: {
      type:'action', label:'Action needed',
      text:'Describe what is required in explicit behavioural terms, and monitor subsequent performance closely.',
      next:'q2'
    },
    q2: {
      type:'decision', label:'Question 2',
      text:'Is the person now performing well?',
      yes:'end_reinforce', no:'q3'
    },
    end_reinforce: {
      type:'outcome',
      text:'Recognise and reinforce the new behaviour.',
      note:'Positive reinforcement sustains improvement. Make it specific and timely.'
    },
    q3: {
      type:'decision', label:'Question 3',
      text:'Do these matter in terms of actual performance?',
      yes:'q4_acid', no:'end_livewith'
    },
    end_livewith: {
      type:'outcome',
      text:'Live with the situation and concentrate on what matters.',
      note:'Not every imperfection needs correcting. Focus your energy where it counts.'
    },
    q4_acid: {
      type:'decision', label:'The Acid Test',
      text:'Could the person do what was required if their life depended on it? (This separates Can\'t Do from Won\'t Do.)',
      yes:'wont_q1', no:'cant_q1',
      yesLabel:'YES (Won\'t Do)', noLabel:'NO (Can\'t Do)'
    },
    // CAN'T DO (Skills) path
    cant_q1: {
      type:'decision', label:'Can\'t Do: Question 1',
      text:'Has the person done this work or activity successfully in the past?',
      yes:'cant_q2', no:'cant_q3'
    },
    cant_q2: {
      type:'decision', label:'Can\'t Do: Question 2',
      text:'Does the person have the ability and experience to do it?',
      yes:'cant_q4', no:'cant_q3'
    },
    cant_q3: {
      type:'decision', label:'Can\'t Do: Question 3',
      text:'Is the job, task, or body of work designed well, or could it be simplified?',
      yes:'end_redesign', no:'cant_q4'
    },
    end_redesign: {
      type:'outcome',
      text:'Redesign the job to simplify. Provide specific practice, review methods, and reset expectations.',
      note:'Sometimes the task itself is the barrier, not the person.'
    },
    cant_q4: {
      type:'decision', label:'Can\'t Do: Question 4',
      text:'Is the person well trained and knowledgeable?',
      yes:'end_monitor', no:'end_train'
    },
    end_train: {
      type:'outcome',
      text:'Increase the amount of training, practice, and coaching.',
      note:'Invest in building capability. Set clear milestones and review progress.'
    },
    end_monitor: {
      type:'outcome',
      text:'Provide specific, accountable results and monitor closely.',
      note:'The skills may be there but need structure and accountability to surface consistently.'
    },
    // WON'T DO (Attitude) path
    wont_q1: {
      type:'decision', label:'Won\'t Do: Question 1',
      text:'Does the person feel that it doesn\'t matter whether they perform well or not?',
      yes:'end_feedback', no:'wont_q2'
    },
    end_feedback: {
      type:'outcome',
      text:'Give praise and create positive, frequent feedback and recognition.',
      note:'People repeat what gets noticed. Make good performance visible and valued.'
    },
    wont_q2: {
      type:'decision', label:'Won\'t Do: Question 2',
      text:'Are there natural or automatic consequences if the person does the wrong thing?',
      yes:'end_penalties', no:'wont_q3'
    },
    end_penalties: {
      type:'outcome',
      text:'Act to remove unintended penalties for good performance.',
      note:'Sometimes doing the right thing is punished by extra workload or peer pressure. Remove those barriers.'
    },
    wont_q3: {
      type:'decision', label:'Won\'t Do: Question 3',
      text:'Are there any job design characteristics which prevent performance?',
      yes:'end_remove', no:'wont_q4'
    },
    end_remove: {
      type:'outcome',
      text:'Remove such characteristics.',
      note:'Environmental or structural factors can block even willing people.'
    },
    wont_q4: {
      type:'decision', label:'Won\'t Do: Question 4',
      text:'Does the person have a personal problem affecting this work?',
      yes:'end_support', no:'end_formal'
    },
    end_support: {
      type:'outcome',
      text:'Refer to suitable support. Consider whether adjustments can be made while the issue is resolved.',
      note:'Lead with compassion, but keep expectations clear.'
    },
    end_formal: {
      type:'outcome',
      text:'Consider the formal poor performance process, and ultimately, if necessary, dismissal.',
      note:'When all other avenues are exhausted, formal processes protect everyone involved.'
    }
  };

  const wrap = document.createElement('div');
  wrap.className = 'nav-wrap';

  let trail = [];
  let currentId = 'start';

  function render() {
    wrap.innerHTML = '';
    const node = nodes[currentId];

    // Trail of visited steps
    if (trail.length > 0) {
      const trailEl = document.createElement('div');
      trailEl.className = 'nav-trail';
      trail.forEach((t, i) => {
        const step = document.createElement('div');
        step.className = 'nav-step visited';
        const ansLabel = t.answer === 'yes' ? (nodes[t.id].yesLabel || 'Yes') : t.answer === 'no' ? (nodes[t.id].noLabel || 'No') : 'Continue';
        step.innerHTML = `<div class="nav-step-num">${i+1}</div><div><div class="nav-step-text">${nodes[t.id].text}</div>${t.answer ? '<div class="nav-step-answer">' + ansLabel + '</div>' : ''}</div>`;
        trailEl.appendChild(step);
      });
      wrap.appendChild(trailEl);
    }

    // Current node
    const current = document.createElement('div');

    if (node.type === 'action') {
      current.className = 'nav-current decision';
      current.innerHTML = `<div class="nav-q-label">${node.label}</div><div class="nav-q-text">${node.text}</div>`;
      const btn = document.createElement('button');
      btn.className = 'nav-yn yes';
      btn.style.maxWidth = '200px';
      btn.textContent = 'Continue';
      btn.addEventListener('click', () => {
        trail.push({ id: currentId, answer: null });
        currentId = node.next;
        render();
      });
      current.appendChild(btn);
    } else if (node.type === 'decision') {
      current.className = 'nav-current decision';
      current.innerHTML = `<div class="nav-q-label">${node.label}</div><div class="nav-q-text">${node.text}</div>`;
      const btns = document.createElement('div');
      btns.className = 'nav-btns';
      const yesBtn = document.createElement('button');
      yesBtn.className = 'nav-yn yes';
      yesBtn.textContent = node.yesLabel || 'Yes';
      yesBtn.addEventListener('click', () => {
        trail.push({ id: currentId, answer: 'yes' });
        currentId = node.yes;
        render();
      });
      const noBtn = document.createElement('button');
      noBtn.className = 'nav-yn no';
      noBtn.textContent = node.noLabel || 'No';
      noBtn.addEventListener('click', () => {
        trail.push({ id: currentId, answer: 'no' });
        currentId = node.no;
        render();
      });
      btns.appendChild(yesBtn);
      btns.appendChild(noBtn);
      current.appendChild(btns);
    } else if (node.type === 'outcome') {
      current.className = 'nav-current outcome';
      current.innerHTML = `<div class="nav-q-label">Recommended Action</div><div class="nav-outcome-text">${node.text}</div><div class="nav-outcome-note">${node.note}</div>`;
    }

    wrap.appendChild(current);

    // Footer + reset
    const footer = document.createElement('div');
    footer.className = 'nav-footer';
    footer.innerHTML = '<p>Identify solution, act on it, and follow through consistently</p>';
    wrap.appendChild(footer);

    if (trail.length > 0) {
      const reset = document.createElement('button');
      reset.className = 'nav-reset';
      reset.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> Start again';
      reset.addEventListener('click', () => {
        trail = [];
        currentId = 'start';
        render();
      });
      wrap.appendChild(reset);
    }

    wrap.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  render();
  return wrap;
}

      transition:box-shadow .3s ease; }
    .${uid}-centre.pulse { animation:${uid}Pulse .72s ease; }
    @keyframes ${uid}Pulse {
      0%,100% { box-shadow:0 4px 22px rgba(0,97,173,.42), 0 0 0 3px rgba(255,255,255,.14); }
      42%      { box-shadow:0 6px 52px rgba(0,170,255,.78), 0 0 0 8px rgba(255,255,255,.44), 0 0 80px rgba(0,160,255,.22); }
    }
    .${uid}-ct   { font-size:7.5px; font-weight:700; color:white; line-height:1.45; text-transform:uppercase; letter-spacing:.05em; }
    .${uid}-cdiv { width:28px; height:1px; background:rgba(255,255,255,.28); margin:4px auto; }

    /* X axis row */
    .${uid}-x-row { display:flex; align-items:center; gap:0; margin-top:14px;
                    padding-left:60px; /* matches y-col width */ }
    .${uid}-x-label { font-family:"Barlow Condensed",sans-serif; font-size:9px; font-weight:700;
      color:#888; letter-spacing:.14em; text-transform:uppercase;
      text-align:center; margin-bottom:4px; }
    .${uid}-x-track { display:flex; align-items:center; gap:0; width:100%; }
    .${uid}-x-lo { font-family:"Barlow",sans-serif; font-size:11px; font-weight:700;
      color:#aaa; letter-spacing:.1em; text-transform:uppercase; margin-right:8px; flex-shrink:0;
      padding:4px 8px; border-radius:20px; background:transparent;
      transition:color .25s ease, background .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
    .${uid}-x-hi { font-family:"Barlow",sans-serif; font-size:11px; font-weight:700;
      color:#aaa; letter-spacing:.1em; text-transform:uppercase; margin-left:8px; flex-shrink:0;
      padding:4px 8px; border-radius:20px; background:transparent;
      transition:color .25s ease, background .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
    .${uid}-x-lo.lit { color:white; background:#009FA0; transform:scale(1.15);
      box-shadow:0 2px 12px rgba(0,159,160,.45); }
    .${uid}-x-hi.lit { color:white; background:#fa6b02; transform:scale(1.15);
      box-shadow:0 2px 12px rgba(250,107,2,.45); }
    .${uid}-x-line-wrap { flex:1; }

    /* Attribution */
    .${uid}-attrib { text-align:center; font-size:9px; color:#aaa; font-style:italic; margin-top:12px; }

    /* Scenario modal */
    .${uid}-modal-backdrop { position:absolute; inset:0; background:rgba(10,24,48,.55);
      border-radius:14px; z-index:20; display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .22s ease; backdrop-filter:blur(2px); }
    .${uid}-modal-backdrop.open { opacity:1; pointer-events:all; }
    .${uid}-modal-card { position:relative; width:88%; max-width:320px; border-radius:18px;
      padding:24px 22px 20px; color:white; box-shadow:0 16px 48px rgba(0,0,0,.35);
      transform:scale(.88) translateY(10px); transition:transform .28s cubic-bezier(.34,1.56,.64,1);
      overflow:hidden; }
    .${uid}-modal-backdrop.open .${uid}-modal-card { transform:scale(1) translateY(0); }
    .${uid}-modal-eyebrow { font-size:9px; font-weight:700; letter-spacing:.2em;
      text-transform:uppercase; color:rgba(255,255,255,.6); margin-bottom:6px; }
    .${uid}-modal-title { font-family:"Barlow Condensed",sans-serif; font-size:26px;
      font-weight:800; color:white; letter-spacing:.02em; margin-bottom:14px; }
    .${uid}-modal-divider { height:1px; background:rgba(255,255,255,.22); margin-bottom:14px; }
    .${uid}-modal-scenario-label { font-size:9px; font-weight:700; letter-spacing:.18em;
      text-transform:uppercase; color:rgba(255,255,255,.55); margin-bottom:8px; }
    .${uid}-modal-scenario { font-size:13px; color:rgba(255,255,255,.92); line-height:1.7; }
    .${uid}-modal-close { position:absolute; top:14px; right:14px; width:28px; height:28px;
      border-radius:50%; background:rgba(255,255,255,.18); border:none; color:white;
      font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .15s ease; line-height:1; }
    .${uid}-modal-close:hover { background:rgba(255,255,255,.32); }
    .${uid}-modal-shimmer { position:absolute; top:-50%; left:-75%; width:50%; height:200%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
      transform:skewX(-20deg); animation:${uid}MSw .7s .1s ease forwards; pointer-events:none; }
    @keyframes ${uid}MSw { from{left:-75%} to{left:150%} }
    .${uid}-cell { cursor:pointer; }
  `;
  container.appendChild(styleEl);

  // Helper: draw an SVG axis line with arrowhead
  function makeAxisSVG(isVertical, length) {
    const NS = 'http://www.w3.org/2000/svg';
    const w = isVertical ? 16 : length;
    const h = isVertical ? length : 16;
    const svg = document.createElementNS(NS,'svg');
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.setAttribute('width', w); svg.setAttribute('height', h);
    svg.style.overflow = 'visible';

    const defs = document.createElementNS(NS,'defs');
    const marker = document.createElementNS(NS,'marker');
    marker.setAttribute('id', `${uid}-arr-${isVertical?'v':'h'}`);
    marker.setAttribute('markerWidth','6'); marker.setAttribute('markerHeight','6');
    marker.setAttribute('refX','3'); marker.setAttribute('refY','3');
    marker.setAttribute('orient','auto');
    const poly = document.createElementNS(NS,'polygon');
    poly.setAttribute('points','0 0, 6 3, 0 6');
    poly.setAttribute('fill','#ccc');
    marker.appendChild(poly); defs.appendChild(marker); svg.appendChild(defs);

    const line = document.createElementNS(NS,'line');
    if (isVertical) {
      line.setAttribute('x1', w/2); line.setAttribute('y1', h);
      line.setAttribute('x2', w/2); line.setAttribute('y2', 0);
    } else {
      line.setAttribute('x1', 0);   line.setAttribute('y1', h/2);
      line.setAttribute('x2', w);   line.setAttribute('y2', h/2);
    }
    line.setAttribute('stroke','#ccc'); line.setAttribute('stroke-width','1.5');
    line.setAttribute('marker-end', `url(#${uid}-arr-${isVertical?'v':'h'})`);
    svg.appendChild(line);
    return svg;
  }

  // ---- Build layout ----
  const wrap = document.createElement('div');
  wrap.className = `${uid}-wrap`;

  // Middle row: Y axis + grid
  const midRow = document.createElement('div');
  midRow.className = `${uid}-mid-row`;

  // Y axis column — now flex-row: line sub-col then label
  const yCol = document.createElement('div');
  yCol.className = `${uid}-y-col`;

  // Sub-col: just Hi, line, Lo
  const yAxisPart = document.createElement('div');
  yAxisPart.className = `${uid}-y-axis-part`;

  const yHi = document.createElement('div');
  yHi.className = `${uid}-y-hi`; yHi.id = `${uid}-y-hi`; yHi.textContent = 'High';

  const yLineWrap = document.createElement('div');
  yLineWrap.className = `${uid}-y-line-wrap`;
  const yLineSvgHolder = document.createElement('div');
  yLineSvgHolder.style.cssText = 'width:16px;height:100%;display:flex;align-items:center;justify-content:center';
  yLineWrap.appendChild(yLineSvgHolder);

  const yLo = document.createElement('div');
  yLo.className = `${uid}-y-lo`; yLo.id = `${uid}-y-lo`; yLo.textContent = 'Low';

  yAxisPart.appendChild(yHi);
  yAxisPart.appendChild(yLineWrap);
  yAxisPart.appendChild(yLo);

  // Label sits to the right of the arrow line
  const yLabel = document.createElement('div');
  yLabel.className = `${uid}-y-label`;
  yLabel.textContent = 'Joint Decision Making';

  yCol.appendChild(yAxisPart);
  yCol.appendChild(yLabel);
  midRow.appendChild(yCol);

  // Grid column
  const gridCol = document.createElement('div');
  gridCol.className = `${uid}-grid-col`;

  const grid = document.createElement('div');
  grid.className = `${uid}-grid`;

  // Centre circle
  const centre = document.createElement('div');
  centre.className = `${uid}-centre`; centre.id = `${uid}-centre`;
  centre.innerHTML = `
    <div class="${uid}-ct">High Challenge<br>High Support</div>
    <div class="${uid}-cdiv"></div>
    <div class="${uid}-ct">Situational<br>Consistency</div>
    <div class="${uid}-cdiv"></div>
    <div class="${uid}-ct" style="font-size:7px;opacity:.85">Positive Regard<br>&amp; Genuineness</div>
  `;
  grid.appendChild(centre);

  const cells = [
    { label:'Coaching',
      desc:'Leader facilitates, encourages and supports team member\'s judgements and provides advice',
      scenario:'An experienced team member is facing a challenge or decision and would benefit from structured questions that help them think it through and reach their own conclusion.',
      bg:'#009FA0', glowRgb:'0,159,160', xPos:'low', yPos:'high', toneA:523, toneB:659 },
    { label:'Mentoring',
      desc:'Leader briefs team member in what is required, but also seeks their opinions and judgements',
      scenario:'A capable but still developing colleague is taking on a new responsibility and needs guidance, context and occasional steer from someone more experienced.',
      bg:'#0061AD', glowRgb:'0,97,173', xPos:'high', yPos:'high', toneA:659, toneB:880 },
    { label:'Delegating',
      desc:'Leader hands over complete discretion for a task so that the team member manages it and makes decisions for self',
      scenario:'A trusted, proven colleague is given full ownership of a familiar task, with clear outcomes agreed and minimal intervention needed.',
      bg:'#1A3A5C', glowRgb:'26,58,92', xPos:'low', yPos:'low', toneA:440, toneB:554 },
    { label:'Directing',
      desc:'Leader gives explicit briefing for a task and monitors performance closely',
      scenario:'A new starter is carrying out a safety-critical process for the first time and needs clear instruction, close checking, and no ambiguity.',
      bg:'#fa6b02', glowRgb:'250,107,2', xPos:'high', yPos:'low', toneA:784, toneB:988 }
  ];

  cells.forEach(c => {
    const cell = document.createElement('div');
    cell.className = `${uid}-cell`;
    cell.style.background = c.bg;
    cell.innerHTML = `<div class="${uid}-cell-label">${c.label}</div><div class="${uid}-cell-desc">${c.desc}</div><div class="${uid}-pill">See example</div><div class="${uid}-dot"></div>`;

    cell.addEventListener('mouseenter', () => {
      grid.querySelectorAll(`.${uid}-cell`).forEach(el => {
        if (el !== cell) { el.classList.add('dimmed');  el.classList.remove('hovered'); el.style.boxShadow = ''; }
        else             { el.classList.add('hovered'); el.classList.remove('dimmed');
                           el.style.boxShadow = `0 14px 40px rgba(${c.glowRgb},.55)`; }
      });

      // Shimmer sweep
      const old = cell.querySelector(`.${uid}-sweep`);
      if (old) old.remove();
      const sweep = document.createElement('div');
      sweep.className = `${uid}-sweep`;
      cell.appendChild(sweep);
      setTimeout(() => { if (sweep.parentNode) sweep.remove(); }, 600);

      // Centre pulse
      const centreEl = document.getElementById(`${uid}-centre`);
      centreEl.classList.remove('pulse');
      void centreEl.offsetWidth;
      centreEl.classList.add('pulse');

      // Axis highlights
      const yhEl = document.getElementById(`${uid}-y-hi`);
      const ylEl = document.getElementById(`${uid}-y-lo`);
      const xhEl = document.getElementById(`${uid}-x-hi`);
      const xlEl = document.getElementById(`${uid}-x-lo`);
      if (yhEl) { yhEl.classList.toggle('lit', c.yPos === 'high'); yhEl.classList.toggle('dimmed-ax', c.yPos !== 'high'); }
      if (ylEl) { ylEl.classList.toggle('lit', c.yPos === 'low');  ylEl.classList.toggle('dimmed-ax', c.yPos !== 'low'); }
      if (xhEl) { xhEl.classList.toggle('lit', c.xPos === 'high'); xhEl.classList.toggle('dimmed-ax', c.xPos !== 'high'); }
      if (xlEl) { xlEl.classList.toggle('lit', c.xPos === 'low');  xlEl.classList.toggle('dimmed-ax', c.xPos !== 'low'); }

      // Also update arrow colours in SVG
      document.querySelectorAll(`#${uid}-arr-v polygon, #${uid}-arr-h polygon`).forEach(p => p.setAttribute('fill','#aaa'));

      // Sound
      try {
        const ctx = getCtx(), now = ctx.currentTime;
        [c.toneA, c.toneB].forEach((freq, i) => {
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.type = 'sine'; osc.frequency.value = freq;
          const t = now + i * 0.06;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.02 - i * 0.006, t + 0.016);
          g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
          osc.connect(g); g.connect(ctx.destination);
          osc.start(t); osc.stop(t + 0.6);
        });
      } catch(e) {}
    });

    cell.addEventListener('mouseleave', () => {
      grid.querySelectorAll(`.${uid}-cell`).forEach(el => {
        el.classList.remove('dimmed','hovered');
        el.style.boxShadow = '';
      });
      [document.getElementById(`${uid}-y-hi`), document.getElementById(`${uid}-y-lo`),
       document.getElementById(`${uid}-x-hi`), document.getElementById(`${uid}-x-lo`)].forEach(el => {
        if (el) { el.classList.remove('lit','dimmed-ax'); }
      });
    });

    // Click handler: show scenario modal
    cell.addEventListener('click', () => {
      const backdrop = document.getElementById(`${uid}-backdrop`);
      const card = document.getElementById(`${uid}-modal-card`);
      // Update card colour and content
      card.style.background = c.bg;
      card.querySelector(`.${uid}-modal-title`).textContent = c.label;
      card.querySelector(`.${uid}-modal-scenario`).textContent = c.scenario;
      // Re-trigger shimmer
      const oldShimmer = card.querySelector(`.${uid}-modal-shimmer`);
      if (oldShimmer) oldShimmer.remove();
      const shimmer = document.createElement('div');
      shimmer.className = `${uid}-modal-shimmer`;
      card.appendChild(shimmer);
      setTimeout(() => { if (shimmer.parentNode) shimmer.remove(); }, 900);
      backdrop.classList.add('open');
      playChime();
    });

    grid.appendChild(cell);
  });

  // Build modal backdrop (scoped inside the grid wrapper)
  const backdrop = document.createElement('div');
  backdrop.className = `${uid}-modal-backdrop`;
  backdrop.id = `${uid}-backdrop`;

  const modalCard = document.createElement('div');
  modalCard.className = `${uid}-modal-card`;
  modalCard.id = `${uid}-modal-card`;
  modalCard.innerHTML = `
    <button class="${uid}-modal-close" id="${uid}-modal-close" aria-label="Close">✕</button>
    <div class="${uid}-modal-eyebrow">When to use this style</div>
    <div class="${uid}-modal-title"></div>
    <div class="${uid}-modal-divider"></div>
    <div class="${uid}-modal-scenario-label">Example scenario</div>
    <div class="${uid}-modal-scenario"></div>
  `;

  backdrop.appendChild(modalCard);

  // Close on backdrop click (outside card)
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) backdrop.classList.remove('open');
  });
  // Close button
  modalCard.querySelector(`#${uid}-modal-close`).addEventListener('click', () => {
    backdrop.classList.remove('open');
  });
  // Close on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') backdrop.classList.remove('open');
  });

  gridCol.style.position = 'relative';
  gridCol.appendChild(grid);
  gridCol.appendChild(backdrop);
  midRow.appendChild(gridCol);
  wrap.appendChild(midRow);

  // ---- X axis row ----
  const xBlock = document.createElement('div');
  xBlock.style.cssText = 'padding-left:60px;margin-top:14px';

  const xLabelRow = document.createElement('div');
  xLabelRow.className = `${uid}-x-label`;
  xLabelRow.textContent = "Leader's Explicit Direction";
  xBlock.appendChild(xLabelRow);

  const xTrack = document.createElement('div');
  xTrack.className = `${uid}-x-track`;

  const xLo = document.createElement('div');
  xLo.className = `${uid}-x-lo`; xLo.id = `${uid}-x-lo`; xLo.textContent = 'Low';

  const xLineWrap = document.createElement('div');
  xLineWrap.className = `${uid}-x-line-wrap`;
  const xLineSvgHolder = document.createElement('div');
  xLineSvgHolder.style.cssText = 'width:100%;height:16px';
  xLineWrap.appendChild(xLineSvgHolder);

  const xHi = document.createElement('div');
  xHi.className = `${uid}-x-hi`; xHi.id = `${uid}-x-hi`; xHi.textContent = 'High';

  xTrack.appendChild(xLo);
  xTrack.appendChild(xLineWrap);
  xTrack.appendChild(xHi);
  xBlock.appendChild(xTrack);
  wrap.appendChild(xBlock);

  // Attribution
  const attrib = document.createElement('div');
  attrib.className = `${uid}-attrib`;
  attrib.textContent = 'Based on Blanchard, Zigarmi & Zigarmi 1985';
  wrap.appendChild(attrib);

  container.appendChild(wrap);

  // Draw axis SVG lines once layout is in the DOM and has size
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // Y line
      const yH = yLineWrap.offsetHeight;
      if (yH > 0) {
        const ysvg = makeAxisSVG(true, yH);
        ysvg.style.cssText = 'width:16px;height:100%;display:block';
        yLineSvgHolder.innerHTML = '';
        yLineSvgHolder.appendChild(ysvg);
      }
      // X line
      const xW = xLineSvgHolder.offsetWidth;
      if (xW > 0) {
        const xsvg = makeAxisSVG(false, xW);
        xsvg.style.cssText = 'width:100%;height:16px;display:block';
        xLineSvgHolder.innerHTML = '';
        xLineSvgHolder.appendChild(xsvg);
      }
    });
  });

  return container;
}

    .${uid}-btn-primary{background:#0061AD;color:white;box-shadow:0 4px 14px rgba(0,97,173,.2)}
    .${uid}-btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,97,173,.3)}
    .${uid}-btn-primary:disabled{background:#b0c4d8;cursor:not-allowed}
    .${uid}-btn-ghost{background:#e4edf5;color:#666}
    .${uid}-btn-ghost:hover{background:#d0dce8;color:#333}
    .${uid}-btn-download{background:#009FA0;color:white;box-shadow:0 4px 14px rgba(0,159,160,.2)}
    .${uid}-btn-download:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,159,160,.3)}
    .${uid}-ml{margin-left:auto}
    .${uid}-begin{display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 0 6px}
    .${uid}-begin-title{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:18px;color:#004B86;margin-bottom:6px}
    .${uid}-begin-sub{font-size:12px;color:#666;line-height:1.6;max-width:320px;margin-bottom:16px}
    .${uid}-divider{height:1px;background:#e4edf5;margin:14px 0}
  `;

  function getCat(id) { return CATS.find(c => c.id === id); }
  function getFactor(name) { return ALL.find(f => f.name === name); }

  function buildSteps(current) {
    const d = document.createElement('div');
    d.className = uid+'-steps';
    [1,2,3,4].forEach((n,i) => {
      const s = document.createElement('div');
      s.className = uid+'-step'+(n < current?' done':n===current?' active':'');
      d.appendChild(s);
      if (i<3){const g=document.createElement('div');g.className=uid+'-step-gap';d.appendChild(g);}
    });
    return d;
  }

  function buildCounter(count, max, label) {
    const d = document.createElement('div');
    d.className = uid+'-counter'+(count>=max?' full':'');
    d.innerHTML = '<span>'+count+' / '+max+'</span><span>'+label+'</span>';
    return d;
  }

  function buildChip(f, isSelected, isDimmed, isTop2) {
    const chip = document.createElement('div');
    chip.className = uid+'-chip'+(isSelected?' selected':'')+(isDimmed?' dimmed':'')+(isTop2?' top2-pick':'');
    chip.style.borderColor = isSelected ? f.catColor : 'transparent';
    chip.style.color = f.catColor;
    chip.innerHTML =
      '<div class="'+uid+'-chip-cat">'+f.catLabel+'</div>'+
      '<div class="'+uid+'-chip-name">'+f.name+'</div>'+
      (isSelected ? '<div class="'+uid+'-chip-desc">'+f.desc+'</div>' : '')+
      '<div class="'+uid+'-chip-check" style="background:'+(isSelected?f.catColor:'#e4edf5')+'">'+
        (isTop2?'&#9733;':'&#10003;')+'</div>';
    return chip;
  }

  function renderBrowse() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);

    const tabBar = document.createElement('div');
    tabBar.className = uid+'-tabs';
    CATS.forEach(cat => {
      const t = document.createElement('button');
      t.className = uid+'-tab'+(cat.id===activeTab?' active':'');
      t.textContent = cat.label;
      t.style.background = cat.id===activeTab ? cat.color : '';
      t.addEventListener('click', () => { playMITab(cat.id); activeTab=cat.id; renderBrowse(); });
      tabBar.appendChild(t);
    });
    wrap.appendChild(tabBar);

    const cat = getCat(activeTab);
    const rows = document.createElement('div');
    rows.className = uid+'-rows';
    cat.factors.forEach((f,i) => {
      const row = document.createElement('div');
      row.className = uid+'-row';
      row.style.animationDelay = (i*0.04)+'s';
      row.style.borderLeftColor = cat.color;
      row.innerHTML = '<div class="'+uid+'-row-name" style="color:'+cat.color+'">'+f.name+'</div>'+
                      '<div class="'+uid+'-row-desc">'+f.desc+'</div>';
      rows.appendChild(row);
    });
    wrap.appendChild(rows);

    const begin = document.createElement('div');
    begin.className = uid+'-begin';
    begin.innerHTML = '<div class="'+uid+'-begin-title">Ready to explore your motivation pattern?</div>'+
      '<div class="'+uid+'-begin-sub">Browse all three categories first, then begin your personal reflection. It takes about two minutes and works best when you are honest with yourself.</div>';
    const btn = document.createElement('button');
    btn.className = uid+'-btn '+uid+'-btn-primary';
    btn.textContent = 'Begin reflection \u2192';
    btn.addEventListener('click', () => { playMIBegin(); sel6.clear(); top2.clear(); leastSet.clear(); renderSelect6(); });
    begin.appendChild(btn);
    wrap.appendChild(begin);
  }

  function renderSelect6() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);
    wrap.appendChild(buildSteps(2));

    const instr = document.createElement('div');
    instr.className = uid+'-instr';
    instr.innerHTML = '<div class="'+uid+'-instr-title">Step 1: Select your top 6</div>'+
      '<div class="'+uid+'-instr-sub">Which six factors matter most to you? Think about who you are, not who you think you should be.</div>';
    wrap.appendChild(instr);
    wrap.appendChild(buildCounter(sel6.size, 6, 'selected'));

    const chips = document.createElement('div');
    chips.className = uid+'-chips';
    ALL.forEach((f,i) => {
      const isSel = sel6.has(f.name);
      const isDim = sel6.size>=6 && !isSel;
      const chip = buildChip(f, isSel, isDim, false);
      chip.style.animationDelay = (i*0.025)+'s';
      chip.addEventListener('click', () => {
        if (sel6.has(f.name)) { sel6.delete(f.name); playMIDeselect(); }
        else if (sel6.size<6) { sel6.add(f.name); playMISelect(); }
        renderSelect6();
      });
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);

    const nav = document.createElement('div');
    nav.className = uid+'-nav';
    const back = document.createElement('button');
    back.className = uid+'-btn '+uid+'-btn-ghost';
    back.textContent = '\u2190 Browse factors';
    back.addEventListener('click', () => { playMIBack(); renderBrowse(); });
    const next = document.createElement('button');
    next.className = uid+'-btn '+uid+'-btn-primary '+uid+'-ml';
    next.textContent = 'Next: Pick your top 2 \u2192';
    next.disabled = sel6.size!==6;
    next.addEventListener('click', () => { if(sel6.size===6){ playMINext(); top2.clear();renderSelect2();} });
    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderSelect2() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);
    wrap.appendChild(buildSteps(3));

    const instr = document.createElement('div');
    instr.className = uid+'-instr';
    instr.innerHTML = '<div class="'+uid+'-instr-title">Step 2: Your top 2 of all</div>'+
      '<div class="'+uid+'-instr-sub">From your six, which two are your most important motivators of all? These are your primary drivers.</div>';
    wrap.appendChild(instr);
    wrap.appendChild(buildCounter(top2.size, 2, 'chosen'));

    const chips = document.createElement('div');
    chips.className = uid+'-chips';
    sel6.forEach((name,i) => {
      const f = getFactor(name);
      const isSel = top2.has(name);
      const isDim = top2.size>=2 && !isSel;
      const chip = buildChip(f, isSel, isDim, isSel);
      chip.addEventListener('click', () => {
        if (top2.has(name)) { top2.delete(name); playMIDeselect(); }
        else if (top2.size<2) { top2.add(name); playMISelect(); }
        renderSelect2();
      });
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);

    const nav = document.createElement('div');
    nav.className = uid+'-nav';
    const back = document.createElement('button');
    back.className = uid+'-btn '+uid+'-btn-ghost';
    back.textContent = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); renderSelect6(); });
    const next = document.createElement('button');
    next.className = uid+'-btn '+uid+'-btn-primary '+uid+'-ml';
    next.textContent = 'Next: Least important \u2192';
    next.disabled = top2.size!==2;
    next.addEventListener('click', () => { if(top2.size===2){ playMINext(); leastSet.clear();renderSelectLeast();} });
    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderSelectLeast() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);
    wrap.appendChild(buildSteps(4));

    const instr = document.createElement('div');
    instr.className = uid+'-instr';
    instr.innerHTML = '<div class="'+uid+'-instr-title">Step 3: Least important</div>'+
      '<div class="'+uid+'-instr-sub">From the remaining factors, select those that matter least to you right now. There is no right or wrong answer here.</div>';
    wrap.appendChild(instr);

    const counter = document.createElement('div');
    counter.className = uid+'-counter'+(leastSet.size>0?' full':'');
    counter.textContent = leastSet.size+' selected';
    wrap.appendChild(counter);

    const chips = document.createElement('div');
    chips.className = uid+'-chips';
    ALL.filter(f => !sel6.has(f.name)).forEach((f,i) => {
      const isSel = leastSet.has(f.name);
      const chip = buildChip(f, isSel, false, false);
      chip.style.animationDelay = (i*0.03)+'s';
      chip.addEventListener('click', () => {
        if (leastSet.has(f.name)) { leastSet.delete(f.name); playMIDeselect(); }
        else { leastSet.add(f.name); playMISelect(); }
        renderSelectLeast();
      });
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);

    const nav = document.createElement('div');
    nav.className = uid+'-nav';
    const back = document.createElement('button');
    back.className = uid+'-btn '+uid+'-btn-ghost';
    back.textContent = '\u2190 Back';
    back.addEventListener('click', () => { playMIBack(); renderSelect2(); });
    const next = document.createElement('button');
    next.className = uid+'-btn '+uid+'-btn-primary '+uid+'-ml';
    next.textContent = 'See my profile \u2192';
    next.addEventListener('click', () => { playMIComplete(); renderProfile(); });
    nav.appendChild(back); nav.appendChild(next);
    wrap.appendChild(nav);
  }

  function renderProfile() {
    wrap.innerHTML = '';
    wrap.appendChild(styleEl);
    wrap.appendChild(buildSteps(5));

    const scores = {people:0, achievement:0, enjoyment:0};
    sel6.forEach(name => { const f=getFactor(name); if(f) scores[f.catId]++; });

    const titleEl = document.createElement('div');
    titleEl.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:#004B86;margin-bottom:14px';
    titleEl.textContent = 'Your Motivation Profile';
    wrap.appendChild(titleEl);

    // PAE bars
    const pae = document.createElement('div');
    pae.className = uid+'-pae';
    CATS.forEach(cat => {
      const score = scores[cat.id];
      const pct = Math.round((score/6)*100);
      const row = document.createElement('div');
      row.className = uid+'-pae-row';
      const fill = document.createElement('div');
      fill.className = uid+'-pae-fill';
      fill.style.background = cat.color;
      fill.setAttribute('data-pct', pct);
      fill.innerHTML = score>0?'<span class="'+uid+'-pae-count">'+score+' of 6</span>':'';
      row.innerHTML = '<div class="'+uid+'-pae-label" style="color:'+cat.color+'">'+cat.label+'</div>'+
                      '<div class="'+uid+'-pae-track"></div>'+
                      '<div class="'+uid+'-pae-score" style="color:'+cat.color+'">'+score+'</div>';
      row.querySelector('.'+uid+'-pae-track').appendChild(fill);
      pae.appendChild(row);
    });
    wrap.appendChild(pae);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        wrap.querySelectorAll('.'+uid+'-pae-fill').forEach(el => { el.style.width = el.getAttribute('data-pct')+'%'; });
      });
    });

    // Top 2 heroes
    const heroLabel = document.createElement('div');
    heroLabel.className = uid+'-tag-group-label';
    heroLabel.textContent = 'Your top 2 motivators';
    wrap.appendChild(heroLabel);

    const heroPair = document.createElement('div');
    heroPair.className = uid+'-hero-pair';
    [...top2].forEach((name,i) => {
      const f = getFactor(name);
      const hero = document.createElement('div');
      hero.className = uid+'-hero';
      hero.style.background = f.catColor;
      hero.style.animationDelay = (i*0.1)+'s';
      hero.innerHTML = '<div class="'+uid+'-hero-num">'+(i+1)+'</div>'+
                       '<div class="'+uid+'-hero-eyebrow">'+f.catLabel+'</div>'+
                       '<div class="'+uid+'-hero-name">'+f.name+'</div>'+
                       '<div class="'+uid+'-hero-desc">'+f.desc+'</div>';
      heroPair.appendChild(hero);
    });
    wrap.appendChild(heroPair);

    // Top 6 tags
    const top6Group = document.createElement('div');
    top6Group.className = uid+'-tag-group';
    top6Group.innerHTML = '<div class="'+uid+'-tag-group-label">All 6 of your key motivators</div>';
    const top6Tags = document.createElement('div');
    top6Tags.className = uid+'-tags';
    sel6.forEach(name => {
      const f = getFactor(name);
      const tag = document.createElement('div');
      tag.className = uid+'-tag';
      tag.style.background = f.catColor;
      tag.textContent = f.name + (top2.has(name)?' \u2605':'');
      top6Tags.appendChild(tag);
    });
    top6Group.appendChild(top6Tags);
    wrap.appendChild(top6Group);

    // Least important
    if (leastSet.size>0) {
      const leastGroup = document.createElement('div');
      leastGroup.className = uid+'-tag-group';
      leastGroup.innerHTML = '<div class="'+uid+'-tag-group-label">Factors you rated least important</div>';
      const leastTags = document.createElement('div');
      leastTags.className = uid+'-tags';
      leastSet.forEach(name => {
        const tag = document.createElement('div');
        tag.className = uid+'-tag least';
        tag.textContent = name;
        leastTags.appendChild(tag);
      });
      leastGroup.appendChild(leastTags);
      wrap.appendChild(leastGroup);
    }

    // Interpretation
    const domCat = CATS.reduce((a,b) => scores[a.id]>=scores[b.id]?a:b);
    const interpMap = {
      people:'Your profile shows a strong People orientation. To make the most of this as a leader, pair it with Achievement focus to ensure your care for others drives real results. High People motivation is your superpower when it creates movement, not just connection.',
      achievement:'Your profile shows a strong Achievement orientation. This is a hallmark of effective Leader-Developers. Stay mindful of your Enjoyment needs to prevent tunnel vision, and keep People motivation visible so your team feels the human side of your drive.',
      enjoyment:'Your profile shows strong Enjoyment motivators. These are the conditions that allow you to sustain performance without burning out. Work to ensure Achievement and People motivators are also present, so your environment supports both you and the people around you.'
    };
    const interp = document.createElement('div');
    interp.className = uid+'-interp';
    interp.innerHTML = '<div class="'+uid+'-interp-label">A note on your profile</div>'+
                       '<div class="'+uid+'-interp-text">'+interpMap[domCat.id]+'</div>';
    wrap.appendChild(interp);

    const div = document.createElement('div');
    div.className = uid+'-divider';
    wrap.appendChild(div);

    const nav = document.createElement('div');
    nav.className = uid+'-nav';
    const restart = document.createElement('button');
    restart.className = uid+'-btn '+uid+'-btn-ghost';
    restart.textContent = '\u21BA Start again';
    restart.addEventListener('click', () => {
      playMIBack();
      sel6.clear(); top2.clear(); leastSet.clear();
      phase='browse'; activeTab='people'; renderBrowse();
    });
    const dl = document.createElement('button');
    dl.className = uid+'-btn '+uid+'-btn-download '+uid+'-ml';
    dl.textContent = '\u2193 Download profile';
    dl.addEventListener('click', () => { playMIDownload(); generateMotivationPDF(top2, sel6, leastSet, scores); });
    nav.appendChild(restart); nav.appendChild(dl);
    wrap.appendChild(nav);
  }

  renderBrowse();
  return wrap;
}

function buildAARVisual() {
  const svg = createSVG(400, 200);
  const qs = [
    { q:'What was supposed to happen?', icon:'🎯' },
    { q:'What actually happened?', icon:'📋' },
    { q:'Why was there a difference?', icon:'🔍' },
    { q:'What can we learn?', icon:'💡' }
  ];
  qs.forEach((item, i) => {
    const y = i * 44 + 14;
    addRect(svg, 50, y, 310, 36, i===3?'#004B86':'#0061AD', 8);
    addText(svg, 72, y+22, item.icon, 'white', 14);
    addText(svg, 210, y+22, item.q, 'white', 11, 500);
    if (i < 3) addLine(svg, 205, y+36, 205, y+44, '#ccc', 1, '3,3');
  });
  return svg;
}

// SVG helper functions
function createSVG(w, h) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.style.width = '100%';
  svg.style.height = 'auto';
  return svg;
}
function addRect(svg, x, y, w, h, fill, r=0) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','rect');
  el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('width',w); el.setAttribute('height',h);
  el.setAttribute('fill',fill); el.setAttribute('rx',r);
  svg.appendChild(el);
  return el;
}
function addCircle(svg, cx, cy, r, fill, stroke, sw) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','circle');
  el.setAttribute('cx',cx); el.setAttribute('cy',cy); el.setAttribute('r',r); el.setAttribute('fill',fill);
  if(stroke){el.setAttribute('stroke',stroke);el.setAttribute('stroke-width',sw);}
  svg.appendChild(el); return el;
}
function addText(svg, x, y, text, fill, size, weight, rotate) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','text');
  el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('text-anchor','middle');
  el.setAttribute('dominant-baseline','middle');
  el.setAttribute('fill',fill); el.setAttribute('font-size',size);
  el.setAttribute('font-family',"'Barlow',sans-serif");
  if(weight) el.setAttribute('font-weight',weight);
  if(rotate) el.setAttribute('transform',`rotate(${rotate},${x},${y})`);
  el.textContent = text;
  svg.appendChild(el); return el;
}
function addLine(svg, x1, y1, x2, y2, stroke, sw, dash) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','line');
  el.setAttribute('x1',x1); el.setAttribute('y1',y1); el.setAttribute('x2',x2); el.setAttribute('y2',y2);
  el.setAttribute('stroke',stroke); el.setAttribute('stroke-width',sw);
  if(dash) el.setAttribute('stroke-dasharray',dash);
  svg.appendChild(el); return el;
}
function addTrapezoid(svg, x, y, w, h, fill, r) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','rect');
  el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('width',w); el.setAttribute('height',h);
  el.setAttribute('fill',fill); el.setAttribute('rx',r);
  svg.appendChild(el); return el;
}

function buildHeader(rightEl) {
  const header = document.createElement('div');
  header.className = 'header';
