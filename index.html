    pdf += `trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

    const blob = new Blob([pdf], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'Feedback-Plan-' + new Date().toISOString().slice(0,10) + '.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error('PDF error', e); }
}

// ── PDF Generator ──
function downloadChangeSheetPDF(issue, less, more) {
  // Simple PDF builder - no libraries needed
  const W = 595.28, H = 841.89; // A4 in points
  const M = 50; // margin
  const blue = '0 0.38 0.68';
  const white = '1 1 1';
  const grey = '0.4 0.4 0.4';

  let objects = [];
  let objCount = 0;
  let content = '';

  function addObj(str) {
    objCount++;
    objects.push({ id: objCount, data: str });
    return objCount;
  }

  function wrapText(text, maxChars) {
    if (!text) return [''];
    const words = text.split(/\s+/);
    const lines = [];
    let line = '';
    words.forEach(w => {
      if ((line + ' ' + w).trim().length > maxChars) {
        lines.push(line.trim());
        line = w;
      } else {
        line = (line + ' ' + w).trim();
      }
    });
    if (line) lines.push(line.trim());
    return lines.length ? lines : [''];
  }

  function escPDF(str) {
    return str.replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
  }

  // Build page stream
  let s = '';
  const lh = 16; // line height
  let y = H - M;

  // Title bar
  s += `${blue} rg\n`;
  s += `${M} ${H - M - 40} ${W - 2*M} 40 re f\n`;
  s += `${white} rg\n`;
  s += `BT /F1 16 Tf ${M + 12} ${H - M - 27} Td (${escPDF('Story Liberator - Change Sheet')}) Tj ET\n`;
  s += `BT /F2 9 Tf ${W - M - 120} ${H - M - 27} Td (${escPDF('Liberator Programme - p.126')}) Tj ET\n`;

  y = H - M - 60;

  // Performance Issue section
  s += `${grey} rg\n`;
  s += `BT /F1 11 Tf ${M} ${y} Td (${escPDF('Issue')}) Tj ET\n`;
  y -= 6;
  s += `0.78 0.82 0.87 rg\n`;
  const issueLines = wrapText(issue || '(No issue described)', 75);
  const issueBoxH = Math.max(60, issueLines.length * lh + 20);
  s += `${M} ${y - issueBoxH} ${W - 2*M} ${issueBoxH} re f\n`;
  s += `0.2 0.2 0.2 rg\n`;
  let iy = y - 16;
  issueLines.forEach(line => {
    s += `BT /F2 10 Tf ${M + 10} ${iy} Td (${escPDF(line)}) Tj ET\n`;
    iy -= lh;
  });
  y -= issueBoxH + 20;

  // Two columns
  const colW = (W - 2*M - 16) / 2;
  const colH = 340;

  // Left column header
  s += `${blue} rg\n`;
  s += `${M} ${y - 42} ${colW} 42 re f\n`;
  s += `${white} rg\n`;
  s += `BT /F1 9 Tf ${M + 8} ${y - 16} Td (${escPDF('Present Undesirable Behaviours')}) Tj ET\n`;
  s += `BT /F2 8 Tf ${M + 8} ${y - 30} Td (${escPDF('(Less of required)')}) Tj ET\n`;

  // Right column header
  s += `${blue} rg\n`;
  s += `${M + colW + 16} ${y - 42} ${colW} 42 re f\n`;
  s += `${white} rg\n`;
  s += `BT /F1 9 Tf ${M + colW + 24} ${y - 16} Td (${escPDF('Future Desirable Behaviours')}) Tj ET\n`;
  s += `BT /F2 8 Tf ${M + colW + 24} ${y - 30} Td (${escPDF('(More of required)')}) Tj ET\n`;

  y -= 42;

  // Left column body
  s += `0.95 0.97 0.99 rg\n`;
  s += `${M} ${y - colH} ${colW} ${colH} re f\n`;
  s += `0.2 0.2 0.2 rg\n`;
  const lessLines = wrapText(less || '', 38);
  let ly = y - 16;
  lessLines.forEach(line => {
    if (ly > y - colH + 10) {
      s += `BT /F2 10 Tf ${M + 10} ${ly} Td (${escPDF(line)}) Tj ET\n`;
      ly -= lh;
    }
  });

  // Right column body
  s += `0.95 0.97 0.99 rg\n`;
  s += `${M + colW + 16} ${y - colH} ${colW} ${colH} re f\n`;
  s += `0.2 0.2 0.2 rg\n`;
  const moreLines = wrapText(more || '', 38);
  let ry = y - 16;
  moreLines.forEach(line => {
    if (ry > y - colH + 10) {
      s += `BT /F2 10 Tf ${M + colW + 26} ${ry} Td (${escPDF(line)}) Tj ET\n`;
      ry -= lh;
    }
  });

  // Column borders
  s += `0.78 0.82 0.87 RG\n0.5 w\n`;
  s += `${M} ${y - colH} ${colW} ${colH} re S\n`;
  s += `${M + colW + 16} ${y - colH} ${colW} ${colH} re S\n`;

  // Footer
  const fy = y - colH - 30;
  s += `${grey} rg\n`;
  s += `BT /F2 8 Tf ${M} ${fy} Td (${escPDF('Story Contracting - Liberator Programme - Change Sheet - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

  // Build PDF structure
  const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
  const pagesId = addObj(''); // placeholder
  const font1Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
  const font2Id = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
  const streamBytes = new TextEncoder().encode(s);
  const streamId = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
  const pageId = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);

  // Update pages object
  objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

  // Assemble PDF
  let pdf = '%PDF-1.4\n';
  const offsets = [];
  objects.forEach(obj => {
    offsets.push(pdf.length);
    pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`;
  });
  const xrefOffset = pdf.length;
  pdf += `xref\n0 ${objCount + 1}\n0000000000 65535 f \n`;
  offsets.forEach(off => {
    pdf += String(off).padStart(10, '0') + ' 00000 n \n';
  });
  pdf += `trailer\n<< /Size ${objCount + 1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

  // Download
  const blob = new Blob([pdf], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Change-Sheet-' + new Date().toISOString().slice(0,10) + '.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Motivation Profile PDF ──
function generateMotivationPDF(top2, sel6, leastSet, scores) {
  try {
    const W = 595, H = 842, M = 44;
    let objCount = 0;
    const objects = [];
    function addObj(data) { objCount++; objects.push({ id: objCount, data }); return objCount; }
    function escPDF(str) {
      return String(str).replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
    }
    function getCatId(name) {
      if (['Task Focus','Goal Orientation','Power & Authority','Responsibility','Initiative & Independence','Creativity','Challenge'].indexOf(name) !== -1) return 'achievement';
      if (['Suitability','Structure','Security','Tangible Reward','Variety & Fun','Recognition','Comfort'].indexOf(name) !== -1) return 'enjoyment';
      return 'people';
    }

    const blue = '0.00 0.38 0.68';
    const teal = '0.00 0.62 0.63';
    const pink = '0.75 0.22 0.36';
    const dark = '0.10 0.23 0.36';
    const white = '1 1 1';
    const grey = '0.55 0.55 0.55';
    const catColors = { people: pink, achievement: dark, enjoyment: teal };
    const catLabels = { people: 'People', achievement: 'Achievement', enjoyment: 'Enjoyment' };

    let s = '';
    const lh = 16;
    let y = H - M;

    // Title bar
    s += `${blue} rg\n`;
    s += `${M} ${H - M - 44} ${W - 2*M} 44 re f\n`;
    s += `${white} rg\n`;
    s += `BT /F1 15 Tf ${M + 12} ${H - M - 28} Td (${escPDF('Story Liberator - Motivation Profile')}) Tj ET\n`;
    s += `BT /F2 8 Tf ${W - M - 140} ${H - M - 28} Td (${escPDF('Liberator Programme | Ali Stewart & Co')}) Tj ET\n`;
    y = H - M - 62;

    // Section: Top 2
    s += `${grey} rg\n`;
    s += `BT /F1 10 Tf ${M} ${y} Td (${escPDF('YOUR TOP 2 MOTIVATORS')}) Tj ET\n`;
    y -= 8;
    const top2arr = [...top2];
    const colW = (W - 2*M - 10) / 2;
    top2arr.forEach((name, i) => {
      const x = M + (i * (colW + 10));
      const bh = 68;
      const catId = getCatId(name);
      const cc = catColors[catId];
      s += `${cc} rg\n`;
      s += `${x} ${y - bh} ${colW} ${bh} re f\n`;
      s += `${white} rg\n`;
      s += `BT /F2 8 Tf ${x + 10} ${y - 16} Td (${escPDF(catLabels[catId] + ' | #' + (i + 1))}) Tj ET\n`;
      s += `BT /F1 13 Tf ${x + 10} ${y - 32} Td (${escPDF(name)}) Tj ET\n`;
    });
    y -= 78;

    // Section: PAE balance bars
    s += `${grey} rg\n`;
    s += `BT /F1 10 Tf ${M} ${y} Td (${escPDF('MOTIVATION BALANCE')}) Tj ET\n`;
    y -= 8;
    const barW = W - 2*M - 50;
    [
      { id:'people',      label:'People',      color: pink },
      { id:'achievement', label:'Achievement', color: dark },
      { id:'enjoyment',   label:'Enjoyment',   color: teal }
    ].forEach(cat => {
      const score = scores[cat.id] || 0;
      const fillW = Math.max(8, Math.round((score / 6) * barW));
      s += `${cat.color} rg\n`;
      s += `${M} ${y - 14} ${fillW} 14 re f\n`;
      s += `0.88 0.90 0.93 rg\n`;
      s += `${M + fillW} ${y - 14} ${barW - fillW} 14 re f\n`;
      s += `${cat.color} rg\n`;
      s += `BT /F1 9 Tf ${M + barW + 6} ${y - 10} Td (${escPDF(score + '/6')}) Tj ET\n`;
      s += `${white} rg\n`;
      s += `BT /F2 8 Tf ${M + 4} ${y - 10} Td (${escPDF(cat.label)}) Tj ET\n`;
      y -= 20;
    });
    y -= 12;

    // Section: Top 6
    s += `${grey} rg\n`;
    s += `BT /F1 10 Tf ${M} ${y} Td (${escPDF('ALL 6 KEY MOTIVATORS')}) Tj ET\n`;
    y -= 8;
    [...sel6].forEach(name => {
      const isStar = top2.has(name);
      const catId = getCatId(name);
      const cc = catColors[catId];
      s += `${cc} rg\n`;
      s += `${M} ${y - 18} ${W - 2*M} 18 re f\n`;
      s += `${white} rg\n`;
      s += `BT /F1 9 Tf ${M + 6} ${y - 12} Td (${escPDF((isStar ? '** ' : '   ') + name)}) Tj ET\n`;
      s += `BT /F2 8 Tf ${W - M - 75} ${y - 12} Td (${escPDF(catLabels[catId])}) Tj ET\n`;
      y -= 22;
    });
    s += `${grey} rg\n`;
    s += `BT /F2 7 Tf ${M + 6} ${y - 10} Td (${escPDF('** = top 2 motivator')}) Tj ET\n`;
    y -= 24;

    // Section: Least important
    if (leastSet.size > 0) {
      y -= 4;
      s += `${grey} rg\n`;
      s += `BT /F1 10 Tf ${M} ${y} Td (${escPDF('FACTORS RATED LEAST IMPORTANT')}) Tj ET\n`;
      y -= 8;
      [...leastSet].forEach(name => {
        s += `0.92 0.94 0.96 rg\n`;
        s += `${M} ${y - 18} ${W - 2*M} 18 re f\n`;
        s += `0.40 0.40 0.40 rg\n`;
        s += `BT /F2 9 Tf ${M + 8} ${y - 12} Td (${escPDF(name)}) Tj ET\n`;
        y -= 22;
      });
    }

    // Footer
    s += `${grey} rg\n`;
    s += `BT /F2 7 Tf ${M} ${M - 8} Td (${escPDF('Story Contracting - Liberator Programme - Motivation Profile - Generated ' + new Date().toLocaleDateString('en-GB'))}) Tj ET\n`;

    // Build PDF objects
    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId   = addObj(''); // placeholder
    const font1Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id   = addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const streamBytes = new TextEncoder().encode(s);
    const streamId  = addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
    const pageId    = addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R >> >> >>`);
    objects[1].data = `<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`;

    // Assemble
    let pdf = '%PDF-1.4\n';
    const offsets = [];
    objects.forEach(obj => {
      offsets.push(pdf.length);
      pdf += `${obj.id} 0 obj\n${obj.data}\nendobj\n`;
    });
    const xrefOffset = pdf.length;
    pdf += `xref\n0 ${objCount + 1}\n0000000000 65535 f \n`;
    offsets.forEach(off => { pdf += String(off).padStart(10, '0') + ' 00000 n \n'; });
    pdf += `trailer\n<< /Size ${objCount + 1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

    // Download
    const blob = new Blob([pdf], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Motivation-Profile-' + new Date().toISOString().slice(0, 10) + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

  } catch(err) {
    console.error('Motivation PDF error:', err);
    alert('PDF generation error: ' + err.message);
  }
}

// ── Idle Nudge ──
(function() {
  const NUDGE_ITEMS = [
    { id:'be-explicit',  label:'Be explicit',               sub:'The Onion Model and Change Sheet', colour:'#1A3A5C' },
    { id:'get-to-root',  label:'Get to the root of issues', sub:'Performance Navigator',            colour:'#1A3A5C' },
    { id:'empower-team', label:'Empower team members',      sub:'Situational Leadership',           colour:'#0061AD' }
  ];
  let nudgeTimer = null, fadeTimer = null, nudgeEl = null;

  function buildNudge() {
    const el = document.createElement('div');
    el.className = 'idle-nudge'; el.id = 'idle-nudge';
    el.innerHTML =
      '<div class="idle-nudge-header">' +
        '<span class="idle-nudge-title">Not sure where to start?</span>' +
        '<button class="idle-nudge-close" id="idle-nudge-close" aria-label="Dismiss">&#x2715;</button>' +
      '</div>' +
      '<p class="idle-nudge-text">Here are three great places to begin exploring the Liberator wheel.</p>' +
      '<div class="idle-nudge-links">' +
        NUDGE_ITEMS.map(function(s) {
          return '<a class="idle-nudge-link" href="#/' + s.id + '" data-nudge-link>' +
            '<span class="idle-nudge-dot" style="background:' + s.colour + '"></span>' +
            '<span><span class="idle-nudge-label">' + s.label + '</span>' +
            '<span class="idle-nudge-sub">' + s.sub + '</span></span></a>';
        }).join('') +
      '</div>';
    document.body.appendChild(el);
    el.querySelector('#idle-nudge-close').addEventListener('click', hideNudge);
    el.querySelectorAll('[data-nudge-link]').forEach(function(a) { a.addEventListener('click', hideNudge); });
    return el;
  }

  function isHomePage() {
    var hash = window.location.hash.replace('#/','').trim();
    if (!hash) return true;
    return !SEGMENTS.find(function(s){ return s.id === hash; });
  }

  function showNudge() {
    var overlay = document.getElementById('welcome');
    if (overlay && !overlay.classList.contains('dismissed')) return;
    if (!isHomePage()) return;
    if (!nudgeEl) nudgeEl = buildNudge();
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        nudgeEl.classList.add('visible');
        clearTimeout(fadeTimer);
        fadeTimer = setTimeout(hideNudge, 15000);
      });
    });
  }

  function hideNudge() {
    clearTimeout(fadeTimer);
    if (!nudgeEl || !nudgeEl.classList.contains('visible')) return;
    nudgeEl.style.transition = 'opacity 1.2s ease-in-out, transform 1.2s ease-in-out';
    nudgeEl.style.opacity = '0';
    nudgeEl.style.transform = 'translateY(12px)';
    setTimeout(function() {
      if (nudgeEl) { nudgeEl.classList.remove('visible'); nudgeEl.style.opacity = ''; nudgeEl.style.transform = ''; nudgeEl.style.transition = ''; }
    }, 1200);
  }

  function resetTimer() {
    clearTimeout(nudgeTimer); hideNudge();
    if (isHomePage()) nudgeTimer = setTimeout(showNudge, 10000);
  }

  ['mousemove','keydown','mousedown','touchstart','scroll'].forEach(function(evt) {
    window.addEventListener(evt, resetTimer, { passive:true });
  });
  window.addEventListener('hashchange', function() {
    clearTimeout(nudgeTimer); hideNudge();
    if (isHomePage()) nudgeTimer = setTimeout(showNudge, 10000);
  });
  document.getElementById('welcome-btn').addEventListener('click', function() {
    nudgeTimer = setTimeout(showNudge, 10000);
  });
})();
</script>
